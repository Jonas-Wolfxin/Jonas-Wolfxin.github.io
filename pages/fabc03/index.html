ode>与<code>交换机接口</code>的地址对应表<code>Forward/Filter MAC database</code>(MAC地址条目的存活时间是 5min);</p></blockquote></li> <li><p>转发和过滤数据帧(Frame):</p> <blockquote><p>当交换机的接口接收到一个数据帧时，交换机就将帧中携带的目的地址和<code>Forward/Filter MAC database</code>中的记录进行比较:</p> <ul><li>如果目的硬件地址是已知的，即已经被列入到MAC表中，则该帧只被发送到指定的输出接口。交换机不会将此帧发送到除目的地接口之外的任何其他接口。这一过程叫做 帧过滤;</li> <li>如果<code>Forward/Filter MAC database</code>中没有列出目标方的MAC地址，那么此数据帧将会从除接收此帧接口之外的所有其他活动接口上泛洪出去。如果某个设备响应了被泛洪的数据帧，则交换机就会用此设备的位置(接口)信息来更新MAC地址表。</li></ul></blockquote></li> <li><p>二层环路避免: 通过STP避免在数据链路层由于交换机之间的冗余物理链路而形成的环路; (TTL的计算中的hop是指路由器间的跳转, 即三层的跳转, 对2层及以下是透明的)</p> <blockquote><ul><li>路由选择协议(如第8章介绍的RIP) 可以防止在<strong>网络层</strong>形成网络环路。</li> <li>然而，对于<strong>因交换机之间存在冗余物理链路而在数据链路层上形成的环路</strong>，路由选择协议无能为力。网络传播的数据帧会在所有冗余链路上同时被泛洪开来，这会导致<code>广播风暴</code>和其他严重的问题。这就是开发生成树协议的原因所在，可以防止在第2层交换式网络中形成环路。</li></ul></blockquote></li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207081721321.png" alt="image-20220708172156171" style="zoom:80%;"> <h2 id="交换的寻址过程"><a href="#交换的寻址过程" class="header-anchor">#</a> 交换的寻址过程</h2> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621140831792.png" alt="image-20220621140831792" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621141319943.png" alt="image-20220621141319943" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621141355454.png" alt="image-20220621141355454" style="zoom:40%;"> <h2 id="stp生成树协议"><a href="#stp生成树协议" class="header-anchor">#</a> STP生成树协议</h2> <blockquote><p>STP的主要任务是防止在第2层网络中因交换机之间的物理链路冗余而导致网络环路。它警惕地监视着网络以找出所有可用链路，并关闭任何冗余链路以确保不会出现环路。STP首先使用 生成树算法(STA) 创建一个拓扑数据库，然后找出并关闭冗余链路。运行STP后，数据帧就只能在STP选定的最优链路上进行转发。</p></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207081848217.png" alt="image-20220708184828063" style="zoom:70%;"> <h3 id="存在问题的网络拓扑设计"><a href="#存在问题的网络拓扑设计" class="header-anchor">#</a> 存在问题的网络拓扑设计</h3> <h4 id="单点故障-的问题"><a href="#单点故障-的问题" class="header-anchor">#</a> ==单点故障==的问题:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621234604906.png" alt="image-20220621234604906" style="zoom:40%;"> <h4 id="改进版-v1-冗余拓扑的问题"><a href="#改进版-v1-冗余拓扑的问题" class="header-anchor">#</a> ==改进版 v1: 冗余拓扑的问题==</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621234817209.png" alt="image-20220621234817209" style="zoom:40%;"> <ol><li><p>广播风暴</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621235216204.png" alt="image-20220621235216204" style="zoom:40%;"></li> <li><p>多帧复用</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621235411794.png" alt="image-20220621235411794"></p></li> <li><p>MAC地址紊乱</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621235552078.png" style="zoom:40%;"></li></ol> <h4 id="复杂的多环网络"><a href="#复杂的多环网络" class="header-anchor">#</a> ==复杂的多环网络==:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621235936357.png" alt="image-20220621235936357" style="zoom:40%;"> <blockquote><p>由此, STP协议默认是开启的, 因为一旦存在二层环路的网络运转起来，要想找出问题的根源会超级困难!</p></blockquote> <h3 id="spanning-tree-terms"><a href="#spanning-tree-terms" class="header-anchor">#</a> Spanning Tree Terms</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207101153882.png" alt="Spanning Tree » ADMIN-Magazin" style="zoom:67%;"> <blockquote><ul><li><code>BPDU</code> All the switches exchange information to use in the selection of the root switch as well as in subsequent configuration of the network. Each switch compares the parameters in the <strong>Bridge Protocol Data Unit (BPDU)</strong> that it sends to one neighbor with the ones that it receives from other neighbors.</li> <li><code>Root bridge</code>: <strong>The root bridge is the bridge with the best bridge ID</strong>. With STP, the key is for all the switches in the network to elect a root bridge that becomes the focal point in the network. All other decisions in the network, such as which port is to be blocked and which port is to be put in forwarding mode are made from the perspective of this root bridge. Once a root bridge is elected on the network, all other bridges must make a single path to this root bridge. The port with the best path to the root bridge is called the root port.
<ul><li><code>Non-root bridges</code> These are all bridges that are not the root bridge. Non-root bridges exchange BPDUs with all bridges and update the STP topology database on all switches, preventing loops and providing a measure of defense against link failures.</li></ul></li> <li><code>Bridge ID</code> The bridge ID is how STP keeps track of all the switches in the network. It is determined by a combination of the bridge priority (32,768 by default on all Cisco switches) and the base MAC address. The bridge with the lowest bridge ID becomes the root bridge in the network.</li> <li><code>Port cost</code> Port cost determines the best path when multiple links are used between two switches. <strong>The cost of a link is determined by the bandwidth of a link</strong>.</li> <li><code>Root port</code> <strong>The root port is always the link directly connected to the root bridge, or the lowest path cost to the root bridge.</strong> If more than one link connects to the root bridge, then a port cost is determined by checking the bandwidth of each link. The lowest-cost port becomes the root port. If multiple upstream switches have the same cost, the bridge with the lower advertising bridge ID is used. When multiple links connect to the same device, the port connected to the lowest port number on the upstream switch will be used.</li> <li><code>Designated port</code> A designated port is one that has been determined as <strong>having the best (lowest) cost to the root bridge via its root port</strong>. A designated port will be marked as a forwarding port.
<ul><li><code>Non-designated port</code> A non-designated port is one with a higher cost than the designated port. They are what’s left over after the root ports and designated ports have been determined. Non-designated ports are put in blocking mode, they are not forwarding ports.</li></ul></li> <li><code>Forwarding port</code> A forwarding port forwards frames and can be a <strong>root port</strong> or a <strong>designated port</strong>.</li> <li><code>Blocked port</code> A blocked port is the port that, in order to prevent loops, will not forward frames. However, a blocked port will always listen to BPDU frames but drop any and all other frames.</li></ul></blockquote> <h3 id="stp执行过程"><a href="#stp执行过程" class="header-anchor">#</a> STP执行过程</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622000256029.png" alt="image-20220622000256029" style="zoom:40%;"> <blockquote><ul><li>STP首先选举一个根桥，根桥可以通过所有的端口完成对数据的转发(<em>因为根桥上的每个端口都是指定端口</em>)，并且它是该STP域中所有设备的参考点。</li> <li>一旦所有的交换机都同意将某台交换机选为根桥，每个网桥就必须找出属于它自己的一个并且也是唯一一个分派的根端口。任意两台交换机之间的链路必须要有一个且只能有一个指定端口，该端口位于能够提供到根桥最大带宽的链路上。注意，一个网桥可以通过多个其他网桥到达根桥，也就是说这一路径可能不是最短路径，但一定是最快(具有最大带宽)路径;</li> <li>那些既不是根端口也不是指定端口的端口，也就是那些非根端口和非指定端口，全部被设置为阻塞状态，这样就避免了交换环路的形成。</li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622000459451.png" alt="image-20220622000459451" style="zoom:40%;"> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Switch<span class="token comment">#show spanning-tree vlan 1</span>

VLAN0001

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br></div></div><h4 id="选举根桥"><a href="#选举根桥" class="header-anchor">#</a> 选举根桥</h4> <blockquote><p>具有最低的Bridge ID的交换机被选为根桥</p></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622000654205.png" alt="image-20220622000654205" style="zoom:40%;"> <blockquote><ul><li><p>交换机向广播域内每隔2秒互相发出一个BPDU报文;</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622000933745.png" alt="image-20220622000933745" style="zoom:50%;"></li> <li><p>BPDU报文中的 Bridge ID最小的被选为 Root Bridge;</p> <ul><li><p>Bridge ID 由 2 Bytes的Priority 和 6 Bytes的MAC地址组成; 而默认的优先级为 32678;</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Switch<span class="token comment"># show spanning-tree brief</span>
                                                       Hello  Max  Fwd
    Vlan                         Bridge ID              Time  Age  Dly  Protocol
    ---------------- --------------------------------- -----  ---  ---  --------
    VLAN0001         <span class="token number">32769</span> <span class="token punctuation">(</span><span class="token number">32768</span>,   <span class="token number">1</span><span class="token punctuation">)</span> aabb.cc00.2000    <span class="token number">2</span>    <span class="token number">20</span>   <span class="token number">15</span>  rstp        
    VLAN0002         <span class="token number">32770</span> <span class="token punctuation">(</span><span class="token number">32768</span>,   <span class="token number">2</span><span class="token punctuation">)</span> aabb.cc00.2000    <span class="token number">2</span>    <span class="token number">20</span>   <span class="token number">15</span>  rstp  
<span class="token comment"># 这里的 Bridge ID 实际上是由交换机和 VLAN ID 构成的生成树桥ID的信息， VLAN 1 被表示为VLAN0001，注意每个VLAN 都可以有不同的根桥。</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div></li> <li><p>如果两个交换机的Priority值不加以修改, 则 MAC地址将决定 哪个交换机具有最低的Bridge ID;</p></li> <li><p>Priority的取值是分散的, 以 4096 为间隔递增:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment">#  在当前的交换机上, 设置在指定 VLAN 的生成树的 Priority值</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree vlan 1 priority 9182</span>
% Bridge Priority must be <span class="token keyword">in</span> increments of <span class="token number">4096</span>.
% Allowed values are: 
  <span class="token number">0</span>     <span class="token number">4096</span>  <span class="token number">8192</span>  <span class="token number">12288</span> <span class="token number">16384</span> <span class="token number">20480</span> <span class="token number">24576</span> <span class="token number">28672</span>
  <span class="token number">32768</span> <span class="token number">36864</span> <span class="token number">40960</span> <span class="token number">45056</span> <span class="token number">49152</span> <span class="token number">53248</span> <span class="token number">57344</span> <span class="token number">61440</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div></li></ul></li></ul></blockquote> <blockquote><p>也可以直接设置指定交换机为根桥:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree vlan 1 root ?</span>
    primary Configure this switch as primary root <span class="token keyword">for</span> this spanning tree
    secondary Configure switch as secondary root
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree vlan 1 root primary</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></blockquote> <h4 id="在非根桥的交换机上选择出-root-port"><a href="#在非根桥的交换机上选择出-root-port" class="header-anchor">#</a> 在非根桥的交换机上选择出 Root Port</h4> <blockquote><ul><li><p>到达根桥的路径cost最小的交换机接口;</p></li> <li><p>Cost相等, 则比较<code>BPDU发送者的Bridge ID</code>;</p></li> <li><p>如果一致, 则比较<code>BPDU发送者的端口号</code>(包含了 port priority和 <em>port ID(物理口编号)</em>)</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 交换机端口的 Port-priority值, 取值是离散的: 0, 64, 128, 192</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int e0/1</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#spanning-tree vlan 1 port-priority ?</span>
  <span class="token operator">&lt;</span><span class="token number">0</span>-19<span class="token operator"><span class="token file-descriptor important">2</span>&gt;</span>  port priority <span class="token keyword">in</span> increments of <span class="token number">64</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622005432148.png" alt="image-20220622005432148" style="zoom:47%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622005652213.png" alt="image-20220622005652213" style="zoom:39%;"> <h4 id="在每一个链路上选择出一个-designed-port"><a href="#在每一个链路上选择出一个-designed-port" class="header-anchor">#</a> 在每一个链路上选择出一个 Designed Port</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622020612615.png" alt="image-20220622020612615" style="zoom:40%;"> <h4 id="阻塞其他端口"><a href="#阻塞其他端口" class="header-anchor">#</a> 阻塞其他端口</h4> <h3 id="stp的端口状态"><a href="#stp的端口状态" class="header-anchor">#</a> STP的端口状态:</h3> <blockquote><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622021653187.png" alt="image-20220622021653187" style="zoom:50%;"> <ul><li><code>Blocking</code>: A blocked port won’t forward frames; it just listens to BPDUs. The purpose of the blocking state is to prevent the use of looped paths. All ports are in blocking state by default when the switch is powered up.</li> <li><code>Listening</code>: The port listens to BPDUs to make sure no loops occur on the network before passing data frames. A port in listening state prepares to forward data frames without populating the MAC address table.</li> <li><code>Learning</code>: The switch port listens to BPDUs and learns all the paths in the switched network. A port in learning state populates the MAC address table but <em>still doesn’t forward data frames</em>. <strong>Forward delay</strong> means the time it takes to transition a port from listening to learning mode (or from learning to forwarding mode), which is set to 15 seconds by default and can be seen in the <code>show spanning-tree</code> output.</li> <li><code>Forwarding</code>: The port sends and receives all data frames on the bridged port. If the port is still a designated or root port at the end of the learning state, it enters the forwarding state.</li> <li><code>Disabled (technically not a transition state)</code>A port in the disabled state (administratively) does not participate in the frame forwarding or STP. A port in the disabled state is virtually non-operational.</li></ul></blockquote> <h3 id="交换机的端口安全"><a href="#交换机的端口安全" class="header-anchor">#</a> 交换机的端口安全:</h3> <blockquote><div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Switch<span class="token comment">#config t</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int f0/1</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport mode access</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport port-security ?</span>
 aging Port-security aging commands
 mac-address Secure mac address
 maximum Max secure addresses
 violation Security violation mode
 <span class="token operator">&lt;</span>cr<span class="token operator">&gt;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><ul><li><p>Since all Cisco’s latest switches ship with the ports in <strong>desirable mode</strong> <em>(the port desires to trunk if it senses another switch just connected)</em>, we must first change the port from desirable mode to <code>access mode</code> or we cannot configure port security. Once that is done, we can continue on with our port-security commands.</p></li> <li><p>You can see clearly in the preceding output that the switch port port-security command can be used with four options:</p> <ul><li><p><code>switchport port-security mac-address</code>: to assign individual MAC addresses to each switch port, but if you choose to go there, you’d better have a lot of time on your hands!</p></li> <li><p>如果需要将交换机的端口设置为，每个端口只允许接入一台主机，并且当有人破坏这一规则时，
端口就会关闭，那么，完成这样的配置可以使用下列命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport port-security maximum 1</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport port-security violation shutdown</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><blockquote><p>一旦这种情况发生，只能在交换机上手工使用<code>no shutdown</code>命令来恢复端口的启用。</p></blockquote></li> <li><p>接入&quot;stick&quot; 端口的前两个地址被认定为静态地址，并且不管在aging命令中设置了多长时间，它们一直会是静态地址。为什么这里要将它设置为2 呢?这是因为其中一个地址将用于PC机，而另一个用于电话机。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport port-security maximum 2</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport port-security mac-address sticky</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport port-security violation shutdown</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li></ul></li></ul></blockquote> <h3 id="stp的收敛-convergence"><a href="#stp的收敛-convergence" class="header-anchor">#</a> STP的收敛(Convergence)</h3> <blockquote><ul><li><p>Convergence occurs when all ports on bridges and switches have transitioned to either forwarding or blocking modes. No data will be forwarded until convergence is complete. Yes—you read that right: When STP is converging, all host data stops transmitting!</p></li> <li><p>By creating your physical switch design in a hierarchical manner, as shown in Figure, you can make your Core switch the STP root, which will then make STP convergence time nice and quick.</p></li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207092051674.png" alt="image-20220709164505688"></p></blockquote> <h4 id="stp的-portfast模式"><a href="#stp的-portfast模式" class="header-anchor">#</a> STP的 Portfast模式</h4> <blockquote><p>在交换机端口上，从<code>Blocking状态</code>到<code>Forwarding状态</code>的典型的生成树拓扑的收敛时间通常需要50秒，这样在服务器或主机上就会引发超时的问题，比如，在重启交换机的时候。针对这样的问题，可以在接入层的交换机端口上开启<code>Portfast</code>来<strong>禁用STP协议</strong>。</p> <ul><li>PortFast一般需要在access layer的交换机的接口开启. 之后插入终端设备后只需要 1s 左右就可以连通网络</li></ul></blockquote> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 设置所有接口为 Portfast</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree portfast ? </span>
  edge     Spanning tree portfast edge options
  network  Spanning tree portfast network options
  normal   Spanning tree portfast normal options
  
<span class="token comment"># 设置指定接口为 portfast</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int range fastEthernet 0/1 - 12</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#spanning-tree portfast ?</span>
    disable Disable portfast <span class="token keyword">for</span> this interface
    trunk Enable portfast on the interface even <span class="token keyword">in</span> trunk mode
    <span class="token operator">&lt;</span>cr<span class="token operator">&gt;</span>
Switch<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#spanning-tree portfast</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><h5 id="两种safeguard模式可搭配portfast使用"><a href="#两种safeguard模式可搭配portfast使用" class="header-anchor">#</a> 两种Safeguard模式可搭配Portfast使用:</h5> <h6 id="bpduguard"><a href="#bpduguard" class="header-anchor">#</a> BPDUguard:</h6> <blockquote><p>当access layer的交换机的指定接口开启 BPDUguard 后, 当此接口插入交换机(接收到BPDU报文)就会变成err-down状态</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int e0/3</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#spanning-tree bpduguard ?</span>
  disable  Disable BPDU guard <span class="token keyword">for</span> this interface
  <span class="token builtin class-name">enable</span>   Enable BPDU guard <span class="token keyword">for</span> this interface
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></blockquote> <h6 id="bpdufilter"><a href="#bpdufilter" class="header-anchor">#</a> bpdufilter:</h6> <blockquote><p>当access layer的交换机的指定接口开启 bpdufilter 之后, 如果BPDUFilter 接收到了一个BPDU ，它会立即关闭端口的PortFast ，并迫使端口重新成为STP拓扑的一部分.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#spanning-tree bpdufilter ?</span>
  disable  Disable BPDU filtering <span class="token keyword">for</span> this interface
  <span class="token builtin class-name">enable</span>   Enable BPDU filtering <span class="token keyword">for</span> this interface
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></blockquote> <h4 id="uplinkfast"><a href="#uplinkfast" class="header-anchor">#</a> UplinkFast</h4> <blockquote><p>UplinkFast 是思科产品特有的特性，两个交换机之间有2条以上的直连物理链路, 当主链路失效时, 在备份链路的阻塞端口可以立即工作, 就不用再等待通常STP收敛所需要的50秒的时间。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>S2<span class="token comment">#config t</span>
S2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree uplinkfast</span>
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#do show spanning-tree uplinkfast</span>
UplinkFast is enabled
Station update rate <span class="token builtin class-name">set</span> to <span class="token number">150</span> packets/sec.
UplinkFast statistics
-----------------------
Number of transitions via uplinkFast <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">1</span>
Number of proxy multicast addresses transmitted <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">8</span>
Name Interface List
-------------------- ------------------------------------
VLAN0001 Fa0/1<span class="token punctuation">(</span>fwd<span class="token punctuation">)</span>, Fa0/2
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div></blockquote> <h4 id="backbonefast"><a href="#backbonefast" class="header-anchor">#</a> BackboneFast</h4> <blockquote><ul><li>Unlike UplinkFast(<em>which is used to determine and quickly fix link failures on the local switch</em>), another Cisco-proprietary STP extension called BackboneFast is used for speeding up convergence when a link <em>that’s not directly connected to the switch</em> fails. If a switch running BackboneFast receives an <strong>inferior BPDU</strong> from its designated bridge, it knows that a link on the path to the root has failed. Just to make sure you’re clear on this, an <em>inferior BPDU is one that lists the same switch for the root bridge and the designated bridge</em>.</li> <li>And again, unlike UplinkFast(<em>which is only configured on Access layer switches or switches with redundant links and at least one link in blocking mode</em>), BackboneFast should be enabled on <strong>all Catalyst switches</strong> to allow for detection of indirect link failures.</li> <li>Enabling BackboneFast is also beneficial because it starts the spanning tree reconfiguration more quickly—it can save 20 seconds on the default 50-second STP convergence time.</li> <li>默认情况下， BackboneFast 会将默认优先级提高到49152。</li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree backbonefast</span>
S2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree backbonefast</span>
Core<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree backbonefast</span>
S2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#do show spanning-tree backbonefast</span>
    BackboneFast is enabled
    BackboneFast statistics
    -----------------------
    Number of transition via backboneFast <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">0</span>
    Number of inferior BPDUs received <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">2</span>
    Number of RLQ request PDUs received <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">0</span>
    Number of RLQ response PDUs received <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">1</span>
    Number of RLQ request PDUs sent <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">1</span>
    Number of RLQ response PDUs sent <span class="token punctuation">(</span>all VLANs<span class="token punctuation">)</span> <span class="token builtin class-name">:</span> <span class="token number">0</span>
S2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><blockquote><p>与配置UplinkFast不同，此处我们对网络中的所有交换机都进行了BackboneFast配置，而不只限于接入层交换机。</p> <ul><li>记住，BackboneFast 用来确定远程交换机上非直接连接到根路径的链路失效，这与UplinkFast不同，</li> <li>UplinkFast可以确定并快速修复本地交换机的链路失效。</li></ul></blockquote></blockquote> <h4 id="rstp"><a href="#rstp" class="header-anchor">#</a> RSTP</h4> <blockquote><p>Rapid Spanning Tree Protocol (RSTP) 802.1w</p> <ul><li>思科创建了PortFast 、UplinkFast 和BackboneFast 来&quot;修补&quot; IEEE 802.1d 标准中的漏洞和缺陷。</li> <li>但这些改进特性的不足之处在于，它们都是思科专用的，还需要进行额外的配置。但新的802.1w 标准(RSTP) 将所有这些&quot;问题&quot;都一并解决了，你需要做的就只是打开RSTP. 有一点很重要，即必须确保网络中所有的交换机都能正确地运行802.1w 协议。</li> <li>It might come as a surprise, but RSTP actually can interoperate with legacy STP protocols. -Just know that the inherently fast convergence ability of 802.1w is lost when it interacts with legacy bridges. 并且, 即使legacy bridges后来又配置了802.1w, 这些RSTP交换机也不能自动切换回802.1w, 而是继续发送 802.1d BPDU; 需要重启该交换机才可以.</li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Core<span class="token comment">#config t</span>
Core<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree mode ?</span>
    mst Multiple spanning tree mode
    pvst Per-Vlan spanning tree mode
    rapid-pvst Per-Vlan rapid spanning tree mode
Core<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#spanning-tree mode rapid-pvst</span>

    1d02h: %LINEPROTO-5-UPDOWN: Line protocol on Interface Vlan1,
    changed state to down
    1d02h: %LINEPROTO-5-UPDOWN: Line protocol on Interface Vlan1,
    changed state to up

        Address 000d.29bd.4b80

    Fa0/7 		Desg FWD 	<span class="token number">19</span> 	<span class="token number">128.7</span> 		P2p Peer<span class="token punctuation">(</span>STP<span class="token punctuation">)</span>
    Fa0/8 		Desg FWD 	<span class="token number">19</span> 	<span class="token number">128.8</span> 		P2p Peer<span class="token punctuation">(</span>STP<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br></div></div></blockquote> <h3 id="etherchannel"><a href="#etherchannel" class="header-anchor">#</a> EtherChannel</h3> <blockquote><p>除了配置冗余链路并允许STP将某条链路设置为阻塞(BLK) 模式之外，我们还可以将多条链路捆绑在一起创建逻辑上的聚合，这样多条链路可以像单→链路那样工作。既然这种做法与STP一样，也可以提供同样的冗余性。</p> <ul><li><p>思科的EtherChannel 版本被称为<code>端口聚合协议(PAgP)</code>；</p></li> <li><p>IEEE 的端口通道协商协议的版本被称为<code>链路聚合控制协议(LACP)</code>;</p></li> <li><p>配置EtherChannel 的最为简单的方式就是使用思科网络助手(CNA)。搜索思科的网站，就可以免费下载这个GUI 软件。</p> <p>但是这里使用CLI 来进行配置</p></li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>S1<span class="token comment">#config t</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br></div></div><div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 设置静态的MAC地址条目</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><blockquote><p>如果需要在局域网外部对交换机进行管理, 则应该在交换机上设置网关, 就像在主机上完成的默认网关设置一样:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip default-gateway 192.168.10.254</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int vlan 1</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ip address 192.168.10.252 255.255.255.0</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no shut</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></blockquote> <h2 id="vlan"><a href="#vlan" class="header-anchor">#</a> VLAN</h2> <h3 id="概述"><a href="#概述" class="header-anchor">#</a> 概述</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621141811827.png" alt="image-20220621141811827" style="zoom:40%;"> <blockquote><p>在纯粹的交换型互联网络中, 如何划分广播域呢? 答案是创建VLAN(虚拟局域网). VLAN是一个网络用户和网络资源的逻辑编组, 它们与管理者定义的交换机端口相连. 通过在交换机上创建VLAN, 可以指定交换机端口为不同的子网提供服务, 从而在二层交换型网络中创建更小的广播域.</p> <ul><li><p>默认情况下, 一台交换机的所有接口都属于同一个广播域;</p></li> <li><p>VLAN技术可以把交换机的接口在==数据链路层==上将整个广播域(LAN)划分成若干个VLAN;</p></li> <li><p>划分后,VLAN之间是互相隔离的, VLAN之间在二层设备上无法互相通信, 必须经由三层设备(路由器)才可以互通;</p></li></ul></blockquote> <h4 id="vlan的成员模式"><a href="#vlan的成员模式" class="header-anchor">#</a> VLAN的成员模式</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621143523960.png" alt="image-20220621143523960" style="zoom:40%;"> <blockquote><ul><li><code>静态VLAN</code> 易于配置和管理，非常适合用于需要控制所有用户移动的网络环境; 是创建VLAN最常用的方法，其原因之一是静态VLAN最安全。</li> <li><code>动态VLAN</code> 通过使用<strong>VLAN管理策略服务器(VMPS)</strong>，可根据硬件(MAC)地址、协议甚至创建动态VLAN 的应用程序来确定所连接的交换机端口所属的VLAN。VMPS数据库将MAC地址映射到VLAN。在同一台交换机中，可以同时有动态接入端口和中继端口，但动态接入端口只能连接到终端或集线器，而不能连接到其他交换机!</li></ul></blockquote> <h4 id="vlan-id"><a href="#vlan-id" class="header-anchor">#</a> VLAN ID</h4> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207092051943.png" alt="image-20220709205119792"></p> <blockquote><p>由于每个VLAN都是一个广播域, 因此他们也有自己的子网号; 如果使用的是IPv6. 则必须给每个VLAN分配独立的IPv6网络号.</p></blockquote> <blockquote><p>==VLAN 1的特性==:</p> <ul><li>VLAN 1 是一个管理VLAN(管理数据流，如CDP， PAgP、LACP， DTP和VTP), 虽然也可将其用于工作组, 但思科建议只将其用于管理;</li> <li>VLAN 1是默认的Native VLAN, 无法删除, 也无法修改其名称;</li> <li>默认情况下, 所有的交换机端口都属于VLAN 1;</li></ul></blockquote> <h4 id="identifying-vlans"><a href="#identifying-vlans" class="header-anchor">#</a> Identifying VLANs</h4> <blockquote><ul><li>交换机端口是第二层接口, 这种接口与物理端口相关联;</li> <li>交换机端口为<code>access port</code>时, 只能属于一个VLAN; 而为<code>trunk port</code>时, 属于所有的VLANS;</li> <li>可手工将端口配置为<code>access port</code>或<code>trunk port</code>, 也可在每个端口上运行动态中继协议(DTP), DTP通过与链路另一端的端口协商来设置端口模式</li></ul></blockquote> <blockquote><p>在交换环境中，存在三种类型的端口:</p> <ul><li><p><code>Access port</code>: <strong>An access port belongs to and carries the traffic of only one VLAN</strong>. Traffic is both received and sent in <strong>native formats with no VLAN tagging</strong> whatsoever. Anything arriving on an access port is simply assumed to belong to the VLAN assigned to the port.</p> <ul><li>与<code>Access Port</code>相连的设备没有VLAN成员资格的概念，只是认为自己是某个广播域的一员, 没有全局意识，根本不了解物理网络拓扑。</li> <li>将帧转发给与<code>Access Port</code>相连的终端设备前，交换机将删除所有的VLAN信息。</li></ul> <blockquote><p>So, what do you think will happen if an access port receives a <em>tagged packet, like IEEE 802.1Q tagged</em>?</p> <ul><li>Right—<em>that packet would simply be dropped</em>. But why? Well, because an access port doesn’t look at the source address, so tagged traffic can be forwarded and received only on trunk ports.</li></ul></blockquote></li> <li><p><code>Voice access ports</code>: 这是一种特殊的<code>Access port</code>; 前面一直说接入端口只能属于一个VLAN，但这种说法不完全正确。当前，大多数交换机都允许将接入端口分配给另一个VLAN，以便传输语音数据流，这种VLAN被称为语音VLAN。语音VLAN过去被称为辅助VLAN，它可以与数据VLAN重叠，允许同一个端口同时传输语音和数据。虽然从技术上说，这属于不同类型的链路，但它仍然只是一种接入端口，只是能够配直的同时为语音VLAN 和数据VLAN传输数据流。这让你能够将电话和PC同时连接到同一个交换机棉口，并让它们属于不同的VLAN。在本章后面的11.8节，将详细介绍语音VLAN。</p></li> <li><p><code>trunk port</code>: trunk ports can carry multiple VLANs at a time; 位于交换机之间、交换机和路由器之间或交换机和服务器之间，它同时为多个(1-4094个，但除非使用扩展VLAN，否则最多为1005个)VLAN传输数据流。</p> <ul><li><p>可让一个端口同时属于众多不同的VLAN, 比如可让同一台服务器属于两个不同的广播域，这样用户无需通过第3层设备(路由器)就能登录或访问它;</p></li> <li><p>另一个优点表现在交换机之间的Trunk连接。中继链路可传输来自多个VLAN的帧。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207101256426.png" alt="image-20220710125650266" style="zoom:80%;"></li></ul></li></ul></blockquote> <h4 id="frame-tagging"><a href="#frame-tagging" class="header-anchor">#</a> Frame Tagging</h4> <blockquote><p>​	It can get kind of complicated—even for a switch—so there needs to be a way for each one to keep track of all the users and frames as they travel the <strong>switch fabric</strong> and VLANs. <em>When I say “switch fabric,” I’m just referring to a group of switches that share the same VLAN information.</em> And this just happens to be where frame tagging enters the scene. This frame identification method uniquely assigns a user-defined VLAN ID to each frame. Sometimes people refer to it as a <strong>VLAN ID</strong> or even <strong>VLAN color</strong>.</p> <p>​	Here’s how it works: Once within the switch fabric, each switch that the frame reaches must first identify the VLAN ID from the frame tag. It then finds out what to do with the frame by looking at the information in what’s known as the <strong>filter table</strong>. If the frame reaches a switch that has another trunked link, the frame will be forwarded out the trunk-link port.
​	Once the frame reaches an exit that’s determined by the <strong>forward/filter table to be an access link</strong> matching the frame’s VLAN ID, the switch will remove the VLAN identifier. This is so the destination device can receive the frames without being required to understand their VLAN identification information.
​	Another thing about <strong>trunk ports is that they will support tagged and untagged traffic simultaneously (if you are using 802.1Q trunkin</strong>g, which we will talk about later).</p> <p>​	==The trunk port is assigned a default port VLAN ID (PVID) for a VLAN on which all untagged traffic will travel. This VLAN is also called the <strong>native VLAN</strong> and is always <strong>VLAN 1</strong> by default (but it can be changed to any VLAN number).==</p></blockquote> <h4 id="vlan-identification-methods"><a href="#vlan-identification-methods" class="header-anchor">#</a> VLAN Identification Methods</h4> <blockquote><ul><li><p>==Inter-Switch Link (ISL)==: 思科专用协议</p> <ul><li><p>交换机间链路(ISL)是一种显式标记方法，它在以太网帧中添加VLAN信息。这些标记信息允许利用外部标记方法在中继链路上多路复用多个VLAN的数据流，从而让交换机确定通过中继链路收到的帧属于哪个VLAN 。</p></li> <li><p>通过使用ISL，可连接多台交换机，并在数据流通过中继链路在交换机之间传输时保留VLAN信息。ISL 运行在第2层，它使用新的报头和循环冗余校验(CRC)封装数据帧。</p></li> <li><p>需要注意的是，这是一种思科专用协议，只能用于快速以太网和吉比特以太网链路。ISL可用于交换机端口、路由器接口和服务器接口卡。</p></li> <li><p>思科的专有协议ISL, 但是存在一些问题, 所以思科已经开始放弃了这个协议</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621183600780.png" alt="image-20220621183600780" style="zoom:40%;"></li></ul></li> <li><p>==IEEE 802.1Q==:</p> <ul><li><p>IEEE802.1Q 是IEEE 制定的一种帧标记标准，它在帧中插入一个字段，用于标识VLAN。在思科交换机和其他品牌的交换机之间中继时，必须使用802.1Q。</p></li> <li><p>其工作原理如下:首先指定中继端口，并指定它使用802.1Q封装。为让这些端口能够通信，必须指定它们所属的VLAN。默认的Native VLAN为VLAN 1，使用802.1Q时，不会对Native VLAN数据流进行标记。中继链路两端的端口根据Native VLAN组成一个小组，并使用相应的标识号(默认为VLAN 1)</p></li> <li><p>802.1Q 帧标记</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621184009736.png" alt="image-20220621184009736" style="zoom:40%;"> <blockquote><ul><li><p>FCS(Frame Check Sum)会重新计算;</p></li> <li><p>Tag 有 4个Bytes:</p> <ul><li>2 Bytes的EtherType;</li> <li>3 bits的PRI字段, 用于流量控制;</li> <li>1 bit的CFI字段, 用于令牌网络, 目前基本淘汰, 置零;</li> <li>12 bits的VLAN ID字段</li></ul></li></ul></blockquote></li></ul></li></ul></blockquote> <h3 id="vlan的基本配置"><a href="#vlan的基本配置" class="header-anchor">#</a> VLAN的基本配置</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621144559529.png" alt="image-20220621144559529" style="zoom:40%;"> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621153512606.png" alt="image-20220621153512606"></p> <blockquote><ul><li>不能修改、删除或重命名VLAN1 ，因为它是默认的Native VLAN; 交换机的所有端口默认都属于VLAN 1;</li> <li>编号大于1005的VLAN称为扩展VLAN，除非交换机处于VTP透明模式，否则它们不会被启用;</li></ul></blockquote> <h4 id="vlan的创建-重命名-删除"><a href="#vlan的创建-重命名-删除" class="header-anchor">#</a> VLAN的创建, 重命名, 删除:</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#vlan 2  # 创建 VLAN 2</span>
SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#vlan 3-10   # 连续地创建 编号为 3~10, 一共8个 VLAN</span>
SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#vlan 11,13,15,17  # 创建指定编号的 VLAN</span>

SW1<span class="token punctuation">(</span>config-vlan<span class="token punctuation">)</span><span class="token comment">#name VLAN的名字    # 自定义 当前VLAN的名字</span>
SW1<span class="token punctuation">(</span>config-vlan<span class="token punctuation">)</span><span class="token comment">#end</span>
SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#do show vlan brief   # 查看vlan配置</span>

SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no vlan 3-10,11,13,15,17   # 删除指定的VLAN, 也支持批量删除</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h4 id="为指定vlan分配ip地址块"><a href="#为指定vlan分配ip地址块" class="header-anchor">#</a> 为指定VLAN分配IP地址块</h4> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW1<span class="token comment">#config t</span>
SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int vlan 1</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ip address 172.16.10.2 255.255.255.128</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no shutdown</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h4 id="设置端口为-access-模式并分配给指定的vlan"><a href="#设置端口为-access-模式并分配给指定的vlan" class="header-anchor">#</a> 设置端口为 access 模式并分配给指定的VLAN:</h4> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int e0/0</span>

  <span class="token operator">&lt;</span>cr<span class="token operator">&gt;</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br><span class="line-number">31</span><br><span class="line-number">32</span><br><span class="line-number">33</span><br></div></div><blockquote><div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport mode ?</span>
  access        Set trunking mode to ACCESS unconditionally

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><ul><li><p><code>switchport mode access</code>: The interface becomes a nontrunk interface regardless of whether the neighboring interface is a trunk interface. The port would be a dedicated layer 2 access port.</p></li> <li><p><code>switchport mode trunk</code>: The interface becomes a trunk interface even if the neighboring interface isn’t a trunk interface.</p></li> <li><p><code>switchport nonegotiate</code>: Prevents the interface from generating DTP frames. You can use this command only when the interface switchport mode is access or trunk. You must manually configure the neighboring interface as a trunk interface to establish a trunk link.</p> <blockquote><p><strong>Dynamic Trunking Protocol (DTP)</strong> is used for negotiating trunking on a link between two devices, as well as negotiating the encapsulation type of either 802.1Q or ISL. I use the nonegotiate command when I want dedicated trunk ports no questions asked.</p></blockquote></li> <li><p><code>switchport mode dynamic auto</code>: This mode makes the interface able to convert the link to a trunk link. The interface becomes a trunk interface if the neighboring interface is set to trunk or desirable mode. The default is dynamic auto now.</p></li> <li><p><code>switchport mode dynamic desirable</code>: This one makes the interface actively attempt to convert the link to a trunk link. The interface becomes a trunk interface if the neighboring interface is set to trunk, desirable, or auto mode.</p></li></ul></blockquote> <p>将接口设置加入未预先创建的VLAN:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW2<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport access vlan 2</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>一次性设置多个接口加入同一个VLAN:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface range e0/0 - 3</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div><h4 id="设置端口为-trunk模式"><a href="#设置端口为-trunk模式" class="header-anchor">#</a> 设置端口为 Trunk模式</h4> <blockquote><p>不同的交换机上承载多个VLAN, 则需要将接口设置为 <code>Trunk模式</code>;</p></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621183139837.png" alt="image-20220621183139837" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621194813412.png" alt="image-20220621194813412" style="zoom:50%;"> <h5 id="基本trunk配置"><a href="#基本trunk配置" class="header-anchor">#</a> 基本Trunk配置</h5> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 1.配置 Trunk 的封装方式(使用的协议):</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk encapsulation ?</span>

  isl        Interface uses only ISL trunking encapsulation when trunking
  negotiate  Device will negotiate trunking encapsulation with peer on
             interface       
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk encapsulation dot1q </span>

<span class="token comment"># 2.开启接口的Trunk模式:</span>

SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#show int trunk  # 查看本交换机上的trunk端口</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div><h5 id="限定中继端口支持的vlan"><a href="#限定中继端口支持的vlan" class="header-anchor">#</a> 限定中继端口支持的VLAN</h5> <blockquote><p>默认情况下，中继端口发送和接收来自所有VLAN 的信息，并将未标记的帧发送到管理VLAN。这也适用于扩展VLAN。</p> <p>然而也可以在端口上限定哪些VLAN禁止通过Trunk端口:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>S1<span class="token comment">#config t</span>
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int f0/1</span>
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk allowed vlan ?</span>
    WORD 	VLAN IDs of the allowed VLANs when this port is <span class="token keyword">in</span> trunking mode
    <span class="token function">add</span> 	<span class="token function">add</span> VLANs to the current list
    all 	all VLANs
    except 	all VLANs except the following
    none 	no VLANs
    remove 	remove VLANs from the current list
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk allowed vlan remove ?</span>
	WORD VLAN IDs of disallowed VLANS when this port is <span class="token keyword">in</span> trunking mode
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk allowed vlan remove 4-8</span>

<span class="token comment"># 将VLAN 排除在外后，要恢复到默认设置，可使用下述命令:</span>
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#sw;tchport trunk allowed vlan all</span>
<span class="token comment"># 也可使用如下命令:</span>
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no switchport trunk allowed vlan</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div></blockquote> <h5 id="修改指定端口的native-vlan"><a href="#修改指定端口的native-vlan" class="header-anchor">#</a> 修改指定端口的Native Vlan</h5> <blockquote><div class="language-sh line-numbers-mode"><pre class="language-sh"><code>S1<span class="token comment">#config t</span>
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int f0/1</span>

    pruning Set pruning VLAN characteristics when interface is <span class="token keyword">in</span> trunking mode

<span class="token operator">&lt;</span><span class="token number">1</span>-409<span class="token operator"><span class="token file-descriptor important">4</span>&gt;</span> VLAN ID of the native VLAN when this port is <span class="token keyword">in</span>
trunking mode
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk native vlan 40</span>
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#^Z</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><ul><li><p>实际上，不需要修改中继端口的本机VLAN，但可以这样做，有些人处于安全考虑而这样做。</p></li> <li><p>将中继端口的本地VLAN改为VLAN 40后，使用命令show running-cofig 查看该中继接口的配置;</p></li> <li><p>如果中继链路两端的交换机端口的Native VLAN 不同, 两个端口将无法通信:</p> <ul><li><p>要么修改中继链路另一端的native VLAN</p></li> <li><p>要么将当前端口的本机VLAN 恢复到默认设置:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Sl<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no switchport trunk native vlan</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul></li></ul></blockquote> <h3 id="vtp"><a href="#vtp" class="header-anchor">#</a> VTP</h3> <blockquote><p>VLAN Trunk Protocol, Cisco created this one too.</p> <ul><li>The basic goals of VLAN Trunking Protocol (VTP) are to <strong>manage all configured VLANs across a switched internetwork and to maintain consistency</strong> throughout that network. VTP allows you to add, delete, and rename VLANs—information that is then propagated to all other switches in the VTP domain.</li> <li>Here’s a list of some of the <strong>cool features</strong> VTP has to offer:
<ul><li>Consistent VLAN configuration across all switches in the network</li> <li>VLAN trunking over mixed networks, such as Ethernet to ATM LANE or even FDDI</li> <li>Accurate tracking and monitoring of VLANs</li> <li>Dynamic reporting of added VLANs to all switches in the VTP domain</li> <li>Adding VLANs using Plug and Play(以即插即用的方式)</li></ul></li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621195238427.png" alt="image-20220621195238427" style="zoom:40%;"> <blockquote><p>VTP(VLAN Trunking Protocol): (思科专有协议), 在多个交换机之间同步VLAN配置信息的协议,</p> <ul><li>通过一个共有的管理域, 维持所有交换机的VLAN配置(借助修订号 Configuration Revision)的一致性;</li> <li>交换机间互相的接口要设置为Trunk模式, 即VTP只能在<em>Trunk端口发送</em>要宣告的信息;</li> <li>支持混合的介质主干连接(Fast Ethernet, FDDI, ATM)</li></ul></blockquote> <h4 id="交换机的三种vtp模式"><a href="#交换机的三种vtp模式" class="header-anchor">#</a> 交换机的三种VTP模式</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621195404942.png" alt="image-20220621195404942" style="zoom:40%;"> <blockquote><ul><li><p>==Server==:</p> <ul><li>This is the <strong>default mode</strong> for all Catalyst switches;</li> <li>at least one server in your VTP domain to propagate VLAN information throughout that domain;</li> <li>The switch must be in server mode to be able to create, add, and delete VLANs in a VTP domain;</li> <li>In VTP server mode, VLAN configurations are <strong>saved in NVRAM</strong> on the switch.</li></ul></li> <li><p>==Client:==</p> <ul><li>In client mode, switches receive information from VTP servers, but they also receive and forward updates;</li> <li>they can’t create, change, or delete VLANs.</li> <li>VLAN information received from a VTP server isn’t stored in NVRAM</li></ul> <blockquote><p>Here’s a hint: If you want a switch to become a server, first make it a client so it receives all the correct VLAN information, then change it to a server — so much easier!</p></blockquote></li> <li><p>==Transparent==:</p> <ul><li>Switches in transparent mode don’t participate in the VTP domain or share its VLAN database, but they’ll still forward VTP advertisements through any configured trunk links.</li> <li>They can create, modify, and delete VLANs because they keep their own database — one they keep secret from the other switches.</li> <li>Despite being kept in NVRAM, the VLAN database in transparent mode is actually only locally significant.</li> <li>The whole purpose of transparent mode is to <strong>allow remote switches to receive the VLAN database from a VTP server-configured switch through a switch that is not participating in the same VLAN assignments</strong>.</li></ul></li></ul></blockquote> <blockquote><p><strong>VTP only learns about normal-range VLANs, with VLAN IDs 1 to 1005</strong>; <em>VLANs with IDs greater than 1005 are called extended-range VLANs and they’re not stored in the VLAN database</em>. The switch must be in VTP transparent mode when you create VLAN IDs from 1006 to 4094, so it would be pretty rare that you’d ever use these VLANs. One other thing: VLAN IDs 1 and 1002 to 1005 are automatically created on all switches and can’t be removed.</p></blockquote> <h4 id="vtp的运行模式"><a href="#vtp的运行模式" class="header-anchor">#</a> VTP的运行模式</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621195839843.png" alt="image-20220621195839843" style="zoom:40%;"> <blockquote><p>多台交换机配置VTP，必须满足如下三项要求:</p> <ul><li>交换机的VTP domain name要相同;</li> <li>其中一台交换机要配置为VTP Server;(事实上，思科建议让所有交换机都处于VTP服务器模式)</li> <li>VTP password要一致(如果使用了的话)。</li></ul></blockquote> <h4 id="vtp的基本配置"><a href="#vtp的基本配置" class="header-anchor">#</a> VTP的基本配置</h4> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#vtp mode ?</span>
  client       Set the device to client mode.
  off          Set the device to off mode.
  server       Set the device to server mode.
  transparent  Set the device to transparent mode.
  
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#vtp domain VTP域名    # 设置VTP域名</span>
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#vtp password VTP密码</span>
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#vtp pruning</span>


S1<span class="token comment">#show vtp password</span>
S1<span class="token comment">#show vtp status   # 查看 VTP 的配置</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><blockquote><p>==Tips==:</p> <ol><li>所有思科交换机默认的VTP模式是 Server;</li> <li>VTP的域名和密码均对大小写敏感;</li> <li>VTP pruning 默认是关闭的;</li></ol></blockquote> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R2<span class="token comment">#show vtp status</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><h4 id="vtp-pruning"><a href="#vtp-pruning" class="header-anchor">#</a> VTP pruning</h4> <blockquote><ul><li>默认情况下，所有VLAN 的数据流都可通过中继链路进行传输;</li> <li>VTP Pruning可以自动修剪开不参与VLAN配置同步的交换机链路; VTP gives you a way to preserve bandwidth by configuring it to reduce the amount of broadcasts, multicasts, and unicast packets. This is called <strong>pruning</strong>. Switches enabled for VTP pruning send broadcasts only to <em>trunk links</em> that actually must have the information.</li> <li>默认情况下，所有交换机都禁用了VTP修剪; 在VTP服务器上启用修剪后，将在整个VTP域中启用它。</li> <li>默认情况下，修剪将用于VLAN 2-1001, 但对VLAN 1不会修剪，因为它是一个管理VLAN.</li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621232836287.png" alt="image-20220621232836287" style="zoom:50%;"> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>S1<span class="token comment">#config t</span>
S1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int f0/1</span>
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk ?</span>
    allowed Set allowed VLAN characteristics when interface is
    <span class="token keyword">in</span> trunking mode
