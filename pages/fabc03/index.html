    is <span class="token keyword">in</span> trunking mode
    pruning Set pruning VLAN characteristics when interface is
    <span class="token keyword">in</span> trunking mode
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk pruning ?</span>
    vlan Set VLANs enabled <span class="token keyword">for</span> pruning when interface is <span class="token keyword">in</span>
    trunking mode
S1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk pruning vlan 3-4</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><h3 id="vlans之间的路由选择"><a href="#vlans之间的路由选择" class="header-anchor">#</a> VLANs之间的路由选择</h3> <blockquote><p>如果要让不同VLAN中的主机(或其他有IP地址的设备)能够彼此通信，就必须使用第3层设备来提供路由选择功能。</p></blockquote> <h4 id="使用路由器的多个接口"><a href="#使用路由器的多个接口" class="header-anchor">#</a> 使用路由器的多个接口</h4> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207101449355.png" alt="image-20220710144905201"></p> <blockquote><ul><li>每个路由器接口都连接了一条接入链路，这意味着每个路由器接口的IP地址都将成为相应VLAN中每台主机的默认网关地址。</li></ul></blockquote> <h4 id="使用三层交换机"><a href="#使用三层交换机" class="header-anchor">#</a> 使用三层交换机</h4> <blockquote><ul><li>如果VLAN数量比路由器接口多，可在一个快速以太网接口上配置中继，也可购买一台第3层交换机，如Cisco 3560交换机或诸如6500等高端交换机。</li></ul></blockquote> <h4 id="单臂路由"><a href="#单臂路由" class="header-anchor">#</a> 单臂路由</h4> <blockquote><ul><li><p>也可不给每个VLAN提供一个路由器接口，而在路由器上只使用一个快速以太网接口，并在该接口上运行中继协议802.1Q(或者ISL)，如图11-8所示。这让所有VLAN都通过一个接口进行通信，思科称之为&quot;单臂路由&quot;。</p></li> <li><p>要在路由器的快速以太网接口或吉比特以太网接口上启用Trunk，可使用命令<code>encapsulation</code>指定协议;</p></li> <li><p>对于每个VLAN中的主机，都需要给它们分配相应子网中的地址，而默认网关为相应路由器子接口的IP地址。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207101453391.png" alt="image-20220710145303118" style="zoom:80%;"></li></ul></blockquote> <blockquote><p>路由器的物理接口可以<em>虚拟出42.9亿(2^32^)个子接口</em>, 可以在三层进行不同VLAN的数据交换;</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R3<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int e0/0.?</span>
<span class="token operator">&lt;</span><span class="token number">0</span>-429496729<span class="token operator"><span class="token file-descriptor important">5</span>&gt;</span>  Ethernet interface number
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621233022548.png" alt="image-20220621233022548" style="zoom:40%;"> <h5 id="示例1"><a href="#示例1" class="header-anchor">#</a> 示例1:</h5> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621233749122.png" alt="image-20220621233749122" style="zoom:50%;"> <h5 id="示例2"><a href="#示例2" class="header-anchor">#</a> 示例2:</h5> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207101558706.png" alt="image-20220710155821482"></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 下面是路由器的配置:</span>
ISR<span class="token comment">#config t</span>
ISR<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int fOjO</span>
ISR<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no ip address</span>
ISR<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no shutdown</span>

ISR<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#int fO/O.1</span>
ISR<span class="token punctuation">(</span>config-subif<span class="token punctuation">)</span><span class="token comment">#encapsulation dotlq 1</span>
ISR<span class="token punctuation">(</span>config-subif<span class="token punctuation">)</span><span class="token comment">#ip address 192.168.1.65 255.255.255.192</span>

ISR<span class="token punctuation">(</span>confìg-subif<span class="token punctuation">)</span><span class="token comment">#int fO/O.2</span>
ISR<span class="token punctuation">(</span>config 币subif<span class="token punctuation">)</span><span class="token comment">#encapsulation dotlq 2</span>
ISR<span class="token punctuation">(</span>config-subif<span class="token punctuation">)</span><span class="token comment">#ip address 192.168.1.129 255.255.255.224</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><h2 id="voice-vlan"><a href="#voice-vlan" class="header-anchor">#</a> Voice VLAN</h2> <blockquote><p>​	The voice VLAN feature enables <strong>access ports</strong> to <em>carry IP voice traffic from an IP phone</em>. When a switch is connected to a Cisco IP phone, the IP phone sends voice traffic with <strong>layer 3 IP precedence and layer 2 class of service (CoS) values</strong>, which are <em>both set to 5 for voice traffic; all other traffic defaults to 0.</em></p> <p>​	Because the sound quality of an IP phone call can deteriorate(恶化) if the data is unevenly sent, the switch supports <strong>quality of service (QoS)</strong> based on IEEE 802.1p CoS. (802.1p provides a mechanism for implementing QoS at the Data Link level.) The 802.1p field is carried in the 802.1Q trunk header. If you look at the fields in an 802.1Q tag, you will see a field called the <strong>priority</strong> field; this is where the 802.1p information goes. <em>QoS uses classification and scheduling to send network traffic from the switch in an organized, predictable manner.</em></p></blockquote> <blockquote><p>思科IP电话基本上是一台三端口交换机:一个连接到思科交换机，一个连接到PC，还有一个端口位于内部，连接的是电话本身。</p> <ul><li>思科IP电话是一种可配置的设备，可对其进行配置，使其在发送的数据流中包含IEEE 802.1p 优先级。</li> <li>还可配置交换机，使其信任或覆盖IP电话指定的优先级</li></ul></blockquote> <blockquote><p>对于与思科IP电话相连的接入端口，可对其进行配置，使其将一个VLAN用于语音数据流，并将另一个VLAN用于与电话相连的设备(如PC)的数据流。可对交换机的接入端口进行配置，使其发送思科发现协议(CDP)分组，设置相连的思科IP电话以下述方式之一将语音数据流发送给交换机:</p> <ul><li>通过语音VLAN发送，并添加一个第2层CoS优先级值;</li> <li>通过接入VLAN发送，并添加一个第2层CoS优先级值;</li> <li>通过接入VLAN发送，但不添加第2层CoS优先级值。</li></ul></blockquote> <blockquote><p>The switch can also process <strong>tagged data traffic</strong> (traffic in IEEE 802.1Q or IEEE 802.1p frame types) <em>from the device attached to the access port on the Cisco IP phone</em>. You can configure layer 2 access ports on the switch to send CDP packets that instruct the attached Cisco IP phone to configure <strong>the IP phone PC access port</strong> in one of these modes:</p> <ul><li>In <strong>trusted</strong> mode, all traffic received through the access port on the Cisco IP phone passes through the IP phone <strong>unchanged</strong>.</li> <li>In <strong>untrusted</strong> mode, all traffic in IEEE 802.1Q or IEEE 802.1p frames received through the access port on the IP phone receive a configured layer 2 CoS value. The default layer 2 CoS value is 0. <strong>Untrusted mode is the default.</strong></li></ul></blockquote> <h3 id="configuring-the-voice-vlan"><a href="#configuring-the-voice-vlan" class="header-anchor">#</a> Configuring the Voice VLAN</h3> <blockquote><p><strong>By default, the voice VLAN feature is disabled</strong>; you enable it by using the interface command <code>switchport voice vlan</code>. When the voice VLAN feature is enabled, all untagged traffic is sent according to the <strong>default CoS priority</strong> of the port. The CoS value is not trusted for IEEE 802.1p or IEEE 802.1Q tagged traffic.</p> <p>==These are the voice VLAN configuration guidelines==:</p> <ul><li>You <em>should configure a voice VLAN on switch access ports</em>; voice VLAN isn’t supported on trunk ports, even though you can actually configure it!</li> <li>The voice VLAN should be present and active on the switch for the IP phone to correctly communicate on it. Use the <code>show vlan</code> privileged EXEC command to see if the voice VLAN is present--if it is, it’ll be listed in the display.</li> <li>Before you enable the voice VLAN, it’s recommended that you <strong>enable QoS</strong> on the switch by entering the <code>mls qos</code> global configuration command and set the port trust state to trust by entering the <code>mls qos trust cos</code> interface configuration command.</li> <li>You must make sure that CDP is enabled on the switch port connected to the Cisco IP phone to send the configuration. This is on by default, so unless you disabled it, you shouldn’t have a problem.</li> <li>The PortFast feature is automatically enabled when the voice VLAN is configured, but when you disable the voice VLAN, the PortFast feature
isn’t automatically disabled.</li> <li>To return the port to its default setting, use the <code>no switchport voice vlan</code> interface configuration command.</li></ul></blockquote> <h3 id="configuring-ip-phone-voice-traffic"><a href="#configuring-ip-phone-voice-traffic" class="header-anchor">#</a> Configuring IP Phone Voice Traffic</h3> <blockquote><p>You can configure a port connected to the Cisco IP phone to send CDP packets to the phone in order to configure how the phone sends voice traffic.</p> <ul><li>The phone can carry voice traffic in IEEE 802.1Q frames for a specified voice VLAN with a layer 2 CoS value.</li> <li>It can use IEEE 802.1p priority tagging to give voice traffic a higher priority as well as forward all voice traffic through the access VLAN instead of the native (access) VLAN.</li> <li>The IP phone can also send untagged voice traffic or use its own configuration to send voice traffic in the access VLAN.</li> <li><strong>In all configurations, the voice traffic carries a layer 3 IP precedence value—again, for voice the setting is usually 5.</strong></li></ul></blockquote> <blockquote><p>I think it’s about time to give you some actual examples to make this clear to you. This example shows you how to configure four things:</p> <ol><li>How to configure a port connected to an IP phone to use the <strong>CoS value</strong> for classifying incoming traffic</li> <li>How to configure the port to <strong>use IEEE 802.1p priority tagging</strong> for voice traffic</li> <li>How to configure it to use the Voice VLAN (10) to carry all voice traffic</li> <li>And last, how to configure VLAN 3 to carry PC data</li></ol> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Switch<span class="token comment">#configure t</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#mls qos</span>
Switch<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface f0/1</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport priority extend ?</span>
    cos Override <span class="token number">802</span>.1p priority of devices on appliance
    trust Trust <span class="token number">802</span>.1p priorities of devices on appliance
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport priority extend trust</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#mls qos trust cos</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport voice vlan dot1p</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport mode access</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport access vlan 3</span>
Switch<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport voice vlan 10</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div></blockquote> <h2 id="ethernetchannel"><a href="#ethernetchannel" class="header-anchor">#</a> EthernetChannel</h2> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622025022846.png" alt="image-20220622025022846" style="zoom:40%;"> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int range e0/0 -1</span>

="line-number">51</span><br><span class="line-number">52</span><br><span class="line-number">53</span><br><span class="line-number">54</span><br><span class="line-number">55</span><br><span class="line-number">56</span><br><span class="line-number">57</span><br><span class="line-number">58</span><br><span class="line-number">59</span><br></div></div><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622174953723.png" alt="image-20220622174953723" style="zoom:50%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220622175026977.png" alt="image-20220622175026977" style="zoom:87%;"> <blockquote><ul><li><p>PAgP(Port Aggregration Protocol 端口聚合协议):</p> <p>Cisco Proprietary protocol;</p></li> <li><p>LACP（Link Aggregration Control Protocol）</p> <p>是属于IEEE规范（802.3ad）,允许将多个物理端口捆绑形成单个逻辑通道。它的功能类似于思科的以太通道协议PAgP。: Open Standard used by most of Vendors</p></li></ul></blockquote> <blockquote><ul><li>==on==
Mode that forces the LAN port to form Etherchannel without using negotiation protocol. In the on mode, a usable EtherChannel exists only when a LAN port group in the on mode is connected to another LAN port group in the on mode. Because ports configured in the on mode do not negotiate, there is no negotiation traffic between the ports. You cannot configure the on mode with an EtherChannel protocol. If one end uses the on mode, the other end must also.</li></ul> <h6 id="pagp-协议"><a href="#pagp-协议" class="header-anchor">#</a> PAgP 协议</h6> <ul><li><p>==auto==
PAgP mode that places a LAN port into a passive negotiating state, in which the port responds to PAgP packets it receives but does not initiate PAgP negotiation. (Default)</p></li> <li><p>==desirable==</p> <p>​	PAgP mode that places a LAN port into an active negotiating state, in which the port initiates negotiations with other LAN ports by sending PAgP packets.</p></li></ul> <h6 id="lacp-协议"><a href="#lacp-协议" class="header-anchor">#</a> LACP 协议</h6> <ul><li><p>==passive==</p> <p>​	LACP mode that places a port into a passive negotiating state, in which the port responds to LACP packets it receives but does not initiate LACP negotiation. (Default)</p></li> <li><p>==active==</p> <p>​	LACP mode that places a port into an active negotiating state, in which the port initiates negotiations with other ports by sending LACP packets. Ref: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-2/3-1-1SG/configuration/guide/config/channel.html</p></li></ul></blockquote> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#default int range e0/0-3</span>
