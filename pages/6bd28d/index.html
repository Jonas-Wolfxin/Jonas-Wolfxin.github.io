1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">ACL<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="acl"><a href="#acl" class="header-anchor">#</a> ACL</h1> <blockquote><p>在大中型企业网络中，通常采用<code>外围路由器</code>、<code>内部路由器</code>和<code>防火墙</code>的配置来实现各种安全策略。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207101845191.png" alt="image-20220710184543082" style="zoom:80%;"> <ul><li><code>内部路由器</code>对前往企业网络中受保护部分的数据流进行过滤，以进一步提高安全，这是通过使用<code>访问控制列表ACL</code>实现的.</li> <li>在可信网络内部，可不使用路由器，而结合使用<code>虚拟局域网(VLAN)和交换机</code>。多层交换机内置了安全功能，可替代内部路由器在VLAN架构中提供较高的性能。</li></ul></blockquote> <h2 id="acl简介"><a href="#acl简介" class="header-anchor">#</a> ACL简介</h2> <blockquote><p>ACL(Access Control List, 访问控制列表):</p> <ul><li>访问控制列表最常见的用途之一是，将有害的分组过滤掉以实现安全策略。例如，可使用访问控制列表来作出非常具体的数据流控制决策，只允许某些主机访问因特网上的Web资源。</li> <li>创建访问控制列表后，就可将其应用于任何接口的<code>入站</code>或<code>出站</code>数据流。访问控制列表被应用于接口后，路由器将对沿指定方向穿越该接口的每个分组进行分析，并采取相应的措施。</li></ul></blockquote> <blockquote><p>==使用ACL缓解安全威胁==:</p> <ul><li>IP address spoofing(欺骗), inbound</li> <li>IP address spoofing, outbound</li> <li>Denial of service (DoS) TCP SYN attacks, blocking external attacks</li> <li>DoS TCP SYN attacks, using TCP Intercept(拦截)</li> <li>DoS smurf attacks</li> <li>Denying/Filtering ICMP messages, inbound</li> <li>Denying/Filtering ICMP messages, outbound</li> <li>Denying/Filtering traceroute</li></ul></blockquote> <blockquote><p>==ACL的执行机制==:</p> <ul><li>总是按顺序将分组与访问控制列表的每一行进行比较，即总是首先与访问控制列表的第一行进行比较，然后是第二行和第三行，以此类推。</li> <li>不断比较，直到满足条件为止。在访问控制列表中，找到分组满足的条件后，对分组采取相应的措施，且不再进行比较。</li> <li>每个访问控制列表末尾都有一条隐式的deny语句，这意味着如果不满足访问控制列表中任何行的条件，分组将被丢弃。</li></ul></blockquote> <blockquote><p>==在路由器上创建和实现访问控制列表时，应遵守一些通用的指导原则==:</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220627142924467.png" alt="image-20220627142924467" style="zoom:50%;"> <ul><li><p>在接口的特定方向上，每种协议只能有一个访问控制列表。这意味着应用IP ACL时，==每个接口上只能有一个Inbound ACL和一个Outbound ACL==。</p></li> <li><p>Organize your access lists so that the more specific tests are at the top.</p></li> <li><p>Any time a new entry is added to the access list, it will be placed at the bottom of the list. Using a text editor for access lists is highly suggested.</p></li> <li><p>You cannot remove one line from an access list. If you try to do this, you will remove the entire list. It is best to copy the access list to a text editor before trying to edit the list. The only exception is when using named access lists.</p> <blockquote><ul><li>对于命名访问控制列表，可编辑、添加或删除特定行，稍后将演示这一点。</li></ul></blockquote> <blockquote><ul><li><p>不能使用 <code>R1(config)#no access-list 10 permit ....</code> 来删除指定的ACL语句, 因为不支持此语法; 使用此语法<code>no access-list 10 ...</code>会导致一次性删除整个 access-list;</p></li> <li><p>正确删除指定的ACL语句:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>R1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip access-list standard 10</span>
R1<span class="token punctuation">(</span>config-std-nacl<span class="token punctuation">)</span><span class="token comment">#no permit 192.168.1.1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li></ul></blockquote></li> <li><p>除非访问控制列表以<code>permit any</code>命令结尾，否则不满足任何条件的分组都将被丢弃。访问控制列表至少应包含一条permit 语句，否则它将拒绝所有的数据流。</p></li> <li><p>创建访问控制列表后应将其应用于接口, 否则不会生效;</p></li> <li><p>访问控制列表用于过滤穿越路由器的数据流;它们不会对始发于当前路由器的数据流进行过滤。</p></li> <li><p>应将IP Standard ACL放在离目的地尽可能近的端口，这就是我们不想在网络中使用Standard ACL的原因。不能将Standard ACL放在离源主机或源网络很近的端口，因为它只能根据源IP地址进行过滤，这将影响所有的目的地。</p></li> <li><p>将IP 扩展访问控制列表放在离信源尽可能近的端口。扩展访问控制列表可根据非常具体的地址和协议进行过滤，我们不希望数据流穿越整个网络后，最终却被拒绝。将这种访问控制列表放在离信源尽可能近的端口，可在一开始就将数据流过滤掉，以免它占用宝贵的带宽。</p></li></ul></blockquote> <h3 id="acl的方向性"><a href="#acl的方向性" class="header-anchor">#</a> ACL的方向性</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220627082603066.png" alt="image-20220627082603066" style="zoom:39%;"> <blockquote><p>如果外部IP分组的源IP地址为内部主机或网络，通常明智的选择是不让它们进入私有网络。
配置ACL，对从因特网前往私有网络的数据流进行过滤，以缓解安全威胁时，应遵守如下规则:</p> <ul><li>拒绝源地址属于内部网络的分组;</li> <li>拒绝游、地址为本地主机地址( 127.0.0.0/8 )的分组;</li> <li>拒绝源地址为保留私有地址(盯C 1918) 的分组;</li> <li>拒绝源地址位于IP 组播地址范围( 224.0.0.0/4 )内的分组。。</li></ul></blockquote> <h4 id="入站acl-inbound"><a href="#入站acl-inbound" class="header-anchor">#</a> 入站ACL(Inbound)</h4> <blockquote><ul><li>将根据访问控制列表对这些分组进行处理，然后再将其路由到出站接口。遭到拒绝的分组不会被路由，因为在调用路由选择进程前，它们已被丢弃。</li> <li>一般应用于与</li></ul> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220627082407729.png" alt="image-20220627082407729" style="zoom:37%;"> <blockquote><h6 id="掩码通配符-wildcard-masking"><a href="#掩码通配符-wildcard-masking" class="header-anchor">#</a> 掩码通配符 Wildcard Masking:</h6> <ul><li><p>二进制的0位 表示地址中的对应位必须与指定的地址相同, 也即网段地址;</p></li> <li><p>二进制的1位 表示地址中的对应位是主机地址范围;</p></li></ul> <p>假定要禁止网络中的一部分(即172.16.8.0-172.16.15.0 )访问你的网络。该范围对应的块大小为8，因此，在访问控制列表中，应指定网络号172.16.8.0 和通配符掩码0.0.7.255 。这是什么意思呢?</p> <p>路由器根据7.255确定块大小。上述网络号和通配符掩码组合告诉路由器，从172.16.8.0 开始，向上数8个(块大小)网络，直到网络172.16.15.0。这比看起来简单。我原本可以使用二进制来解释，但不需要这样做。实际上，只需记住，通配符掩码总是比块大小小1 。就这个示例而言，通配符掩码为7，因为块大小为8。如果使用的块大小为16，则通配符掩码将为15。</p> <p>==练习: 下面的配置是什么意思呢?==</p> <ol><li><p>Corp(config)#access-list 10 deny 172.16.16.0 0.0.7.255
这条语句指出，从网络172.16.16.0 开始，向上数8 个(块大小)网络，到172.16.23.255 结束。</p></li> <li><p>Corp(config)#access-list 10 deny 172.16.32.0 0.0.15.255
这条语句指出，从网络172.16.32.0 开始，向上数16 个(块大小)网络，到172.16.47.255 结束。</p></li> <li><p>Corp(config)#access-list 10 deny 172.16.64.0 0.0.63.255
这条语句指出，从网络172.16.64.0 开始，向上数64 个(块大小)网络，到172.16.127.255 结束。</p></li> <li><p>Corp(config)#access-list 10 deny 192.168.160.0 0.0.31.255
这条语句指出，从网络192.168.160.0 开始，向上数32 个(块大小)网络，到192.168.19 l.255 结束。</p></li></ol></blockquote></blockquote> <h4 id="出站acl-outbound"><a href="#出站acl-outbound" class="header-anchor">#</a> 出站ACL(Outbound)</h4> <blockquote><p>访问控制列表应用于出站分组时，分组将首先被路由到出站接口，然后根据访问控制列表对其进行处理。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207101930803.png" alt="image-20220627082832389" style="zoom:33%;"></blockquote> <h3 id="acl的分类"><a href="#acl的分类" class="header-anchor">#</a> ACL的分类</h3> <blockquote><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220627083654033.png" alt="image-20220627083654033" style="zoom:33%;"> <p>​</p> <blockquote><p><strong>Named access lists</strong> technically there really are only two classes since named access lists are either standard or extended and not actually a new type. I’m just distinguishing them because they’re created and referred to differently than standard and extended access lists, but they’re functionally the same.</p></blockquote> <h5 id="standard-access-lists"><a href="#standard-access-lists" class="header-anchor">#</a> ==Standard access lists==:</h5> <ul><li>只能根据<code>源IP地址</code>做过滤条件; 这意味着标准访问控制列表允许或者拒绝整个协议族，它们不区分IP数据包类型(如Web 、Telnet 、UDP 等)。</li> <li>使用访问控制列表编号<code>1-99</code>或<code>1300-1999</code>，就相当于告诉路由器你要创建一个 Standard ACL。</li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list ?</span>

    <span class="token operator">&lt;</span><span class="token number">1100</span>-119<span class="token operator"><span class="token file-descriptor important">9</span>&gt;</span> Extended <span class="token number">48</span>-bit MAC address access list
    <span class="token operator">&lt;</span><span class="token number">1300</span>-199<span class="token operator"><span class="token file-descriptor important">9</span>&gt;</span> IP standard access list <span class="token punctuation">(</span>expanded range<span class="token punctuation">)</span>
    <span class="token operator">&lt;</span><span class="token number">200</span>-29<span class="token operator"><span class="token file-descriptor important">9</span>&gt;</span> Protocol type-code access list
    <span class="token operator">&lt;</span><span class="token number">2000</span>-269<span class="token operator"><span class="token file-descriptor important">9</span>&gt;</span> IP extended access list <span class="token punctuation">(</span>expanded range<span class="token punctuation">)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br></div></div><h5 id="extended-access-lists"><a href="#extended-access-lists" class="header-anchor">#</a> ==Extended access lists==:</h5> <ul><li>能根据查<code>源IP地址</code>、<code>目标IP地址</code>、<code>网络层报头的协议(Protocol)字段</code>、<code>传输层报头中的端口号</code>等等进行过滤;</li> <li>对于扩展访问控制列表，使用编号<code>100-199</code>; 但注意，编号<code>2000-2699</code>也可用于扩展访问控制列表。</li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list?</span>

="line-number">51</span><br><span class="line-number">52</span><br><span class="line-number">53</span><br><span class="line-number">54</span><br><span class="line-number">55</span><br><span class="line-number">56</span><br><span class="line-number">57</span><br><span class="line-number">58</span><br><span class="line-number">59</span><br><span class="line-number">60</span><br><span class="line-number">61</span><br><span class="line-number">62</span><br><span class="line-number">63</span><br><span class="line-number">64</span><br><span class="line-number">65</span><br><span class="line-number">66</span><br><span class="line-number">67</span><br><span class="line-number">68</span><br><span class="line-number">69</span><br><span class="line-number">70</span><br><span class="line-number">71</span><br><span class="line-number">72</span><br><span class="line-number">73</span><br><span class="line-number">74</span><br><span class="line-number">75</span><br><span class="line-number">76</span><br><span class="line-number">77</span><br><span class="line-number">78</span><br><span class="line-number">79</span><br><span class="line-number">80</span><br><span class="line-number">81</span><br><span class="line-number">82</span><br><span class="line-number">83</span><br><span class="line-number">84</span><br><span class="line-number">85</span><br><span class="line-number">86</span><br><span class="line-number">87</span><br><span class="line-number">88</span><br><span class="line-number">89</span><br><span class="line-number">90</span><br><span class="line-number">91</span><br><span class="line-number">92</span><br><span class="line-number">93</span><br><span class="line-number">94</span><br><span class="line-number">95</span><br><span class="line-number">96</span><br><span class="line-number">97</span><br><span class="line-number">98</span><br><span class="line-number">99</span><br><span class="line-number">100</span><br><span class="line-number">101</span><br><span class="line-number">102</span><br><span class="line-number">103</span><br></div></div><blockquote><ul><li>如果根据应用层协议进行过滤，必须在permit或deny后面指定合适的第4层(传输层)协议。例如，要过滤Telnet或FTP，可选择TCP，因为Telnet和FTP都使用传输层协议TCP。</li> <li>如果选择IP，你将不能进一步指定应用层协议或者协议端口，而只能根据<code>源地址和目标地址</code>进行过滤。</li></ul></blockquote></blockquote> <h2 id="acl的配置"><a href="#acl的配置" class="header-anchor">#</a> ACL的配置</h2> <h3 id="控制vty-telnet-ssh-访问"><a href="#控制vty-telnet-ssh-访问" class="header-anchor">#</a> 控制VTY(Telnet/SSH) 访问</h3> <p>对于大型路由器，要禁止用户以Telnet 或SSH 方式访问它可能很难，因为每个活动接口都允许VTY 访问。可创建一个扩展IP 访问控制列表，禁止访问路由器的每个地址。但如果真的这样做，必须将其应用于每个接口的入站方向，对于有数十甚至数百个接口的大型路由器来说，这种解决方案的可扩展性太低了。另外，如果每台路由器都对每个分组进行检查，以防它访问VTY 线路，导致的网
络延迟将很大。</p> <blockquote><p>一种好得多的解决方案是，使用标准访问控制列表来控制对VTY线路的访问。这种解决方案为何可行呢?因为将访问控制列表应用于VTY线路时，不需要指定协议一一访问VTY就意味着以Telnet 或SSH 方式访问终端。也不需要指定目标地址，因为你不关心用户将哪个接口的地址用作Telnet会话的目标。你只需控制用户来自何方一他们的源IP地址。</p> <p>要实现这项功能，需要如下步骤:
(1) 创建一个标准访问控制列表，它只允许你希望的主机远程登录到路由器。
(2) 使用命令<code>access-class in</code> <strong>将该访问控制列表应用于VTY线路</strong>。
下面的示例只允许主机172.16.10.3远程登录到路由器:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 50 permit host 172.16.10.3</span>
Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#line vty 0 4</span>
Lab_A<span class="token punctuation">(</span>config-line<span class="token punctuation">)</span><span class="token comment">#access-class 50 in</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><blockquote><ul><li>由于访问控制列表末尾有一条隐式的deny any语句，因此除172.16.10.3外的其他任何主机都不能远程登录到该路由器，而不管它将路由器的哪个IP地址用作目标。</li> <li>在VTY线路上配置命令``access-class in`时，只会检查并比较进入路由器的Telnet分组。</li></ul></blockquote></blockquote> <h3 id="standard-acl示例"><a href="#standard-acl示例" class="header-anchor">#</a> Standard ACL示例:</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207111021777.png" alt="image-20220711102123628"></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_A<span class="token comment">#config t</span>
Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 10 deny 172.16.40.0 0.0.0.255</span>
Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 10 permit any</span>
Lab_ACconfig<span class="token punctuation">)</span><span class="token comment">#int faO/1</span>
Lab_ACconfig-if<span class="token punctuation">)</span><span class="token comment">#ip access-group 10 out</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207111024740.png" alt="image-20220711102402551"></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token comment">#config t</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#access-list 10 deny 192.168.10.128 0.0.0.31</span>
Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 10 permit any</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#interface Ethernet 0</span>
Lab_BCconfig-if<span class="token punctuation">)</span><span class="token comment">#ip access-group 10 out</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><h3 id="extended-acl示例"><a href="#extended-acl示例" class="header-anchor">#</a> Extended ACL示例</h3> <p>在这个示例中，我们只想让主机B以HTTP方式访问财务部服务器，但允许其他数据流通过。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207111205770.png" alt="image-20220711120527576"></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_A<span class="token comment">#config t</span>
Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 110 permit tcp host 192.168.177.2 host 172.22.89.26 eq 80</span>
Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 110 deny tcp any host 172.22.89.26 eq 80</span>
Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 110 per.it ip any any</span>

Lab_A<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface fastethernet 0/1</span>
Lab_A<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ip access-group 110 out</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><h3 id="示例"><a href="#示例" class="header-anchor">#</a> 示例</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220627091339583.png" alt="image-20220627091339583"></p> <h5 id="vpcs的配置"><a href="#vpcs的配置" class="header-anchor">#</a> VPCS的配置</h5> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token builtin class-name">set</span> pcname PC1   <span class="token comment"># 设置 主机名</span>

们没有什么独特之处，只是让你能够以易于理解的方式引用它们。另外，在语法方面也存在细微的差别。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220627142049065.png" alt="image-20220627142049065" style="zoom:67%;"></blockquote> <blockquote><p>下面为图12.2所示的网络重新创建标准访问控制列表，但使用命名访问控制列表:</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207102111496.png" alt="image-20220710211146327"></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_A<span class="token comment">#config t</span>

R2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 110 remark Permit Bob from Sales Only To Finance</span>
R2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 110 permit ip host 172.16.40.1 172.16.50.0 0.0.0.255</span>
R2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 110 deny ip 172.16.40.0 0.0.0.255 172.16.50.0 0.0.0.255</span>

R2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip access-list extended No_Telnet</span>
R2<span class="token punctuation">(</span>config-ext-nacl<span class="token punctuation">)</span><span class="token comment">#remark Deny all of Sales from Telnetting to Marketing</span>
R2<span class="token punctuation">(</span>config-ext-nacl<span class="token punctuation">)</span><span class="token comment">#deny tcp 172.16.40.0 0.0.0.255 172.16.60.0 0.0.0.255 eq 23</span>
R2<span class="token punctuation">(</span>config-ext-nacl<span class="token punctuation">)</span><span class="token comment">#permit ip any any</span>

R2<span class="token punctuation">(</span>config-ext-nacl<span class="token punctuation">)</span><span class="token comment">#do show run   # 只能在运行配置中看到注释</span>
    <span class="token punctuation">[</span>output cut<span class="token punctuation">]</span>
    <span class="token operator">!</span>
    <span class="token function">ip</span> access-list extended No_Telnet
    remark Stop all of Sales from Telnetting to Marketing
    deny tcp <span class="token number">172.16</span>.40.0 <span class="token number">0.0</span>.0.255 <span class="token number">172.16</span>.60.0 <span class="token number">0.0</span>.0.255 eq telnet
    permit <span class="token function">ip</span> any any
    <span class="token operator">!</span>
    access-list <span class="token number">110</span> remark Permit Bob from Sales Only To Finance
    access-list <span class="token number">110</span> permit <span class="token function">ip</span> <span class="token function">host</span> <span class="token number">172.16</span>.40.1 <span class="token number">172.16</span>.50.0 <span class="token number">0.0</span>.0.255
    access-list <span class="token number">110</span> deny <span class="token function">ip</span> <span class="token number">172.16</span>.40.0 <span class="token number">0.0</span>.0.255 <span class="token number">172.16</span>.50.0 <span class="token number">0.0</span>.0.255
    access-list <span class="token number">110</span> permit <span class="token function">ip</span> any any
    <span class="token operator">!</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br></div></div></blockquote> <h3 id="turning-off-and-configuring-network-services"><a href="#turning-off-and-configuring-network-services" class="header-anchor">#</a> Turning Off and Configuring Network Services</h3> <blockquote><ul><li>默认情况下，思科IOS 运行了一些不必要的服务，如果不禁用它们，它们很可能成为<code>拒绝服务(DoS)</code>攻击的目标。</li> <li>DoS 攻击是最常见的攻击，因为这种攻击最容易发动。</li> <li>为实时防范DoS 攻击，并将攻击网络的企图记录到日志, 可使用软件和硬件工具，如==入侵检测系统(IDS)== 和==入侵防范系统(IPS)==。然而，如果不能实现IDS/IPS，可在路由器上执行一些基本命令，让路由器更安全，但没有任何措施可确保当今的网络绝对安全。</li></ul></blockquote> <h4 id="blocking-snmp-packets"><a href="#blocking-snmp-packets" class="header-anchor">#</a> Blocking SNMP Packets</h4> <blockquote><ul><li><p>思科IOS默认允许从任何地方远程接入，生产环境中要对远程接入进行限制。否则，路由器很容易成为非法登录者的攻击目标。</p></li> <li><p>通过在外围路由器的接口serialO/O 上配置如下命令，可禁止任何SNMP 分组进入该路由器和DMZ
(要让这个访问控制列表真正发挥作用，还需添加→条permit 语句，但这只是一个示例而已):</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#access-list 110 deny udp any any eq snmp</span>
Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface sO/O</span>
Lab_B<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#access-group 110 in</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li></ul></blockquote> <h4 id="disabling-echo"><a href="#disabling-echo" class="header-anchor">#</a> Disabling Echo</h4> <blockquote><ul><li><p>默认情况下，思科路由器启用了一系列诊断端口，运行一些对诊断很有帮助的小型服务(它们是服务器或后台程序), 以提供一些UDP和TCP服务，这包括echo、chargen 和discard. 主机连接到这些端口后，将占用少量CPU以响应相关的请求。只需使用一台攻击设备发送大量请求(这些请求使用伪造的随机源IP地址)，就可让路由器不堪重负，使其响应缓慢甚至崩溃。</p> <blockquote><ul><li><p>TCP 小型服务包括以下几种。</p> <ul><li><p>echo: 回显输入的内容。要查看相关的选项，请执行命令telnet x.x.x.x echo ?</p></li> <li><p>chargen: 生成ASCII 数据流。要查看相关的选项，请执行命令telnet x.x.x.x chargen ?</p></li> <li><p>discard: 丢弃输入的内容。要查看相关的选项，请执行命令telnetx.x.x.x discard ?</p></li> <li><p>daytime: 返回系统日期和时间一一如果运行了NTP或在EXEC模式下手工设置了日期和时间，它们就是正确的。要查看相关的选项，请执行命令telnet x.x.x.x daytime ?</p></li></ul></li> <li><p>UDP 小型服务包括以下几种。</p> <ul><li>echo: 回显发送的数据报的有效负载。</li> <li>discard: 悄悄地丢弃发送的数据报。</li> <li>chargen: 丢弃发送的数据报，并以一个字符串响应，该字符串包含72 个ASCII 字符，并以 CR+LF 结尾。</li></ul></li></ul></blockquote></li> <li><p>为防范chargen攻击，可配置如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no service tcp-small-servers</span>
Lab_B<span class="token punctuation">(</span>confìg<span class="token punctuation">)</span><span class="token comment">#no service udp-small-servers</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li> <li><p>finger是一个实用程序，允许因特网上的Unix主机用户能够彼此获取对方的信息，应禁用这项服务:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no service finger   # finger命令可用来获取有关网络中所有用户和路由器的信息; finger 是一个远程执行的命令，其效果与在路由器上执行命令show users相同。</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul></blockquote> <h4 id="turning-off-bootp-and-auto-config"><a href="#turning-off-bootp-and-auto-config" class="header-anchor">#</a> Turning off BootP and Auto-Config</h4> <blockquote><p>默认情况下，思科路由器也提供异步线路BootP服务以及远程自动配置服务。要在思科路由器上禁用这些功能，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no ip boot server</span>
Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no service config</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></blockquote> <h4 id="disabling-the-http-interface"><a href="#disabling-the-http-interface" class="header-anchor">#</a> Disabling the HTTP Interface</h4> <blockquote><p>对配置和监视路由器来说，命令ip http server 可能很有用，但ππp 的明文特征显然是一种安全风险。要在路由器上禁用HTIP 进程，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no ip http server</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>要在路由器上启用Hπ? 服务器，以支持AAA ，可使用全局配置命令 <code>ip http server</code> 。</p></blockquote> <h4 id="disabling-ip-source-routing"><a href="#disabling-ip-source-routing" class="header-anchor">#</a> Disabling IP Source Routing</h4> <blockquote><ul><li><p>IP报头包含一个源路由( source-route )选项，让源IP主机可指定分组穿越IP网络时采用的路由。在启用了源路由选择的情况下，分组将被转发到其源路由选项指定的路由器地址。</p></li> <li><p>要禁用根据报头中的源路由选项来处理分组，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no ip source-route</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul></blockquote> <h4 id="disabling-proxy-arp"><a href="#disabling-proxy-arp" class="header-anchor">#</a> Disabling Proxy ARP</h4> <blockquote><ul><li><p>代理ARP是这样一种技术，即由一台主机(通常是路由器)来响应发送给其他设备的ARP请求。通过&quot;伪造&quot;身份，路由器承担了将这些分组转发给&quot;实际&quot;目的地的职责。代理ARP可让主机到达远程子网，而无需配置路由选择或默认网关。</p></li> <li><p>要禁用代理ARP ，可使用下面的命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface faO/O</span>
Lab_B<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no ip proxy-arp</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li></ul></blockquote> <h4 id="disabling-redirect-messages"><a href="#disabling-redirect-messages" class="header-anchor">#</a> Disabling Redirect Messages</h4> <blockquote><ul><li><p>路由器使用ICMP重定向消息来告诉主机，有一条前往特定目的地的路由更好。</p></li> <li><p>为禁用重定向消息，以防坏人根据这种信息推断出网络拓扑，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface sO/O</span>
Lab_B<span class="token punctuation">(</span>config斗f<span class="token punctuation">)</span><span class="token comment">#no ip redirects</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>请在路由器的所有接口上配置该命令。然而，需要知道的是，这样做后，合法的用户数据流可能采用次优路由。因此，禁用这项功能时要谨慎。</p></li></ul></blockquote> <h4 id="disabling-the-generation-of-icmp-unreachable-messages"><a href="#disabling-the-generation-of-icmp-unreachable-messages" class="header-anchor">#</a> Disabling the Generation of ICMP Unreachable Messages</h4> <blockquote><ul><li><p>要防止外围路由器告诉外部哪些子网不存在，进而泄露拓扑信息，可使用命令``no ip unreachables`。</p></li> <li><p>应在连接到外部的所有路由器接口上都配置这个命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface sO/O</span>
Lab_B<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no ip unreachables</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li></ul></blockquote> <h4 id="disabling-multicast-route-caching"><a href="#disabling-multicast-route-caching" class="header-anchor">#</a> Disabling Multicast Route Caching</h4> <blockquote><ul><li><p>组播路由缓存列出了组播路由选择缓存条目，这些分组可被人读取，带来了安全威胁。</p></li> <li><p>要禁用组播路由缓存，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface sO/O</span>
Lab_B<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no ip mroute-cache</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li></ul></blockquote> <h4 id="disabling-the-maintenance-operation-protocol-mop"><a href="#disabling-the-maintenance-operation-protocol-mop" class="header-anchor">#</a> Disabling the ==Maintenance Operation Protocol (MOP)==</h4> <blockquote><p>维护操作协议(Maintenance Operation Protocol，MOP) 是DECnet协议族中的一种协议，运行在数据链路层和网络层，供上传和下载系统软件、远程测试和故障诊断等服务使用, 但 DECnet协议已不再使用:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface sO/O</span>
Lab_B<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no mop enab1ed</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></blockquote> <h4 id="turning-off-the-x-25-pad-service"><a href="#turning-off-the-x-25-pad-service" class="header-anchor">#</a> Turning Off the ==X.25 PAD Service==</h4> <blockquote><p>分组拆装器( Packet AssemblerlDisassembler, PAD) 将终端和计算机等异步设备连接到公共/私有X.25 网络。鉴于当前的每台计算机都使用IP，X.25 经淘汰了，因此没有理由运行该服务。要禁用PAD服务，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no service pad</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></blockquote> <h4 id="enabling-the-nagle-tcp-congestion-algorithm"><a href="#enabling-the-nagle-tcp-congestion-algorithm" class="header-anchor">#</a> Enabling the ==Nagle TCP== Congestion Algorithm</h4> <blockquote><ul><li><p>NagleTCP 拥塞算法避免小型分组导致的拥塞很有用，但如果使用的MTU设置比默认值(1500B)大，这种算法可能导致负载超过平均水平。</p></li> <li><p>要启用该服务，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#service nagle</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>需要知道的是， Nagle 拥塞服务可能导致到Xserver 的XWindow 连接断开，因此如果使用的是XWindow, 请不要启用该服务。</p></li></ul></blockquote> <h4 id="logging-every-event"><a href="#logging-every-event" class="header-anchor">#</a> Logging Every Event</h4> <blockquote><p>用作Syslog服务器时，思科ACS服务器可将事件写入日志。要启用这项功能，可使用命令<code>logging trap debugging</code> (或<code>logging trap level</code>) 和<code>logging ip_address</code>:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#logging trap debugging</span>
Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#logging 192.168.254.251</span>
Lab_B<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#exit</span>
Lab_B<span class="token comment">#show logging  # 有关路由器日志配置的统计信息</span>
    Syslog logging: enabled <span class="token punctuation">(</span><span class="token number">0</span> messages dropped, <span class="token number">0</span> flushes, <span class="token number">0</span> overruns<span class="token punctuation">)</span>
    Console logging: level debugging, <span class="token number">15</span> messages logged
    Monitor logging: level debugging, <span class="token number">0</span> messages logged
    Buffer logging: disabled
    Trap logging: level debugging, <span class="token number">19</span> message lines logged
    Logging to <span class="token number">192.168</span>.254.251, <span class="token number">1</span> message lines logged
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div></blockquote> <h4 id="disabling-cisco-discovery-protocol"><a href="#disabling-cisco-discovery-protocol" class="header-anchor">#</a> Disabling ==Cisco Discovery Protocol==</h4> <blockquote><ul><li><p>思科发现协议(CDP)发现直接相连的思科网络设备，这是一种思科专用协议。然而，由于它是一种数据链路层协议，因此无法发现路由器另一边的思科设备。另外，默认情况下，思科交换机不转发CDP分组，因此无法发现交换机端口连接的思科设备。</p></li> <li><p>组建网络时，CDP确实很有用。但熟悉该网络并编写文档后，就不再需要CDP了。鉴于CDP可用于发现网络中的思科路由器和交换机，应将其禁用:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no cdp run  # 可在全局配置模式下设置，这将在交换机或路由器上完全关闭CDP</span>

Lab_BCconfig-if<span class="token punctuation">)</span><span class="token comment">#no cdp enab1e  # 也可以在每个接口上禁用CDP</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li></ul></blockquote> <h4 id="disabling-the-default-forwarded-udp-protocols"><a href="#disabling-the-default-forwarded-udp-protocols" class="header-anchor">#</a> Disabling the ==Default Forwarded UDP Protocols==</h4> <blockquote><ul><li><p>在接口上配置命令<code>ip helper-address</code>后，路由器将把UDP广播转发到指定的服务器:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#interface fO/O</span>
Lab_BCconfig-if<span class="token punctuation">)</span><span class="token comment">#ip helper-address 192.168.254.251</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li> <li><p>在需要将DHCP客户端请求转发给DHCP服务器时，通常使用命令<code>ip helper-address</code>。但问题是，这不仅会转发前往端口67的分组(BOOTP服务器请求)，默认还会转发前往其他7个端口的分组。要禁止转发前往这些端口的分组，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no ip forward-protocol udp 69</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no ip forward-protocol udp 53</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no ip forward-protocol udp 37</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no ip forward-protocol udp 137</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no ip forward-prococo1 udp 138</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no ip forward-protocol udp 68</span>
Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#no ip forward-protocol udp 49</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div></li> <li><p>如果要转发前往特定端口的分组(如TACACS+分组)，可使用如下命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Lab_BCconfig<span class="token punctuation">)</span><span class="token comment">#ip forward-protocol udp 49</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul></blockquote> <h4 id="cisco-s-auto-secure"><a href="#cisco-s-auto-secure" class="header-anchor">#</a> Cisco’s ==Auto Secure==</h4> <blockquote><p>关闭前面讨论的所有服务需要做的工作量很大，思科提供的解决方案只需要一个命令即可实现自动化安全配置:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R1<span class="token comment">#auto secure</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></blockquote> <h3 id="monitoring-access-lists"><a href="#monitoring-access-lists" class="header-anchor">#</a> Monitoring Access Lists</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207111322837.png" alt="image-20220711132243623"></p> <h1 id="tacacs-and-radius"><a href="#tacacs-and-radius" class="header-anchor">#</a> <a href="https://www.geeksforgeeks.org/computer-network-tacacs/" target="_blank" rel="noopener noreferrer">TACACS+<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> and <a href="https://www.geeksforgeeks.org/computer-network-radius/" target="_blank" rel="noopener noreferrer">RADIUS<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></h1> <p>To provide a <strong>centralized management system for the authentication, authorization, and accounting (AAA framework)</strong>, Access Control Server (ACS) is used.</p> <p>For the communication between the client and the ACS server, two protocols are used namely <strong>TACACS+</strong> and RADIUS.</p> <h2 id="tacacs"><a href="#tacacs" class="header-anchor">#</a> TACACS+</h2> <p>Terminal Access Controller Access Control System (TACACS+) is a Cisco proprietary protocol that is used for the communication of the Cisco client and Cisco ACS server. It uses TCP port number 49 which makes it reliable.</p> <h2 id="radius"><a href="#radius" class="header-anchor">#</a> RADIUS</h2> <p>Remote Access Dial-In User Service (RADIUS) is an open standard protocol used for the communication between any vendor AAA client and ACS server. If one of the clients or servers is from any other vendor (other than Cisco) then we have to use RADIUS. It uses port number 1812 for authentication and authorization and 1813 for accounting.</p> <p><strong>Similarities –</strong>
The process is started by Network Access Device (NAD – client of TACACS+ or RADIUS). NAD contact the TACACS+ or RADIUS server and transmit the request for authentication (username and password) to the server. First, NAD obtains the username prompt and transmits the username to the server, and then again the server is contacted by NAD to obtain the password prompt and then the password is sent to the server.</p> <p>The server replies with an access-accept message if the credentials are valid otherwise send an access-reject message to the client. Further authorization and accounting are different in both protocols as authentication and authorization are combined in RADIUS.</p> <p><strong>Differences –</strong></p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207111409034.png" alt="image-20220711140954901"></p> <p><strong>Advantages (TACACS+ over RADIUS) –</strong></p> <ol><li><p>As TACACS+ uses TCP therefore more reliable than RADIUS.</p></li> <li><p>TACACS+ provides more control over the authorization of commands while in RADIUS, no external authorization of commands is supported.</p></li> <li><p>All the AAA packets are encrypted in TACACS+ while only the passwords are encrypted in RADIUS i.e more secure.</p></li></ol> <p><strong>Advantage (RADIUS over TACACS+) –</strong></p> <ol><li><p>As it is an open standard therefore RADIUS can be used with other vendor’s devices while because TACACS+ is Cisco proprietary, it can be used with Cisco devices only.</p></li> <li><p>It has more extensive accounting support than TACACS+.</p></li></ol></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/master/docs/40.网络运维/05.CCNA/10.CCNA知识笔记/09.ACL.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">last Updated:</span> <span class="time">2022/07/13, 13:10:53</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/bada2c/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">热备份技术</div></a> <a href="/pages/7db05a/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">NAT 网络地址转换</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
