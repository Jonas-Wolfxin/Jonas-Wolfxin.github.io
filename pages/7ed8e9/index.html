WBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">Python 基础篇(八)<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="python-元组和集合"><a href="#python-元组和集合" class="header-anchor">#</a> Python 元组和集合</h1> <h2 id="什么是元组"><a href="#什么是元组" class="header-anchor">#</a> 什么是元组</h2> <ul><li>元组
<ul><li>Python内置的数据结构之一，是一个<strong>不可变序列</strong></li></ul></li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/08/01.png" alt="01"></p> <ul><li>不可变序列与可变序列
<ul><li>不可变序列:<strong>字符串、元组</strong> <ul><li>不变可变序列:<strong>没有增、删、改的操作</strong></li></ul></li> <li>可变序列:<strong>列表、字典</strong> <ul><li>可变序列:<strong>可以对序列执行增、删、改操作，对象地址不发生更改</strong></li></ul></li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/22 23:39
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token triple-quoted-string string">''' 不可变序列，可变序列'''</span>
<span class="token triple-quoted-string string">'''可变序列  列表，字典'''</span>
lst<span class="token operator">=</span><span class="token punctuation">[</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">45</span><span class="token punctuation">]</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">id</span><span class="token punctuation">(</span>lst<span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#2607077621248</span>
lst<span class="token punctuation">.</span>append<span class="token punctuation">(</span><span class="token number">300</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">id</span><span class="token punctuation">(</span>lst<span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#2607077621248</span>

<span class="token triple-quoted-string string">'''不可变序列 字符串、元组'''</span>
s<span class="token operator">=</span><span class="token string">'hello'</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">id</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span><span class="token punctuation">)</span>   <span class="token comment">#2178033099568</span>
s<span class="token operator">=</span>s<span class="token operator">+</span><span class="token string">' world'</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">id</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span><span class="token punctuation">)</span>   <span class="token comment">#2178035703344</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span> <span class="token comment">#hello world</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br></div></div><h2 id="元组的创建方式"><a href="#元组的创建方式" class="header-anchor">#</a> 元组的创建方式</h2> <ul><li><p>元组的创建方式</p> <ul><li><p><font color="#DC4040" size="4" face="黑体">直接小括号</font></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>t<span class="token operator">=</span><span class="token punctuation">(</span><span class="token string">'Python'</span><span class="token punctuation">,</span><span class="token string">'hello'</span><span class="token punctuation">,</span><span class="token number">90</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p><font color="#DC4040" size="4" face="黑体">使用内置函数tuple()</font></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>t<span class="token operator">=</span><span class="token builtin">tuple</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token string">'Python'</span><span class="token punctuation">,</span><span class="token string">'hello'</span><span class="token punctuation">,</span><span class="token number">90</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p><font color="#DC4040" size="4" face="黑体">只包含一个元组的元素需要使用逗号和小括号</font></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>t<span class="token operator">=</span><span class="token punctuation">(</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/22 23:48
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token triple-quoted-string string">'''元组的创建方式'''</span>
<span class="token triple-quoted-string string">'''第一种；使用小括号()'''</span>
t<span class="token operator">=</span><span class="token punctuation">(</span><span class="token string">'Python'</span><span class="token punctuation">,</span><span class="token string">'world'</span><span class="token punctuation">,</span><span class="token number">98</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t<span class="token punctuation">)</span>         <span class="token comment">#('Python', 'world', 98)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>t<span class="token punctuation">)</span><span class="token punctuation">)</span>   <span class="token comment">#&lt;class 'tuple'&gt;</span>

<span class="token comment">#第二种创建方式，使用内置函数tuple()</span>
t1<span class="token operator">=</span><span class="token builtin">tuple</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token string">'Python'</span><span class="token punctuation">,</span><span class="token string">'world'</span><span class="token punctuation">,</span><span class="token number">98</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t1<span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>t1<span class="token punctuation">)</span><span class="token punctuation">)</span>

t2<span class="token operator">=</span><span class="token string">'Python'</span><span class="token punctuation">,</span><span class="token string">'world'</span><span class="token punctuation">,</span><span class="token number">98</span>  <span class="token comment">#省略了小括号</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t2<span class="token punctuation">)</span>            <span class="token comment">#('Python', 'world', 98)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>t2<span class="token punctuation">)</span><span class="token punctuation">)</span>      <span class="token comment">#&lt;class 'tuple'&gt;</span>

t3<span class="token operator">=</span><span class="token string">'Python'</span><span class="token punctuation">,</span>     <span class="token comment">#如果元组中只有一个元素时，逗号不能省</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t3<span class="token punctuation">)</span>        <span class="token comment">#('Python',)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>t3<span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#&lt;class 'tuple'&gt;</span>

<span class="token triple-quoted-string string">'''空元组的创建方式'''</span>
lst<span class="token operator">=</span><span class="token punctuation">[</span><span class="token punctuation">]</span>        <span class="token comment">#空列表</span>
lst1<span class="token operator">=</span><span class="token builtin">list</span><span class="token punctuation">(</span><span class="token punctuation">)</span>   <span class="token comment">#空列表</span>

d<span class="token operator">=</span><span class="token punctuation">{</span><span class="token punctuation">}</span>          <span class="token comment">#空字典</span>
d2<span class="token operator">=</span><span class="token builtin">dict</span><span class="token punctuation">(</span><span class="token punctuation">)</span>      <span class="token comment">#空字典</span>

t4<span class="token operator">=</span><span class="token punctuation">(</span><span class="token punctuation">)</span>         <span class="token comment">#空元组</span>
t5<span class="token operator">=</span><span class="token builtin">tuple</span><span class="token punctuation">(</span><span class="token punctuation">)</span>    <span class="token comment">#空元组</span>

<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'空列表'</span><span class="token punctuation">,</span>lst<span class="token punctuation">,</span>lst1<span class="token punctuation">)</span> <span class="token comment">#空列表 [] []</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'空字典'</span><span class="token punctuation">,</span>d<span class="token punctuation">,</span>d2<span class="token punctuation">)</span>     <span class="token comment">#空字典 {} {}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'空元组'</span><span class="token punctuation">,</span>t4<span class="token punctuation">,</span>t5<span class="token punctuation">)</span>    <span class="token comment">#空元组 () ()</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br><span class="line-number">31</span><br><span class="line-number">32</span><br><span class="line-number">33</span><br><span class="line-number">34</span><br><span class="line-number">35</span><br><span class="line-number">36</span><br><span class="line-number">37</span><br></div></div><h2 id="为什么要将元组设计成不可变序列"><a href="#为什么要将元组设计成不可变序列" class="header-anchor">#</a> 为什么要将元组设计成不可变序列</h2> <ul><li><p>为什么要将元组设置成不可变序列</p> <ul><li><p><font color="#DC4040" size="4" face="黑体">在多任务环境下,同时操作对象时不需要加锁</font></p></li> <li><p><font color="#DC4040" size="4" face="黑体">因此,在程序中尽量使用不可变序列</font></p></li> <li><p><strong>注意事项</strong>:元组中存储的是对象的引用</p> <ul><li><font color="#DC4040" size="4" face="黑体">如果元组中对象本身不可变对象，则不能在引用其他对象</font></li> <li><font color="#DC4040" size="4" face="黑体">如果元组中对象是可变对象，则可变对象的引用不允许改变，但数据可以改变</font></li></ul></li></ul></li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/08/02.png" alt="01"></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/23 0:11
@Version    :1.0
&quot;&quot;&quot;</span>

t<span class="token operator">=</span><span class="token punctuation">(</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token punctuation">[</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">]</span><span class="token punctuation">,</span><span class="token number">9</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t<span class="token punctuation">)</span>        <span class="token comment">#(10, [20, 30], 9)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>t<span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#&lt;class 'tuple'&gt;</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">0</span><span class="token punctuation">]</span><span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">0</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">,</span><span class="token builtin">id</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">0</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">)</span>     <span class="token comment">#10 &lt;class 'int'&gt; 140713469812768</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">,</span><span class="token builtin">id</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">)</span>     <span class="token comment">#[20, 30]  &lt;class 'list'&gt; 1458245322240</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">2</span><span class="token punctuation">]</span><span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">2</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">,</span><span class="token builtin">id</span><span class="token punctuation">(</span>t<span class="token punctuation">[</span><span class="token number">2</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">)</span>     <span class="token comment">#9    &lt;class 'int'&gt; 140713469812736</span>

<span class="token triple-quoted-string string">'''尝试将t[1]修改为100'''</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">id</span><span class="token punctuation">(</span><span class="token number">100</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token comment"># t[1]=100  #元组是不允许修改元素的</span>
<span class="token triple-quoted-string string">'''由于[20,30]是列表，而类表是可变序列，所以可以向列表中添加元素,而列表的内存地址不变'''</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;

<span class="token keyword">print</span><span class="token punctuation">(</span>s2<span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>s2<span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#{1, 2, 3, 4, 5, 6, 7, 8} &lt;class 'set'&gt;</span>
s3<span class="token operator">=</span><span class="token builtin">set</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">,</span><span class="token number">2</span><span class="token punctuation">,</span><span class="token number">3</span><span class="token punctuation">,</span><span class="token number">4</span><span class="token punctuation">,</span><span class="token number">5</span><span class="token punctuation">,</span><span class="token number">5</span><span class="token punctuation">)</span><span class="token punctuation">)</span>    <span class="token comment">#元组转集合</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s3<span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>s3<span class="token punctuation">)</span><span class="token punctuation">)</span>           <span class="token comment">#{1, 2, 3, 4, 5} &lt;class 'set'&gt;</span>
s4<span class="token operator">=</span><span class="token builtin">set</span><span class="token punctuation">(</span><span class="token string">'Python'</span><span class="token punctuation">)</span>        <span class="token comment"># 字符串转集合</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s4<span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>s4<span class="token punctuation">)</span><span class="token punctuation">)</span>           <span class="token comment">#{'y', 'o', 'h', 'n', 'P', 't'} &lt;class 'set'&gt;  #集合中的元素是无序的</span>

s5<span class="token operator">=</span><span class="token builtin">set</span><span class="token punctuation">(</span><span class="token punctuation">{</span><span class="token number">1</span><span class="token punctuation">,</span><span class="token number">2</span><span class="token punctuation">,</span><span class="token number">3</span><span class="token punctuation">,</span><span class="token number">4</span><span class="token punctuation">,</span><span class="token number">4</span><span class="token punctuation">}</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s5<span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>s5<span class="token punctuation">)</span><span class="token punctuation">)</span>           <span class="token comment">#{1, 2, 3, 4} &lt;class 'set'&gt;</span>


<span class="token comment">#定义空集合</span>

<span class="token keyword">print</span><span class="token punctuation">(</span>s6<span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">(</span>s6<span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#{} &lt;class 'dict'&gt;</span>

<ul><li><strong>in</strong>或<strong>not in</strong></li></ul></li> <li>集合元素的新增操作
<ul><li>调用**add()**方法,<strong>一次添中一个</strong>元素</li> <li>调用<strong>update()<strong>方法</strong>至少添加一个</strong>元素</li></ul></li> <li>集合元素的删除操作
<ul><li>调用**remove()**方法,<strong>一次删除一个指定元素</strong>,如果指定的元素不存在抛出KeyError</li> <li>调用**discard()**方法,<strong>一次删除一个指定元素</strong>,如果指定的元素不存在不抛异常</li> <li>调用**pop()**方法,<strong>一次只删除一个任意元素</strong></li> <li>调用**clear()**方法,<strong>清空集合</strong></li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/23 1:56
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token triple-quoted-string string">'''集合的相关操作'''</span>
s<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">,</span><span class="token number">40</span><span class="token punctuation">,</span><span class="token number">50</span><span class="token punctuation">}</span>
<span class="token triple-quoted-string string">'''集合元素的判断操作'''</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token number">10</span> <span class="token keyword">in</span> s<span class="token punctuation">)</span>      <span class="token comment">#True</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token number">100</span> <span class="token keyword">not</span> <span class="token keyword">in</span> s<span class="token punctuation">)</span>  <span class="token comment">#False</span>
<span class="token triple-quoted-string string">'''集合元素的新增操作'''</span>
s<span class="token punctuation">.</span>add<span class="token punctuation">(</span><span class="token number">80</span><span class="token punctuation">)</span>  <span class="token comment">#add一次添加一个元素</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span> <span class="token comment">#{40, 10, 80, 50, 20, 30}</span>
s<span class="token punctuation">.</span>update<span class="token punctuation">(</span><span class="token punctuation">{</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token number">200</span><span class="token punctuation">}</span><span class="token punctuation">)</span>  <span class="token comment">#update()一次至少添加一个元素</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span>            <span class="token comment">#{100, 40, 200, 10, 80, 50, 20, 30}</span>
s<span class="token punctuation">.</span>update<span class="token punctuation">(</span><span class="token punctuation">[</span><span class="token number">300</span><span class="token punctuation">,</span><span class="token number">400</span><span class="token punctuation">]</span><span class="token punctuation">)</span>
s<span class="token punctuation">.</span>update<span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token number">500</span><span class="token punctuation">,</span><span class="token number">600</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span> <span class="token comment">#{100, 40, 200, 10, 300, 80, 400, 50, 20, 500, 600, 30}</span>

<span class="token triple-quoted-string string">'''集合元素的删除操作'''</span>
s<span class="token punctuation">.</span>remove<span class="token punctuation">(</span><span class="token number">100</span><span class="token punctuation">)</span>
<span class="token comment">#s.remove(1000) #KeyErrorTrue\</span>
s<span class="token punctuation">.</span>discard<span class="token punctuation">(</span><span class="token number">500</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span>  <span class="token comment">#{40, 200, 10, 300, 80, 400, 50, 20, 500, 600, 30}</span>
s<span class="token punctuation">.</span>pop<span class="token punctuation">(</span><span class="token punctuation">)</span>   <span class="token comment">#pop任意删除一个元素 pop()不能添加参数</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span>  <span class="token comment">#{200, 10, 300, 80, 400, 50, 20, 600, 30}</span>
s<span class="token punctuation">.</span>clear<span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span> <span class="token comment">#set()</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br></div></div><h2 id="集合间的关系"><a href="#集合间的关系" class="header-anchor">#</a> 集合间的关系</h2> <ul><li><strong>两个集合是否相等</strong> <ul><li>可以使用运算符**==<strong>或</strong>!=**进行判断</li></ul></li> <li><strong>一个集合是否是另一个集合的子集</strong> <ul><li>可以调用方法<strong>issubset</strong>进行判断</li> <li><strong>B是A的子集</strong></li></ul></li> <li><strong>两个集合是否没有交集</strong> <ul><li>可以调用方法<strong>isdisjoint</strong>进行判断</li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/23 2:13
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token triple-quoted-string string">'''两个集合是否相等'''</span>
s<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">,</span><span class="token number">40</span><span class="token punctuation">}</span>
s2<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">40</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token operator">==</span>s2<span class="token punctuation">)</span> <span class="token comment">#true</span>

<span class="token triple-quoted-string string">'''一个集合是否是另一个集合的子集'''</span>
s1<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">,</span><span class="token number">40</span><span class="token punctuation">,</span><span class="token number">50</span><span class="token punctuation">,</span><span class="token number">60</span><span class="token punctuation">}</span>
s2<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">,</span><span class="token number">40</span><span class="token punctuation">,</span><span class="token number">50</span><span class="token punctuation">}</span>
s3<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">,</span><span class="token number">90</span><span class="token punctuation">}</span>

<span class="token keyword">print</span><span class="token punctuation">(</span>s2<span class="token punctuation">.</span>issubset<span class="token punctuation">(</span>s1<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#True  #s2是否是s1的子集</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s3<span class="token punctuation">.</span>issubset<span class="token punctuation">(</span>s1<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#False</span>

<span class="token triple-quoted-string string">'''一个集合是否是另一个集合的超集'''</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">.</span>issuperset<span class="token punctuation">(</span>s2<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#True s1是否为s2的超集</span>

<span class="token triple-quoted-string string">'''两个集合是否含有交集'''</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s2<span class="token punctuation">.</span>isdisjoint<span class="token punctuation">(</span>s3<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#False  #有交集为False</span>
s4<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">200</span><span class="token punctuation">,</span><span class="token number">300</span><span class="token punctuation">}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">.</span>isdisjoint<span class="token punctuation">(</span>s4<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#没有交集为True</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br></div></div><h2 id="集合的数学操作"><a href="#集合的数学操作" class="header-anchor">#</a> 集合的数学操作</h2> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/08/04.png" alt="04"></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/23 2:23
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token comment">#交集</span>
s1<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">,</span><span class="token number">40</span><span class="token punctuation">}</span>
s2<span class="token operator">=</span><span class="token punctuation">{</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">,</span><span class="token number">40</span><span class="token punctuation">,</span><span class="token number">50</span><span class="token punctuation">,</span><span class="token number">60</span><span class="token punctuation">,</span><span class="token number">70</span><span class="token punctuation">}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">.</span>intersection<span class="token punctuation">(</span>s2<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#{40, 20, 30}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1 <span class="token operator">&amp;</span> s2<span class="token punctuation">)</span>             <span class="token comment">#{40, 20, 30}</span>

<span class="token comment">#并集</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">.</span>union<span class="token punctuation">(</span>s2<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#{70, 40, 10, 50, 20, 60, 30}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1 <span class="token operator">|</span> s2<span class="token punctuation">)</span>      <span class="token comment">#{70, 40, 10, 50, 20, 60, 30}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">)</span>    <span class="token comment">#{40, 10, 20, 30}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s2<span class="token punctuation">)</span>    <span class="token comment">#{70, 40, 50, 20, 60, 30}</span>


<span class="token comment">#差集</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">.</span>difference<span class="token punctuation">(</span>s2<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#{10}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token operator">-</span>s2<span class="token punctuation">)</span>  <span class="token comment">#{10}</span>

<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s2<span class="token punctuation">)</span>

<span class="token comment">#对称差集</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token punctuation">.</span>symmetric_difference<span class="token punctuation">(</span>s2<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#{50, 70, 10, 60}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s1<span class="token operator">^</span>s2<span class="token punctuation">)</span>


</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br></div></div><h2 id="集合生成式"><a href="#集合生成式" class="header-anchor">#</a> 集合生成式</h2> <ul><li>用于生成集合的公式</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/08/05.png" alt="05"></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/23 2:31
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token comment">#列表生成式</span>
lst<span class="token operator">=</span><span class="token punctuation">[</span>i<span class="token operator">*</span>i <span class="token keyword">for</span> i <span class="token keyword">in</span> <span class="token builtin">range</span><span class="token punctuation">(</span><span class="token number">6</span><span class="token punctuation">)</span><span class="token punctuation">]</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>lst<span class="token punctuation">)</span> <span class="token comment">#[0, 1, 4, 9, 16, 25]</span>

<span class="token comment">#集合生成式</span>
s<span class="token operator">=</span><span class="token punctuation">{</span>i<span class="token operator">*</span>i <span class="token keyword">for</span> i <span class="token keyword">in</span> <span class="token builtin">range</span><span class="token punctuation">(</span><span class="token number">6</span><span class="token punctuation">)</span><span class="token punctuation">}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span>  <span class="token comment">#{0, 1, 4, 9, 16, 25}</span>
