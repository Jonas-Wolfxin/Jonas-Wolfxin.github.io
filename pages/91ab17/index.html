q0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">OSI 七层网络模型<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="osi-七层网络模型"><a href="#osi-七层网络模型" class="header-anchor">#</a> OSI 七层网络模型</h1> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151906297" alt="查看源图像" style="zoom:44%;"> <h2 id="osi-七层网络模型-2"><a href="#osi-七层网络模型-2" class="header-anchor">#</a> OSI 七层网络模型</h2> <blockquote><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150312032.png" alt="image-20210928171031876" style="zoom:67%;"> <h4 id="概念"><a href="#概念" class="header-anchor">#</a> 概念</h4> <p>​	<strong>Open System Interconnection Reference Model</strong>（OSI开放系统互连参考模型），是由ISO（国际标准化组织）定义的。OSI 模型是主要的网络架构模型，描述了数据和网络信息如何通过网络介质从一台计算机的应用程序传输到另一台计算机的应用程序。OSI 参考模型对这一网络通信工作进行了分层架构。</p> <p>​	然而，OSI 并非具体的模型，而是一组指导原则，应用程序开发人员可使用它们创建可在网络中运行的应用程序。它还提供了一个框架，指导如何制定和实施网络标准、如何制造设备以及如何制定网络互联方案。</p> <h4 id="目的"><a href="#目的" class="header-anchor">#</a> 目的</h4> <p>规范不同系统的互联标准，使各种网络中的不同设备能够可靠的通信，而不需要改变底层的硬件和软件逻辑。</p> <h4 id="特点"><a href="#特点" class="header-anchor">#</a> 特点</h4> <ol><li>OSI模型每层都有自己的功能划分；</li> <li>层与层之间相互独立又相互依靠；</li> <li>上层依赖于下层，下层又为上层提供服务；</li></ol> <h4 id="使用osi分层模型的主要优点在于"><a href="#使用osi分层模型的主要优点在于" class="header-anchor">#</a> 使用OSI分层模型的主要优点在于:</h4> <ul><li>将网络通信过程划分成更小、更简单的组件，这有助于组件的开发、设计和故障排除;</li> <li>通过标准化网络组件，让多家厂商能够协作开发;</li> <li>定义了模型每层执行的功能，从而鼓励了行业标准化;</li> <li>让不同类型的网络硬件和软件能够彼此通信;</li> <li>避免让对一层的修改影响其他层，从而避免妨碍开发工作。</li></ul></blockquote> <hr> <blockquote><h6 id="osi-模型包含7-层-它们分为两组"><a href="#osi-模型包含7-层-它们分为两组" class="header-anchor">#</a> OSI 模型包含7 层，它们分为两组:</h6> <ul><li>上3层定义了了终端中的应用程序如何彼此通信以及如何与用户交流( <em>这三层都对联网和网络地址一无所知</em>);</li> <li>下4层定义了数据是如何重建从发送方主机到目标主机的应用程序的数据流。</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150315572.png" alt="image-20220615031540489"></p></blockquote> <h3 id="应用层"><a href="#应用层" class="header-anchor">#</a> 应用层</h3> <blockquote><ul><li>为应用程序与表示层之间提供接口, 是应用程序能够使用网络服务, 比如文件、打印、消息、数据库和应用程序服务;</li> <li>实际上，应用层让应用程序能够将信息沿协议栈向下传输，从而充当了应用程序(它们不是OSI分层结构的组成部分)和表示层之间的接口。也就是说，IE浏览器 并不位于应用层中，而是在需要使用HTTP来获取的HTML 文挡，或使用FTP(或者 TFTP) 来下载远程文件时与应用层协议交互;</li> <li>应用层还<code>负责确定目标通信方的可用性</code>，并判断是否有足够的资源进行想要的通信。</li> <li>常见的应用层协议: HTTP(80), HTTPs(443), DNS(53), FTP(20/21), SMTP(25), POP3(110), Telnet(23)</li></ul> <blockquote><h6 id="应用层协议"><a href="#应用层协议" class="header-anchor">#</a> 应用层协议:</h6> <p>提供为应用程序而设计的接口（API）, 以设定与另一应用软件之间的通讯。</p> <ul><li><strong>HTTP ------- Hyper Text Transfer Protocol</strong> 超文本传输协议; <em>TCP 80端口</em></li> <li><strong>FTP -------- File Transfer Protocol</strong> 文件传输协议，20用于连接，21用于传输; <em>TCP 20/21端口</em></li> <li><strong>TFTP ------- Trivial File Transfer Protocol</strong>, 简单文件传输协议; UDP</li> <li><strong>SMTP------ Simple Mail Transfer Protocol</strong> 简单邮件传输协议; <em>使用TCP 25端口</em></li> <li>TELNET ------- TCP/IP终端仿真协议, 使用<a href="https://zh.wikipedia.org/wiki/%E8%99%9B%E6%93%AC%E7%B5%82%E7%AB%AF%E6%A9%9F" target="_blank" rel="noopener noreferrer">虚拟终端<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>的形式，提供双向、以文字字符串为主的<a href="https://zh.wikipedia.org/wiki/%E5%91%BD%E4%BB%A4%E5%88%97%E4%BB%8B%E9%9D%A2" target="_blank" rel="noopener noreferrer">命令行接口<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>交互功能。; <em>23端口</em></li> <li><strong>SSH ------- Secure Shell</strong>, 是较可靠，专为<a href="https://baike.baidu.com/item/%E8%BF%9C%E7%A8%8B%E7%99%BB%E5%BD%95/1071998" target="_blank" rel="noopener noreferrer">远程登录<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>会话和其他网络服务提供安全性的协议; <em>TCP 端口号 22</em></li> <li><strong>DNS ------- Domain Name System</strong>, 将<a href="https://baike.baidu.com/item/%E5%9F%9F%E5%90%8D/86062" target="_blank" rel="noopener noreferrer">域名<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>和<a href="https://baike.baidu.com/item/IP%E5%9C%B0%E5%9D%80/150859" target="_blank" rel="noopener noreferrer">IP地址<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>相互<a href="https://baike.baidu.com/item/%E6%98%A0%E5%B0%84/20402620" target="_blank" rel="noopener noreferrer">映射<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>的一个<a href="https://baike.baidu.com/item/%E5%88%86%E5%B8%83%E5%BC%8F%E6%95%B0%E6%8D%AE%E5%BA%93/1238109" target="_blank" rel="noopener noreferrer">分布式数据库<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，能够使人更方便地访问互联网; <em>UDP 端口号53</em></li> <li><strong>POP3 ------ Post Office Protocol</strong> 邮局协议第三版 ，用于收邮件; <em>TCP的110端口</em></li> <li>Finger ------ 用户信息协议</li> <li>NNTP ------ Network News Transfer Protocol 网络新闻传输协议; 端口号119</li></ul></blockquote></blockquote> <h3 id="表示层"><a href="#表示层" class="header-anchor">#</a> 表示层:</h3> <blockquote><ul><li>实现数据转换和格式化以适合系统格式, 包括数据编码/解码、解密/加密、压缩/解压缩等, 为应用层提供数据；</li></ul> <blockquote><h6 id="表示层协议"><a href="#表示层协议" class="header-anchor">#</a> 表示层协议:</h6> <ul><li>DECnet NSP</li> <li>LPP ------- 轻量级表示协议</li> <li>NBSSN NetBIOS ------ 会话服务协议</li> <li>XDP ------ 外部数据表示协议</li> <li>IPX</li></ul></blockquote></blockquote> <h3 id="会话层"><a href="#会话层" class="header-anchor">#</a> 会话层:</h3> <blockquote><ul><li>负责建立、管理和终止 表示层实体之间的会话连接，将不同应用程序的数据分离;</li> <li>在设备或者节点之间提供会话控制， 协调通信过程， 并提供
<ul><li>单工、</li> <li>半双工和</li> <li>全双工 共三种方式， 组织他们之间的通信；</li></ul></li></ul> <blockquote><h6 id="会话层协议"><a href="#会话层协议" class="header-anchor">#</a> 会话层协议:</h6> <ul><li>SSL -------安全套接字层协议</li> <li>TLS ------传输层安全协议</li> <li>DAP -------目录访问协议</li> <li>LDAP ------轻量级目录访问协议</li> <li>RPC ------远程过程调用协议</li></ul></blockquote></blockquote> <h3 id="传输层"><a href="#传输层" class="header-anchor">#</a> 传输层:</h3> <blockquote><ul><li>将来自上层应用的数据进行<em>分段（Segment)并重组为数据流</em>;</li> <li>负责建立<code>端口号到端口号</code>的连接， 保证报文在端到端之间的传输；</li> <li>提供机制: 对上层应用程序进行多路复用, 建立会话以及拆除虚电路; 还提供透明的数据传输, 从而对高层隐藏随网络而异的信息</li></ul> <blockquote><p>传输层提供<code>面向连接</code>和<code>无连接</code>的服务, 此处着重介绍一下<code>面向连接的传输层服务</code>:</p> <ol><li><p>==流量控制==:</p> <p>流量控制旨在提供一种机制，让接收方能够控制发送方发送的数据量。由此可避免作为发送方的主机让作为接收方的主机的缓冲区溢出(这可能导致数据丢失)。可靠的数据传输在系统之间使用面向连接的通信会话，而涉及的协议确保可实现如下目标:</p> <ul><li>确保数据流量不超过处理能力，以避免拥塞、过载和数据丢失。</li> <li>收到数据段后，向发送方进行确认; 所有未得到确认的数据段, 发送方进行重传;</li> <li>数据段到达目的地后，按正确的顺序排列它们;</li></ul> <blockquote><p>流量控制方式包含缓冲、窗口技术和拥塞避免。</p></blockquote></li> <li><p>==面向连接的通信==:</p> <p>在可靠的传输操作中，要传输数据的设备建立一个到远程设备的面向连接的通信会话。传输设备首先与其对等系统建立面向连接的会话，这称为呼叫建立或三次握手，然后传输数据。传输完毕后，将进行呼叫终止，以拆除虚电路。</p> <blockquote><p>如果服务具有如下特征，它就是面向连接的:</p> <ul><li>建立<code>虚电路</code>(如三次握手);</li> <li>使用<code>排序技术</code>;</li> <li>使用<code>确认</code>;</li> <li>使用<code>流量控制</code>。</li></ul></blockquote></li> <li><p>==窗口技术==:</p> <p>用于控制未确认的数据段数量。在理想情况下，数据传输快捷而高效。可以想见，如果传输方发送每个数据段后都必须等待确认，传输速度将变得缓慢。然而，从发送方传输数据段到处理完毕来自接收方的确认之间有一段时间，发送方可利用这段时间传输更多的数据。在收到确认前，传输方可发送的数据段数量(以字节为单位)称为窗口。</p></li> <li><p>==确认==:</p> <p>可靠的数据传输依靠功能完整的数据链路，从而确保机器之间发送的数据流的完整性。它确保数据不会重复或丢失，这是通过确认和重传实现的，这种方法要求接收方在收到数据后向发送方发送1条确认消息。发送方记录每个以字节为单位度量的数据段，将其发送后等待确认，而暂不发送下一数据段。发送数据段后，对于未收到所有应确认的字节，接收方将缩小窗口，以改善通信会话; 同时发送方启动定时器，如果定时器到期后仍未收到接收方的确认，就重传该数据段。</p></li></ol></blockquote> <blockquote><h6 id="传输层协议"><a href="#传输层协议" class="header-anchor">#</a> 传输层协议:</h6> <ul><li>TCP(传输控制协议): 可靠的, 面向连接的传输协议;
<ul><li>特点: 可靠准确, 但是速度慢</li></ul></li> <li>UDP(用户数据报协议): 不可靠的, 面向无连接的传输协议;
<ul><li>特点: 快, 但是不可靠, 易丢包</li> <li>常见的应用: <em>视频流; DNS协议; VoIP协议</em></li></ul></li></ul></blockquote></blockquote> <h3 id="网络层"><a href="#网络层" class="header-anchor">#</a> 网络层:</h3> <blockquote><ul><li><p>为网络设备提供逻辑地址(IP地址), 网络层必须在位于不同网络中的设备之间传输数据流;</p></li> <li><p>将分组从源端传送到目的端;</p></li> <li><p>跟踪设备在网络中的位置并确定最佳的数据传输路径, 维护路由表并进行路由选择；</p> <ul><li>路由器在其接口上收到分组后，路由器首先检查分组的目标IP地址。如果分组的目的地不是当前的广播域，路由器将在路由选择表中查找目标网络地址。选择出站接口后，路由器将分组发送到该接口，后者将分组封装成帧后在本地网络中传输。如果在路由选择表中找不到目标网络对应的条目，路由器将丢弃分组。</li></ul></li></ul> <blockquote><p>第3层设备(如路由器)需要确定网络的位置，而第2层设备(交换机和网桥)需要确定设备的位置。</p></blockquote> <blockquote><h6 id="网络层的协议"><a href="#网络层的协议" class="header-anchor">#</a> 网络层的协议:</h6> <ul><li><p>IP协议</p></li> <li><p>ARP: 地址解析协议, 根据IP地址解析为MAC地址;</p></li> <li><p>RARP协议: 反向地址解析协议</p></li> <li><p>ICMP（Internet Control Message Protocol）Internet控制<a href="https://baike.baidu.com/item/%E6%8A%A5%E6%96%87/3164352" target="_blank" rel="noopener noreferrer">报文<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>协议: ping命令使用了此协议</p></li> <li><p>IGMP（Internet Group Management Protocol）是因特网协议家族中的一个组播协议, 该协议运行在主机和组播路由器之间。</p></li></ul> <blockquote><ol><li>主机通过IGMP通知路由器希望接收或离开某个特定组播组的信息。</li> <li>路由器通过IGMP周期性地查询局域网内的组播组成员是否处于活动状态，实现所连网段组成员关系的收集与维护。</li></ol></blockquote></blockquote></blockquote> <h3 id="数据链路层"><a href="#数据链路层" class="header-anchor">#</a> 数据链路层:</h3> <blockquote><ul><li><p>对本地网络中每台设备进行唯一标识, 使用<strong>MAC地址</strong>提供介质访问;</p> <ul><li>MAC地址为48bit, 即12位的十六进制数: 前6位表示生产厂商(OUI), 后六位表示设备编号;</li></ul></li> <li><p>将来自网络层的分组封装成数据帧, 并添加定制的报头，其中包含源硬件地址和目标硬件地址;</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207081838897.png" alt="image-20220704233506622"></p></li> <li><p>提供节点到节点方式的传输: 每当在路由器之间传输分组时，分组都将在数据链路层封装成帧，但接收路由器会将这些信息剥离，只保留完整的原始分组。在每一跳都将重复这种将分组封装成帧的过程，直到分组最终到达正确的接收主机;</p></li> <li><p>执行差错检测, 但不纠错;</p></li></ul> <blockquote><p>IEEE 以太网数据链路层包含两个子层，如下：</p> <ul><li>==介质访问控制(MAC) 子层(802.3)==： 它定义了如何通过介质传输分组。它采用&quot;FIFO&quot;的访问方式，带宽由大家共享，因此称为竟用介质访问( contention media access )。这个子层定义了物理地址和逻辑拓扑。什么是逻辑拓扑呢? 它指的是信号在物理拓扑中的传输路径。在这个子层，还可使用线路控制、错误通知(不纠错)、顺序传递帧以及可选的流量控制。</li> <li>==逻辑链路控制(LLC) 子层(802.2)==： 负责识别网络层协议并对其进行封装。LLC 报头告诉数据链路层收到帧后如何对分组进行处理。其工作原理类似于:收到帧后，主机查看LLC报头以确定要将分组交给谁。LLC 还可提供流量控制以及控制比特排序。</li></ul></blockquote> <blockquote><h6 id="主要设备"><a href="#主要设备" class="header-anchor">#</a> 主要设备:</h6> <ul><li>网卡（NIC - Network Interface Card）: 连接计算机与网络之间的硬件设备;</li> <li>网桥（Bridge）: 将两个LAN连接在一起，并且按MAC地址转发; 分割冲突域</li> <li>交换机（Switch）</li></ul> <h6 id="数据链路层的协议"><a href="#数据链路层的协议" class="header-anchor">#</a> 数据链路层的协议:</h6> <p>​	PPP: （Point to Point Protocol，PPP）为在点对点连接上传输多协议数据包提供了一个标准方法</p> <p>​	PPOE: (Point-to-Point Protocol Over Ethernet)<a href="https://baike.baidu.com/item/%E4%BB%A5%E5%A4%AA%E7%BD%91" target="_blank" rel="noopener noreferrer">以太网<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>上的点对点协议</p></blockquote></blockquote> <h4 id="mac地址"><a href="#mac地址" class="header-anchor">#</a> MAC地址:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621104247650.png" alt="image-20220621104247650" style="zoom:40%;"> <blockquote><p>MAC(Media Access Control Address, 媒介访问控制地址), 也称为 <strong>局域网地址</strong>（LAN Address）, 网卡地址, <strong>MAC位址</strong>，<strong>以太网地址</strong>（Ethernet Address）或<strong>物理地址</strong>（Physical Address）, 用来确认网络设备位置的位址。</p> <ul><li><p>MAC地址实际上就是适配器地址或适配器标识符EUI-48</p></li> <li><p>MAC地址则是48位的, 6个Bytes, 但通常表示为 <code>3组/4个</code>或者 <code>6组/2个</code> 十六进制数;</p></li> <li><p>其前3个Bytes表示<em>OUI（Organizationally Unique Identifier）</em>，是<a href="https://baike.baidu.com/item/IEEE/150905" target="_blank" rel="noopener noreferrer">IEEE<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>的注册管理机构给不同各厂家分配的代码; 后3个Bytes由厂家自行分配。</p></li> <li><p>在<a href="https://baike.baidu.com/item/OSI%E6%A8%A1%E5%9E%8B" target="_blank" rel="noopener noreferrer">OSI模型<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>中，第三层网络层负责<a href="https://baike.baidu.com/item/IP%E5%9C%B0%E5%9D%80" target="_blank" rel="noopener noreferrer">IP地址<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，第二层数据链路层则负责MAC位址 [1] 。MAC地址用于在网络中唯一标示一个<a href="https://baike.baidu.com/item/%E7%BD%91%E5%8D%A1" target="_blank" rel="noopener noreferrer">网卡<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，一台设备若有一或多个网卡，则每个网卡都需要并会有一个唯一的MAC地址。IP和MAC地址这种映射关系由ARP（Address Resolution Protocol，地址解析协议）协议完成。</p></li> <li><p>MAC地址最高字节（MSB）的低第二位（LSb）表示这个MAC地址是全局的还是本地的，即U/L（Universal/Local）位，如果为0，表示是全局地址。所有的OUI这一位都是0。</p></li> <li><p>MAC地址最高字节（MSB）的低第一位(LSb），表示这个MAC地址是单播还是多播。0表示单播。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/7af40ad162d9f2d36c26cc35a7ec8a136327cc31" alt="img"></p></li></ul></blockquote> <blockquote><h5 id="与ip地址区别"><a href="#与ip地址区别" class="header-anchor">#</a> 与IP地址区别:</h5> <p>IP地址和MAC地址相同点是它们都唯一，不同的特点主要有：</p> <ol><li>对于网络上的某一设备，如一台计算机或一台<a href="https://baike.baidu.com/item/%E8%B7%AF%E7%94%B1%E5%99%A8" target="_blank" rel="noopener noreferrer">路由器<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，其IP地址是基于<a href="https://baike.baidu.com/item/%E7%BD%91%E7%BB%9C%E6%8B%93%E6%89%91/4804125" target="_blank" rel="noopener noreferrer">网络拓扑<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>设计出的，同一台设备或计算机上，改动IP地址是很容易的（但必须唯一），而MAC则是生产厂商烧录好的，一般不能改动。我们可以根据需要给一台主机指定任意的IP地址，如我们可以给<a href="https://baike.baidu.com/item/%E5%B1%80%E5%9F%9F%E7%BD%91" target="_blank" rel="noopener noreferrer">局域网<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>上的某台计算机分配IP地址为192.168.0.112 ，也可以将它改成192.168.0.200。而任一网络设备（如网卡，路由器）一旦生产出来以后，其MAC地址不可由本地连接内的配置进行修改。如果一个计算机的网卡坏了，在更换网卡之后，该计算机的MAC地址就变了 [5] 。</li> <li>长度不同。IP地址为32位，MAC地址为48位 [5] 。</li> <li>分配依据不同。IP地址的分配是基于网络拓扑，MAC地址的分配是基于制造商 [8] 。</li> <li>寻址协议层不同。IP地址应用于OSI第三层，即网络层，而MAC地址应用在OSI第二层，即数据链路层。 数据链路层协议可以使数据从一个节点传递到相同链路的另一个节点上（通过MAC地址），而网络层协议使数据可以从一个网络传递到另一个网络上（ARP根据目的IP地址，找到中间节点的MAC地址，通过中间节点传送，从而最终到达目的网络） [1] 。</li></ol></blockquote> <h4 id="cdp-lldp"><a href="#cdp-lldp" class="header-anchor">#</a> CDP &amp; LLDP</h4> <h5 id="cdp协议"><a href="#cdp协议" class="header-anchor">#</a> CDP协议:</h5> <blockquote><ul><li><p><strong>CDP</strong>(Cisco Discovery Protocol, 思科发现协议), 简单、低开销的协议, 用来获取直接相连接设备上的相关信息;</p></li> <li><p>默认运行在所有思科制造的设备上，包括路由器、网桥（bridge）、接入服务器（access server）和交换机;</p></li> <li><p>有时候，我们到了一个新布置机房进行维护，这个时候可以使用CDP来画出机房的网络拓扑。</p></li> <li><p>运行在<a href="https://so.csdn.net/so/search?q=%E6%95%B0%E6%8D%AE%E9%93%BE%E8%B7%AF%E5%B1%82&amp;spm=1001.2101.3001.7020" target="_blank" rel="noopener noreferrer">数据链路层<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，用来获取<code>直连的思科设备</code>以及这些设备的平台信息; CDP也可为<a href="https://so.csdn.net/so/search?q=%E8%B7%AF%E7%94%B1%E5%99%A8&amp;spm=1001.2101.3001.7020" target="_blank" rel="noopener noreferrer">路由器<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>提供正在使用的接口信息;</p> <blockquote><ul><li><strong>设备标识符（Device ID）：</strong> 设备的名称，如邻接路由器的名字为R2。</li> <li><strong>地址列表（IP Address）：</strong> 每种支持的协议最多一个网络层地址，如使用TCP/IP协议栈的192.168.1.2。</li> <li><strong>端口标识符（ Local Intrfce/Port ID）：</strong> 设备的本地与邻接设备的端口。</li> <li><strong>功能列表（Capability）：</strong> 邻接设备所支持的功能，如设备充当路由器、交换机或防火墙等。</li> <li><strong>平台（ Platform）：</strong> 设备的硬件平台，如Cisco的3745。</li> <li><strong>设备的IOS版本：</strong> 如经典版本12.4。</li></ul> <ul><li><strong>保持时间(Holdtime)</strong>：这里指的是接收到CDP的信息最多保留180秒，超过了就丢弃了。</li></ul></blockquote></li> <li><p>CDP的相关命令:</p> <ul><li><p>基本命令和启动命令:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#sh cdp</span>
    Globa1 CDP information:
    SendingζDP packets every <span class="token number">60</span> seconds
    Sending a ho1dtime va1ue of <span class="token number">180</span> seconds
    Sending CDPv2 advertisements is enab1ed
Corp<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#cdp timer ?</span>
	<span class="token operator">&lt;</span><span class="token number">5</span>-25<span class="token operator"><span class="token file-descriptor important">4</span>&gt;</span> Rate at whichζDP packets are sent <span class="token punctuation">(</span>in seι 〉
	<span class="token comment"># 默认每60秒所有活动接口将CDP 分组发送出去，</span>
	        
Corp<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#cdp holdtime ?</span>
	<span class="token operator">&lt;</span><span class="token number">10</span>-25<span class="token operator"><span class="token file-descriptor important">5</span>&gt;</span> Length of <span class="token function">time</span> <span class="token punctuation">(</span>in sec<span class="token punctuation">)</span> that receiver must keep this packet
<span class="token comment"># 默认保持时间为180秒(接收自相邻设备的CDP分组应被当前设备保持的时间长度);</span>
        
R2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#cdp run 		//在全局模式下启用CDP</span>
        
R2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#no cdp run 		//在全局模式下禁用CDP</span>
        
R2<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#cdp enable		//在接口上启用 CDP</span>
R2<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no cdp enable			//在接口上禁用 CDP</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br></div></div></li> <li><p><code>show cdp neighbors [details]</code>: 显示运行CDP协议的邻接设备信息，相关的信息有: 邻接设备ID、本地接口、保持时间、设备功能编码、硬件平台、邻接设备端口。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/2021031123515731.png" alt="在这里插入图片描述"></p></li> <li><p><code>show cdp entry *</code>: 和命令show cdp neighbors detail 提供同样的信息。显示有关运行CDP协议的邻接设备的详细信息，如设备ID、保持时间、硬件平台、本地与邻接设备端口、第三层协议信息IP地址、Cisco IOS软件的类型与版本、设备功能等。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/20210312000002877.png" alt="在这里插入图片描述"></p> <ul><li><p>仅可以显示出每个直接相连的设备的IP地址。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#show cdp entry * protocols</span>
    Protocol informat<span class="token punctuation">;</span>on <span class="token keyword">for</span> ap <span class="token builtin class-name">:</span>
    1P address: <span class="token number">10.1</span>.1.2
    Protocol information <span class="token keyword">for</span> R2
    1P address: <span class="token number">10.4</span>.4.2
    Protocol information <span class="token keyword">for</span> R3
    IP address: <span class="token number">10.5</span>.5.1
    Protocol information <span class="token keyword">for</span> R1
    1P address: <span class="token number">10.3</span>.3.2
    Protocol information <span class="token keyword">for</span> R1 <span class="token builtin class-name">:</span>
    1P address: <span class="token number">10.2</span>.2.2
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div></li> <li><p>show cdp entry * version 将只负责给出每个直接相连的设备上运行的IOS版本信息</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#show cdp entry * version</span>
    Version information <span class="token keyword">for</span> ap <span class="token builtin class-name">:</span>
    Cisco <span class="token number">105</span> 5oftware ， ζ1240 50ftware <span class="token punctuation">(</span>C1240-K9W7-M<span class="token punctuation">)</span> , Version
    <span class="token number">12.3</span><span class="token punctuation">(</span><span class="token number">8</span><span class="token punctuation">)</span>JEA, RELEA5E SOFTWARE <span class="token punctuation">(</span>fc2<span class="token punctuation">)</span>

    Compiled Wed <span class="token number">23</span>-Aug-06 <span class="token number">16</span>:45 by kel1ythw
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div></li></ul></li> <li><p><code>show cdp interface</code>: 显示本设备的接口状态和配置信息，如接口的线路状态的数据链路状态、接口的封装类型、CDP的发送间隔（默认60秒发送一次）、保持时间（默认180秒）等。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/20210311235558294.png" alt="在这里插入图片描述" style="zoom:80%;"></li> <li><p><code>show cdp traffic</code>: 显示接口流量的信息，包括发送和接收到的CDP分组的数量，以及CDP错误。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/20210312000406731.png" alt="在这里插入图片描述"></p></li></ul></li></ul> <h6 id="使用cdp-记录网络拓扑结构"><a href="#使用cdp-记录网络拓扑结构" class="header-anchor">#</a> 使用CDP 记录网络拓扑结构:</h6> <ol><li>使用<code>show running-config</code> 命令确定每个接口的IP 地址;</li> <li>使用<code>show cdp neighbors</code> 命令确定与这些接口相连的另一端的设备类型;</li> <li>使用<code>show cdp nei ghbors detail</code> 命令查看相邻设备的E 地址;</li> <li>现在根据以上的命令提供的信息，我们就可以手动绘制这个网络的拓扑图</li></ol></blockquote> <h5 id="lldp"><a href="#lldp" class="header-anchor">#</a> LLDP</h5> <blockquote><ul><li><p><strong>LLDP（Link Layer Discovery Protocol，链路层发现协议）</strong>, 区别于 CDP是思科设备的专有协议, LLDP是各网络设备厂商支持的共有协议;</p></li> <li><p>LLDP定义在802.1ab中,它是一个数据链路层层协议，它提供了一种标准的链路层发现方式。</p></li> <li><p>LLDP协议使得接入网络的一台设备可以将其主要的能力，管理地址，设备标识，接口标识等信息发送给接入同一个局域网络的其它设备。当一个设备从网络中接收到其它设备的这些信息时，它就将这些信息以MIB的形式存储起来。这些MIB信息可用于发现设备的物理拓扑结构以及管理配置信息。</p></li> <li><p>封装有 LLDPDU 的报文称为 LLDP 帧，其封装格式有两种：Ethernet II 和 SNAP（Subnetwork Access Protocol，子网访问协议）。两者的差别在于LLDPDU分组的大小，<em>Ethernet II 封装格式为固定1500 Bytes，SNAP封装为 n 字节。</em></p> <ul><li><p>Ethernet II格式:</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/20210312002838818.png" alt="在这里插入图片描述"> <ul><li><strong>DA：</strong> 目的 MAC地址，为固定的组播 MAC地址 0x0180-C200-000E。</li></ul></li> <li><p><strong>SA：</strong> 源 MAC地址，为端口 MAC地址或设备MAC地址（如有端口地址则用端口MAC地址，否则用设备MAC地址）。</p></li> <li><p><strong>Type：</strong> 帧类型，为 0x88CC。</p></li> <li><p><strong>Data：</strong> 数据，为 LLDPDU。</p></li> <li><p><strong>FCS：</strong> 帧检验序列。</p></li> <li><p>SNAP格式:</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/20210312003038743.png" alt="在这里插入图片描述"></p> <ul><li><strong>DA</strong>：目的MAC地址，为固定的组播 MAC地址 01-80-C2-00-00-0E。</li></ul></li> <li><p><strong>SA</strong>：源MAC地址，为端口MAC地址或设备MAC地址（如果有端口地址则用端口MAC地址，否则用设备MAC地址）。</p></li> <li><p><strong>Type</strong>：帧类型，为 0xAAAA-0300-0000-88CC。</p></li> <li><p><strong>Data</strong>：数据，为 LLDPDU。</p></li> <li><p><strong>FCS</strong>：帧检验序列。</p></li></ul></li> <li><p>LLDP协议的命令:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code> lldp <span class="token builtin class-name">enable</span>		// 华为设备开启这个服务
lldp run     <span class="token comment"># 在思科设备上开启这个服务</span>
display lldp neighbor <span class="token punctuation">(</span>brief<span class="token punctuation">)</span>		// 使用这条命令查看邻居交换机
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li></ul></blockquote> <h3 id="物理层"><a href="#物理层" class="header-anchor">#</a> 物理层:</h3> <blockquote><ul><li><p>帧被转换为比特，并使用数字编码和时钟同步方案, 在节点之间传输比特流;</p></li> <li><p>定义传输介质的电气特性: 物理层定义了要在终端系统之间激活、维护和断开物理链路，而需要满足的电气、机械、规程和功能需求，还让你能够确定<code>DTE (Data Terminal Equipment ，数据终端设备)</code>和 <code>DCE (Data Communication Equipment ，数据通信设备)</code>之间的接口。DCE 通常位于服务提供商处，而DTE 是与之相连的设备, 位于服务终端。通常情况下， DTE通过调制解调器或CSUIDSU (Channel Service UnitlData Service Unit ，信道服务单元/数据服务单元)使用可用的服务。</p></li> <li><p>主要设备:</p> <ul><li>中继器（Repeater）: 因为双绞线的有效传输距离是100米，超过100米后就会数据衰减，难以保证数据的准确性。需要中继器: 对信号进行放大</li> <li>集线器（Hub）: 相当于多个端口的中继器，内部构造是总线型的共享带宽的方式</li></ul></li></ul></blockquote> <h2 id="网络设备"><a href="#网络设备" class="header-anchor">#</a> 网络设备</h2> <blockquote><p>网络的含义: 将地理位置不同的若干台计算机通过通信线路连接起来, 在网络操作系统、网络管理软件以及网络通信协议的管理和协调下，实现资源共享和信息传递和计算机系统。</p></blockquote> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151430607.png" alt="img"></p> <h3 id="集线器-hub"><a href="#集线器-hub" class="header-anchor">#</a> 集线器(Hub)</h3> <blockquote><ul><li>(已基本淘汰)</li> <li>优点: 便宜, 操作简单;</li> <li>缺点:
<ul><li>**使用集线器连接的基本LAN网络，实际上只有一个冲突域和广播域；**集线器构成的网络中的主机通过MAC地址来通信；</li> <li>不具备网络分段的功能， 只是扩展网络；</li> <li>传输类型为<strong>半双工型</strong>(对讲机), 无法满足多人同时访问(所有的接口在同一个<strong>冲突域</strong>当中);</li></ul></li> <li>工作特点:
<ul><li>集线器是一种物理层设备，<em>不能识别MAC地址和IP地址</em>。当集线器下连接的主机设备间传输数据时，数据包是以<em>广播</em>的方式进行传输，由每一台主机自己验证<em>MAC地址</em>来确定是否接收。这种情况下，同一时刻由集线器连接的网络中只能传输一组数据，如果发生冲突则需要重传。<strong>集线器下连接的所有端口共享整个带宽，即所有端口为一个冲突域</strong>暨<strong>广播域</strong>。</li></ul></li></ul> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150259546.png" alt="image-20210817165109624" style="zoom:50%;"></blockquote> <hr> <blockquote><p><strong>交换机（网桥）, 路由器</strong>等网络设备的功能是： 实现<strong>网络分段(Network Segmentation)</strong>, 即将大型网络分割成众多小型网络。</p></blockquote> <h3 id="交换机-switch-又叫网桥"><a href="#交换机-switch-又叫网桥" class="header-anchor">#</a> 交换机(Switch, 又叫网桥):</h3> <p>不用于组建互联网络, 而是用于提高LAN的性能和带宽</p> <blockquote><ul><li>优点:
<ul><li>默认情况下, <strong>与交换机的每个端口连接都是一个独立的冲突域；但是所有接口构成同一个广播域；</strong></li> <li>灵活的端口扩展满足远距离高速传输；安装方便，无需调试；支持<strong>全双工</strong>;</li></ul></li> <li>缺点:
<ul><li>交换机不像路由器那样将分组转发到其他网络，而只在交换型网络内的端口之间交换帧;</li> <li>无法实现<strong>NAT</strong>等功能; 终端多时延迟高；</li></ul></li> <li>作用: 终端用户设备的接入; 基本的安全功能; <strong>广播域的隔离(VLAN);</strong></li> <li>工作特点：
<ul><li>交换机则是工作在<strong>二、三、四层</strong>的设备;二层交换机在接收到数据后，通过查找自身系统MAC地址表中的MAC地址与端口对应关系，将数据传送到目的端口。</li> <li>交换机在同一时刻可进行多个端口之间的数据传输，每一端口都是独立的物理网段，连接在端口上的网络设备独自享有全部的带宽。因此，交换机起到了分割冲突域的作用，每一个端口的延展网域分别为一个<strong>冲突域</strong>；所有的端口都在同一个<strong>广播域</strong>中。</li></ul></li> <li>工作过程:
<ul><li>1.交换机根据收到数据帧中的源MAC地址建立该地址同交换机端口的映射，并将其更新写入<strong>MAC地址表</strong>中。</li> <li>2.交换机将数据帧中的目的MAC地址同已建立的MAC地址表进行比较，以决定由哪个端口进行转发。</li> <li>3.如数据帧中的目的MAC地址不在MAC地址表中，则向所有端口转发。这一过程称为泛洪（flood）。</li></ul></li></ul></blockquote> <blockquote><h5 id="二、三、四层交换机对比"><a href="#二、三、四层交换机对比" class="header-anchor">#</a> 二、三、四层交换机对比:</h5> <ul><li>二层交换机(数据链路层): 基于MAC地址，进行转发或过滤帧</li> <li>三层交换机(网络层): 基于IP，就是网络具有<strong>VLAN</strong>功能,有交换和路由功能;</li> <li>四层交换机(传输层): 基于端口，可以区分应用; 不仅基于MAC（第二层桥接）或源/目的地IP地址（第三层路由选择），同时也基于TCP/UDP应用端口来做出转发决定的能力。其使网络在决定路由时能够区分应用。能够基于具体应用对数据流进行优先级划分。它为基于策略的服务质量技术提供了更加细化的解决方案。</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150259738.png" alt="image-20210820140758116"></p> <h6 id="补充知识-导致lan拥塞的常见原因"><a href="#补充知识-导致lan拥塞的常见原因" class="header-anchor">#</a> 补充知识: 导致LAN拥塞的常见原因：</h6> <ul><li>同一个广播域或者冲突域中的主机太多；</li> <li>广播风暴；</li> <li>组播数据流太多；</li> <li>带宽太低；</li> <li>使用了集线器扩展网络；</li></ul></blockquote> <h3 id="路由器"><a href="#路由器" class="header-anchor">#</a> 路由器</h3> <p>（实际上是第三层交换机）： 用于组建互联网络(分割广播域)，并在网络之间路由数据分组。</p> <blockquote><ul><li>优点：
<ul><li>默认情况下， <strong>路由器的下联端口延伸出去的网段分别为一个广播域</strong>；</li> <li>使用IP地址，并提供<code>分组交换</code>功能；</li> <li>可使用<code>访问列表ACL</code>进行分组过滤；</li> <li>使用<code>路由选择表</code>来选择路径并将分组转发到远程网络；</li></ul></li> <li>缺点：接口少，价格贵</li> <li>功能：分组交换; 分组过滤; 路由选择; 网络间通信(包括广域网接入)；</li></ul></blockquote> <blockquote><h5 id="补充知识-广播域与冲突域的概念"><a href="#补充知识-广播域与冲突域的概念" class="header-anchor">#</a> 补充知识： 广播域与冲突域的概念</h5> <ul><li><p><strong>广播域(Broadcast Domain)</strong>： <strong>同一个网段中的所有设备组成的集合</strong>, 一个广播域中的设备都会侦听该网段中发送的所有广播。</p> <ul><li>广播域太大时，必须处理的广播就很多，用户可用的带宽就很少，而网络的响应速度将会慢到特别差。</li> <li>路由器的每个接口都分别是一个广播域；</li></ul></li> <li><p><strong>冲突域(Collision Domain)</strong>:  在冲突域内, 同一时间只允许一台设备发送数据。如果有两台设备试图同时传输数据, 将会发生冲突, 而后这两台设备必须分别重传数据, 因此效率不高。</p> <ul><li><p>交换机的每个接口都分别是一个冲突域，一般情况下所有的接口都同属于一个广播域（如果没有VLAN划分的话）。</p></li> <li><p>集线器的所有接口都属于一个冲突域；</p></li></ul></li> <li><p>目前常见的网络形式:</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150300524.png" alt="image-20211030184616554"></p></li></ul></blockquote> <h4 id="网络设备图标"><a href="#网络设备图标" class="header-anchor">#</a> 网络设备图标</h4> <blockquote><p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150300833.png" alt="image-20210928164859022"></p> <h5 id="网络拓扑图示例"><a href="#网络拓扑图示例" class="header-anchor">#</a> 网络拓扑图示例</h5> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150304106.png" alt="image-20220615030402013"></p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206150308927.png" alt="image-20220615030811784"></p></blockquote> <h2 id="网络器材"><a href="#网络器材" class="header-anchor">#</a> 网络器材</h2> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151432581.png" alt="image-20220615143251493"></p> <h3 id="连接器"><a href="#连接器" class="header-anchor">#</a> 连接器</h3> <h4 id="光猫"><a href="#光猫" class="header-anchor">#</a> 光猫</h4> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151632251.png" alt="image-20220615163204137"></p> <h4 id="光纤终端盒"><a href="#光纤终端盒" class="header-anchor">#</a> 光纤终端盒</h4> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151632888.png" alt="image-20220615163256755"></p> <h3 id="传输线缆"><a href="#传输线缆" class="header-anchor">#</a> 传输线缆</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151629231.png" alt="image-20220615162932111"></p> <h4 id="铜介质"><a href="#铜介质" class="header-anchor">#</a> 铜介质</h4> <blockquote><p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151436672.png" alt="image-20220615143606550"></p> <ul><li><p>同轴电缆(基本淘汰)</p></li> <li><p>双绞线: 一共8根线; 1,2,3,6 th 用于 通信; 4,5,7,8 th 一般用于PoE</p> <ul><li>非屏蔽双绞线UTP: <em>绝缘套管中无屏蔽层; 价格低廉,用途广泛;</em></li> <li>屏蔽双绞线STP: 绝缘套管中外层有金属网, 内层有铝箔包裹,以减少辐射; 价格相对较高, 高要求场景使用;</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151600013.png" alt="image-20220615160009882"></p> <blockquote><p>目前大多数网络设备都支持 自动识别并翻转, 所以 直通线, 交叉线的概念已不再重要</p></blockquote></li></ul></blockquote> <blockquote><h4 id="寻线仪"><a href="#寻线仪" class="header-anchor">#</a> 寻线仪:</h4> <ul><li>RJ-45: 网线接口; RJ-11: 电话线接口</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151608878.png" alt="image-20220615160800756"></p></blockquote> <blockquote><h5 id="网线-双绞线-分类及如何选择"><a href="#网线-双绞线-分类及如何选择" class="header-anchor">#</a> 网线(双绞线)分类及如何选择:</h5> <h6 id="网线-双绞线-的种类"><a href="#网线-双绞线-的种类" class="header-anchor">#</a> 网线(双绞线)的种类</h6> <ul><li>双绞线可分为<code>非屏蔽双绞线（UTP）</code>和<code>屏蔽双绞线（STP）</code>。
<ul><li>屏蔽双绞线电缆的外层由铝铂包裹，以减小辐射，但并不能完全消除辐射，屏蔽双绞线价格相对较高，安装时要比非屏蔽双绞线电缆困难。</li> <li>非屏蔽双绞线电缆具有以下优点：无屏蔽外套，直径小，节省所占用的空间；重量轻，易弯曲，易安装；将近端串扰减至最小或加以消除；具有阻燃性；具有独立性和灵活性，适用于结构化综合布线。</li></ul></li> <li>目前市面上常见的有 CAT5, CAT5e, CAT6, CAT6A, CAT7。</li> <li>参考链接: https://www.tripplite.com/products/ethernet-cable-types</li></ul> <table><thead><tr><th style="text-align:left;">Category</th> <th style="text-align:left;">Max. Data Rate</th> <th style="text-align:left;">Bandwidth</th> <th style="text-align:left;">Max. Distance</th> <th style="text-align:left;">Usage</th></tr></thead> <tbody><tr><td style="text-align:left;">CAT1</td> <td style="text-align:left;">1 Mbps</td> <td style="text-align:left;">0.4 MHz</td> <td style="text-align:left;"></td> <td style="text-align:left;">Telephone and modem lines</td></tr> <tr><td style="text-align:left;">CAT2</td> <td style="text-align:left;">4 Mbps</td> <td style="text-align:left;">4 MHz</td> <td style="text-align:left;"></td> <td style="text-align:left;">LocalTalk &amp; Telephone</td></tr> <tr><td style="text-align:left;">CAT3</td> <td style="text-align:left;">10 Mbps</td> <td style="text-align:left;">16 MHz</td> <td style="text-align:left;">100 m (328 ft.)</td> <td style="text-align:left;">10BaseT Ethernet</td></tr> <tr><td style="text-align:left;">CAT4</td> <td style="text-align:left;">16 Mbps</td> <td style="text-align:left;">20 MHz</td> <td style="text-align:left;">100 m (328 ft.)</td> <td style="text-align:left;">Token Ring</td></tr> <tr><td style="text-align:left;">CAT5</td> <td style="text-align:left;">100 Mbps</td> <td style="text-align:left;">100 MHz</td> <td style="text-align:left;">100 m (328 ft.)</td> <td style="text-align:left;">100BaseT Ethernet</td></tr> <tr><td style="text-align:left;">CAT5e</td> <td style="text-align:left;">1 Gbps</td> <td style="text-align:left;">100 MHz</td> <td style="text-align:left;">100 m (328 ft.)</td> <td style="text-align:left;">100BaseT Ethernet, residential homes</td></tr> <tr><td style="text-align:left;">CAT6</td> <td style="text-align:left;">1 Gbps</td> <td style="text-align:left;">250 MHz</td> <td style="text-align:left;">100 m (328 ft.) 10Gb at 37 m (121 ft.)</td> <td style="text-align:left;">Gigabit Ethernet, commercial buildings</td></tr> <tr><td style="text-align:left;">CAT6a</td> <td style="text-align:left;">10 Gbps</td> <td style="text-align:left;">500 MHz</td> <td style="text-align:left;">100 m (328 ft.)</td> <td style="text-align:left;">Gigabit Ethernet in data centers and commercial buildings</td></tr> <tr><td style="text-align:left;">CAT7</td> <td style="text-align:left;">10 Gbps</td> <td style="text-align:left;">600 MHz</td> <td style="text-align:left;">100 m (328 ft.)</td> <td style="text-align:left;">10 Gbps Core Infrastructure</td></tr> <tr><td style="text-align:left;">CAT7a</td> <td style="text-align:left;">10 Gbps</td> <td style="text-align:left;">1000 MHz</td> <td style="text-align:left;">100 m (328 ft.) 40Gb at 50 m (164 ft.)</td> <td style="text-align:left;">10 Gbps Core Infrastructure</td></tr> <tr><td style="text-align:left;">CAT8</td> <td style="text-align:left;">25 Gbps (Cat8.1) 40 Gbps (Cat8.2)</td> <td style="text-align:left;">2000 MHz</td> <td style="text-align:left;">30 m (98 ft.)</td> <td style="text-align:left;">25 Gbps/40 Gbps Core Infrastructure</td></tr></tbody></table> <h6 id="网线的选择"><a href="#网线的选择" class="header-anchor">#</a> 网线的选择</h6> <ul><li><p>辨别标识：三类线的标识是CAT3，五类线的标识是CAT5，超五类线的标识是CAT5E，六类线的标识是CAT6。</p></li> <li><p>用手感觉：优质的网线一般使用铜线做导线芯，比较软，劣质导线添加了其它的金属元素，比较硬，不易弯曲，使用中容易断线。</p></li> <li><p>用刀割：去掉塑料外皮露出芯线，白色芯线是花白的，假货通常是纯白色或花色不明显，好的网线绕线密度适中，方向是逆时针。</p></li></ul></blockquote> <blockquote><h5 id="poe-power-over-ethernet"><a href="#poe-power-over-ethernet" class="header-anchor">#</a> PoE (Power Over Ethernet)</h5> <p>概念: PoE (Power Over Ethernet)指的是在现有的以太网Cat.5布线基础架构不作任何改动的情况下，在为一些基于IP的终端(如IP电话机、无线局域网接入点AP、网络摄像机等)传输数据的同时，还能为此类设备提供直流供电的技术。PoE技术能在确保现有结构化布线安全的同时保证现有网络的正常运作，最大限度地降低成本。</p> <p>一个完整的PoE系统包括供电端设备(PSE，Power Sourcing Equipment)和受电端设备(PD，Powered Device)两部分。</p> <ul><li>供电端设备(PSE)：支持POE功能的以太网交换机、路由器、集线器或者其他网络交换设备</li> <li>受电端设备(PD)：常见的是在监控系统中的网络摄像机(IPC)</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151603405.png" alt="image-20220615160318319"></p></blockquote> <h4 id="光纤介质"><a href="#光纤介质" class="header-anchor">#</a> 光纤介质</h4> <blockquote><p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151620103.png" alt="image-20220615162044974"></p> <ul><li>单模光纤和多模光纤:
<ul><li>单模光纤支持全双工通信, 即需要成对使用;</li> <li>多模光纤一般单根使用;</li></ul></li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151624135.png" alt="image-20220615162429985"></p> <ul><li>光纤跳线接口类型:</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151625019.png" alt="image-20220615162522914"></p> <ul><li><p>光模块</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151627296.png" alt="image-20220615162753198"></p></li></ul></blockquote> <h1 id="以太网和数据封装"><a href="#以太网和数据封装" class="header-anchor">#</a> 以太网和数据封装</h1> <h2 id="csma-cd"><a href="#csma-cd" class="header-anchor">#</a> CSMA/CD</h2> <blockquote><ul><li><code>半双工以太网</code>使用<code>CSMA/CD</code> (Carrier Sense Multiple Access with Collision Detection ，载波侦听多路访问/冲突检测)，这是一种帮助设备均衡地共享带宽的协议，可避免两台设备同时在网络介质上传输数据。同一冲突域内, 多个节点同时传输分组时，将发生冲突，而开发CSMA/CD就旨在避免这种问题。</li> <li>在<code>半双工以太网</code>中发生冲突后，将出现如下情况:
<ol><li>拥堵信号告诉所有设备发生了冲突;</li> <li>冲突发生后进行随机延迟并重传;</li> <li>以太网网段中的每台设备都暂停传输，直到定时器到期后，所有主机的传输优先级都相同。</li></ol></li> <li>CSMA/CD 网络持续发生严重冲突时，将导致如下结果:
<ul><li>延迟;</li> <li>低吞吐量;</li> <li>拥塞。</li></ul></li></ul></blockquote> <blockquote><ul><li>在只有两个节点的情况下，全双工以太网要求使用点到点连接。</li> <li>除集线器外，其他所有设备都可在全双工模式下运行。</li> <li>半双工以太网只有一个冲突域，其有效吞吐量比全双工以太网低得多。</li> <li>在全双工以太网中，通常每个端口都对应一个独立的冲突域，且有效吞性量更高。</li></ul></blockquote> <blockquote><p>最后，请牢记如下要点:</p> <ul><li><code>在全双工模式下，不会发生冲突;</code></li> <li>每个全双工节点都必须有一个专用的交换机端口;</li> <li>主机的网卡和交换机端口必须能够在全双工模式下运行。</li></ul></blockquote> <h2 id="mac地址-2"><a href="#mac地址-2" class="header-anchor">#</a> MAC地址</h2> <blockquote><p>MAC (硬件)地址长48 位(6 B) ，采用十六进制格式。</p> <ul><li><strong>前24bit(3 Bytes)是OUI</strong> (Organizationally Unique Identifier ，组织唯一标识符)是由IEEE 分配给厂商的;</li> <li>后24bit(3 Bytes)是各厂商给生产的每个网卡都分配一个唯一的(据说如此，但不保证) 全局管理地址</li></ul></blockquote> <h2 id="以太网帧"><a href="#以太网帧" class="header-anchor">#</a> 以太网帧</h2> <ul><li><p>数据链路层负责将比特合并成字节，再将字节封装成帧。在数据链路层，我们使用帧封装来自网络层的分组，以便通过特定类型的介质进行传输。</p></li> <li><p>以太网工作站的职责是，使用MAC 帧格式彼此传递数据帧, 这利用CRC (Cyclic Redundancy Check ，循环冗余校验)提供了错误检测功能，</p></li></ul> <p>![image-20220704231652823](C:\Users\Jonas Wolfxin\AppData\Roaming\Typora\typora-user-images\image-20220704231652823.png)</p> <blockquote><ul><li><code>前导码</code>: 交替的0和1，在每个分组的开头提供5 MHz 的时钟信号，让接收设备能够跟踪到来的比特流。</li> <li><code>帧起始位置分隔符(SFD)</code> 前导码为7B ，而SFD为1B; SFD 的值为10101011 ,
其中最后两个1让接收方能够识别中间的0和1交替模式，进而同步并检测到数据开头。</li> <li><code>目标地址(DA)</code> 包含一个48 位的值，且LSB (Least Significant Bit ，最低有效位)优先。接收方根据DA 判断到来的分组是否是发送给特定节点的。目标地址可以是单播地址、广播地址或组播MAC 地址。别忘了， 广播地址全为1 (在十六进制格式下全为F)， 广播发送给所有设备，而组播只发送给网络中一组类似的节点。</li> <li><code>源地址(SA)</code> SA 是一个48 位的MAC 地址， 用于标识传输设备，也使用LSB 优先格式。在SA 字段中，不能包含广播地址或组播地址。</li> <li><code>长度或类型</code>: 802.3 帧使用长度字段，而Ethenet_II 帧使用类型字段标识网络层协议。802.3不能标识上层协议，只能用于专用LAN ，如IPX。</li> <li><code>数据</code>: 这是网络层传递给数据链路层的帧，其长度为46-1500 B 。</li> <li><code>帧校验序列(FCS)</code>:  FCS 字段用于存储CRC (Cyclic Redundancy Check ，循环冗余校验) 结果。CRC是一种数学算法，创建每个帧时都将运行它。作为接收方的主机收到帧并运行CRC 时，其结果必须相同，否则，接收方将认为发生了错误，进而将帧丢弃。</li></ul></blockquote> <h2 id="以太网物理层"><a href="#以太网物理层" class="header-anchor">#</a> 以太网物理层</h2> <p>IEEE 对802.3进行了扩展，制定了3个新标准:</p> <ul><li>802.3u ( 快速以太网): 速度为100Mbit/s 的快速以太网，包括100Base-TX、100Base-T4 和100Base-FX。</li> <li>802.3ab: 定义了使用双绞线的1 Gbitls 以太网。</li> <li>802.3ae (使用光纤和同轴电缆，速度为10 Gbit/s )。</li></ul> <p>![image-20220704232917404](C:\Users\Jonas Wolfxin\AppData\Roaming\Typora\typora-user-images\image-20220704232917404.png)</p> <h2 id="数据传输过程中的封装和解封装"><a href="#数据传输过程中的封装和解封装" class="header-anchor">#</a> 数据传输过程中的封装和解封装</h2> <blockquote><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151411009.png" alt="image-20210928175046144" style="zoom:67%;"> <p>![image-20220704235956581](C:\Users\Jonas Wolfxin\AppData\Roaming\Typora\typora-user-images\image-20220704235956581.png)</p> <p>![image-20220705000049367](C:\Users\Jonas Wolfxin\AppData\Roaming\Typora\typora-user-images\image-20220705000049367.png)</p> <p>![image-20220705000035266](C:\Users\Jonas Wolfxin\AppData\Roaming\Typora\typora-user-images\image-20220705000035266.png)</p> <ul><li><p>网络层负责获悉目标硬件地址(这种地址指出了分组应发送到本地网络的什么地方); 网络层查看目标IP地址，并将其与自己的IP地址和子网掩码进行比较。</p> <ul><li>如果比较表明分组是前往本地主机的，则ARP协议会请求目标主机的硬件地址;</li> <li>如果分组是前往远程主机的， 网络层将获悉默认网关(路由器)的IP地址。</li></ul></li> <li><p>接下来，网络层将分组向下传递给数据链路层，一同传递的还有本地主机或默认网关的硬件地址; 然后, 将对帧运行CRC ( Cyclic Redundancy Check ，循环冗余校验)，并将结果放在帧尾的FCS (Frame Check Sequence ，帧校验序列)字段中。</p></li> <li><p>再接下来, 数据链路层将数据帧传递给物理层, 物理层将使用比特定时规则( bit timing rule) 将数据编码成比特流的形式, 将数据帧传输到下一跳站点;</p></li> <li><p>网段中的每台设备都将同步时钟，从数字信号中提取1和0 ，并重建帧。重建帧后，设备将运行CRC，以确保帧是正确的。如果一切顺利，主机将检查目标MAC 地址和目标
E 地址，以检查帧是否是发送给它的。</p></li></ul></blockquote> <h3 id="发送过程"><a href="#发送过程" class="header-anchor">#</a> 发送过程：</h3> <blockquote><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151411552.png" alt="image-20210928174243963" style="zoom:64%;"></blockquote> <h3 id="接收过程"><a href="#接收过程" class="header-anchor">#</a> 接收过程：</h3> <blockquote><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151411803.png" alt="image-20210928174707727" style="zoom:67%;"></blockquote> <h2 id="常见的网络组网模型"><a href="#常见的网络组网模型" class="header-anchor">#</a> 常见的网络组网模型</h2> <h3 id="三层组网模型"><a href="#三层组网模型" class="header-anchor">#</a> 三层组网模型</h3> <p>3个独立的层并不意味着3 台独立的设备，设备可能更多，也可能更少。别忘了，这是一种分层方法。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151639532.png" alt="image-20220615163936447"></p> <h4 id="核心层"><a href="#核心层" class="header-anchor">#</a> 核心层:</h4> <p>位于层次结构顶端，负责快速而可靠地传输大量的数据流。网络核心层的唯一目标是尽可能快地交换数据流。在核心层传输的数据流是大多数用户共享的; 然而，用户数据是在集散层处理的，该层在必要时将请求转发到核心层。</p> <blockquote><h6 id="不应该做的事"><a href="#不应该做的事" class="header-anchor">#</a> 不应该做的事:</h6> <ul><li>不要做任何降低速度的事情，这包括使用访问列表、在虚拟局域网(VLAN) 之间路由以及实现分组过滤。</li> <li>不要在核心层支持工作组接入。</li> <li>避免核心层随着网络的增大而增大(即添加路由器)。如果核心层的性能是个问题，应进行升级，而不是增大。</li></ul> <h6 id="应该做的事"><a href="#应该做的事" class="header-anchor">#</a> 应该做的事:</h6> <ul><li>设计核心层时，应确保其高可靠性。考虑使用对速度、冗余有帮助的数据链路技术，如包含冗余链路的吉比特以太网，甚至是10 吉比特以太网。</li> <li>设计时要考虑速度，核心层的延迟必须非常短。</li> <li>选择会聚时间短的路由选择协议。如果路由选择表不行，快速且冗余的数据链路也帮不上忙。</li></ul></blockquote> <h4 id="集散层"><a href="#集散层" class="header-anchor">#</a> 集散层:</h4> <p>集散层的主要功能是提供路由选择、分组过滤，以及在必要时确定如何让分组进入核心层。集散层必须确定处理网络服务请求的最快方式，例如如何将文件请求转发给服务器。确定最佳路径后，集散层将在必要时将请求转发给核心层，然后核心层将请求快速转发给正确的服务。</p> <blockquote><p>集散层是实现网络策略的地方，在这里，你可相当灵活地指定网络的运行方式。下面几项操作通常应该在集散层执行:</p> <ul><li>路由选择;</li> <li>访问访问列表、分组过滤和排队;</li> <li>实现安全性和网络策略，包括地址转换和防火墙;</li> <li>在路由选择协议之间重分发，包括静态路由;</li> <li>在VLAN 之间路由以及其他支持工作组的功能;</li> <li>定义广播域和组播域。</li></ul></blockquote> <h4 id="接入层"><a href="#接入层" class="header-anchor">#</a> 接入层</h4> <p>接入层控制用户和工作组对互联网络资源的访问，有时也称为桌面层。大多数用户需要的网络资源位于本地，而所有远程服务数据流都由集散层处理。接入层经常采用吉比特以太网和快速以太网交换等技术。下面是接入层的一些功能:</p> <ul><li>延续集散层的访问控制和策略。</li> <li>建立独立的冲突域(网络分段)</li> <li>提供到集散层的工作组连接。</li></ul> <h4 id="组网示例"><a href="#组网示例" class="header-anchor">#</a> 组网示例</h4> <blockquote><ul><li>示例1: SMB中小型企业网</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151647362.png" alt="image-20220615164743256"></p> <ul><li><p>示例2: 无线园区网</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151650976.png" alt="image-20220615165033869"></p></li> <li><p>示例3: 政府网络</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151807036.png" alt="image-20220615180710931"></p></li> <li><p>示例4: 中小型教育网络</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151809005.png" alt="image-20220615180900902"></p></li> <li><p>示例5: 大型教育网络</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151809944.png" alt="image-20220615180959813"></p></li> <li><p>金融行业: 要求很高, 全冗余; 零丢包;</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151811954.png" alt="image-20220615181126843"></p></li></ul></blockquote> <h3 id="spine-and-leave-network-model"><a href="#spine-and-leave-network-model" class="header-anchor">#</a> Spine and leave Network Model</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/1520185570000" alt="The Leaf-Spine Architecture" style="zoom:80%;"> <blockquote><ul><li><p>With a spine-and-leaf architecture, no matter which leaf switch to which a server is connected, its traffic always has to cross the same number of devices to get to another server (unless the other server is located on the same leaf). This approach keeps latency at a predictable level because a payload only has to hop to a spine switch and another leaf switch to reach its destination.</p></li> <li><p>In this two-tier Clos architecture, every lower-tier switch (leaf layer) is connected to each of the top-tier switches (spine layer) in a full-mesh topology.</p></li> <li><p>The leaf layer consists of access switches that connect to devices such as servers.</p></li> <li><p>The spine layer is the backbone of the network and is responsible for interconnecting all leaf switches.</p></li> <li><p>Every leaf switch connects to every spine switch in the fabric. The path is randomly chosen so that the traffic load is evenly distributed among the top-tier switches.</p></li> <li><p>If one of the top tier switches were to fail, it would only slightly degrade performance throughout the data center.</p></li></ul> <p>Ref: https://www.cisco.com/c/en/us/products/collateral/switches/nexus-7000-series-switches/white-paper-c11-737022.html
Ref: https://www.youtube.com/watch?v=xjc7WLBb-nI</p></blockquote></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/master/docs/40.网络运维/05.CCNA/10.CCNA知识笔记/02.OSI 七层网络模型.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">last Updated:</span> <span class="time">2022/07/13, 13:10:53</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/1634eb/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">网络工程师的介绍</div></a> <a href="/pages/0cd5e5/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">TCP IP 协议簇</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
