0 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="python中的输出函数"><a href="#python中的输出函数" class="header-anchor">#</a> Python中的输出函数</h2> <h3 id="print-函数"><a href="#print-函数" class="header-anchor">#</a> print()函数</h3> <ul><li>我里面有一个你可以直接使用的函数叫print()，可以将你想展示的东东在IDLE或标准的控制台上显示</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/01/01.png" alt="01"></p> <h3 id="print-的函数的使用"><a href="#print-的函数的使用" class="header-anchor">#</a> print()的函数的使用</h3> <ul><li>print()函数可以输出那些内容?
<ol><li>print()函数输出的内容可以是<strong>数字</strong></li> <li>print()函数输出的内容可以是<strong>字符串</strong></li> <li>print()函数输出的内容可以是<strong>含有运算符的表达式</strong></li></ol></li> <li>print()函数可以将内容输出的目的地
<ol><li><strong>显示器</strong></li> <li><strong>文件</strong></li></ol></li> <li>print()函数的输出形式
<ol><li><strong>换行</strong></li> <li><strong>不换行</strong></li></ol></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/9/30 20:58
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token comment">##可以输出数字</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token number">520</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token number">666.666</span><span class="token punctuation">)</span>

<span class="token comment">##可以输出字符串</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'HelloWorld'</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;HelloWorld&quot;</span><span class="token punctuation">)</span>

<span class="token comment">##含有运算符的表达式</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token number">3</span><span class="token operator">+</span><span class="token number">1</span><span class="token punctuation">)</span> <span class="token comment">#3和1是操作数 +是运算符</span>

<span class="token comment">#将数据输出文件中,注意点：</span>
<span class="token comment">##1.所指定的盘存在</span>
<span class="token comment">##2.使用file=XX</span>
fp<span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'E:/test.txt'</span><span class="token punctuation">,</span><span class="token string">'a+'</span><span class="token punctuation">)</span><span class="token comment">##如果文件不存在就创建，存在就在文件内容的后面继续追加</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'HelloWorld'</span><span class="token punctuation">,</span><span class="token builtin">file</span><span class="token operator">=</span>fp<span class="token punctuation">)</span>
fp<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>

<span class="token comment">## 不进行换行输出 (输出内容在一行当中)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'Hello'</span><span class="token punctuation">,</span><span class="token string">'World'</span><span class="token punctuation">,</span><span class="token string">'Python'</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br></div></div><h2 id="转义字符"><a href="#转义字符" class="header-anchor">#</a> 转义字符</h2> <h3 id="什么是转义字符"><a href="#什么是转义字符" class="header-anchor">#</a> 什么是转义字符</h3> <ul><li>就是反斜杠+想要实现的转义功能首字母</li></ul> <h3 id="为什么需要转义字符"><a href="#为什么需要转义字符" class="header-anchor">#</a> 为什么需要转义字符</h3> <ul><li><p><strong>当字符串中包含反斜杠、单引号和双引号等有特殊用途的字符时，必须使用反斜杠对这些字符进行转义（转换一个含义)</strong></p> <p>反斜杠:\\</p> <p>单引号:\'</p> <p>双引号:\&quot;</p></li> <li><p><strong>当字符串中包含换行、回车，水平制表符或退格等无法直接表示的特殊字符时，也可以使用转义字符当字符串中包含换行、回车，水平制表符或退格等无法直接表示的特殊字符时，也可以使用转义字符</strong></p> <p>换行:\n</p> <p>回车:\r</p> <p>水平制表符:\t</p> <p>退格:\b</p></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/9/30 21:21
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token comment"># 转义字符</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'Hello\nWorld'</span><span class="token punctuation">)</span> <span class="token comment">#\ +转义功能的首字母  n--&gt;newLine的首字母表示换行  光标移动到下一行的开头</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'Hello\tWorld'</span><span class="token punctuation">)</span>                          <span class="token comment">#Hello World</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'Hellooo\tWorld'</span><span class="token punctuation">)</span> <span class="token comment">#四个字符是一个制表位     #Helloooooo World   tab键</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'Hello\rWorld'</span><span class="token punctuation">)</span>  <span class="token comment">#World将Hello进行了覆盖  #World    r--&gt;return光标移动到本行的开头</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'Hello\bWorld'</span><span class="token punctuation">)</span>  <span class="token comment">#\b是退一格，将o干掉了    #HellWorld    b--&gt;键盘上backspace键，回退一个字符</span>

<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'http:\\\\www.baidu.com'</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'老师说\‘大家好\’'</span><span class="token punctuation">)</span>

<span class="token comment">#元字符,不希望字符串中的转义字符起作用，就使用原字符，就是在字符串之前加上r或R</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">r'Hello\nWorld'</span><span class="token punctuation">)</span>
<span class="token comment">#注意事项，最后一个字符不能是反斜线</span>
<span class="token comment"># print(r'Hello\nWorld') 报错</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">r'Hello\nWorld\\'</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br></div></div></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/main/docs/30.Python/10.Python Basics/01.python01.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=Python" title="标签">#Python</a></div> <div class="last-updated"><span class="prefix">last Updated:</span> <span class="time">2023/03/23, 15:21:41</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><!----> <a href="/pages/d22ec2/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Python 基础篇(二)</div></a></div> <div c
