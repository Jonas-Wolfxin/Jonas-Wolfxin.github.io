wIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">Switching_EtherChannel<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h2 id="etherchannel"><a href="#etherchannel" class="header-anchor">#</a> EtherChannel</h2> <ul><li>[ ] configure and verify Layer 2 and Layer 3 EtherChannel using LACP(Link Aggregation Control Protocol);</li></ul> <h3 id="intro"><a href="#intro" class="header-anchor">#</a> Intro</h3> <blockquote><ul><li>EtherChannel allows you to group multiple physical interfaces into a group which operates as a single logical interface, so they behave as if they are a single interface.
<ul><li>A Layer 2 Etherchannel is a group of switch ports which operate as a single interface;</li> <li>a Layer 3 Etherchannel is a group of routed port which operate as a single interface, which you assign an IP address to, because it’s Layer 3.</li></ul></li></ul></blockquote> <h5 id="the-problem-without-etherchannel"><a href="#the-problem-without-etherchannel" class="header-anchor">#</a> The problem without Etherchannel</h5> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303292353185.png" alt="image-20230329235325076" style="zoom:38%;"> <blockquote><ul><li>ASW1: <em>Access layer Switch</em>, a switch that <em>end hosts</em> connect to;</li> <li>DSW1: <em>Distribution layer switch</em>, a switch that <em>access layer switches</em> connect to;</li> <li>When the bandwidth of the interfaces connected to end hosts is greater than the bandwidth of the connection to the distribution switch(es), this is called <strong>Over-Subscription</strong>.  Some oversubscription is acceptable, but too much will cause congestion.</li></ul> <h5 id="problems"><a href="#problems" class="header-anchor">#</a> Problems:</h5> <ul><li><p>Because of STP,</p> <ul><li><p>If you connect two switches together with multiple links, all except one will be disabled by spanning tree. Other links will be unused unless the active link fails.</p></li> <li><p>if all of ASW1’s interfaces were forwarding, Layer 2 loops would form between ASW1 and DSW1, leading to Broadcast Storms.</p></li></ul></li></ul> <h5 id="solution"><a href="#solution" class="header-anchor">#</a> Solution:</h5> <p>However, by forming these four physical interfaces into one logical interface, <strong>EtherChannel</strong> can solve this problem, giving us <em>both redundancy and increased bandwidth</em>.</p></blockquote> <h3 id="etherchannel-2"><a href="#etherchannel-2" class="header-anchor">#</a> Etherchannel</h3> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300003921.png" alt="image-20230330000351819" style="zoom:38%;"> <blockquote><ul><li><p>An EtherChannel is represented in network diagrams by <strong>drawing a circle</strong> around the interfaces</p> <p>that are grouped together; Some other names for an EtherChannel are:</p> <ul><li>Port Channel</li> <li>LAG (Link Aggregation Group)</li></ul></li> <li><p>EtherChannel <strong>groups multiple interfaces together to act as a single (virtual) interface</strong>.</p> <ul><li><em>STP will treat this group as a single interface.</em></li> <li>The bandwidth of the <em>four separate</em> interfaces is combined to form <em>one 4-times</em> bandwidth interface,</li></ul> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300009516.png" alt="image-20230330000938418" style="zoom:33%;"></li> <li><p>Traffic using the EtherChannel will be <strong>load balanced</strong> among the physical interfaces in the group. An algorithm is used to determine which traffic will use which physical interface.</p> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300015653.png" alt="image-20230330001518549" style="zoom:31%;"> <ul><li>EtherChannel load balances based on ‘<strong>flows</strong>’. A flow is a communication between two nodes in the network.</li> <li><strong>Frames in the same flow will be forwarded using the same physical interface.</strong> <ul><li>If frames in the same flow were forwarded using different physical interfaces, some frames
may arrive at the destination out of order, which could cause problems.</li> <li>Some applications can deal with frames arriving out of order, but some applications can’t.</li></ul></li> <li>The algorithm that is done to determine which physical interface to use takes into account a few inputs:
<ul><li>MAC address:
<ul><li><em>Source MAC address</em>,</li> <li><em>Destination MAC address</em>,</li> <li><em>Src &amp; Dest MAC addresses</em></li></ul></li> <li>IP address:
<ul><li><em>Source IP</em>,</li> <li><em>Dest IP</em>,</li> <li><em>Src &amp; Dest IP addresses</em>;</li></ul></li> <li>Some switches also support load-balancing based on the <em>Layer 4 TCP or UDP port numbers</em>;</li></ul></li></ul></li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># check the load-balancing method </span>
ASW1<span class="token comment">#show etherchannel load-balance </span>
EtherChannel Load-Balancing Operational State <span class="token punctuation">(</span>src-mac<span class="token punctuation">)</span>:
Non-IP: Source MAC address         
<span class="token comment"># if an IP packet isn’t encapsulated in the Ethernet frame, there is no IP address that can be used to determine the load-balancing, so the MAC addresses are used instead.   </span>
  IPv4: Source MAC address
  IPv6: Source MAC address


<span class="token comment"># change the load-balancing method </span>
ASW1<span class="token comment">#conf t</span>
ASW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#port-channel load-balance ?</span>
  dst-ip       Dst IP Addr
  dst-mac      Dst Mac Addr
  src-dst-ip   Src XOR Dst IP Addr
  src-dst-mac  Src XOR Dst Mac Addr
  src-ip       Src IP Addr
  src-mac      Src Mac Addr
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br></div></div></blockquote> <h3 id="etherchannel-protocols"><a href="#etherchannel-protocols" class="header-anchor">#</a> Etherchannel Protocols</h3> <h4 id="intro-2"><a href="#intro-2" class="header-anchor">#</a> Intro</h4> <blockquote><p>There are three methods of EtherChannel configuration on Cisco switches:</p> <h5 id="pagp-端口聚合协议"><a href="#pagp-端口聚合协议" class="header-anchor">#</a> PAgP <code>端口聚合协议</code></h5> <ul><li><p>(Port Aggregation Protocol)</p></li> <li><p>Cisco proprietary protocol</p></li> <li><p>Dynamically negotiates the creation/maintenance of the EtherChannel. (like DTP does for trunks)</p></li></ul> <h5 id="lacp-链路聚合控制协议-recommended"><a href="#lacp-链路聚合控制协议-recommended" class="header-anchor">#</a> LACP: <code>链路聚合控制协议</code> ==Recommended!==</h5> <ul><li><p>(Link Aggregation Control Protocol)</p></li> <li><p>Industry standard protocol (<strong>IEEE 802.3AD</strong>)</p></li> <li><p>Dynamically negotiates the creation/maintenance of the EtherChannel. (like DTP does for trunks)</p></li></ul> <blockquote><p><strong>Up to 8 interfaces</strong> can be formed into a single EtherChannel (<strong>LACP allows up to 16</strong>, <em>but only 8 will be active</em>, the other 8 will be in standby mode, waiting for an active interface to fail)</p></blockquote> <h5 id="static-etherchannel"><a href="#static-etherchannel" class="header-anchor">#</a> Static EtherChannel</h5> <ul><li>A protocol isn’t used to determine if an EtherChannel should be formed.</li> <li>Interfaces are statically configured to form an EtherChannel.</li></ul></blockquote> <h4 id="modes"><a href="#modes" class="header-anchor">#</a> Modes</h4> <blockquote><h5 id="static-etherchannel-2"><a href="#static-etherchannel-2" class="header-anchor">#</a> Static Etherchannel:</h5> <ul><li><code>on</code> Mode that forces the LAN port to form Etherchannel <strong>without using negotiation protocol</strong>.</li> <li>In the <code>on</code> mode, a usable EtherChannel exists <strong>only when</strong> <em>a LAN port group in the <code>on</code> mode</em> is connected to <em>another LAN port group in the <code>on</code> mode</em>. Because ports configured in the on mode do not negotiate, there is no negotiation traffic between the ports. You cannot configure the on mode with an EtherChannel protocol. <strong>If one end uses the on mode, the other end must also.</strong></li></ul> <h5 id="pagp-协议"><a href="#pagp-协议" class="header-anchor">#</a> PAgP 协议</h5> <ul><li>==auto==: PAgP mode that places a LAN port into a <em>passively</em> negotiating state, in which the port responds to PAgP packets it receives but does not initiate PAgP negotiation. <strong>(Default)</strong></li> <li>==desirable==: PAgP mode that places a LAN port into an <em>actively</em> negotiating state, in which the port initiates negotiations with other LAN ports by sending PAgP packets.</li></ul> <h5 id="lacp-协议"><a href="#lacp-协议" class="header-anchor">#</a> LACP 协议</h5> <ul><li><p>==passive==: LACP mode that places a port into a <em>passively</em> negotiating state, in which the port responds to LACP packets it receives but does not initiate LACP negotiation. <strong>(Default)</strong></p></li> <li><p>==active==: LACP mode that places a port into an <em>actively</em> negotiating state, in which the port initiates negotiations with other ports by sending LACP packets.</p></li></ul> <p>Reference: <a href="https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-2/3-1-1SG/configuration/guide/config/channel.html" target="_blank" rel="noopener noreferrer">https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-2/3-1-1SG/configuration/guide/config/channel.html<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></blockquote> <blockquote><h4 id="summary-of-valid-modes"><a href="#summary-of-valid-modes" class="header-anchor">#</a> Summary of valid modes</h4> <ul><li>Static: <code>on</code> &lt;-&gt; <code>on</code></li> <li>PAgP
<ul><li><code>auto</code> &lt;-&gt; <code>desirable</code></li> <li><code>desirable</code> &lt;-&gt; <code>desirable</code></li></ul></li> <li>LACP:
<ul><li><code>passive</code> &lt;-&gt; <code>active</code></li> <li><code>active</code> &lt;-&gt; <code>active</code></li></ul></li></ul></blockquote> <h3 id="configuration"><a href="#configuration" class="header-anchor">#</a> Configuration</h3> <h4 id="initiate-an-etherchannel"><a href="#initiate-an-etherchannel" class="header-anchor">#</a> Initiate an Etherchannel</h4> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>ASW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface range g0/1-2</span>
ASW1<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#channel-?</span>
channel-group  channel-protocol  

<span class="token comment"># channel-group</span>
ASW1<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#channel-group ?</span>
  <span class="token operator">&lt;</span><span class="token number">1</span>-<span class="token operator"><span class="token file-descriptor important">6</span>&gt;</span>  Channel group number
ASW1<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#channel-group 1 mode ?</span>
  active     Enable LACP unconditionally
  auto       Enable PAgP only <span class="token keyword">if</span> a PAgP device is detected
  desirable  Enable PAgP unconditionally
  on         Enable Etherchannel only
  passive    Enable LACP only <span class="token keyword">if</span> a LACP device is detected

ASW1<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#channel-group 1 mode active</span>
  
  
<span class="token comment"># channnel-protocol , this command is Useless, because last command can auto set the Ethnerchannel Type</span>
ASW1<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#channel-protocol ?</span>
  lacp  Prepare interface <span class="token keyword">for</span> LACP protocol
  pagp  Prepare interface <span class="token keyword">for</span> PAgP protocol
  
  
<span class="token comment"># 省略 DSW1 的命令</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br></div></div><blockquote><ul><li>Remember that the <code>channel-group</code> command is used to configure the etherchannel, but the name of the virtual interface that is created is <strong>port-channel</strong>.</li> <li>The <em>channel-group number</em> has to match for member interfaces on the same switch. However, it doesn’t have to match the channel-group number on the other switch. (channel-group 1 on ASW1 can form an EtherChannel with channel-group 2 on DSW1)</li></ul></blockquote> <h4 id="configure-the-port-channel-interface"><a href="#configure-the-port-channel-interface" class="header-anchor">#</a> configure the port-channel interface</h4> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>ASW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface port-channel ?</span>
  <span class="token operator">&lt;</span><span class="token number">1</span>-<span class="token operator"><span class="token file-descriptor important">6</span>&gt;</span>  Port-channel interface number
ASW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface port-channel 1</span>
ASW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#?</span>
  arp             Set arp <span class="token builtin class-name">type</span> <span class="token punctuation">(</span>arpa, probe, snap<span class="token punctuation">)</span> or <span class="token function">timeout</span>
  bandwidth       Set bandwidth informational parameter
  cdp             Global CDP configuration subcommands
  delay           Specify interface throughput delay
  description     Interface specific description
  duplex          Configure duplex operation.
  <span class="token builtin class-name">exit</span>            Exit from interface configuration mode
  hold-queue      Set hold queue depth
  no              Negate a <span class="token builtin class-name">command</span> or <span class="token builtin class-name">set</span> its defaults
  service-policy  Configure QoS Service Policy
  <span class="token function">shutdown</span>        Shutdown the selected interface
  spanning-tree   Spanning Tree Subsystem
  speed           Configure speed operation.
  storm-control   storm configuration
  switchport      Set switching mode characteristics
  tx-ring-limit   Configure PA level transmit ring limit
ASW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport ?</span>
  access         Set access mode characteristics of the interface
  mode           Set trunking mode of the interface
  nonegotiate    Device will not engage <span class="token keyword">in</span> negotiation protocol on this
                 interface
  port-security  Security related <span class="token builtin class-name">command</span>
  priority       Set appliance <span class="token number">802</span>.1p priority
  protected      Configure an interface to be a protected port
  trunk          Set trunking characteristics of the interface
  voice          Voice appliance attributes
  
ASW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk encapsulation dot1q  # the command maybe not exist if support dot1q</span>

ASW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport mode trunk </span>


<span class="token comment"># 省略 DSW1 的命令</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br><span class="line-number">31</span><br><span class="line-number">32</span><br><span class="line-number">33</span><br><span class="line-number">34</span><br><span class="line-number">35</span><br><span class="line-number">36</span><br><span class="line-number">37</span><br></div></div><blockquote><p><strong>Important</strong>:</p> <ul><li><p>Member interfaces(the physical interfaces) in the EtherChannel, must have matching configurations:</p> <ul><li><p>Same duplex (full/half)</p></li> <li><p>Same speed</p></li> <li><p>Same switchport mode (access/trunk)</p></li> <li><p>Same allowed VLANs/native VLAN (for trunk interfaces)</p></li></ul></li> <li><p>If an interface’s configurations do not match the others, it will be excluded from the EtherChannel.</p></li></ul></blockquote> <h4 id="check-the-status-of-an-etherchannel"><a href="#check-the-status-of-an-etherchannel" class="header-anchor">#</a> Check the status of an EtherChannel</h4> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>ASW1<span class="token comment">#show etherchannel ?</span>
  load-balance  Load-balance/frame-distribution scheme among ports <span class="token keyword">in</span>
                port-channel
  port-channel  Port-channel information
  summary       One-line summary per channel-group
  <span class="token operator">&lt;</span>cr<span class="token operator">&gt;</span>
  
ASW1<span class="token comment">#show etherchannel summary</span>
ASW1<span class="token comment">#show etherchannel port-channel</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300246804.png" alt="image-20230330024612582" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300246610.png" alt="image-20230330024638386" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300246236.png" alt="image-20230330024655022" style="zoom:42%;"> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300249069.png" alt="image-20230330024934887" style="zoom:45%;"> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300250633.png" alt="image-20230330025018431" style="zoom:33%;"> <h3 id="layer-3-etherchannel"><a href="#layer-3-etherchannel" class="header-anchor">#</a> Layer-3 Etherchannel</h3> <blockquote><p>Modern network design often leans toward using Layer 3 connections between switches, because that way spanning-tree won’t be an issue anywhere in the network.</p> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300253867.png" alt="image-20230330025353727" style="zoom:33%;"> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300254358.png" alt="image-20230330025416216" style="zoom:33%;"></blockquote> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>DSW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface range g1/0/3 - 4</span>
DSW1<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#no switchport </span>
DSW1<span class="token punctuation">(</span>config-if-range<span class="token punctuation">)</span><span class="token comment">#channel-group 1 mode active </span>
Creating a port-channel interface Port-channel <span class="token number">1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><blockquote><p><strong>Note:</strong> use the <code>no switchport</code> command to make them Layer 3 routed interfaces, which can don't worry about STP.</p></blockquote> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>DSW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface port-channel 1</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303300305690.png" alt="image-20230330030530484" style="zoom:39%;"> <img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303291027093.png" alt="image-20220622025022846" style="zoom:40%;"> <h3 id="commands-summary"><a href="#commands-summary" class="header-anchor">#</a> Commands summary</h3> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Sw<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment"># port-channel load-balance mode </span>

SW<span class="token comment"># show etherchannel load-balance </span>
<span class="token comment">#displays information about the load-balancing settings </span>

Sw<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment"># channel-group number mode { desirable | auto | active | passive } </span>
<span class="token comment">#configures an interface to be part of an EtherChannel </span>

SW<span class="token comment"># show etherchannel summary </span>
<span class="token comment">#displays a summary of EtherChannels on the switch </span>

SwW<span class="token comment"># show etherchannel port-channel </span>
<span class="token comment">#displays information about the virtual port-channel interfaces on the switch</span>
