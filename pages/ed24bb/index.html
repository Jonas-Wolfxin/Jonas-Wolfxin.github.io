hjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">CCNA 200-301 题库_501-530<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="ccna-200-301-题库-501-530"><a href="#ccna-200-301-题库-501-530" class="header-anchor">#</a> CCNA 200-301 题库_501-530</h1> <ol start="501"><li><p>Refer to the exhibit. Web traffic is coming in from the WAN interface. Which route takes precedence when the router is processing <strong>traffic destined for the LAN network at 10.0.10.0/24</strong>?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191618918.jpg" alt="CCNA 200-301 Dumps Full Questions - Exam Study Guide &amp; Free 186"></p> <p>A. via next-hop 10.0.1.5</p> <p>B. via next-hop 10 0 1.4</p> <p>C. via next-hop 10.0 1.50</p> <p>D. via next-hop 10.0 1 100</p> <details><summary>Correct Answer</summary> <strong>A</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. All VLANs are present in the VLAN database. Which command sequence must be applied to complete the configuration?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208310.png" alt="image-20220703200936200"></p> <p>A. <code>Interface FastEthernet0/1</code></p> <p>​    <code>switchport trunk native vlan 10</code></p> <p>​    <code>switchport trunk allowed vlan 10,15</code></p> <p>B. <code>Interface FastEthernet0/1</code></p> <p>​    <code>switchport mode trunk</code></p> <p>​    <code>switchport trunk allowed vlan 10,15</code></p> <p>C. <code>interface FastEthernet0/1</code></p> <p>​    <code>switchport mode access</code></p> <p>​    <code>switchport voice vlan 10</code></p> <p>D. <code>interface FastEthernet0/1</code></p> <p>​    <code>switchport trunk allowed vlan add 10</code></p> <p>​    <code>vlan 10 private-vlan isolated</code></p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. An engineer is <strong>updating the R1 configuration to connect a new server to the management network</strong>. <strong>The PCs on the management network must be blocked from pinging the default gateway of the new server.</strong> Which command must be configured on R1 to complete the task?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208231.jpeg" alt="img"></p> <p>A. R1(config)#ip route 172.16.2.2 255.255.255.248 gi0/1</p> <p>B. R1(config)#ip route 172.16.2.2 255.255.255.255 gi0/0</p> <p>C. R1(config)#ip route 172.16.2.0 255.255.255.0 192.168.1.15</p> <p>D. R1(conflg)#ip route 172.16.2.0 255.255.255.0 192.168.1.5</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li>Only the route to the new server(just this one IP address) is added to the routing table of R1</li></ul></details></li> <li><p>Refer to the exhibit. The DHCP server and clients are connected to the same switch. What is the next step to <strong>complete the DHCP configuration to allow clients on VLAN 1 to receive addresses from the DHCP server</strong>?</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208078.png" alt="image-20220703201125818" style="zoom:150%;"> <p>A. Configure the ip dhcp snooping trust command on the interlace that is connected to the DHCP client.</p> <p>B. Configure the ip dhcp relay information option command on the interface that is connected to the DHCP client</p> <p>C. Configure the ip dhcp snooping trust command on the interface that is connected to the DHCP server.</p> <p>D. Configure the Ip dhcp relay information option command on the interface that is connected to the DHCP server.</p> <p>Trusted and Untrusted Sources</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li>The DHCP snooping feature determines whether traffic sources are trusted or untrusted. An untrusted source may initiate traffic attacks or other hostile actions. To prevent such attacks, the DHCP snooping feature filters messages and rate-limits traffic from untrusted sources. </li></ul> <ul><li>In an enterprise network, devices under your administrative control are trusted sources. These devices include the switches, routers and servers in your network. Any device beyond the firewall or outside your network is an untrusted source. Host ports are generally treated as untrusted sources. </li> <li>In a service provider environment, any device that is not in the service provider network is an untrusted source (such as a customer switch). Host ports are untrusted sources. </li> <li>In the Catalyst 6500 series switch, you indicate that a source is trusted by configuring the trust state of its connecting interface. </li> <li>The default trust state of all interfaces is untrusted. You must configure DHCP server interfaces as trusted. You can also configure other interfaces as trusted if they connect to devices (such as switches or routers) inside your network. You usually do not configure host port interfaces as trusted. </li> <li>Note: For DHCP snooping to function properly, all DHCP servers must be connected to the switch through trusted interfaces, as untrusted DHCP messages will be forwarded only to trusted interfaces.</li></ul>
      Reference: <a href="https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst6500/ios/12-2SXF/native/configuration/guide/swcg/snoodhcp.pdf " target="_blank">https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst6500/ios/12-2SXF/native/configuration/guide/swcg/snoodhcp.pdf </a></details></li> <li><p>An engineer is configuring <strong>remote access to a router from IP subnet 10.139.58.0/28</strong>. The domain name, crypto keys, and SSH have been configured. Which configuration enables the traffic on the destination router?</p> <p>A.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>interface FastEthernet0/0
<span class="token function">ip</span> address <span class="token number">10.122</span>.49.1 <span class="token number">255.255</span>.255.240
access-group <span class="token number">120</span> <span class="token keyword">in</span>
<span class="token function">ip</span> access-list extended <span class="token number">120</span>
permit tcp <span class="token number">10.139</span>.58.0 <span class="token number">255.255</span>.255.248 any eq <span class="token number">22</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>B.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>interface FastEthernet0/0
<span class="token function">ip</span> address <span class="token number">10.122</span>.49.1 <span class="token number">255.255</span>.255.252
<span class="token function">ip</span> access-group <span class="token number">110</span> <span class="token keyword">in</span>
<span class="token function">ip</span> access-list extended <span class="token number">110</span>
permit tcp <span class="token number">10.139</span>.58.0 <span class="token number">0.0</span>.0.15 <span class="token function">host</span> <span class="token number">10.122</span>.49.1 eq <span class="token number">22</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>C.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>interface FastEthernet0/0
<span class="token function">ip</span> address <span class="token number">10.122</span>.49.1 <span class="token number">255.255</span>.255.248
<span class="token function">ip</span> access-group <span class="token number">10</span> <span class="token keyword">in</span>
<span class="token function">ip</span> access-list standard <span class="token number">10</span>
permit udp <span class="token number">10.139</span>.58.0 <span class="token number">0.0</span>.0.7 <span class="token function">host</span> <span class="token number">10.122</span>.49.1 eq <span class="token number">22</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>D.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>interface FastEthernet0/0
<span class="token function">ip</span> address <span class="token number">10.122</span>.49.1 <span class="token number">255.255</span>.255.252
<span class="token function">ip</span> access-group <span class="token number">105</span> <span class="token keyword">in</span>
<span class="token function">ip</span> access-list standard <span class="token number">105</span>
permit tcp <span class="token number">10.139</span>.58.0 <span class="token number">0.0</span>.0.7 eq <span class="token number">22</span> <span class="token function">host</span> <span class="token number">10.122</span> <span class="token number">49.1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li>/28 ====&gt;  0.0.0.15</li></ul></details></li> <li><p>Which PoE mode <strong>enables powered-device detection</strong> and <strong>guarantees</strong> power when the device is detected?</p> <p>A. dynamic</p> <p>B. static</p> <p>C. active</p> <p>D. auto</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li>auto—Enables powered-device detection. If enough power is available, automatically allocates power to the PoE port after device detection. This is the default setting.</li> <li>never —Disables device detection, and disable power to the port.
          <p>
              If a port has a Cisco powered device connected to it, do not use the power inline never command to configure the port. A false link-up can occur, placing the port into the error-disabled state.
              </p></li> <li>static—Enables powered-device detection. Pre-allocate (reserve) power for a port before the switch discovers the powered device. The switch reserves power for this port even when no device is connected and guarantees that power will be provided upon device detection.</li></ul>
      Reference: <a href="https://www.cisco.com/en/US/docs/switches/lan/catalyst3850/software/release/3.2_0_se/multibook/configuration_guide/b_consolidated_config_guide_3850_chapter_011010.html#:~:text=static%E2%80%94Enables%20powered%2Ddevice%20detection,be%20provided%20upon%20device%20detection." target="_blank">https://www.cisco.com/en/US/docs/switches/lan/catalyst3850/software/release/3.2_0_se/multibook/configuration_guide/b_consolidated_config_guide_3850_chapter_011010.html</a></details></li> <li><p>A Cisco engineer must configure a <strong>single switch interface</strong> to meet these requirements:</p> <ul><li>accept <strong>untagged</strong> frames and place them in VLAN 20</li> <li>accept <strong>tagged</strong> frames in VLAN 30 when CDP detects a <strong>Cisco IP phone</strong></li></ul> <p>Which command set must the engineer apply?
A.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>switchport mode dynamic desirable
switchport access vlan <span class="token number">20</span>
switchport trunk allowed vlan <span class="token number">30</span>
switchport voice vlan <span class="token number">30</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>B.</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>switchport mode dynamic auto
switchport trunk native vlan <span class="token number">20</span>
switchport trunk allowed vlan <span class="token number">30</span>
switchport voice vlan <span class="token number">30</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>C.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>switchport mode access
switchport access vlan <span class="token number">20</span>
switchport voice vlan <span class="token number">30</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>D.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>switchport mode trunk
switchport access vlan <span class="token number">20</span>
switchport voice vlan <span class="token number">30</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li>Untagged traffic from the device attached to the Cisco IP Phone passes through the phone unchanged, regardless of the trust state of the access port on the phone.</li>        Reference: <a href="https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst2960/software/release/12-2_40_se/configuration/guide/scg/swvoip.pdf" target="_blank">https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst2960/software/release/12-2_40_se/configuration/guide/scg/swvoip.pdf</a></ul></details></li> <li><p>Refer to the exhibit. Which minimum configuration items are needed to enable <strong>Secure Shell version 2 access to R15</strong>?</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191930049.jpg" alt="img" style="zoom:80%;"> <p>A.</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#hostname R15</span>
R15<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#crypto key generate rsa general-keys modulus 1024</span>
R15<span class="token punctuation">(</span>config-line <span class="token comment">#line vty 0 15</span>
R15<span class="token punctuation">(</span>config-line<span class="token punctuation">)</span><span class="token comment">#transport input ssh</span>
R15<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh source-interface Fa0/0</span>
R15<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh stricthostkeycheck</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>B.</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#crypto key generate rsa general-keys modulus 1024</span>
Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh version 2</span>
Router<span class="token punctuation">(</span>config-line <span class="token comment">#line vty 0 15</span>
Router<span class="token punctuation">(</span>config-line<span class="token punctuation">)</span><span class="token comment">#transport input ssh</span>
Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh logging events</span>
R15<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh stricthostkeycheck</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>C.</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip domain-name cisco.com</span>

Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh version 2</span>
Router<span class="token punctuation">(</span>config-line<span class="token punctuation">)</span><span class="token comment">#line vty 0 15</span>
Router<span class="token punctuation">(</span>config-line<span class="token punctuation">)</span><span class="token comment">#transport input all</span>
Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh logging events</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>D.</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#hostname R15</span>
R15<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip domain-name cisco.com</span>

R15<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip ssh version 2</span>
R15<span class="token punctuation">(</span>config-line<span class="token punctuation">)</span><span class="token comment">#line vty 0 15</span>
R15<span class="token punctuation">(</span>config-line<span class="token punctuation">)</span><span class="token comment">#transport input ssh</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div> <details><summary>Correct Answer</summary> <strong>D</strong> <p><em>Explanation: </em></p> <ul><li>Reference: <a href="https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/15-s/sec-usr-ssh-15-s-book/sec-secure-shell-v2.html" target="_blank">https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/15-s/sec-usr-ssh-15-s-book/sec-secure-shell-v2.html</a></li></ul></details></li> <li><p>Refer to the exhibit. Users need to connect to the wireless network with IEEE 802.11r-compatible devices. <strong>The connection must be maintained as users travel between floors or to other areas in the building</strong>. What must be the configuration of the connection?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191704415.png" alt="img"></p> <p>A. Select the WPA Policy option with the CCKM option.</p> <p>B. Disable AES encryption.</p> <p>C. Enable Fast Transition and select the FT 802.1x option.</p> <p>D. Enable Fast Transition and select the FT PSK option.</p> <details><summary>Correct Answer</summary> <strong>D</strong> <p><em>Explanation: </em></p> <ul><li>Reference: <a href="https://www.cisco.com/c/dam/en/us/td/docs/wireless/controller/technotes/80211r-ft/b-80211r-dg.html" target="_blank">https://www.cisco.com/c/dam/en/us/td/docs/wireless/controller/technotes/80211r-ft/b-80211r-dg.html</a></li></ul></details></li> <li><p>Refer to the exhibit. How should the configuration be updated to <strong>allow PC1 and PC2 access to the Internet</strong>?</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208800.jpeg" alt="img" style="zoom:80%;"> <p>A. Modify the configured number of the second access list.</p> <p>B. Add either the ip nat {inside|outside} command under both interfaces.</p> <p>C. Remove the overload keyword from the ip nat inside source command.</p> <p>D. Change the ip nat inside source command to use interface GigabitEthernet0/0.</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li>Reference: <a href="https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/ipaddr_nat/configuration/15-mt/nat-15-mt-book/iadnat-addr-consv.html" target="_blank">https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/ipaddr_nat/configuration/15-mt/nat-15-mt-book/iadnat-addr-consv.html</a></li></ul></details></li> <li><p>Refer to the exhibit. An engineer is configuring an <strong>EtherChannel using LACP between Switches 1 and 2</strong>. Which configuration must be applied so that <strong>only Switch 1 sends LACP initiation packets</strong>?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191714277.webp" alt="img"></p> <p>A.  Switch1 (config-if)#channel-group 1 mode on</p> <p>Switch2(config-if)#channel-group 1 mode passive</p> <p>B.  Switch1(config-if)#channel-group 1 mode passive</p> <p>Switch2(config-if)#channel-group 1 mode active</p> <p>C.  Switch1(config-if)#channel-group 1 mode active</p> <p>Switch2(config-if)#channel-group 1 mode passive</p> <p>D.  Switch1(config-if)#channel-group 1 mode on</p> <p>Switch2(config-if)#channel-group 1 mode active</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li>Reference: <a href="https://www.cisco.com/en/US/docs/switches/metro/me3600x_3800x/trash/swethchl.html#:~:text=LACP%20facilitates%20the%20automatic%20creation,the%20capabilities%20of%20each%20port." target="_blank">https://www.cisco.com/en/US/docs/switches/metro/me3600x_3800x/trash/swethchl.html</a></li></ul></details></li> <li><p>Refer to the exhibit. Which switch becomes the <strong>root of a spanning tree</strong> for VLAN 20 if all links are of equal speed?</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191715012.jpg" alt="img" style="zoom:80%;"> <p>A. SW1 = 24596 0018.184e.3c00</p> <p>B. SW2 = 28692 004a.14e5.4077</p> <p>C. SW3 = 32788 0022.55cf.dd00</p> <p>D. SW4 = 64000 0041.454d.407f</p> <details><summary>Correct Answer</summary> <strong>A</strong> <p><em>Explanation: </em></p> <ul><li>Reference: <a href="https://en.wikipedia.org/wiki/Spanning_Tree_Protocol#:~:text=The%20root%20bridge%20of%20the,priority%2032768%20and%20MAC%200200.0000.">https://en.wikipedia.org/wiki/Spanning_Tree_Protocol</a></li></ul></details></li> <li><p>Refer to the exhibit. Packets received by the router from BGP enter via a serial interface at 209.165.201.1. Each route is present within the routing table. Which interface is used to forward traffic with a <strong>destination IP of 10.1.1.19</strong>?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208073.png" alt="image-20220703202034988"></p> <p>A. F0/4</p> <p>B. F0/0</p> <p>C. F0/1</p> <p>D. F0/3</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. Users on existing VLAN 100 can reach sites on the Internet. Which action must the administrator take to <strong>establish connectivity to the Internet for users in VLAN 200</strong>?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191720832.jpg" alt="img"></p> <p>A. Define a NAT pool on the router.</p> <p>B. Configure static NAT translations for VLAN 200.</p> <p>C. Configure the ip nat outside command on another interface for VLAN 200.</p> <p>D. Update the NAT_INSIDE_RANGES ACL</p> <details><summary>Correct Answer</summary> <strong>D</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. Host A sent a data frame destined for host D. What does the switch do when it receives the frame from host A?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191723097.jpg" alt="img"></p> <p>A. It drops the frame from the switch CAM table.</p> <p>B. It floods the frame out of all ports except port Fa0/1.</p> <p>C. It shuts down the port Fa0/1 and places it in err-disable mode.</p> <p>D. It experiences a broadcast storm</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Which protocol uses the SSL?</p> <p>A. HTTP</p> <p>B. SSH</p> <p>C. HTTPS</p> <p>D. Telnet</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li>SSL stands for Secure Sockets Layer and, in short, it's the standard technology for keeping an internet connection secure and safeguarding any sensitive data that is being sent between two systems, preventing criminals from reading and modifying any information transferred, including potential personal details. The two systems can be a server and a client (for example, a shopping website and browser) or server to server (for example, an application with personal identifiable information or with payroll information).</li> <li>HTTPS (Hyper Text Transfer Protocol Secure) appears in the URL when a website is secured by an SSL certificate. The details of the certificate, including the issuing authority and the corporate name of the website owner, can be viewed by clicking on the lock symbol on the browser bar.</li> <li>TLS (Transport Layer Security) is just an updated, more secure, version of SSL. We still refer to our security certificates as SSL because it is a more commonly used term, but when you are buying SSL from DigiCert you are actually buying the most up to date TLS certificates with the option of ECC, RSA or DSA encryption.</li></ul></details></li> <li><p>Which value is the <strong>unique identifier that an access point uses to establish and maintain wireless connectivity to wireless network devices</strong>?</p> <p>A. VLANID</p> <p>B. SSID</p> <p>C. RFID</p> <p>D. WLANID</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li>An SSID is a unique identifier used by a client to establish a connection to a particular wireless network. When devices within a network need to communicate with each other, they need to identify the WLAN. Identification is handled through a unique value given to that WLAN, known as the SSID.</li></ul></details></li> <li><p>A network engineer is configuring <strong>a switch so that it is remotely reachable via SSH</strong>. The engineer has already configured the host name on the router. Which additional command must the engineer configure before <strong>entering the command to generate the RSA key</strong>?</p> <p>A. password password</p> <p>B. crypto key generate rsa modulus 1024</p> <p>C. ip domain-name domain</p> <p>D. ip ssh authentication-retries 2</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. Switch A is newly configured. All VLANs are present in the VLAN database. The IP phone and PC A on Gi0/1 must be configured for the appropriate VLANs to establish connectivity between the PCs. Which command set fulfills the requirement?</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208423.png" alt="image-20220703202433028" style="zoom:150%;"> <p>A.  SwitchA(config-if)#switchport mode access</p> <p>SwitchA(config-if)#switchport access vlan 50</p> <p>SwitchA(config-if)#switchport voice vlan 51</p> <p>B.  SwitchA(config-if)#switchport mode access</p> <p>SwitchA(config-if)#switchport access vlan 50</p> <p>SwitchA(config-if)#switchport voice vlan untagged</p> <p>C.  SwitchA(config-if)#switchport mode trunk</p> <p>SwitchA(config-if)#switchport trunk allowed vlan add 50, 51</p> <p>SwitchA(config-if)#switchport voice vlan dot1p</p> <p>D.  SwitchA(config-if)#switchport mode trunk</p> <p>SwitchA(config-if)#switchport trunk allowed vlan 50, 51</p> <p>SwitchA(config-if)#mls qos trust cos</p> <details><summary>Correct Answer</summary> <strong>A</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Which QoS traffic handling technique <strong>retains excess packets in a queue and reschedules these packets for later transmission when the configured maximum bandwidth has been surpassed</strong>?</p> <p>A. weighted random early detection</p> <p>B. traffic policing</p> <p>C. traffic shaping</p> <p>D. traffic prioritization</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li>Shaping: retains excess packets in a queue and then schedules the excess for later transmission over increments of time. When traffic reaches the maximum configured rate, additional packets are queued instead of being dropped to proceed later.</li></ul>
      Reference: <a href="https://www.cisco.com/c/en/us/support/docs/quality-of-service-qos/qos-policing/19645-policevsshape.html" target="_blank">https://www.cisco.com/c/en/us/support/docs/quality-of-service-qos/qos-policing/19645-policevsshape.html</a></details></li> <li><p>What is the function of the <strong>controller</strong> in a software-defined network?</p> <p>A. multicast replication at the hardware level</p> <p>B. fragmenting and reassembling packets</p> <p>C. making routing decisions</p> <p>D. forwarding packets</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li>An SDN controller is an application in a software-defined networking (SDN) architecture that manages flow control for improved network management and application performance. The SDN controller platform typically runs on a server and uses protocols to tell switches where to send packets.</li></ul>
      Reference: <a href="https://www.techtarget.com/searchnetworking/definition/SDN-controller-software-defined-networking-controller#:~:text=An%20SDN%20controller%20is%20an,switches%20where%20to%20send%20packets." target="_blank">https://www.techtarget.com/searchnetworking/definition/SDN-controller-software-defined-networking-controller</a></details></li> <li><p>Refer to the exhibit. <strong>R1 learns all routes via OSPF</strong>. Which command configures a <strong>backup static route on R1 to reach the 192.168.20.0/24 network via R3</strong>?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208489.png" alt="image-20220703202618962"></p> <p>A. R1(config)#ip route 192.168.20.0 255.255.0.0 192.168.30.2</p> <p>B. R1(config)#ip route 192.168.20.0 255.255.255.0 192.168.30.2 90</p> <p>C. R1(config)#ip route 192.168.20.0 255.255.255.0 192.168.30.2 111</p> <p>D. R1(config)#ip route 192.168.20.0 255.255.255.0 192.168.30.2</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Which wireless security protocol relies on <strong>Perfect Forward Secrecy</strong>?</p> <p>A. WPA3</p> <p>B. WPA</p> <p>C. WEP</p> <p>D. WPA2</p> <details><summary>Correct Answer</summary> <strong>A</strong> <p><em>Explanation: </em></p> <ul><li>WPA3 (Wi-Fi Protected Access 3) is the newest wireless security protocol designed to encrypt data using a frequent and automatic encryption type called Perfect Forward Secrecy.</li>
          Reference: <a href="https://www.avast.com/c-wep-vs-wpa-or-wpa2#:~:text=WPA3%20(Wi%2DFi%20Protected%20Access,type%20called%20Perfect%20Forward%20Secrecy." target="_blank">https://www.avast.com/c-wep-vs-wpa-or-wpa2</a></ul></details></li> <li><p>Refer to the exhibit. Router R1 resides in OSPF Area 0. After updating the R1 configuration to influence the paths that it will use to direct traffic, an engineer verified that each of the four Gigabit interfaces has the same route to 10.10.0.0/16. Which interface will R1 choose to send traffic to reach the route?</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R1<span class="token comment">#show run</span>
router ospf <span class="token number">1</span>
auto-cost referenge -bandwidth <span class="token number">100000</span>
interface GigabitEthecnet0/0
bandwidth <span class="token number">100000</span>
<span class="token operator">!</span>
interface GigabitEthernet0/ <span class="token number">1</span>
bandwidth <span class="token number">100000000</span>
<span class="token operator">!</span>
interface GigabitEthernet0/2
<span class="token function">ip</span> ospf cost <span class="token number">100</span>
<span class="token operator">!</span>
interface GigabitEthernet0/3
<span class="token function">ip</span> ospf cost <span class="token number">1000</span>
end
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><p>A. GigabitEthernet0/0</p> <p>B. GigabltEthornet0/1</p> <p>C. GigabitEthernet0/2</p> <p>D. GigabitEthernet0/3</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Which two spanning-tree states are bypassed on an interface running <strong>PortFast</strong>? (Choose two.)</p> <p>A. disabled</p> <p>B. listening</p> <p>C. forwarding</p> <p>D. learning</p> <p>E. blocking</p> <details><summary>Correct Answer</summary> <strong>BD</strong> <p><em>Explanation: </em></p> <ul><li>The PortFast feature is introduced to avoid network connectivity issues. These issues are caused by delays in STP enabled ports moving from blocking-state to forwarding-state after transitioning from the listening and learning states. </li></ul></details></li> <li><p>Which Layer 2 switch function encapsulates packets for different VLANs so that the packets traverse the same port and maintain traffic separation between the VLANs?</p> <p>A. VLAN numbering</p> <p>B. VLAN DSCP</p> <p>C. VLAN tagging</p> <p>D. VLAN marking</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>What is an expected outcome when <strong>network management automation</strong> is deployed?</p> <p>A. A distributed management plane must be used.</p> <p>B. Software upgrades are performed from a central controller</p> <p>C. Complexity increases when new device configurations are added</p> <p>D. Custom applications are needed to configure network devices</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. Packets received by the router from BGP enter via a serial interface at 209.165.201.10. Each route is present within the routing table. Which interface is used to forward traffic with a destination IP of 10.10.10.24?</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>EIGRP <span class="token number">10.10</span>.10.0/24<span class="token punctuation">[</span><span class="token number">90</span>/1441<span class="token punctuation">]</span> via F0/10
EIGRP <span class="token number">10.10</span>.10.0/24<span class="token punctuation">[</span><span class="token number">90</span>/144<span class="token punctuation">]</span> via F0/11
EIGRP <span class="token number">10.10</span>.10.0/24 <span class="token punctuation">[</span><span class="token number">90</span>/1441<span class="token punctuation">]</span> via F0/12
OSPF <span class="token number">10.10</span>.10.0/24<span class="token punctuation">[</span><span class="token number">110</span>/20<span class="token punctuation">]</span>via F0/13
OSPF <span class="token number">10.10</span>.10.0/24<span class="token punctuation">[</span><span class="token number">110</span>/30<span class="token punctuation">]</span>via F0/14
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>A. F0/10</p> <p>B. F0/11</p> <p>C. F0/12</p> <p>D. F0/13</p> <details><summary>Correct Answer</summary> <strong>B</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. An engineer has started to configure replacement switch SW1. To verify part of the configuration, the engineer issued the commands as shown and noticed that the <strong>entry for PC2 is missing</strong>. Which change must be applied to SW1 so that PC1 and PC2 communicate normally?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207192208536.jpeg" alt="img"></p> <p>A.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface fa0/2</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no switchport mode trunk</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no switchport trunk allowed vlan 3</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport mode access</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>B.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface fa0/1</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no switchport access vlan 2</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk native vlan 2</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk allowed vlan 3</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>C.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface fa0/1</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no switchport access vlan 2</span>

SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#switchport trunk allowed vlan 2</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>D.</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface fa0/2</span>
SW1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#no switchport access vlan 2</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div> <details><summary>Correct Answer</summary> <strong>A</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Refer to the exhibit. Which action must be taken to <strong>ensure that router A is elected as the DR for OSPF area 0</strong>?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207191754588.webp" alt="img"></p> <p>A. Configure the OSPF priority on router A with the lowest value between the three routers.</p> <p>B. Configure router B and router C as OSPF neighbors of router A.</p> <p>C. Configure the router A interfaces with the highest OSPF priority value within the area.</p> <p>D. Configure router A with a fixed OSPF router ID</p> <details><summary>Correct Answer</summary> <strong>C</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></li> <li><p>Which two actions influence the EIGRP route selection process? (Choose two)</p></li></ol> <p>​	A.The router calculates the reported distance by multiplying the delay on the exiting Interface by 256.</p> <p>​	B.The router calculates the best backup path to the destination route and assigns it as the feasible successor-.</p> <p>​	C.The router calculates the feasible distance of all paths to the destination route</p> <p>​	D.The advertised distance is calculated by a downstream neighbor to inform the local router of the bandwidth on the link</p> <p>​	E.The router must use the advertised distance as the metric for any given route</p> <details><summary>Correct Answer</summary> <strong>BC</strong> <p><em>Explanation: </em></p> <ul><li></li></ul></details></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/main/docs/40.网络运维/05.CCNA/20.CCNA题库/11.CCNA 200-301 题库_501-530.md" t
