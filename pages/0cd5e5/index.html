muLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">TCP IP 协议簇<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="tcp-ip-协议簇"><a href="#tcp-ip-协议簇" class="header-anchor">#</a> TCP/IP 协议簇</h1> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151900569.png" alt="image-20220615190031467"></p> <h2 id="tcp-ip四层模型的分层和作用"><a href="#tcp-ip四层模型的分层和作用" class="header-anchor">#</a> TCP/IP四层模型的分层和作用</h2> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151907527.png" alt="查看源图像" style="zoom:50%;"> <blockquote><p>作用参考ISO/OSI七层模型</p></blockquote> <h3 id="三、tcp-ip协议中常用的网络命令"><a href="#三、tcp-ip协议中常用的网络命令" class="header-anchor">#</a> 三、TCP/IP协议中常用的网络命令</h3> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">ping</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><h3 id="四、网络抓包工具"><a href="#四、网络抓包工具" class="header-anchor">#</a> 四、网络抓包工具</h3> <p>wireshark</p> <h2 id="ipv4协议"><a href="#ipv4协议" class="header-anchor">#</a> IPv4协议</h2> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623091803068.png" alt="image-20220623091803068" style="zoom:60%;"> <blockquote><h5 id="地址分类"><a href="#地址分类" class="header-anchor">#</a> 地址分类:</h5> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623095637294.png" alt="image-20220623095637294" style="zoom:80%;"> <ul><li><p>长度为 32 位（4 个Byte, 或者 Octet）。地址由网络和主机部分组成，这取决于子网掩码(Subnet mask)。根据地址的前几位，可定义各种地址类：A、B、C、D 或 E。</p></li> <li><p>IPv4 地址的总数为 4 294 967 296, 即 2^32^ = 42.9亿 = 4.3 * 10^9^</p></li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623095909936.png" alt="image-20220623095909936" style="zoom:87%;"> <h3 id="ipv4编址方案"><a href="#ipv4编址方案" class="header-anchor">#</a> IPv4编址方案:</h3> <blockquote><p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/v2-13c1daebb7b5706a847f4e727d9dacde_r.jpg" alt="preview"></p> <ul><li><p><strong>A类 IP/8</strong>(<em>A类IP地址的首个二进制位必须是0开头: 1~126</em>):</p> <ul><li>起始: (0000 0001).0.0.1   --&gt; 十进制: <code>1.0.0.1/8</code></li> <li>终止: (0111 1110).255.255.254  --&gt; 十进制: <code>126.255.255.254/8</code></li> <li>最大网络数: 2^7^ -2 =126; 每个子网内最大主机数: 2^24^ -2</li></ul> <blockquote><ul><li>0.0.0.0/8 ~ 0.255.255.255/8 为保留地址</li> <li>127.0.0.0/8 ~ 127.255.255.255/8, designated for <a href="https://en.wikipedia.org/wiki/Loopback" target="_blank" rel="noopener noreferrer">loopback<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> and cannot be assigned to a network
<ul><li>127.0.0.1 等效于<strong>localhost</strong>或<strong>本机IP</strong>。 一般用于测试使用。
<ul><li>ping 127.0.0.1来测试本机TCP/IP是否正常。</li> <li>http://127.0.0.1:8080 等效 http://localhost:8080</li></ul></li></ul></li></ul></blockquote></li> <li><p><strong>B类 IP/16</strong>(<em>B类IP地址的二进制位必须是10开头: 128~191</em>):</p> <ul><li>起始: (1000 0000).(0000 0000).0.1  --&gt; 十进制:<code>128.0.0.1/16</code></li> <li>终止: (1011 1111).(1111 1111).255.254  --&gt; 十进制: <code>191.255.255.254/16</code></li> <li>最大网络数: 2^14^; 每个子网内最大主机数: 2^16^ -2= 65536 - 2 =65534</li></ul></li> <li><p><strong>C类 IP/24</strong>(<em>C类IP地址的二进制位必须是110开头: 192~223</em>):</p> <ul><li>起始: (1100 0000).(0000 0000).(0000 0000).1  --&gt; 十进制: <code>192.0.0.1/24</code></li> <li>终止: (1101 1111).(1111 1111).(1111 1111).254  -&gt; <code>223.255.255.254/24</code></li> <li>最大网络数: 2^21^; 每个子网内最大主机数: 2^8^ -2 = 254</li></ul></li> <li><p>D类 IP(<em>D类IP地址的二进制位必须是1110开头</em>): 作为==组播地址==</p> <ul><li>起始: (1110 0000).0.0.1 --&gt; 十进制: 224.0.0.1</li> <li>终止: (1110 1111).255.255.254 --&gt; 十进制: 239.255.255.254</li></ul></li> <li><p>E类 IP(<em>E类IP地址的二进制位必须是1111开头</em>): 作为研究保留</p> <ul><li>起始: (1111 0000).0.0.1  --&gt; 十进制: 240.0.0.1</li> <li>终止: (1111 1111).255.255.254  -&gt; 十进制: 255.255.255.254</li></ul></li></ul> <blockquote><p>“节点地址(主机号)”为全0和全1的IP地址不作指派（主机号全0表示本网络，主机号全1为广播地址）</p></blockquote> <h5 id="其中abc三类地址各包含一段私有ip范围"><a href="#其中abc三类地址各包含一段私有ip范围" class="header-anchor">#</a> 其中ABC三类地址各包含一段<code>私有IP范围</code>:</h5> <ul><li>A类 IP/8: <code>10.0.0.0</code> ~ <code>10.255.255.255</code></li> <li>B类 IP/16: <code>172.16.0.0</code> ~ <code>172.31.255.255</code></li> <li>C类 IP/24: <code>192.168.0.0</code> ~ <code>192.168.255.255</code></li></ul> <h5 id="其他特殊ip"><a href="#其他特殊ip" class="header-anchor">#</a> 其他特殊IP:</h5> <ul><li>169.254.0.0/16: 在 Windows 系统上在DCHP无法分配IP地址时, 会自动生成这个链路本地地址;</li> <li>192.0.2.0/24: 保留地址, Test-Net地址;</li> <li>127.0.0.1: 保留用于环回测试。表示当前节点，让节点能够给自己发送测试分组，而不会生成网络流量;</li> <li>所有主机位都为0时，得到的是<code>网络地址</code>;</li> <li>所有主机位都为1 时，得到的是<code>广播地址</code>;</li></ul></blockquote> <h3 id="ipv4-地址类型"><a href="#ipv4-地址类型" class="header-anchor">#</a> IPv4 地址类型</h3> <h4 id="广播地址"><a href="#广播地址" class="header-anchor">#</a> 广播地址</h4> <blockquote><p>广播消息是发送给广播域中所有主机的，其目标地址的主机位都为1。</p> <ul><li><p>对于网络地址172.16.0.0 255.255.0.0 ，其广播地址为172.16.255.255 ---- 所有主机位都为1 。</p></li> <li><p>广播也可以是发送给所有网络中的所有主机的，例如255.255.255.255。</p> <blockquote><p>对应于第二层广播: 第2层广播也叫硬件广播，它们只在当前LAN内传输，而不会穿越LAN边界(路由器)。典型的硬件地址长6B (48位)，如45:AC:24:E3:60:A5 。使用二进制表示时，该广播地址全为1，而使用十六进制表示时全为F，即FF:FF:FF:FF:FF:FF 。</p></blockquote></li></ul></blockquote> <h4 id="单播地址"><a href="#单播地址" class="header-anchor">#</a> 单播地址</h4> <blockquote><p>单播地址是分配给网络接口卡的IP地址，在分组中用作目标地址，换句话说，它将分组传输到特定IP的主机。</p> <p>==DHCP 客户端请求很好地说明了单播的工作原理==:</p> <ol><li>LAN中的某主机发送广播(其第2层目标地址为FF:FF:FF:FF:FF:FF ，而第3层目标地址为255.255.255.255 )，在LAN中寻找DHCP服务器。</li> <li>路由器知道这是发送给DHCP服务器的广播，因为其目标端口号为67 (BootP 服务器)，因此会将该请求转发到另一个LAN中的DHCP服务器。因此，如果DHCP服务器的IP地址为172.16.10.1 ，路由器将修改该广播，将其目标地址改为172.16.10.1。为让路由器提供这种服务，你需要使用命令<code>ip helper-address</code>配置接口一一这不是默认启用的服务。</li></ol></blockquote> <h4 id="组播地址"><a href="#组播地址" class="header-anchor">#</a> 组播地址</h4> <blockquote><ul><li><p>组播支持点到多点通信</p></li> <li><p>组播的关键点在于，它让多个接收方能够接收消息，却不会将消息传递给广播域中的所有主机。</p></li> <li><p>组播这样工作:将消息或数据发送给IP组播地址，路由器将分组的副本从每个这样的接口转发出去(这不同于广播，路由器不转发广播)，给订阅了该组播的主机。</p> <blockquote><p>从理论上说，指的是主机将收到发送给224.0.0.10 的组播分组(EIGRP 分组，只有运行EIGRP协议的路由器才会读取它)。广播型LAN (以太网是一种广播型多路访问LAN 技术)中的所有主机都将接收这种帧，读取其目标地址，然后马上丢弃除非它是组播组的成员。这节省了PC的处理周期，但没有节省LAN带宽。如果不小心实现，组播有时会导致严重的LAN 拥塞。</p></blockquote></li></ul></blockquote> <h3 id="子网掩码以及子网划分"><a href="#子网掩码以及子网划分" class="header-anchor">#</a> 子网掩码以及子网划分</h3> <blockquote><h6 id="子网掩码的作用"><a href="#子网掩码的作用" class="header-anchor">#</a> 子网掩码的作用</h6> <ul><li><p>子网掩码用于将IP地址划分为网络号和主机号两部分; IP地址必须结合子网掩码才具有意义;</p></li> <li><p>子网掩码只要是<strong>连续的二进制&quot;1&quot;</strong>+<strong>连续的二进制&quot;0&quot;</strong>,就是合理的子网掩码;</p></li> <li><p>与子网掩码中二进制&quot;1&quot;对应的IP地址中的地址位,代表<strong>网络号</strong>位; 与子网掩码中二进制&quot;0&quot;对应的IP地址中的地址位,代表<strong>主机号</strong>位;</p></li> <li><p><strong>标准子网掩码</strong>:</p> <ul><li>A类子网: 255.0.0.0      --&gt; IP地址/8</li></ul></li> <li><p>B类子网: 255.255.0.0    --&gt; IP地址/16</p></li> <li><p>C类子网: 255.255.255.0  --&gt; IP地址/24</p></li></ul> <div class="language- extra-class"><pre><code>  &lt;img src=&quot;https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20210613142114029.png&quot; alt=&quot;image-20210613142114029&quot; style=&quot;zoom: 30%;&quot; /&gt;
</code></pre></div><h5 id="子网划分-vlsm"><a href="#子网划分-vlsm" class="header-anchor">#</a> 子网划分(VLSM):</h5> <ul><li><strong>网段地址</strong>: 对应IP地址的主机号位都是0; 计算方法:把IP地址与子网掩码进行<code>按位逻辑与</code>的运算,得到的IP地址就是网段地址;</li> <li><strong>广播地址</strong>: 对应IP地址的主机号位都是1; 计算方法: 子网掩码中二进制&quot;0&quot;的部分对应于IP地址中的位全部设为&quot;1&quot;,得到的IP地址就是广播地址;</li> <li><strong>可用的主机地址个数:</strong> 若子网掩码中的主机号位的个数为n,则为 2^n -2(网络本身和广播地址各占1个IP地址);</li> <li><strong>子网个数</strong>: 此概念对应于A, B, C类子网的划分, 子网掩码中有效字节段(A(<em>看第2个字节段</em>), B(<em>看第3个字节段</em>), C类(<em>看第4个字节段</em>))的二进制&quot;1&quot;的个数为m,则为 2^m^;</li></ul></blockquote> <blockquote><p><code>ip subnet-zero</code>: 这个命令让你能够在网络设计中使用第一个子网和最后一个子网。例如， C 类子网掩码
255.255.255.192 提供了子网64 和128 (这将在本章后面详细讨论)，但配置命令ip subnet-zero 后，
将可使用子网0 、64 、128 和192。也就是说，这条命令重新划分了子网, 即让每个子网掩码提供的子网多了两个。</p></blockquote> <h4 id="c类-24-30-子网划分"><a href="#c类-24-30-子网划分" class="header-anchor">#</a> C类/24~30 子网划分</h4> <blockquote><h6 id="示例1"><a href="#示例1" class="header-anchor">#</a> 示例1:</h6> <p>172.22.141.231/26, 该IP位于哪个网段? 该网段具有多少个可用的IP地址? 广播地址是什么?</p> <p>解答:</p> <ul><li><p><code>子网掩码</code>为26: 即网络号位为26位, 主机号位为6位, 此网段<em>可用的主机IP地址为 2^6 -2 = 62个</em></p></li> <li><p><em>子网个数</em>: 26&gt;24, 对应着 ==C类的子网划分==; 前3个字节段都是255, 是固定的. 有效段为D段 1100 0000, &quot;1&quot;的个数为 m=2,子网个数为 2^m^ = <em>4</em></p></li> <li><p>IP地址转换为二进制:  172. 22.141.1110 0111</p> <p>子网掩码转换为二进制: 255.255.255.1100 0000</p> <p><em>网段地址</em>: 将<code>IP地址</code>与<code>子网掩码</code>进行按位逻辑与运算: IP地址的 A段.B段.C段(都一样).1100 0000, 转换为十进制即 <em>172.22.141.192</em>;</p> <p><em>广播地址</em>: 将IP地址的所有主机号位都设为&quot;1&quot;: 172.22.141.(11[11 1111])即 <em>172.22.141.255</em></p></li></ul> <h6 id="示例2"><a href="#示例2" class="header-anchor">#</a> 示例2:</h6> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220616171955039.png" alt="image-20220616171955039" style="zoom:45%;"></blockquote> <h4 id="b类-16-30-子网划分"><a href="#b类-16-30-子网划分" class="header-anchor">#</a> B类/16~30 子网划分</h4> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705184347440.png" alt="image-20220705184347440"></p> <blockquote><p>示例: 网络地址= 172.16.0.0/18,</p> <ul><li><p>子网掩码 255.255.192.0 (/18)</p></li> <li><p>多少个子网? 2^(18-16)^ =4 。</p></li> <li><p>每个子网多少台主机? 2^(32-18)^ - 2 = 16382</p></li> <li><p>有哪些合法的子网? 块大小为<code>256 - 192 = 64</code>，因此子网为0 、64 、128 和192。鉴于子网划分是在第三个字节中进行的，因此子网号实际上为0.0 、64.0 、128.0 和192札如下面所示。</p></li> <li><p>每个子网的广播地址是什么?</p></li> <li><p>合法的主机地址是什么?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220706123733737.png" alt="image-20220706123733737"></p></li></ul> <p>问题: IP地址172.16.50.10 255.255.224.0 (/19) 属于哪个子网?该子网的广播地址是多少?
答案: 256 - 224 = 32 ，因此子网为0.0 、32.0 、64.0 等。所属的子网为172.16.32.0, 而其广播地址为172.16.63.255 ，因为下一个子网为64.0 。</p></blockquote> <h4 id="a类-8-30-子网划分"><a href="#a类-8-30-子网划分" class="header-anchor">#</a> A类/8~30 子网划分</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220706123820014.png" alt="image-20220706123820014" style="zoom:90%;"> <blockquote><p>示例1: 255.255.0.0 (/16)</p> <ul><li><p>多少个子网? 2^(16-8)^ = 256 。</p></li> <li><p>每个子网的主机数? 2^(32-16)^ -2 = 65534</p></li> <li><p>有哪些合法的子网? 只考虑第二个字节。256-255= 1 ，因此子网为10.0.0.0, 10.1.0.0, 10.2.0.0, 10.3.0.0, ……, 10.255.0.0 。</p></li> <li><p>每个子网的广播地址是什么?</p></li> <li><p>合法的主机地址是什么?</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220706124627464.png" alt="image-20220706124627464"></p></li></ul> <p>练习: 主机IP 地址: 10.1.3.65/23</p> <ul><li>首先，如果不知道/23 对应的子网掩码，你就回答不了这个问题。它对应的子网掩码为
255.255.254.0。这里感兴趣的字节为第三个。块大小为<code>256 - 254</code> = 2 ，因此第三个字节的子网号为0 、2 、4 、6等。在这个问题中，主机位于子网2.0 中，而下一个子网为4.0, 因此该子网的广播地址为10.1.3 .255。<code>10.1.2.1</code>-<code>10.1.3.254</code> 是该子网中合法的主机地址范围。</li></ul></blockquote> <h3 id="变长子网掩码-vlsm"><a href="#变长子网掩码-vlsm" class="header-anchor">#</a> 变长子网掩码(VLSM)</h3> <blockquote><ul><li><p>分类路由选择: 所有的主机和路由器接口都使用相同的子网掩码;</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220706133925715.png" alt="image-20220706133925715"></p></li> <li><p>如果要提高该网络地址的使用效率, 我们必须给每个路由器接口分配不同的子网掩码, 即<code>VLSM</code>;</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220706133935771.png" alt="image-20220706133935771"></p> <ul><li><p>每个路由器接口上可使用长度不同的子网掩码。如果在WAN链路上使用/30. 并在各个LAN 上分别使用/27 、/28 和/29. 则WAN 链路将有两个主机地址，而各个LAN分别有30 、14和6个主机地址，这极大地提高了IP地址的利用率, 尤其是 WAN IP地址.</p></li> <li><p>通过在网络特定的区域使用连续的地址块，你可轻松地对网络进行汇总，从而最大限度地减少路由选择协议通舍的路由更新。若只需在大楼之间通告一条汇总路由就能达到相同效果，可以大大地提高效率.</p> <blockquote><h6 id="路由汇总是什么"><a href="#路由汇总是什么" class="header-anchor">#</a> 路由汇总是什么?</h6> <p>汇总也叫起网化(supemetting)，它以最高效的方式提供路由更新，这是通过在一个通告中通告众多路由，而不是分别通告它们来实现的。这节省了大量带宽，并最大限度地降低了路由嚣的处理负担。通过使用成块的地址(别忘了，前面列出的块大小适用于各种网络)，我们可配置汇总路由，让网络的性能得到极大改善。</p></blockquote></li></ul></li></ul></blockquote> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220706135447056.png" alt="image-20220706135447056"></p> <h3 id="cidr"><a href="#cidr" class="header-anchor">#</a> CIDR:</h3> <blockquote><ul><li><p>Classless Inter-Domain Routing(无类别域间路由), VLSM的反向运算;</p></li> <li><p>汇总也叫路由聚合，让路由选择协议能够用一个地址通告众多网络，旨在缩小路由器中路由选择表的规模，以节省内存，并缩短E 对路由选择表进行分析以找出前往远程网络的路径所需的时间。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220706141409719.png" alt="image-20220706141409719"></p></li></ul></blockquote> <blockquote><p>C类的CIDR</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705182931790.png" alt="image-20220705182931790"></p> <p>路由聚合示例: B类</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220616171336269.png" alt="image-20220616171336269" style="zoom:50%;"></blockquote> <h3 id="排除-ip编址故障"><a href="#排除-ip编址故障" class="header-anchor">#</a> 排除 IP编址故障</h3> <blockquote><p>==思科推荐的4 个故障排除步骤==:</p> <ol><li>打开命令提示符窗口，并<code>ping 127.0.0.1</code>。这是诊断(环回)地址，如果ping 操作成功，则说明IP栈初始化了。如果失败，说明IP栈出现了故障，你需要在主机上重新安装TCP/IP。</li> <li>在命令提示符窗口中， <code>ping 当前主机的IP地址</code>。如果成功，则说明网络接口卡(NIC) 正常; 如果失败，则说明NIC出现了故障。这一步成功并不意味着电缆被插入了NIC，而只意味着主机的IP协议栈能够通过LAN驱动程序与NIC通信。</li> <li>在命令提示符窗口中， <code>ping 默认网关(路由器)</code>。如果成功，说明NIC连接到了网络，能够与本地网络通信。如果失败，则说明本地物理网络出现了故障，该故障可能位于NIC到路由器之间的任何地方。</li> <li>如果第(1)步至第(3)步都成功了，请尝试<code>ping 远程服务器</code>。如果成功，你便可确定本地主机和远程服务器能够进行IP通信，且远程物理网络运行正常。</li> <li>如果第(1)步至第(4)步成功了，但用户仍不能与服务器通信，则可能存在某种名称解析问题，需要检查<code>域名系统(DNS)</code>设置。如果ping 远程服务器时失败，你便可确定存在某种远程物理网络问题，需要对服务器执行第(1)步~第(3)步操作，直到找出故障根源。</li></ol></blockquote> <blockquote><p>==基本命令==:</p> <ul><li><p><code>ping</code>: 使用<code>ICMP请求</code>和<code>应答</code>进行测试，检查网络中节点的IP栈是否已被初始化并处于活动状态。</p></li> <li><p><code>traceroute</code> 使用<code>TTL超时</code>和<code>ICMP错误消息</code>，显示前往某个网络目的地时经历的路径上的所有路由器。该命令不能在windows系统中使用。</p></li> <li><p><code>show ip arp</code> 功能与arp -a 相同，但用于在思科路由器中显示ARP表;</p></li> <li><p><code>ipconfig /all</code> 只能在命令提示符窗口中使用，显示PC 的网络配置。</p></li> <li><p><code>tracert</code> 功能与traceroute 相同，是一个Microsoft Windows 命令，在思科路由器上不管用。</p></li> <li><p><code>arp -a</code> 在WindowsPC 中显示IP地址到MAC地址的映射。</p></li></ul></blockquote> <blockquote><p>==其他命令==:</p> <ul><li><p><code>debug</code>: 只可在思科IOS 特权模式下运行的、用于故障排除的命令。它常用于显示各种路由器操作的信息以及由路由器产生或接收到的与流量相关的信息，此外还包括出错信息。此命令会影响设备处理互联网络中分组的能力, <code>debug all</code>的影响会非常严重. 如果路由器的CPU使用率已经达到了50%或更高，那么再使用debug all 命令就是一个十分不明智的举动，除非你真的想看到路由器是如何崩溃的!</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#debug ?</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div></li></ul></blockquote> <h2 id="ipv6"><a href="#ipv6" class="header-anchor">#</a> IPv6</h2> <h3 id="介绍"><a href="#介绍" class="header-anchor">#</a> 介绍:</h3> <p>![image-20220630150318255](C:\Users\Jonas Wolfxin\AppData\Roaming\Typora\typora-user-images\image-20220630150318255.png)</p> <blockquote><ul><li><p>长度为 128 位（16 个Byte）, 或者 8个 Hextet*(16 bit)*(<em>4个十六进制数 为 1个 Hextet(2 Bytes)</em>) 。基本体系结构的网络部分为 64 位，主机部分为 64 位。通常，IPv6 地址（或其部分）的主机部分将派生自 MAC 地址或其他接口标识。</p></li> <li><p>IPv6地址总数量: 2^128^ = 3.4 * 10^38^</p></li> <li><p>根据子网前缀，IPv6 的体系结构比 IPv4 的体系结构更复杂。IPv6 地址的数目比 IPv4 地址的数目大 10^28^倍。</p></li> <li><p>IPv6 地址的文本格式为 xxxx:xxxx:xxxx:xxxx:xxxx:xxxx:xxxx:xxxx，一共8个16bit段, 也即32个十六进制数(1个十六进制数是 4 bit)。</p></li> <li><p>可省略前导零。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623135337200.png" alt="image-20220623135337200" style="zoom:80%;"></li> <li><p>可且<strong>仅可使用一次</strong>双冒号（::），用于指定<em>任意数目</em>的 0 位。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623135426137.png" alt="image-20220623135426137" style="zoom:80%;"></li> <li><p>IPv6可以内嵌IPv4, 例如，::ffff:10.120.78.40 表示 IPv4 映射的 IPv6 地址。IPv4 占据 xxxx:xxxx,, 即2个Hextet, 也即8个十六进制数。</p></li> <li><p>使用Web 浏览器连接到IPv6 设备的HITP 连接时，必须将IPv6 地址用方括号括起。为什么呢?因为冒号已被浏览器用来指定端口号。如果不用方括号将地址括起，浏览器将无法识别地址。</p> <p>![image-20220630150459050](C:\Users\Jonas Wolfxin\AppData\Roaming\Typora\typora-user-images\image-20220630150459050.png)</p></li> <li><p>IPv4 环回地址为127.0.0.1.而IPv6 环回地址为::1</p></li> <li></li></ul></blockquote> <h3 id="ipv6的分类"><a href="#ipv6的分类" class="header-anchor">#</a> IPv6的分类</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623135655198.png" alt="image-20220623135655198" style="zoom:80%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623095058115.png" alt="image-20220623095058115" style="zoom:67%;"> <blockquote><ul><li><p>==Global Unicast==地址: <code>2000::/3 或者 3000::/3</code>; 全局单播地址是可路由的。</p></li> <li><p>==Unique Local==: <code>FC00::/7 或者 FD00::/7</code>; 将单播地址用作目标地址的分组被传输到一个接口。为均衡负载，可将同一个地址分配给多个接口。</p></li> <li><p>==Link Local==: <code>FE80::/10</code>; 等同于Windows自动配置的IP地址169.254.x.x; 链路本地地址允制为召开会议而组建临时LAN ，或创建小型LAN ，这些LAN不与因特网相连，但可以在本地共享文件和服务。</p></li> <li><p>==Multicast==: <code>FF00::/8</code>; 与IPv4 中一样，将组播地址用作目标地址的分组将被传输到该地址标识的所有接口。这种地址也被称为<code>一对多地址</code></p></li> <li><p>==Anycast==: <code>2000::/3</code>;</p> <ul><li>任播地址就是Global Unicast地址;</li> <li>与组播地址类似，任意播地址也标识多个接口，但有一个很大的差别:任意播分组只被传输到一个接口一一根据路由选择距离确定的最近接口。这种地址也被称为<code>一对多个之一地址</code>;</li></ul> <blockquote><p>可给同一个接口配置链路本地地址、全局单播地址、组播地址和任意播地址。</p></blockquote></li></ul> <blockquote><p>==What is the difference between IPv6 unicast and anycast addressing?==</p> <p>An individual IPv6 unicast address is supported on a single interface on one node but an IPv6 anycast address is assigned to a group of interfaces on multiple nodes.</p></blockquote></blockquote> <blockquote><h5 id="特殊的ipv6地址"><a href="#特殊的ipv6地址" class="header-anchor">#</a> 特殊的IPv6地址:</h5> <ul><li>0:0:0:0:0:0:0:0 (:😃 相当于IPv4 地址0.0.0札通常在使用有状态DHCP 配置时，用作主机
的源地址;</li> <li>0:0:0:0:0:0:0:1 (::1) 相当于IPv4 地址127.0.0.1;</li> <li>0:0:0:0:0:0:192.168.1 00.1 在同时支持IP4 和IPv6 的网络中，从IPv4 地址转换而来的IPv6地址通常这样书写;</li> <li>3FFF:FFFF::/32 保留举例和编写文档时使用;</li> <li>2001 :0088: :/32 保留举例和编写文档时使用;</li> <li>2002::/16 保留供6to4 隧道技术使用。6to4 隧道技术是一种从IPv4 迁移到IPv6 的方法，让
IPv6 分组能够通过IPv4 网络进行传输，而无需配置显式的隧道;</li></ul></blockquote> <blockquote></blockquote> <h3 id="ipv6的优势"><a href="#ipv6的优势" class="header-anchor">#</a> IPv6的优势</h3> <blockquote><ul><li>海量地址: IPv6的地址长度为128bit, 一共 3.4 x 10^38^ 个地址;</li> <li>简化的报文头: IPv6 分组报头包含的字段减少了一半，且所有字段都与64位边界对齐，这极大地提高了效率一一相比于IPv4. 查找速度要快得多;</li> <li>层次化的编址结构: 新增的长度让地址空间可包含更多的层次，从而提供了更灵活的编址架构; 提高了路由选择的效率和可扩展性，因为可以更有效地聚合地址。</li> <li>即插即用: IPv6支持无状态地址自动配置(SLLAC), 终端接入更加简单;</li> <li>安全性提高: IPsec机制, 真实的源地址认证保证了端到端安全; 避免IPv4中的NAT破坏端到端通信的完整性;</li> <li>增强的Qos特性: 额外定义了流标签字段, 可为应用程序和终端所用, 针对特殊的服务和数据流分配特定的资源</li> <li>IPv6 还允许主机和网络有多个地址，这对亟须改善可用性的企业来说显得尤其重要。</li> <li>IPv6 还更广泛地使用了组播通信(一台设备向很多主机或一组选定的主机发送数据);</li> <li>IPv6 还支持另外两种通信:单播和任意播，其中单播与IPv4 中相同，而任意播是新增的。任意播可将同一个地址分配给多台设备，而向该地址发送数据流时，它会被路由到共享该地址的最近主机。这仅仅是开始，在15 .3 .2 节，我们会更详细地介绍各种类型的通信。</li></ul></blockquote> <h3 id="ipv6在互联网络中的运行方式"><a href="#ipv6在互联网络中的运行方式" class="header-anchor">#</a> IPv6在互联网络中的运行方式</h3> <h4 id="无状态自动配置"><a href="#无状态自动配置" class="header-anchor">#</a> 无状态自动配置</h4> <blockquote><p>自动配置是一种很有用的解决方案，让网络中的设备能够给自身分配链路本地单播地址和全局单播地址。</p> <p>==运行步骤:==</p> <ol><li><p>主机首先从路由器那里获悉前缀信息(全局前缀和子网信息): 发送一条路由器请求(Router Solicitation, RS)消息。该消息以组播方式发送给所有路由器。这实际上是一种ICMP消息，并用编号进行标识。则消息的ICMP类型为133.</p></li> <li><p>路由器使用一条路由器通告(RA) 进行应答，其中包含请求的前缀信息。RA消息也是组播分组，被发送到表示所有节点的组播地址，其IC阳类型为134. RA 消息是定期发送的，但主机发送RS 消息后，可立即得到响应</p></li> <li><p>主机再将自己的接口MAC地址(48bit)在中间插入额外的位FFFE, 然后用作接口ID(64bit)。</p></li></ol> <p>==主机或接口ID(64 bit) 的生成:==</p> <ul><li><p>在MAC 地址中间插入额外的位，即FFFE。</p></li> <li><p>插入后将采用改进的==eui-64 (扩展唯一标识符)==格式，它使用首字节的第7位来标识地址是本地唯一的还是全局唯一的:</p> <ul><li>如果这一位为1，则表示地址是全局唯一的;</li> <li>如果为0，则表示地址是本地唯一的。</li></ul> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623131728916.png" alt="image-20220623131728916" style="zoom:80%;"></li></ul></blockquote> <h5 id="案例"><a href="#案例" class="header-anchor">#</a> 案例:</h5> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/lab4.png" alt="img"></p> <p>We will <em>enable SLAAC on interface R1-e0/0</em> which will <em>receive prefix information from Router R6</em>.</p> <h6 id="step-1-enable-ipv6-routing-on-r6"><a href="#step-1-enable-ipv6-routing-on-r6" class="header-anchor">#</a> Step-1 Enable IPv6 Routing on R6</h6> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R6<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ipv6 unicast-routing</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h6 id="step-2-enable-ipv6-and-add-prefix-on-r6"><a href="#step-2-enable-ipv6-and-add-prefix-on-r6" class="header-anchor">#</a> Step-2 Enable IPv6 and Add prefix on R6:</h6> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>interface Ethernet0/0
no <span class="token function">shutdown</span>
<span class="token function">ip</span> address <span class="token number">192.168</span>.100.10 <span class="token number">255.255</span>.255.0
ipv6 address <span class="token number">2000</span>:1234:5678::6666:1/64
ipv6 <span class="token builtin class-name">enable</span>
end
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><h6 id="step-3-enable-ipv6-routing-on-r1"><a href="#step-3-enable-ipv6-routing-on-r1" class="header-anchor">#</a> Step-3 Enable IPv6 Routing on R1</h6> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ipv6 unicast-routing</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h6 id="step-4-enable-ipv6-and-configure-ipv6-auto-config-on-r1"><a href="#step-4-enable-ipv6-and-configure-ipv6-auto-config-on-r1" class="header-anchor">#</a> Step-4 Enable IPv6 and configure IPv6 auto-config on R1:</h6> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>interface Ethernet0/0
no <span class="token function">shutdown</span>
no <span class="token function">ip</span> address
ipv6 address autoconfig
ipv6 <span class="token builtin class-name">enable</span>
end
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><h6 id="result"><a href="#result" class="header-anchor">#</a> Result:</h6> <div class="language- line-numbers-mode"><pre class="language-text"><code>R1#sh ipv6 interface ethernet 0/0
Ethernet0/0 is up, line protocol is up
  IPv6 is enabled, link-local address is FE80::A8BB:CCFF:FE00:2000 
  No Virtual link-local address(es):
  Stateless address autoconfig enabled
  Global unicast address(es):
    2000:1234:5678:0:A8BB:CCFF:FE00:2000, subnet is 2000:1234:5678::/64 [EUI/CAL/PRE]
      valid lifetime 2591997 preferred lifetime 604797
  Joined group address(es):
    FF02::1
    FF02::2
    FF02::1:FF00:2000
  MTU is 1500 bytes
  ICMP error messages limited to one every 100 milliseconds
  ICMP redirects are enabled
  ICMP unreachables are sent
  ND DAD is enabled, number of DAD attempts: 1
  ND reachable time is 30000 milliseconds (using 30000)
  ND advertised reachable time is 0 (unspecified)
  ND advertised retransmit interval is 0 (unspecified)
  ND router advertisements are sent every 200 seconds
  ND router advertisements live for 1800 seconds
  ND advertised default router preference is Medium
  Hosts use stateless autoconfig for addresses.
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br></div></div><h4 id="给思科路由器配置ipv6"><a href="#给思科路由器配置ipv6" class="header-anchor">#</a> 给思科路由器配置IPv6</h4> <blockquote><p>接口配置模式下:</p> <ul><li><p>可指定一个完整的128 位IPv6 全局地址:</p> <p>执行 <code>ipv6 address 2001:db8:3c4d:1:0260:d6FF.FE73:1987/64</code>;</p></li> <li><p>也可使用eui-64 选项。eui-64 格式允许设备对其MAC地址进行转换，以生成接口ID:</p> <p>执行 <code>ipv6 address 2001:db8:3c4d:1::/64 eui-64</code></p></li></ul> <p>全局配置模式下, 执行 <code>ipv6 unicast-routing</code>, 开启IPv6的路由转发功能;</p> <p>若使接口只使用==链路本地地址==，可使用接口配置命令<code>ipv6 enable</code></p></blockquote> <h4 id="dhcpv6"><a href="#dhcpv6" class="header-anchor">#</a> DHCPv6</h4> <p>在IPv4 网络中，客户端启动时将发送一条DHCP 发现消息，以查找可给它提供所需信息的服务器。但在IPv6 中，首先发生的是RS 和RA 过程。如果网络中有DHCPv6 服务器，返回给客户端的RA 将指出DHCP 是否可用。如果没有找到路由器，客户端将发送一条DHCP 请求消息，这是一条组播消息，其目标地址为002:: 1:2 ，表示所有DHCP 代理，包括服务器和中继。思科IOS 提供了一定的DHCPv6 支持，但仅限于无状态DHCP 服务器，这意味着它没有提供地址池管理功能，且可配置的选项仅限于DNS 、域名、默认网关和SIP 服务器。</p> <h4 id="icmpv6"><a href="#icmpv6" class="header-anchor">#</a> ICMPv6</h4> <p>ICMPv6 接管了发现本地链路上其他设备的地址的任务;在IPv4中，这项任务由地址解析协议负责，但ICMPv6 将这种协议重命名为邻居发现。这个过程是使用被称为请求节点地址(solicited node address) 的组播地址完成的，每台主机连接到网络时都会加入这个组播组。为生成请求节点地址，在
FF02:0:0:0:0:1:FF/104 末尾加上目标主机的IPv6地址的最后24位。查询请求节点地址时，相应的主机</p> <h3 id="ipv6-路由选择协议"><a href="#ipv6-路由选择协议" class="header-anchor">#</a> IPv6 路由选择协议</h3> <p>所有IPv6 路由选择协议)最大的变化之一可能是，在接口配置模式下启用网络通告，而不是在路由器配置模式下使用network 命令。</p> <h4 id="ripng"><a href="#ripng" class="header-anchor">#</a> RIPng</h4> <blockquote><ul><li><p>RIPng 的主要功能与RIPv2 相同。它仍是一种<code>距离矢量胁议</code>，<code>最大跳数为15</code>，并使用<code>水平分割</code>、<code>反向抑制(poison reverse)</code>等环路避免机制，但使用<code>UDP端口521</code> 而不是UDP520。</p></li> <li><p>仍使用<code>组播</code>来发送更新，但在IPv6 中，使用的目标地址为<code>FF02::9</code>。这实际上很好，因为在RIPv2中，使用的组播地址为<code>224.0.0.9</code>;</p></li> <li><p>RIPv2 中，路由器在路由选择表中存储了前往每个网络的下一跳地址，但在RIPng 中，路由器存储的下一跳地址为<code>链路本地地址</code>，而不是全局地址。</p></li> <li><p>使用RIPng 时，可直接在接口上通告该路由选择协议，这将创建一个RIPng进程(而无需在路由器配置模式下启动RIPng 进程)，如下所示:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ipv6 rip 1 enable</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>但如果要进入路由器配置模式，以配置重分发等功能，也可以这样做，如下所示:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Routerl<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ipv6 router rip 1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul></blockquote> <h4 id="eigrpv6"><a href="#eigrpv6" class="header-anchor">#</a> EIGRPv6</h4> <blockquote><ul><li><p>EIGRPv6 也是一种高级距离矢量协议，有一些链路状态协议的特征。它也使用<code>Hello分组</code>来发现邻居，使用<code>可靠传输协议(RTP)</code> 来提供可靠的通信，并使用<code>弥散更新算法(DUAL)</code> 实现无环路快速会聚。</p></li> <li><p>Hello 和更新分组是以组播的方式发送的，与R1Png 一样， EIGRPv6 使用的组播地址的最后部分与原来相同:在IPv4 中，使用的组播地址为224.0.0.10 ，而在IPv6 中，使用的组播地址为FF02::A (A是10 的十六进制表示)。</p></li> <li><p>要启用EIGRPv6 ，需如下操作:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Router1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ipv6 router eigrp 10  # 10 自治系统(AS) 号</span>
Router1<span class="token punctuation">(</span>config-rtr<span class="token punctuation">)</span><span class="token comment">#no shutdown</span>
                                            
Router1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ipv6 eigrp 10 # 进入指定接口的配置模式</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></li></ul></blockquote> <h4 id="ospfv3"><a href="#ospfv3" class="header-anchor">#</a> OSPFv3</h4> <blockquote><ul><li><p>仍是一种链路状态路由选择协议，将整个互联网络或自治系统划分成区域，以形成层次结构;</p></li> <li><p>在OSPFv2中，默认情况下，路由器ID( 阻D)为最大的四地址(也可以手工指定它)，但在OSPFv3中，需要手工指定阳D 和区域ID ，它们仍是32 位的值，但不再默认使用E 地址，因为IPv6 地址长128 位。通过要求手工指定这些值，并将OSPF 分组报头中的IP 地址删除，使OSPFv3 几乎可用于任何网络层协议;</p></li> <li><p>在OSPFv3中，邻接关系和下一跳属性是使用链路本地地址指定的，它还使用组播来发送更新和确认:</p> <ul><li>用组播地址<strong>FF02::5 表示OSPF路由器</strong>，并用组播地址<strong>FF02::6 表示OSPF指定路由器</strong>。在OSPFv2中，与这些组播地址对应的分别是224.0.0.5和224.0.0.6 0;</li></ul></li> <li><p>可在接口配置模式下将接口及其连接的网络加入OSPF进程:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ipv6 router osfp 10</span>
Router1<span class="token punctuation">(</span>config-rtr<span class="token punctuation">)</span><span class="token comment">#router-id 1.1.1.1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li> <li><p>要配置汇总和重分发等，必须进入路由器配置模式;但配置OSPFv3 时，可不在这种模式下进行，
而可在接口模式下进行配置。
配置完接口后，将自动创建OSPF 进程。接口配置类似于下面这样:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router1<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ipv6 ospf 10 area 0.0.0.0</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>因此，只需进入每个接口，并指定进程ID 和区域即可。</p></li></ul></blockquote> <h3 id="ipv4-迁移到-ipv6"><a href="#ipv4-迁移到-ipv6" class="header-anchor">#</a> IPv4 迁移到 IPv6</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220623104136985.png" alt="image-20220623104136985" style="zoom:87%;"> <h4 id="双栈技术-isatap"><a href="#双栈技术-isatap" class="header-anchor">#</a> 双栈技术(ISATAP)</h4> <blockquote><p>允许设备同时运行IPv4 和IPv6协议栈，从而能够同时支持现有的通信和新的IPv6通信。</p></blockquote> <p>在思科路由器上配置双栈非常容易: 只需启用IPv6转发并给接口分配IPv6地址即可，如下所示:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>corp<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ipv6 unicast-routing</span>
corp<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#interface fastethernet 0/0</span>
corp<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ipv6 address 2001:db8:3c4d:l::/64 eui-64</span>
corp<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ip address 192.168.255.1 255.255.255.0</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h4 id="_6to4-隧道技术"><a href="#_6to4-隧道技术" class="header-anchor">#</a> 6to4 隧道技术</h4> <blockquote><p>如果要让两个IPv6网络通过IPv4网络进行通信，可选择这种策略。简单地说，隧道技术就是拦截要穿越IPv4网络的IPv6分组，并给它添加一个IPv4报头。</p></blockquote> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220701003651014.png" alt="image-20220701003651014"></p> <p>要创建隧道， 需要两台前面介绍过的双栈路由器，并添加一些配置， 在这些路由器之间建立一条隧道。隧道的创建非常简单，只需告诉每台路由器，隧道的起点和终点在什么地方。要在圈15-3 所示的路由器之间建立隧道，只需做如下配置:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Routerl<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int tunnel 0</span>
Routerl<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ipv6 address 2ω1:db8:1:1::1/64</span>
Routerl<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#tunnel source 192.168.30.1</span>
Routerl<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#tunnel destination 192.168.40.1</span>
Routerl<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#tunnel mode ipv6ip</span>

Rout er2<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#int tunnel 0</span>
Router2<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ipv6 address 2001:db8:2:2::1/64</span>
Router2<span class="token punctuation">(</span>config斗f<span class="token punctuation">)</span><span class="token comment">#tunnel source 192.168.40.1</span>
Rout er2<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#tunnel destination 192.168.30.1</span>
Route r2<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#tunnel mode ipv6ip</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><p>需要注意的一个要点是，如果穿越的IPv4网络包含NAT转换点， 前面创建的隧道将遭到破坏! 多年来，NAT 获得了重大改进，能够处理特定的协议和动态连接;如果没有这些改进，NAT可能破坏大部分连接。鉴于大多数NAT实现都没有考虑这种迁移策略，因此NAT会带来麻烦。但有一种解决这种问题的方案，被称为<code>Teredo</code>，借助它能够将通过隧道传输的数据流都放在UDP分组中。NAT不理会UDP分组，因此这些分组不会像其他协议分组那样遭到破坏。使用Teredo后，分组将伪装成UDP分组，从而逃过NAT破坏。</p> <h4 id="nat-pt-转换技术"><a href="#nat-pt-转换技术" class="header-anchor">#</a> NAT-PT 转换技术</h4> <blockquote><p>不同于IPv4 NAT , NAT-PT 和NAPT-PT并非用于在公有IPv6地址和私有IPv6 地址之间转换，而用于在IPv4 地址和IPv6 地址之间转换。再重申一次，仅在万不得已时才能使用它。在大多数情况下，隧道技术的效果要好得多，没有这种配置带来的麻烦和系统开销。</p></blockquote> <blockquote><p>有一种迁移策略名为NAT协议转换(NAT-PT), 只有在万不得已的情况下才使用这种方法，因为它并非很好的解决方案。使用这种解决方案时， IPv4主机只能与IPv4主机通信，而IPv6主机也只能与IPv6主机通信。NAT-PT不重新封装分组，而将分组从一种IP类型转换为另一种IP类型。</p> <p>与IPv4中的NAT一样，实现NAT-PT的方式有3种:</p> <ul><li>静态NAT-PT 提供一对一的映射，将一个IPv4 地址映射到一个IP喃地址，这类似于静态NAT;</li> <li>动态NAT-PT，它使用一个IPv4 地址池，将一个IPv4 地址映射到一个IPv6 地址;</li> <li>有端口地址转换协议转换(NAPT-PT)，它提供多对一映射，将多个IPv6地址映射到同一个IPv4地址和不同的端口号。</li></ul></blockquote> <h1 id="进程-应用层协议"><a href="#进程-应用层协议" class="header-anchor">#</a> 进程/应用层协议</h1> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705163601407.png" alt="image-20220705163601407" style="zoom:67%;"> <h2 id="telnet"><a href="#telnet" class="header-anchor">#</a> Telnet</h2> <p>终端模拟, 它让远程客户端机器(Telnet 客户端)的用户能够访问另一台机器(Telnet 服务器)的资源。</p> <p>==端口号==:</p> <ul><li>TCP 23</li></ul> <h2 id="ftp"><a href="#ftp" class="header-anchor">#</a> FTP</h2> <p>FTP(File Transfer Protocol，文件传输协议)</p> <ul><li>使用了 TCP 协议, 面向连接;</li> <li>以明文方式发送用户名和密码，根本没有加密</li></ul> <p>==功能:==</p> <ul><li><p>传输文件;</p></li> <li><p>列出和操作目录、输入文件内容以及在主机之间复制文件，而不能远程执行程序。</p></li> <li><p>通过FTP 访问主机只是第一步，随后用户必须通过身份验证登录，因为系统管理员可能使用密码和用户名来限制访问。要避开这种身份验证，可使用用户名anonymous，但这样获得的访问权将受到限制。</p></li></ul> <p>==端口号==:</p> <ul><li>TCP 21</li></ul> <h2 id="tftp"><a href="#tftp" class="header-anchor">#</a> TFTP</h2> <p>TFTP (Trivial File Transfer Protocol ，简单文件传输协议)是FTP 的简化版，</p> <ul><li>使用了 UDP 协议</li></ul> <p>==功能==:</p> <ul><li>TFTP 没有提供目录浏览功能，除发送和接收文件外什么也不能做。</li> <li>这个紧凑的小协议的开销很小，它发送的数据块比FTP 发送的小得多，</li> <li>也不像FTP 那样需要进行身份验证，因此更不安全。鉴于这种固有的安全风险，支持它的网站很少。</li></ul> <p>==端口号==:</p> <ul><li>UDP 69</li></ul> <h2 id="nfs"><a href="#nfs" class="header-anchor">#</a> NFS</h2> <p>NFS (NetworkFile System ，网络文件系统)是一种致力于文件共享的协议，让两种不同的文件系统能够互操作。其工作原理大致如下: 假设NFS服务器端软件运行在Windows服务器上，而NFS 客户端软件运行在Unix 主机上， NFS 让Windows 服务器的部分RAM 看起来像存储的是Unix 文件，可被Unix 用户使用。虽然Windows 文件系统和Unix 文件系统不同一一它们在是否区分大小写、文件名长度、安全性等方面不同，但Unix用户和Windows用户可像通常那样访问相同的文件，就像文件位于他们通常使用的文件系统中一样。</p> <h2 id="smtp"><a href="#smtp" class="header-anchor">#</a> SMTP</h2> <p>SMTP (Simple Mail Transfer Protocol ，简单邮件传输协议)</p> <ul><li>它使用假脱机(排队)的方式传递邮件。邮件到达目的地后，将被存储到设备(通常是磁盘)中。目标
端的服务器软件定期检查队列，看其中是否有邮件。发现邮件后，它将把它们投递给收件人。</li> <li>SMTP用于发送电子邮件，而 POP3 或 IMAP 用于接收邮件。</li></ul> <h2 id="pop"><a href="#pop" class="header-anchor">#</a> POP</h2> <p>POP (Post Office Protocol ，邮局协议)提供了一种对到来邮件进行存储的机制，其最新版本为POP3. 这种协议的工作原理如下:客户端设备连接到 POP3 服务器后，可下载发送给它的邮件。它不允许选择性地下载邮件，但邮件下载后，客户端/服务器交互就结束了，用户可在本地随意删除和操作邮件。接下来将介绍一种更新的标准 IMAP ，它正逐渐取代POP3 ，这是什么原因呢?</p> <p>==端口号==:</p> <ul><li>TCP 110</li></ul> <h2 id="imap4"><a href="#imap4" class="header-anchor">#</a> IMAP4</h2> <p>由于IMAP4 (Internet Message Access Protocol ，因特网消息访问协议)让你能够查看邮件头或下载邮件的一部分，因此使用它可获得亟需的安全性。</p> <p>IMAP 甚至提供了搜索命令，让你能够根据主题、邮件头或内容搜索邮件。可以想见，它提供了一些身份验证功能一一实际上它支持MIT 开发的Kerberos 身份验证方案。IMAP4 是最新的版本。</p> <h2 id="tls"><a href="#tls" class="header-anchor">#</a> TLS</h2> <p>TLS (Transport Layer Security，传输层安全)及其前身SSL (Secure Sockets Layer，安全套接字
层)都是加密协议，非常适合用于确保在线数据传输的安全，如Web浏览、即时通信、因特网传真等。它们极其相似，本书不详细介绍它们之间的差别。</p> <h2 id="sip-voip"><a href="#sip-voip" class="header-anchor">#</a> SIP (VoIP)</h2> <p>SIP (Session lnitiation Protocol ，会话发起协议)是一种非常流行的信令胁议，用于建立和拆除多媒体通信会话，其应用非常广泛，可用于因特网上的语音和视频呼叫、视频会议、流媒体分发、即时通信、状态信息( presence infonnation )、在线游戏等。</p> <h2 id="rtp"><a href="#rtp" class="header-anchor">#</a> RTP</h2> <p>RTP(Real-time Transport Protocol，实时传输协议)是一种分组格式标准，用于通过因特网传输语音和文本. RTP (VoIP)语音和视频。虽然它最初被设计为一种组播协议，但现在也被用于单播应用程序中。它常被用于流式媒体、视频会议和一键通(push to talk)系统，这使其成了VoIP (Voice over IP ，IP语音)行业的事实标准。</p> <h2 id="ldp"><a href="#ldp" class="header-anchor">#</a> LDP</h2> <p>LDP (Line Printer Daemon ，行式打印机守护进程)协议设计用于共享打印机。LPD 和LPR (Line Printer ，行式打印机)程序相互协作，使得能够将打印作业排队并使用 TCP/IP 将其发送给网络打印机。</p> <h2 id="lpr"><a href="#lpr" class="header-anchor">#</a> LPR</h2> <p>在纯粹的TCP/IP 环境中打印时，人们通常结合使用LPR (行式打印机)和LPD (Line Printer Daemon ，行式打印机守护进程)来完成打印作业。LPD 安装在所有打印设备上，负责处理打印机和打印作业。LPR 运行于客户端(发送主机)，用于将数据从主机发送到网络打印资掘，让你能够得到打印输出。</p> <h2 id="x-window"><a href="#x-window" class="header-anchor">#</a> X Window</h2> <p>XWindow 是为客户端/服务器操作设计的， 是一种编写基于GUI (Graphical User Interface ，图形用户界面)的客户端/服务器应用程序的协议。其基本思想是，让运行在一台计算机上的客户端程序能够通过窗口服务器显示另一台计算机的内容。</p> <h2 id="snmp"><a href="#snmp" class="header-anchor">#</a> SNMP</h2> <p>SNMP (Simple Network Management Protocol ，简单网络管理协议)收集并操作有价值的网络信息。</p> <ul><li>它运行在管理工作站上，定期或随机地轮询网络中的设备，要求它们暴露特定的信息，以收集数据。</li> <li>在一切正常的情况下， SNMP 将收到基线(baseline) 信息， 即描述健康网络运行特征的报告。</li> <li>该协议还可充当网络的看门狗，将任何突发事件迅速告知管理员。这些网络看门狗称为代理，出现异常情况时，代理将向管理工作站发送称为trap 的警告。</li></ul> <blockquote><p>使用 TCP 和 UDP 协议</p></blockquote> <h2 id="ssh"><a href="#ssh" class="header-anchor">#</a> SSH</h2> <p>SSH(Secure Shell protocol) 通过标准TCP/IP 连接建立安全的Telnet 会话，用于执行如下操作:登录系
统、在远程系统中运行程序以及在系统间传输文件等。它在执行这些操作时都使用健壮的加密连接。你可将其视为用于替代rsh 、rlogin 甚至 Telnet 的新一代协议。</p> <h2 id="http"><a href="#http" class="header-anchor">#</a> HTTP</h2> <p>HTTP (Hypertext Transfer Protocol,超文本传输协议)所赐。它用于管理Web 浏览器和Web 服务器之间的通信，在你单击链接时打开相应的资源，而不管该资源实际位于何地。</p> <h2 id="https"><a href="#https" class="header-anchor">#</a> HTTPS</h2> <p>HTTPS(Hyper text Transfer Protoco1 Secure ，安全超文本传输协议)使用 SSL ( Secure Socket Layer ,安全套接字层)，它是安全版的HTTP ，提供了一系列安全工具，可确保Web 浏览器和Web 服务器之间的通信安全。当你在网上预订或购物时，浏览器需要使用它来填写表格、签名、验证和加密HTTP 消息。</p> <h2 id="ntp"><a href="#ntp" class="header-anchor">#</a> NTP</h2> <p>NTP (Network Time Protocol，网络时间协议)用于将计算机时钟与标准时间源(通常是原子钟)同步, NTP 将设备同步，确保给定网络中所有计算机的时间一致。这虽然昕起来非常简单，但却非常重要.</p> <h2 id="nntp"><a href="#nntp" class="header-anchor">#</a> NNTP</h2> <p>NNTP (Net明明kNews TransferProtoco1 ，网络新闻传输协议)用于访问Usenet 新闻服务器，这种服务器存储了大量称为新闻组的留言板。</p> <h2 id="scp"><a href="#scp" class="header-anchor">#</a> SCP</h2> <p>SCP (Secure Copy Protoco1 ，安全复制协议)可提供帮助，它通过SSH保护你宝贵的文件。它首先在发送主机和接收主机之间建立一条安全的加密连接，并一直保持这种状态，直到文件传输完毕。然而，在当今的网络中，更健壮的 SFTP 比SCP 更常用。</p> <h2 id="ldap"><a href="#ldap" class="header-anchor">#</a> LDAP</h2> <p>如果管理的网络规模适当，你很可能会在某个地方存储目录，记录所有的网络资源，如设备和用户。但如何访问这些目录呢?通过LDAP (Lightweight Directory Access Protocol ，轻量级目录访问协议)。该协议对如何访问目录进行了标准化.</p> <h2 id="igmp"><a href="#igmp" class="header-anchor">#</a> IGMP</h2> <p>IGMP (Internet Group Management Protocol，因特网组管理协议)是一种用于管理IP 组播会话的TCP/IP 协议，它这样完成其职责:通过网络发送唯一的IGMP 消息，以揭示组播组信息，并找出主机所属的组播组。IP网络中的主机也使用IGMP 消息来加入和退出组播组。IGMP消息非常方便用于跟踪组成员关系以及激活组播流。</p> <h2 id="dns"><a href="#dns" class="header-anchor">#</a> DNS</h2> <p>DNS (Domain Name Serv肘，域名服务)解析主机名，具体地说是因特网名称，如www.routersim.com。</p> <ul><li>DNS 用于解析FQDN (Fully Qualified Domain Name ，全限定域名)，如www.lammle.com 或
todd.lamm1e.com.</li> <li>FQDN 是一种层次结构，可根据域名标识符查找系统。如果要解析名称todd ，则要么输入FQDN todd.lammle.com ，要么让设备(如PC 或路由器)帮助你添加后级。例如，在思科路由器中，你可使用命令<code>ip domain-name lammle.com</code> 给每个请求加上域名 lammle.com。如果不这样做，则你必须输入FQDN ，这样DNS 才能对名称进行解析。</li></ul> <blockquote><p>有关DNS 需要牢记的一个重点是，如果能够使用IP地址ping某台设备，但使用其FQDN不管用，则可能是DNS配置有问题。</p></blockquote> <p>==端口号==:</p> <ul><li>TCP UDP 53</li></ul> <h2 id="dhcp"><a href="#dhcp" class="header-anchor">#</a> DHCP</h2> <p>==端口号==:</p> <ul><li>67</li></ul> <p>DHCP ( Dynamic Host Configuration Protocol ，动态主机配置协议)给主机分配IP地址，让管理工
作更轻松，非常适合用于各种规模的网络。各种类型的硬件都可用作DHCP 服务器，包括思科路由器。</p> <ul><li><p>DHCP 与BootP (Bootstrap Protocol ，自举协议)的差别在于， BootP 给主机分配田地址，但必须
手工将主机的硬件地址输入到BootP表中。你可将DHCP 视为动态的BootP 。但别忘了， BootP也可用于发送操作系统，让主机使用它启动，而DHCP没有这样的功能。</p></li> <li><p>主机向DHCP 服务器请求IP 地址时， DHCP 服务器可将大量信息提供给主机。下面是DHCP服务器可提供的信息列表:</p> <ul><li>IP 地址;</li> <li>子网掩码:</li> <li>域名;</li> <li>默认网关(路由器);</li> <li>DNS 服务器的地址:</li> <li>WINS 服务器的地址。</li></ul></li> <li><p>为获得IP地址而发送 DHCP发现消息的主机在第2层和第3层都发送广播:</p> <ul><li>第2 层广播的地址在十六进制表示下全为F ，即FF:FF:FF:FF:FF:曰:</li> <li>第3 层广播的地址为255.255.255.255 ，这表示所有网络和所有主机。</li></ul></li> <li><p>DHCP 是无连接的，这意味着它在传输层使用UDP(用户数据报协议)，这层也叫主机到主机层，稍后将介绍它。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705145532388.png" alt="image-20220705145532388"></p></li></ul> <blockquote><p>客户端向DHCP 服务器请求IP 地址的4个步骤如下:
(1) DHCP 客户端广播一条 DHCP Discover 消息，旨在寻找<strong>DHCP 服务器(端口67)</strong>;
(2) 收到DHCP Discover消息的DHCP服务器向主机发回一条单播DHCP Offer消息;
(3) 客户端向服务器广播一条DHCP Request消息，请求提议的IP地址和其他信息:
(4) 服务器以单播方式发回一条DHCP ACK消息，完成交互。</p> <blockquote><p>==DHCP 冲突==:</p> <p>两台主机使用相同的IP地址时，就发生了DHCP地址冲突。如果检测到IP 地址冲突，相应的IP 地址将从DHCP 地址池中删除;且在管理员手工解决冲突前，该地址不全被分配给任何主机，牢记这一点很重要。</p></blockquote></blockquote> <h2 id="apipa"><a href="#apipa" class="header-anchor">#</a> APIPA</h2> <p>Windows 提供了APIPA (Automatic Private IP Addressing ，自动私有IP编址)</p> <ul><li>客户端可在DHCP 服务器不可用时自动给自己配置IP 地址和子网掩码(主机用来通信的基本IP 信息).</li> <li>APIPA 使用的IP地址范围为 <code>169.254.0.1</code>-<code>169.254.255.254</code> ，客户端还会给自己配置默认的B 类子网掩码一<code>255.255.0.0</code>。</li></ul> <h1 id="传输层协议"><a href="#传输层协议" class="header-anchor">#</a> 传输层协议</h1> <h2 id="tcp协议"><a href="#tcp协议" class="header-anchor">#</a> TCP协议</h2> <ul><li><p>TCP (Transmission Control Protocol ，传输控制协议)接收来自应用程序的大型数据块，并将其划分成数据段。它给每个数据段编号，让接收主机的TCP 技能够按应用程序希望的顺序排列数据段。发送数据段后，发送主机的TCP 等待来自接收端TCP 的确认，并重传未得到确认的数据段。</p></li> <li><p>发送主机开始沿分层模型向下发送数据段之前，发送方的TCP栈与目标主机的TCP栈联系，以建立连接。它们创建的是虚电路，这种通信被认为是面向连接的。在这次初始握手期间，两个TCP栈还将就如下方面达成一致:在接收方的TCP 发回确认前，将发送的信息量。</p></li> <li><p>TCP 是一种可靠的精确协议，它采用全双工模式，且面向连接，但需要就所有条款和条件达成一致，还需进行错误检查，这些任务都不简单。TCP 很复杂，且网络开销很大，这没有什么可奇怪的。鉴于当今的网络比以往的网络可靠得多，这些额外的可靠性通常是不必要的。大多数程序员都使用TCP，因为它消除了大量的编程工作，但实时视频和VoIP使用UDP ，因为它们无法承受额外的开销。</p></li></ul> <h3 id="报文段的数据格式"><a href="#报文段的数据格式" class="header-anchor">#</a> 报文段的数据格式</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151908919.jpeg" alt="img"></p> <blockquote><p>TCP 报文的报头为 20 Bytes(包含选项时为 24 Bytes)</p> <ul><li><strong>源端口和目的端口</strong>: 分别为<em>16bit</em>,用于标记源端和目的端的端口号</li> <li><strong>序号Seq（Sequence Number）</strong>: 序号占<em>32bit</em>，用来标识从计算机A发送到计算机B的数据包的序号,</li> <li>TCP 用来将数据按正确的顺序重新排列(称为排序)、重传丢失或受损的数据。</li> <li><strong>确认号Ack（Acknowledge Number)</strong>: 确认号占<em>32bit</em>，TCP 期待接下来收到的数据段。客户端和服务器端都可以发送，<em>Ack = Seq + 1</em>; 也可用于<em>三次和四次握手</em>机制;</li> <li><strong>数据偏移</strong>: TCP 报头的长度，指示TCP数据部分的偏移量, 以32bit为单位。</li> <li><strong>保留</strong>: 总是设置为0</li> <li><strong>标志位6个</strong>: 分别为<em>1bit</em>, 用于建立和终止会话的控制功能。
<ul><li>URG: 确定<code>紧急指针</code>是否生效</li> <li>ACK: 确定<code>确认号</code>生否生效</li> <li>PSH: 接收方是否需要尽快将这个报文交给应用层</li> <li>RST: 重置连接的标志位</li> <li>SYN: 发起新连接的标志位</li> <li>FIN: 释放连接的标志位</li></ul></li> <li><strong>窗口大小</strong>: 发送方愿意接受的窗口大小, 单位为Byte</li> <li><strong>校验和CRC</strong>: (Cyclic Redundancy Check，循环冗余校验)，由于TCP不信任低层，因此检查所有数据。CRC 检查报头和数据字段。</li> <li><strong>紧急指针</strong>: 仅当设置了编码位中的紧急指针字段时，该字段才有效。如果设置了紧急指针，该字段表示非紧急数据的开头位置相对于当前序列号的偏移量，单位为字节。</li> <li><strong>选项</strong>: 长度为0或32位的整数倍。也就是说，没有选项时，长度为0。然而，如果包含选项时导致该字段的长度不是32位的整数倍，必须填充零，以确保该字段的长度为32位的整数倍。</li></ul></blockquote> <h3 id="tcp三次握手建立连接的机制"><a href="#tcp三次握手建立连接的机制" class="header-anchor">#</a> TCP<code>三次握手</code>建立连接的机制</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/e095cdb6ee5e9927e31a39fddb0b1fb0.png" alt="三次握手"></p> <h3 id="tcp四次握手释放连接的机制"><a href="#tcp四次握手释放连接的机制" class="header-anchor">#</a> TCP<code>四次握手</code>释放连接的机制</h3> <p><strong>双向断开连接的通知与确认造成了<code>四次握手</code>:</strong></p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206151906344.png" alt="TCP和四次挥手"></p> <h3 id="dos攻击和-ddos"><a href="#dos攻击和-ddos" class="header-anchor">#</a> DOS攻击和 DDoS</h3> <blockquote><p>DoS(Denial of Service) 的原理:</p> <ul><li>攻击者发起大量的TCP连接请求, 占用掉服务器的带宽/CPU等资源, 导致服务器无法为其他正常用户提供服务;</li></ul> <p>DDoS(Distributed Denial of Service):</p> <ul><li>攻击者组织<em>大量主机</em>同时向服务器发起TCP连接请求;</li></ul></blockquote> <h3 id="滑动窗口"><a href="#滑动窗口" class="header-anchor">#</a> 滑动窗口</h3> <p>TCP的滑动窗口是以字节为单位的。TCP全双工通信，通信中的每一方都在发送和接收报文段。每一方都有自己的发送窗口和接收窗口。</p> <h4 id="发送窗口"><a href="#发送窗口" class="header-anchor">#</a> 发送窗口</h4> <blockquote><p>发送窗口由<code>SND.WND</code>, <code>SND.UNA</code> 和 <code>SND.NXT</code>这三个指针进行维护。</p></blockquote> <blockquote><p><strong>发送缓冲区</strong>分为四个部分：</p> <ol><li><p>已经收到ack包的数据: 代表接收窗口已经接收了对应的数据，可以被新数据覆盖。</p></li> <li><p>已经发送还未接收到ack包的数据: 已经发送出去，但是还未收到接收方对应的ack包</p></li> <li><p>允许发送但是还未发送的数据;</p></li> <li><p>不允许发送的数据: 发送窗口之外的数据，排队等待后续发送。</p></li></ol></blockquote> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206152350619.png" alt="在这里插入图片描述"></p> <p>这时还允许发送数据，就会将可用窗口中的数据发送给接收窗口。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206152358247.png" alt="在这里插入图片描述"></p> <p>这个时候，可用窗口大小为0，这个时候会等待接收方发送ack包。</p> <p>如果这个时候如果接收一个ack包为37，这个时候发送窗口会向右边移动5位，52-56会变成可用窗口。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206152359763.png" alt="在这里插入图片描述"></p> <h4 id="接收窗口"><a href="#接收窗口" class="header-anchor">#</a> 接收窗口:</h4> <blockquote><p>接收窗口: 由一个<code>RCV_NEXT</code>和接收窗口<code>RCV.WND</code>来维护。</p></blockquote> <blockquote><p><strong>缓冲区</strong>分为三部分：</p> <ol><li><p>应用层已经读取的数据: 已经接收到的数据，并且已经发送了ack包，并且已经被应用层读取。</p></li> <li><p>接收窗口中的数据: 接收窗口中存储的是当前等待接收的数据。</p></li></ol> <p>接收窗口允许无序接收数据包，所以接收窗口中有一部分数据接收到了，一部分没接收到，将无序的数据包直接缓存到接收窗口中。</p> <p>因为无序的接收数据包，接收窗口中是存在空隙的，因为先发送的数据包由于网络原因，反而可能会后到接收方。</p> <p>当数据包缓存到接收窗口中，就会返回ack包，ack包中会携带SACK信息，也就是选择重选信息。</p> <ol start="3"><li>还未收到的数据: 还不能接收数据的区域，也就是接收窗口之外的数据。</li></ol></blockquote> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206160000388.png" alt="在这里插入图片描述"></p> <h2 id="udp协议"><a href="#udp协议" class="header-anchor">#</a> UDP协议</h2> <ul><li>UDP 不对数据段排序，也不关心数据段到达目的地的顺序。相反， UDP 将数据段发送出去后就不再管它们了。它不检查数据段，也不支持表示安全到达的确认，而是完全放手。有鉴于此， UDP被称为不可靠的协议。这并不意味着UDP 效率低下，而只意味着它根本不会处理可靠性问题。</li> <li>UDP 不建立虚电路，也不在发送信息前与接收方联系。因此，它也被称为无连接的协议。</li> <li>如果数据段未按顺序到达(这在IP网络中很常见)，它们将被按收到的顺序传递给OSI (DoD) 模型的下一层，这可能使数据极其混乱。另一方面， TCP给数据段排序，以便能够按正确的顺序重组它们，而UDP根本没有这样的功能。</li></ul> <h3 id="udp数据段的报头"><a href="#udp数据段的报头" class="header-anchor">#</a> UDP数据段的报头</h3> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705152945841.png" alt="image-20220705152945841" style="zoom:67%;"> <blockquote><p>UDP数据段的报头为 8 Bytes, 开销相比 TCP的 20 Bytes明显降低:</p> <ul><li><strong>Source Port</strong>: 送主机的应用程序的端口号。</li> <li><strong>Destination Port</strong>: 目标主机上被请求的应用程序的端口号。</li> <li><strong>Length</strong>: UDP报头和UDP数据的总长度;</li> <li><strong>Checksum</strong>: UDP 报头和UDP 数据的校验和。</li> <li><strong>UDP Data Area</strong>: 封装来自上层的数据</li> <li>与TCP 一样， UDP 也不信任低层的传输并运行自己的CRC。还记得吗，CRC 结果存储在FCS( Frame
Check Sequence ，帧校验序列)字段中，这就是你能够看到FCS信息的原因。</li></ul></blockquote> <h2 id="端口号"><a href="#端口号" class="header-anchor">#</a> 端口号</h2> <blockquote><ul><li>数据链路层使用MAC硬件地址, 网络层IP协议使用逻辑IP地址来标识发送主机，但传输层和上层协议不这样做，它们使用端口号。</li> <li>传输层的TCP 和UDP 必须使用端口号与上层通信，因为端口号跟踪通过网络同时进行的不同会话。</li> <li>源端口号是源主机动态分配的，其值不小于1024. 1023及更小的端口号是在RFC3232中定义为 知名端口号.</li></ul></blockquote> <blockquote><p>(在<a href="https://baike.baidu.com/item/%E7%BD%91%E7%BB%9C%E6%8A%80%E6%9C%AF/480927" target="_blank" rel="noopener noreferrer">网络技术<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>中，端口包括逻辑端口号和物理端口两种类型。</p> <ul><li><p>==物理端口==：是用于连接物理设备之间的接口，如<a href="https://baike.baidu.com/item/ADSL/96520" target="_blank" rel="noopener noreferrer">ADSL<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> Modem、<a href="https://baike.baidu.com/item/%E9%9B%86%E7%BA%BF%E5%99%A8/214614" target="_blank" rel="noopener noreferrer">集线器<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>、<a href="https://baike.baidu.com/item/%E4%BA%A4%E6%8D%A2%E6%9C%BA/103532" target="_blank" rel="noopener noreferrer">交换机<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>、<a href="https://baike.baidu.com/item/%E8%B7%AF%E7%94%B1%E5%99%A8/108294" target="_blank" rel="noopener noreferrer">路由器<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>上用于连接其他网络设备的接口，如<a href="https://baike.baidu.com/item/RJ-45%E7%AB%AF%E5%8F%A3" target="_blank" rel="noopener noreferrer">RJ-45端口<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>、SC端口等等 [2] 。</p></li> <li><p>==逻辑端口号==：是指逻辑意义上用于区分服务的端口，比如用于浏览网页服务的80端口，用于FTP服务的21端口等。如<a href="https://baike.baidu.com/item/TCP%2FIP%E5%8D%8F%E8%AE%AE" target="_blank" rel="noopener noreferrer">TCP/IP协议<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>中的服务端口，通过不同的逻辑端口来区分不同的服务。一个IP地址的端口通过<em>16bit</em>进行编号，范围是从0 到65535;</p> <ul><li><p><code>well-known ports</code>: <strong>0 to 1023</strong> (0 to 2^10^ − 1);</p> <p>used by system processes that provide widely used types of network services. On <a href="https://en.wikipedia.org/wiki/Unix-like" target="_blank" rel="noopener noreferrer">Unix-like<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> operating systems, a process must execute with <a href="https://en.wikipedia.org/wiki/Superuser" target="_blank" rel="noopener noreferrer">superuser<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> privileges to be able to bind a <a href="https://en.wikipedia.org/wiki/Network_socket" target="_blank" rel="noopener noreferrer">network socket<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> to an <a href="https://en.wikipedia.org/wiki/IP_address" target="_blank" rel="noopener noreferrer">IP address<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> using one of the well-known ports；</p></li> <li><p><code>Registered ports</code>: <strong>1024 to 49151</strong>;</p> <p>They are assigned by <a href="https://en.wikipedia.org/wiki/Internet_Assigned_Numbers_Authority" target="_blank" rel="noopener noreferrer">IANA<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> for specific service upon application by a requesting entity.[<a href="https://en.wikipedia.org/wiki/List_of_TCP_and_UDP_port_numbers#cite_note-IANA-2" target="_blank" rel="noopener noreferrer">2]<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> On most systems, registered ports can be used without superuser privileges.</p></li> <li><p><code>Dynamic, private or ephemeral ports</code>: <strong>49152 to 65535</strong>;</p> <p>used for private or customized services, for temporary purposes, and for automatic allocation of <a href="https://en.wikipedia.org/wiki/Ephemeral_port" target="_blank" rel="noopener noreferrer">ephemeral ports<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>.</p></li></ul></li></ul></blockquote> <h1 id="网络层协议"><a href="#网络层协议" class="header-anchor">#</a> 网络层协议</h1> <h2 id="ip协议"><a href="#ip协议" class="header-anchor">#</a> IP协议</h2> <p>IP (Intemet Protocol ，因特阿协议)就相当于因特网层，该层的其他协议都只是为它提供支持。</p> <h3 id="报文段的数据格式-2"><a href="#报文段的数据格式-2" class="header-anchor">#</a> 报文段的数据格式</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/4322526-c033ebbd5e1368f3.jpg" alt="img"></p> <blockquote><ul><li><p><strong>版本</strong>：IP版本号，例如IPv4或者IPv6，这个字段可以使得在不同版本间传递数据变得可行。</p></li> <li><p><strong>报头长度</strong>：标明IP协议报头有多长，<strong>其单位是32bit即4个字节</strong>，其最小值为5（<code>5 x 4 = 20 byte</code>，这个长度是除去可选项的长度），从上图中看出，其规定头部长为 4 bit，所以最大值为 15， <code>15 x 4 = 60 byte</code> 可以算出可选项长度最大为40个字节(即 <code>60 byte - 20 byte = 40 byte</code>)</p></li> <li><p><strong>服务类型</strong>：用来指示当数据报在一个特定网络中传输时对实际服务质量的要求是什么，服务类型字段从左到右由一个3位的优先顺序字段、三个标志位(D、T、R)和两个保留位组成。</p> <ul><li><p>优先顺序字段用于标志该数据报的优先级，</p></li> <li><p>D、T、R三个标志位分别代表是否对低延迟(Delay)、高吞吐量(Throughput)、高可靠性(Reliability)有要求，</p></li> <li><p>不过实际上，现在的路由器都忽略服务类型这个字段。</p></li></ul></li> <li><p><strong>总长度</strong>：是指整个数据报的长度，包括头部和数据部分，<strong>单位是 1 Byte</strong>，从图上可以看出，规定总长位数为16bit，能存储最大数据为65535个字节的数据报。如长的数据报对大部分主机和网络来说是不现实的。所有主机必须能够接收长达576个字节的数据报(不管他们是以整个数据报到达还是以分片到达)，源端主机在确认目的地址能够接收大数据报的情况下才发送大于576字节的数据报。</p></li> <li><p><strong>标识</strong>：该标识由发送者设定值，主要为了目的主机组装分段时判断新到的报文分段属于哪个分组，所有属于同一分组的报文分段都包含相同的标识。</p></li> <li><p><strong>标记</strong>：长度为3bit，从前到后分别是<strong>保留位</strong>、<strong>不可分段位</strong>(DF, Don't Fragment)和<strong>分段位</strong>(MF,More Fragment)。
保留为始终为 0
DF位为 1 时表示该分组不能被分段
MF位为 1 时表示后面还有该分组的分段，在有分段的情况下，除了最后一个分段该位为 0 外，其他分段该位都为 1</p></li> <li><p><strong>分段偏移</strong>：在分组太大，无法放入一个帧中时，提供了分段和重组功能。它还使得因特网上可有不同的MTU (Maximum Transmission Unit ，最大传输单元)。标记该分段在数据报的位置，<strong>单位是8个字节</strong>，第一个分段的偏移是 0</p></li> <li><p><strong>存活时间</strong>：用来限制分组存活时间的计数器，<strong>单位是hop</strong>，该字段长度为 8bit ，说明存储的最大数值是 255 ，在实际的应用过程中是以经过的节点计数的，每经过一个节点计数减 1 ，计数减到 0 时，分组要被丢弃。</p></li> <li><p><strong>协议</strong>：指明IP层所封装的上层协议类型，如<em>ICMP -&gt; 1, IGMP -&gt; 2, TCP -&gt; 6, UDP -&gt; 17, EIGRP -&gt; 88, OSPF -&gt; 89</em>等</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705171123301.png" alt="image-20220705171123301" style="zoom:80%;"></li> <li><p><strong>报头效验和</strong>：只对头部进行效验，由于头部的一些字段始终在变化(例如：生命期字段)，头部效验和在每个节点都得重新进行计算。</p></li> <li><p>==源地址==：发送方主机的IP地址, 32bit</p></li> <li><p>==目的地址==：接收方主机的IP地址, 32bit</p></li> <li><p><strong>可选项</strong>：可选项对于主机和网关的IP模块来说都是必须实现的，可选是指它们在特定数据报中是否出现是可选的，而不是指他们的实现，每个可选项都以 1 个字节表明它的类型。其长度从1~40个字节之间不固定，主要取决于设置的可选项数目，最终数据长度不够32位的倍数要填充 0 补齐，主要是为了让报头长度是32位的整数倍，一般正常的IP报文头部都是没有可选项的。
目前已定义的可选项有 5 个，分别是安全性(指明数据报的机密程度)、严格路由选择(后面给出所规定的完全路由)、宽松路由选择(后面给出必须要经过的路由)、记录路由(记录下所经路由器附上其IP地址)、时间戳(要求所经路由器都附上其IP地址和时间标记)。</p></li></ul></blockquote> <h3 id="ip协议簇"><a href="#ip协议簇" class="header-anchor">#</a> IP协议簇</h3> <h4 id="icmp协议"><a href="#icmp协议" class="header-anchor">#</a> ICMP协议</h4> <blockquote><ul><li>ICMP ( Internet Control Message Protocol ，因特网控制消息协议)运行在网络层， IP 使用它来获得众多服务。</li> <li>ICMP 是一种管理协议，为IP提供消息收发服务，其消息是以IP数据报的形式传输的。</li> <li>作用: 面向连接的, 用于检测网络层的连通性, 可向主机提供有关网络故障的信息;;</li> <li>原理: 发送 <code>echo request</code>; 目标端收到后发送 <code>echo reply</code>;</li> <li>常用命令:
<ul><li>ping: 检查互联网络中机器的物理连接性和逻辑连接性。</li> <li>traceroute: 使用ICMP超时来发现分组在互联网络中传输时经过的路径。(Windows 称之为tracert)</li></ul></li> <li>与ICMP 相关的常见事件和消息:
<ul><li>目标不可达: 如果路由器不能再向前转发IP数据报，它将使用ICMP 向发送方发送一条消息，以通告这种情况。</li> <li>缓冲区己满: 如果用于接收数据报的路由器内存缓冲区已满，路由器将使用ICMP 发送这种消息，直到拥塞解除。</li> <li>超过跳数/时间: 对于每个IP 数据报，都指定了它可穿越的最大路由器数量(跳数)。如果数据报还未达到目的地就达到了该上限，最后一台收到该数据报的路由器将把它删除。然后，该路由器将使用ICMP 发送一条协告，让发送方知道其数据报已被删除。</li></ul></li></ul></blockquote> <h4 id="arp-地址解析协议"><a href="#arp-地址解析协议" class="header-anchor">#</a> ARP 地址解析协议</h4> <blockquote><ul><li><p>ARP (Address Resolution Protocol ，地址解析协议)根据指定的IP地址查找主机的MAC地址:</p> <ol><li><p>传输层传递给网络层数据时, 将目标IP地址告知了网络层;</p></li> <li><p>网络层需要向发送数据报时，它必须提前将目标端的硬件地址告知数据链路层协议，如以太网或无线。</p></li> <li><p>如果IP在ARP缓存中没有找到目标主机的硬件地址，ARP协议将发送广播，要求配置有指定IP地址的设备回复其MAC地址信息.</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705172950722.png" alt="image-20220705172950722"></p></li></ol></li></ul></blockquote> <h4 id="rarp"><a href="#rarp" class="header-anchor">#</a> RARP</h4> <p>如果IP 主机为无盘计算机，一开始它不知道自己的IP 地址，但知道自己的MAC 地址。无盘机器可使用如图3-12 所示的RARP (Reverse Address Resolution Protocol ，逆向地址解析协议)来获悉其IP 地址，这是通过发送一个分组实现的，该分组包含元盘计算机的MAC 地址和一个请求(请求提供分配给该MAC 地址的IP 地址). RARP服务器将对此作出响应，从而解决身份危机。
RARP使用它知道的信息(即机器的MAC地址)来获悉机器的IP地址，从而完成身份标识。</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705173607409.png" alt="image-20220705173607409" style="zoom:67%;"> <h4 id="proxy-arp"><a href="#proxy-arp" class="header-anchor">#</a> Proxy ARP:</h4> <p>在网络中，我们不能给主机配置多个默认网关。请想一想，如果默认网关(路由器)发生故障，结果将如何呢?主机不能自动将数据发送给另一台路由器，而你必须重新配置主机。但代理ARP可帮助主机前往远程子网，而无需配置路由选择甚至默认网关。</p> <p>使用 代理ARP 的优点之一是，我们可在网络中的一台路由器上启用它，而不影响网络中其他路由器的路由选择表。然而，使用 代理ARP 也存在一个严重的缺陆:使用 代理ARP 将增加网段中的流量，而为处理所有的IP地址到MAC 地址的映射，主机的ARP表比通常情况下大。默认情况下，所有思科路由器都配置了代理ARP，如果你认为自己不会使用它，应将其禁用。</p> <blockquote><p>如果预算允许，你应使用思科的<strong>HSRP</strong> ( Hot Standby Router Protocol. 热备份路由器协议)</p></blockquote></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/master/docs/40.网络运维/05.CCNA/10.CCNA知识笔记/03.TCP IP 协议簇.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">last Updated:</span> <span class="time">2022/07/13, 13:10:53</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/91ab17/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">OSI 七层网络模型</div></a> <a href="/pages/9876fd/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">路由器的组成和功能</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
