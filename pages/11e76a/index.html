thon-字典"><a href="#python-字典" class="header-anchor">#</a> Python 字典</h1> <h2 id="什么是字典"><a href="#什么是字典" class="header-anchor">#</a> 什么是字典</h2> <ul><li>字典</li> <li><strong>Python内置的数据结构之一,与列表一样是一个可变序列</strong></li> <li><strong>以键值对的方式存储数据，字典是一个</strong><font color="#DC4040" size="4" face="黑体">无序</font><strong>的序列</strong></li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/07/01.png" alt="01"></p> <ul><li>字典示意图</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/07/02.png" alt="01"></p> <ul><li>字典的实现原理
<ul><li><strong>字典的实现原理与查字典类似，查字典是先根据部首或拼音查找汉字对应的页码。Python中的字典是根据key查找value所在的位置</strong></li></ul></li></ul> <h2 id="字典的创建"><a href="#字典的创建" class="header-anchor">#</a> 字典的创建</h2> <ul><li>最常用的方式:<font color="#DC4040" size="4" face="黑体">使用花括号</font></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code>score<span class="token operator">=</span><span class="token punctuation">{</span> <span class="token string">'张三'</span><span class="token punctuation">:</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token string">'李四'</span><span class="token punctuation">:</span><span class="token number">98</span><span class="token punctuation">,</span><span class="token string">'王五'</span><span class="token punctuation">:</span><span class="token number">45</span><span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><ul><li><font color="#DC4040" size="4" face="黑体">使用内置函数dict()</font></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token builtin">dict</span><span class="token punctuation">(</span> name<span class="token operator">=</span><span class="token string">'jack'</span><span class="token punctuation">,</span>age<span class="token operator">=</span><span class="token number">20</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/18 22:25
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token triple-quoted-string string">'''字典的创建方式'''</span>
<span class="token triple-quoted-string string">'''使用{}创建字典'''</span>
scores<span class="token operator">=</span><span class="token punctuation">{</span><span class="token string">'张三'</span><span class="token punctuation">:</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token string">'李四'</span><span class="token punctuation">:</span><span class="token number">98</span><span class="token punctuation">,</span><span class="token string">'王五'</span><span class="token punctuation">:</span><span class="token number">45</span><span class="token punctuation">}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>scores<span class="token punctuation">)</span><span class="token punctuation">)</span>

<span class="token triple-quoted-string string">'''第二种创建dict()'''</span>
student<span class="token operator">=</span><span class="token builtin">dict</span><span class="token punctuation">(</span>name<span class="token operator">=</span><span class="token string">'jack'</span><span class="token punctuation">,</span>age<span class="token operator">=</span><span class="token number">20</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>student<span class="token punctuation">)</span>

<span class="token triple-quoted-string string">'''空字典'''</span>
d<span class="token operator">=</span><span class="token punctuation">{</span><span class="token punctuation">}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>d<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br></div></div><h2 id="字典的常用操作"><a href="#字典的常用操作" class="header-anchor">#</a> 字典的常用操作</h2> <h3 id="字典中元素的获取"><a href="#字典中元素的获取" class="header-anchor">#</a> 字典中元素的获取</h3> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/07/03.png" alt="01"></p> <h3 id="如果字典中不存在指定的key-抛出keyerror异常"><a href="#如果字典中不存在指定的key-抛出keyerror异常" class="header-anchor">#</a> <strong>[]如果字典中不存在指定的key,抛出keyError异常</strong></h3> <ul><li><strong>get()方法取值，如果字典中不存在指定的key,并不会抛出keyError而是返回None,可以通过参数设置默认的value，以便指定的key不存在时返回</strong></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/19 19:28
@Version    :1.0
&quot;&quot;&quot;</span>

<span class="token triple-quoted-string string">'''获取字典中的值'''</span>
scores<span class="token operator">=</span><span class="token punctuation">{</span><span class="token string">'张三'</span><span class="token punctuation">:</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token string">'李四'</span><span class="token punctuation">:</span><span class="token number">98</span><span class="token punctuation">,</span><span class="token string">'王五'</span><span class="token punctuation">:</span><span class="token number">45</span><span class="token punctuation">}</span>
<span class="token triple-quoted-string string">'''第一种方式，使用[]'''</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">[</span><span class="token string">'张三'</span><span class="token punctuation">]</span><span class="token punctuation">)</span> <span class="token comment">#100</span>
<span class="token comment"># print(scores['陈六']) #KeyError: '陈六'</span>

<span class="token triple-quoted-string string">'''第二种方式 使用get()方法'''</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token string">'张三'</span><span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#100</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token string">'陈六'</span><span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#None</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token string">'麻七'</span><span class="token punctuation">,</span><span class="token number">99</span><span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#99是在查找'麻七'不存在时，提供的对应值</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br></div></div><h3 id="字典的增删改"><a href="#字典的增删改" class="header-anchor">#</a> 字典的增删改</h3> <ul><li>key的判断</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/07/04.png" alt="01"></p> <ul><li>字典元素的删除</li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">del</span> scores<span class="token punctuation">[</span><span class="token string">'张三'</span><span class="token punctuation">]</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><ul><li>字典元素的新增</li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code>scores<span class="token punctuation">[</span><span class="token string">'Jack'</span><span class="token punctuation">]</span><span class="token operator">=</span><span class="token number">90</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/19 19:40
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token triple-quoted-string string">'''键的判断'''</span>
scores<span class="token operator">=</span><span class="token punctuation">{</span><span class="token string">'张三'</span><span class="token punctuation">:</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token string">'李四'</span><span class="token punctuation">:</span><span class="token number">98</span><span class="token punctuation">,</span><span class="token string">'王五'</span><span class="token punctuation">:</span><span class="token number">45</span><span class="token punctuation">}</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'张三'</span> <span class="token keyword">in</span> scores<span class="token punctuation">)</span> <span class="token comment">#True</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'张三'</span> <span class="token keyword">not</span> <span class="token keyword">in</span> scores<span class="token punctuation">)</span> <span class="token comment">#False</span>

<span class="token keyword">del</span> scores<span class="token punctuation">[</span><span class="token string">'张三'</span><span class="token punctuation">]</span> <span class="token comment">#删除指定的键值对</span>
<span class="token comment"># scores.clear()  #清空字典的元素</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">)</span>

scores<span class="token punctuation">[</span><span class="token string">'陈六'</span><span class="token punctuation">]</span><span class="token operator">=</span><span class="token number">98</span> <span class="token comment"># 新增元素</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">)</span>

scores<span class="token punctuation">[</span><span class="token string">'陈六'</span><span class="token punctuation">]</span><span class="token operator">=</span><span class="token number">100</span>  <span class="token comment">#修改元素</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>scores<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br></div></div><h3 id="字典的视图操作"><a href="#字典的视图操作" class="header-anchor">#</a> 字典的视图操作</h3> <ul><li>获取字典视图的三个方法</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/07/05.png" alt="01"></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/19 20:17
@Version    :1.0
&quot;&quot;&quot;</span>
scores<span class="token operator">=</span><span class="token punctuation">{</span><span class="token string">'张三'</span><span class="token punctuation">:</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token string">'李四'</span><span class="token punctuation">:</span><span class="token number">98</span><span class="token punctuation">,</span><span class="token string">'王五'</span><span class="token punctuation">:</span><span class="token number">45</span><span class="token punctuation">}</span>
<span class="token comment">#获取所有的键</span>
keys<span class="token operator">=</span>scores<span class="token punctuation">.</span>keys<span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>keys<span class="token punctuation">)</span>  <span class="token comment">#dict_keys(['张三', '李四', '王五'])</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>keys<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#&lt;class 'dict_keys'&gt;</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">list</span><span class="token punctuation">(</span>keys<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#将所有键key 组成的视图转成类表</span>

<span class="token comment">#获取所有的values</span>
values<span class="token operator">=</span>scores<span class="token punctuation">.</span>values<span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>values<span class="token punctuation">)</span>        <span class="token comment">#dict_values([100, 98, 45])</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">type</span><span class="token punctuation">(</span>values<span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#&lt;class 'dict_values'&gt;</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">list</span><span class="token punctuation">(</span>values<span class="token punctuation">)</span><span class="token punctuation">)</span>

<span class="token comment">#获取所有的键值对</span>
items<span class="token operator">=</span>scores<span class="token punctuation">.</span>items<span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>items<span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">list</span><span class="token punctuation">(</span>items<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#元组()  转换之后的元素是由元组组成的</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br></div></div><h3 id="字典元素的遍历"><a href="#字典元素的遍历" class="header-anchor">#</a> 字典元素的遍历</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">for</span> item <span class="token keyword">in</span> scores<span class="token punctuation">:</span>
    <span class="token keyword">print</span><span class="token punctuation">(</span>item<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/19 22:08
@Version    :1.0
&quot;&quot;&quot;</span>

<span class="token comment">#字典元素的遍历</span>
scores<span class="token operator">=</span><span class="token punctuation">{</span><span class="token string">'张三'</span><span class="token punctuation">:</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token string">'李四'</span><span class="token punctuation">:</span><span class="token number">98</span><span class="token punctuation">,</span><span class="token string">'王五'</span><span class="token punctuation">:</span><span class="token number">45</span><span class="token punctuation">}</span>
<span class="token comment">#字典元素的遍历</span>
<span class="token keyword">for</span> item <span class="token keyword">in</span> scores<span class="token punctuation">:</span>
    <span class="token keyword">print</span><span class="token punctuation">(</span>item<span class="token punctuation">,</span>scores<span class="token punctuation">[</span>item<span class="token punctuation">]</span><span class="token punctuation">,</span>scores<span class="token punctuation">.</span>get<span class="token punctuation">(</span>item<span class="token punctuation">)</span><span class="token punctuation">)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div><h2 id="字典的特点"><a href="#字典的特点" class="header-anchor">#</a> 字典的特点</h2> <ul><li>字典的特点
<ul><li><font color="#DC4040" size="4" face="黑体">字典中的所有元素都是一个key-value对，key不允许重复,value可以重复</font></li> <li><font color="#DC4040" size="4" face="黑体">字典中的元素都是无序的</font></li> <li><font color="#DC4040" size="4" face="黑体">字典中的key必须是不可变对象</font></li> <li><font color="#DC4040" size="4" face="黑体">字典也可以根据需要动态地伸缩</font></li> <li><font color="#DC4040" size="4" face="黑体">字典会浪费较大的内存，是一种使用空间换时间的数据结构</font></li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/19 22:15
@Version    :1.0
&quot;&quot;&quot;</span>

d<span class="token operator">=</span><span class="token punctuation">{</span><span class="token string">'name'</span><span class="token punctuation">:</span><span class="token string">'张三'</span><span class="token punctuation">,</span><span class="token string">'name'</span><span class="token punctuation">:</span><span class="token string">'李四'</span><span class="token punctuation">}</span> <span class="token comment">#key不晕重复 会出现值覆盖</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>d<span class="token punctuation">)</span>  <span class="token comment">#{'name': '李四'}</span>

d<span class="token operator">=</span><span class="token punctuation">{</span><span class="token string">'name'</span><span class="token punctuation">:</span><span class="token string">'张三'</span><span class="token punctuation">,</span><span class="token string">'nikename'</span><span class="token punctuation">:</span><span class="token string">'张三'</span><span class="token punctuation">}</span>  <span class="token comment">#value可以重复</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>d<span class="token punctuation">)</span>  <span class="token comment">#{'name': '张三', 'nikename': '张三'}</span>

lst<span class="token operator">=</span><span class="token punctuation">[</span><span class="token number">10</span><span class="token punctuation">,</span><span class="token number">20</span><span class="token punctuation">,</span><span class="token number">30</span><span class="token punctuation">]</span>
lst<span class="token punctuation">.</span>insert<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">,</span><span class="token number">100</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>lst<span class="token punctuation">)</span> <span class="token comment">#10,100,20,30</span>

<span class="token comment"># d={lst:100} #TypeError: unhashable type: 'list' key必须是不可变对象</span>
<span class="token comment"># print(d)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br></div></div><h2 id="字典生成式"><a href="#字典生成式" class="header-anchor">#</a> 字典生成式</h2> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/07/06.png" alt="01"></p> <ul><li>内置函数zip()
<ul><li><strong>用于将可迭代的对象作为参数,将对象中对应的元素打包成一个元祖,然后返回由这些返回由这些元组组成的列表</strong></li></ul></li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/07/07.png" alt="01"></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/19 22:28
@Version    :1.0
&quot;&quot;&quot;</span>

items<span class="token operator">=</span><span class="token punctuation">[</span><span class="token string">'Fruits'</span><span class="token punctuation">,</span><span class="token string">'Books'</span><span class="token punctuation">,</span><span class="token string">'Others'</span><span class="token punctuation">]</span>
price<span class="token operator">=</span><span class="token punctuation">[</span><span class="token number">96</span><span class="token punctuation">,</span><span class="token number">78</span><span class="token punctuation">,</span><span class="token number">85</span><span class="token punctuation">,</span><span class="token number">100</span><span class="token punctuation">,</span><span class="token number">120</span><span class="token punctuation">]</span>

d<span class="token operator">=</span><span class="token punctuation">{</span>item<span class="token punctuation">.</span>upper<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>price <span class="token keyword">for</span> item<span class="token punctuation">,</span>price <span class="token keyword">in</span> <span class="token builtin">zip</span><span class="token punctuation">(</span>items<span class="token punctuation">,</span>price<span class="token punctuation">)</span><span class="token punctuation">}</span> <span class="token comment">#以元素少 的列 进行生成</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>d<span class="token punctuation">)</span>   <span class="token comment">#{'FRUITS': 96, 'BOOKS': 78, 'OTHERS': 85}</span>
