​	ESC - Electronic Stability Control: <em>Audi, ŠKODA, SEAT,</em>
​	VDC - Vehicle Dynamics Control: <em>Alfa Romeo,</em>
​	VSA - Vehicle Stability Assist: <em>Honda,</em>
​	DSC - Dynamic Stability Control: <em>Jaguar, Land Rover, Mazda,</em>
​	PSM - Porsche Stability Management: <em>Porsche,</em>
​	DSTC - Dynamic Stability and Traction Control: <em>Volvo,</em></p> <h6 id="作用"><a href="#作用" class="header-anchor">#</a> 作用:</h6> <ul><li>Das System gegen <strong>Untersteuern(转向不足)</strong> und <strong>Übersteuern(转弯过度)</strong> - korrigiert Fahrfehler die das <em>Schleudern in Kurven</em> bewirken. Das ESP besteht mindestens aus <strong>ABS(制动防抱死系统), ASR(加速防滑控制) und GMR(偏航力矩控制)</strong>.</li></ul> <h6 id="原理"><a href="#原理" class="header-anchor">#</a> 原理:</h6> <ul><li>在干燥、潮湿、肮脏或湿滑的道路上进行规避机动往往会导致严重的交通事故。在智能传感器的帮助下，ESP® 每秒 25 次比较汽车是否行驶在驾驶员转向的地方。如果数值相互偏离，防滑系统会介入并初步降低发动机扭矩。如果这还不够，它还会制动单个车轮，从而产生必要的反作用力以使车辆保持在轨道上。</li></ul></blockquote> <h2 id="_2-abs-antiblockiersystem-制动-防抱死系统"><a href="#_2-abs-antiblockiersystem-制动-防抱死系统" class="header-anchor">#</a> 2. ABS(Antiblockiersystem, (制动)防抱死系统)</h2> <blockquote><p>ABS 来自德语 Antiblockiersystem， 英语为 anti-lock brake system。防抱死制动系统 (ABS) 最早由德国的博世公司于 1978 年生产。根据欧洲汽车制造商联盟组织的自愿承诺，从 2004 年开始，所有在欧洲销售的乘用车都按照法律标配了 ABS。从 2016 年起，125cc以上的摩托车将在整个欧盟强制安装 ABS。</p> <h6 id="作用-2"><a href="#作用-2" class="header-anchor">#</a> 作用:</h6> <ul><li>在汽车制动时，自动控制制动器制动力的大小，使车轮处于边滚边滑（滑移率在20%左右）的状态，以保证车轮与地面的附着力在最大值; <strong>防止车轮在制动时抱死，使车辆在规避障碍物的同时可以保持转向能力</strong>。</li> <li>没有ABS的车，汽车在遇紧急情况采取紧急刹车时，容易出现<em>轮胎抱死</em>，也就是<em>方向盘不能转动</em>，这样危险系数就会随之增加，很容易造成严重事故。</li></ul> <img src="F:/1.Fahren Lernen/Fahren Lernen.assets/image-20220516214515103.png" alt="image-20220516214515103" style="zoom:57%;"></blockquote> <h2 id="_3-asr-antriebsschlupfregelung"><a href="#_3-asr-antriebsschlupfregelung" class="header-anchor">#</a> 3. ASR(Antriebsschlupfregelung)</h2> <blockquote><p>ASR，来自德语 Antriebsschlupfregelung，英语为: <strong>Acceleration Slip Regulation, 加速防滑控制</strong>, 其他汽车生产厂商又叫 Traction control system(循迹控制系统, 牵引力控制系统)</p> <h6 id="原理-2"><a href="#原理-2" class="header-anchor">#</a> 原理:</h6> <p>在驱动轮打滑时ASR通过对比各轮子的转速，其电子系统判断出驱动轮打滑，降低发动机转速，从而减少动力输出，对打滑的驱动轮进行制动，减少打滑并保持轮胎与地面抓地力的最合适的动力输出。</p> <h6 id="作用-3"><a href="#作用-3" class="header-anchor">#</a> 作用:</h6> <ul><li><p>主要目的是<strong>防止汽车驱动轮在加速时出现打滑，并保持轮胎与地面抓地力的最合适的动力输出。<strong>特别是下雨下雪冰雹路冻等摩擦力较小的特殊路面上，当汽车加速时将滑动率控制在一定的范围内，从而防止驱动轮快速滑动。它的</strong>功能一是提高牵引力；二是保持汽车的行驶稳定</strong>。</p></li> <li><p>行驶在易滑的路面上，没有ASR的汽车加速时驱动轮容易打滑；如是<em>后驱动的车辆容易甩尾</em>，如是<em>前驱动的车辆容易方向失控</em>。有ASR时，汽车在加速时就不会有或能够减轻这种现象。在转弯时，如果发生驱动轮打滑会导致整个车辆向一侧偏移，当有ASR时就会使车辆沿着正确的路线转向;最重要的是车辆转弯时，一旦驱动轮打滑就会全车一侧偏移，这在山路上极度危险的，有ASR的车一般不会发生这种现象。</p></li></ul></blockquote> <h2 id="_4-tempomat-geschwindigkeitsregelanlage-定速巡航系统"><a href="#_4-tempomat-geschwindigkeitsregelanlage-定速巡航系统" class="header-anchor">#</a> 4. Tempomat(Geschwindigkeitsregelanlage, 定速巡航系统)</h2> <blockquote><p>定速巡航系统(CRUISE CONTROL SYSTEM) 缩写为CCS, 用于控制汽车的定速行驶。汽车一旦被设定为巡航状态时，发动机的供油量便由电脑控制，电脑会根据道路状况和汽车的行驶阻力不断地调整供油量，使汽车始终保持在所设定的车速行驶，而无需操纵油门减轻了疲劳, 不再看速度表，把注意力放在路面上，从而可以促进安全，同时减少了不必要的车速变化,可以节省燃料。</p></blockquote> <h2 id="_5-adaptive-cruise-control-acc-自适应巡航控制"><a href="#_5-adaptive-cruise-control-acc-自适应巡航控制" class="header-anchor">#</a> 5. Adaptive cruise control (ACC，自适应巡航控制)</h2> <blockquote><ul><li>ACC是<strong>自适应巡航系统</strong>，德语为 <strong>adaptive Geschwindigkeitsregelanlage</strong>，这种系统要比<strong>定速巡航系统(Tempomat)</strong> 更加先进、智能。</li></ul> <h6 id="作用-4"><a href="#作用-4" class="header-anchor">#</a> 作用：</h6> <ul><li><p>自适应巡航（ACC）是一项舒适性的辅助驾驶功能。如果车辆前方畅通，自适应巡航（ACC）将保持设定的巡航速度向前行驶。如果检测到前方有车辆，自适应巡航（ACC） 将自动制动以降低车速，与前车保持适当的距离，直到达到合适的巡航速度。</p></li> <li><p>ACC只是辅助性驾驶，驾驶员仍需观察前方路况并在必要时施加制动。</p></li> <li><p>ACC主要用于高速公路等干燥的直路上行驶，在城市内的道路上尽量不要使用。</p></li></ul> <h6 id="原理-3"><a href="#原理-3" class="header-anchor">#</a> 原理：</h6> <ul><li>配备ACC自适应巡航的汽车在车头的保险杠下面有一个测距雷达，这个雷达可以检测汽车与前方车辆的距离，打开了ACC系统，在前方汽车减速时，自己的汽车会自动减速，并且ACC系统可以实现自动跟车功能，从而降低驾驶员的劳动强度。</li></ul></blockquote> <h2 id="_6-spurhalteassistent-车道保持辅助系统"><a href="#_6-spurhalteassistent-车道保持辅助系统" class="header-anchor">#</a> 6.Spurhalteassistent(车道保持辅助系统)</h2> <blockquote><ul><li><p>车道保持辅助系统属于智能驾驶辅助系统中的一种，它可以在车道偏离预警系统（LDWS）的基础上对转向系统进行控制辅助车辆保持在本车道内行驶。</p></li> <li><p>车辆行驶时借助一个摄像头识别行驶车道的标识线将车辆保持在车道上提供支持。如果车辆接近识别到的标记线并可能脱离行驶车道，那么会通过方向盘的振动，或者是声音来提请驾驶员注意，并轻微转动方向盘修正行驶方向，使车辆处于正确的车道上，若方向盘长时间检测到无人主动干预，则发出报警，用来提醒驾驶人员。</p></li> <li><p>适用于车道线标记清楚的道路上; 不适用于路口处拐弯;</p></li></ul></blockquote> <h2 id="_7-bremsassistent"><a href="#_7-bremsassistent" class="header-anchor">#</a> 7. Bremsassistent</h2> <blockquote><p><strong>制动辅助</strong>系统就是<a href="https://de.wikipedia.org/wiki/Bremskraftverst%C3%A4rker" target="_blank" rel="noopener noreferrer">制动助力器<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，可确保在发生明显（紧急）制动操作时将触发紧急制动所需的踏板压力增加到最大可能的制动压力。</p></blockquote> <h2 id="_8-der-autonome-notbremsassistent"><a href="#_8-der-autonome-notbremsassistent" class="header-anchor">#</a> 8. Der Autonome Notbremsassistent</h2> <blockquote><p><strong>自动紧急制动辅助</strong>系统, 在发生危险时向驾驶员发出警告*（距离警告），<em>支持</em>紧急制动（制动辅助）<em>或</em>自动制动*。这是为了避免与障碍物碰撞或降低碰撞速度。一些紧急制动助手可以采取额外的安全措施。例如 如果与前车距离太小，则自动关闭油门并刹车。</p></blockquote></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/master/docs/70.人在德国/10.德国驾照/03.Fahrerassistenzsystem.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9
