mkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">路由选择<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="路由选择"><a href="#路由选择" class="header-anchor">#</a> 路由选择</h1> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220705160854522.png" alt="image-20220705160854522" style="zoom:67%;"> <h2 id="概念"><a href="#概念" class="header-anchor">#</a> 概念</h2> <blockquote><p>路由选择是指将分组从一个设备通过互联网络发往位于不同网络上的另一个设备的路径选择。路由器不关注网络中的主机，而只关注互联起来的网络以及通往各个网络的最佳路径。</p></blockquote> <blockquote><p>==路由表==存储在RAM中, 包含以下信息</p> <ul><li><p>直连网络(directly connected):</p></li> <li><p>远程网络连接:</p></li> <li><p>网络的详细信息:</p></li></ul></blockquote> <blockquote><p>==建立路由表的四种途径==:</p> <ul><li><p><code>直连路由</code>: 直接连接在路由器接口上的网络。</p></li> <li><p><code>静态路由</code>: 手工在路由器上建立路由表条目</p> <ul><li>优点:
<ul><li>不增加路由器CPU的开销，也就是说使用静态路由不需要动态路由那样占用CPU资源计算;</li> <li>不增加路由器间的带宽占用，也就是说在WAN 链接的使用中可以节省更多的费用;</li> <li>提高了安全性，因为管理员可以有选择地配置路由，使之只通过某些特定的网络;</li></ul></li> <li>缺点:
<ul><li>管理员必须真正地了解整个互联网络以及每台路由器间的连接方式，以便实现对这些路由的正确配置;</li> <li>管理员必须在所有路由器上(手工地)添加或者更新到此网络的路由,</li> <li>对于大型网络使用静态路由选择基本上是不可行的，因为配置静态路由选择会产生巨大的工作量。</li></ul></li></ul></li> <li><p><code>默认路由 S*</code>: 对于在路由选择表没有对应表项的网络，都将通过默认路由转发出去。</p> <ul><li>使用默认路由容易创建路由环路，因此使用时要特别小心!</li></ul></li> <li><p><code>动态路由</code>: 路由器根据协议发现网络并更新路由表。</p> <ul><li><p>分类:</p> <ul><li><p><code>IGP (Interior Gateway Proωcol，内部网关协议)</code>: 用于在同一个AS (Auωnomous System ，自治系统)中的路由器间交换路由选择信息。而AS 是一个位于共同管理域下的网络集合，其基本原理是将所有需要共享相同的路由选择表信息的路由器置于同一个AS中。</p> <ul><li><code>距离矢量协议</code>: 距离矢量协议通过判断距离确定当前到达远程网络的最佳路径。比如<code>RIP协议</code>采用跳数作为度量值</li> <li><code>链路状态协议</code>:
<ul><li>路由器将分别创建3个彼此独立的表。其中的一个表用来跟踪直接相连接的邻居，一个用来确定整个互联网络的拓扑结构，而另一个则用作路由选择表。</li> <li>链路状态路由器要比任一使用距离矢量路由选择协议的路由器了解更多地关于互联网络的情况。</li> <li>OSPF 是一个完完全全的链路状态路由选择协议。链路状态协议将包含有自身链接状态的更新发送到网络中其他所有直接连接的路由器上，然后再由这些路由器传播到它们的相邻设备。</li></ul></li> <li><code>混合型</code>: 混合型协议将同时具有距离矢量和链路状态两种协议的特性，例如EIGRP 。</li></ul></li> <li><p><code>EGP (Exterior Gateway Protocol ，外部网关协议)</code>:</p> <p>用于AS 之间的通信。EGP的一个典型示例是BGP (Border Gateway Protocol ，边界网关协议);</p></li></ul></li></ul></li></ul></blockquote> <blockquote><p>一条路由信息的组成:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R<span class="token operator"><span class="token file-descriptor important">1</span>&gt;</span>show <span class="token function">ip</span> route

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><ul><li><code>ip route</code> 用于创建静态路由的命令;</li> <li><code>destination_network</code> 要放置到路由选择表中的网络号。</li> <li><code>mask</code> 在此网络上使用的子网掩码。</li> <li><code>next-hop_address</code> 下一跳路由器上与本路由器直接相连的接口的IP地址</li> <li><code>exitinterface</code>  本路由器的出接口;</li> <li><code>administrative_distance</code> 默认情况下，静态路由的管理距离为1 (甚至可以是0，前提是使用输出接口(exitinterface) 替代下一跳地址)</li> <li><code>permanent</code> 如果接口被关闭或者路由器不能与下一跳路由器通信，默认情况下这一路由将

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><h3 id="静态路由的汇总"><a href="#静态路由的汇总" class="header-anchor">#</a> 静态路由的汇总</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220618124808186.png" alt="image-20220618124808186"></p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220618124855027.png" alt="image-20220618124855027"></p> <h2 id="默认路由"><a href="#默认路由" class="header-anchor">#</a> 默认路由</h2> <blockquote><ul><li><p>静态路由的特殊形式, 一般设置在<code>存根路由器</code>或者<code>连接WAN的路由器</code>上;</p> <ul><li>存根路由器(stub router)。存根表示这个示例中的网络只有通往所有其他网络的一条路径。</li></ul></li> <li><p>对于在路由选择表没有对应表项的网络，都将通过默认路由转发出去。</p></li> <li><p>使用默认路由容易创建路由环路，因此使用时要特别小心!</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R3<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip route 0.0.0.0 0.0.0.0 10.1.5.1</span>
R3<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip classless</span>
R3<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#do show ip route</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><blockquote><ul><li>几乎所有思科路由器都是有类路由器，也就是说，路由器的每个接口预设使用默认的子网掩码。当路由器接收到一个目的子网不在路由选择表中的分组时，默认将丢弃这个分组。因此，如果在配置中使用了默认路由选择，这里就必须使用<code>ip classless</code>命令;</li> <li>IOS 版本为12.4，默认情况下这个ip classless 命令处于启用状态，因此在配置中可以不执行这个命令。在配置默认路由选择时，如果没有执行过这个命令，并且对路由器进行过子网划分，那么就需要添加这个命令。</li></ul></blockquote></li></ul></blockquote> <blockquote><p>如果你在互联网络中已经配置好了最终网关，命令<code>ip default-network ip地址</code>会是另一个非常有用的命令.</p> <p>一个需要使用最终网关配置语句的示例:</p> <p><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicGo/img/202207071305104.png" alt="image-20220707124138160"></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Gateway<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#ip default-network network</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>当对路由器配置了一个IGP (Interior Gateway Protocol ，内部网关协议)时，如RIP ，命令<code>ip default-network</code>将会在边界路由器上通告这个默认网络的信息。这样，此互联网络中的其他路由器
将接收这个信息，并自动地设置这个路由为默认路由。</p></blockquote> <h2 id="动态路由"><a href="#动态路由" class="header-anchor">#</a> 动态路由</h2> <blockquote><ul><li><p>动态路由: 通过网络发现和共享路由表信息, 路由器可以自动发现网络, 并更新和维护路由表</p></li> <li><p>分类:</p> <ul><li><p><code>IGP (Interior Gateway Proωcol，内部网关协议)</code>: 用于在同一个AS (Auωnomous System ，自治系统)中的路由器间交换路由选择信息。而AS 是一个位于共同管理域下的网络集合，其基本原理是将所有需要共享相同的路由选择表信息的路由器置于同一个AS中。</p> <ul><li><code>距离矢量协议</code>: 距离矢量协议通过判断距离确定当前到达远程网络的最佳路径。比如<code>RIP协议</code>采用跳数作为度量值</li> <li><code>链路状态协议</code>:
<ul><li>路由器将分别创建3个彼此独立的表。其中的一个表用来跟踪直接相连接的邻居，一个用来确定整个互联网络的拓扑结构，而另一个则用作路由选择表。</li> <li>链路状态路由器要比任一使用距离矢量路由选择协议的路由器了解更多地关于互联网络的情况。</li> <li>OSPF 是一个完完全全的链路状态路由选择协议。链路状态协议将包含有自身链接状态的更新发送到网络中其他所有直接连接的路由器上，然后再由这些路由器传播到它们的相邻设备。</li></ul></li> <li><code>混合型</code>: 混合型协议将同时具有距离矢量和链路状态两种协议的特性，例如EIGRP 。</li></ul></li> <li><p><code>EGP (Exterior Gateway Protocol ，外部网关协议)</code>:</p> <p>用于AS 之间的通信。EGP的一个典型示例是BGP (Border Gateway Protocol ，边界网关协议);</p></li></ul></li></ul></blockquote> <h3 id="动态路由协议的分类"><a href="#动态路由协议的分类" class="header-anchor">#</a> 动态路由协议的分类</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220619113100182.png" alt="image-20220619113100182"></p> <blockquote><p>CCNA阶段只学习<strong>内部网关协议(Internal Gateway Protocols)</strong>:</p> <ul><li>==距离矢量协议==:
<ul><li>RIPv1协议(基本淘汰)</li> <li>RIPv2</li> <li>IGRP协议: 思科设备上专用的(基本淘汰)</li></ul></li> <li>==链路状态协议==:
<ul><li>OSPF协议</li> <li>IS-IS协议: 运营商使用的</li></ul></li> <li>==混合型==:
<ul><li>EIGRP</li></ul></li></ul></blockquote> <h4 id="距离矢量-distance-vector-路由协议"><a href="#距离矢量-distance-vector-路由协议" class="header-anchor">#</a> 距离矢量(distance-vector)路由协议</h4> <blockquote><p>距离矢量路由选择算法发送<code>完整的路由选择表</code>到相邻的路由器，然后相邻的路由器将接收到的路由表项与它们原有的路由选择表合井，以完善自己的路由选择表。由于路由器接收到的更新信息只是相邻路由器对于远程网络的认知，路由器并不会自己查证这些内容，所以这一方式又被戏称为<code>传闻路由</code>。</p> <h5 id="应用场景"><a href="#应用场景" class="header-anchor">#</a> 应用场景:</h5> <ul><li>网络结构简单扁平, 不需要特殊的分层设计;</li> <li>管理员没有足够的知识来配置链路状态协议和故障排查;</li> <li>特定类型的网络拓扑结构, 如集中星型(Hub-and-Spoke)网络;</li> <li>无需关注网络最差情况下的收敛时间;</li></ul></blockquote> <h4 id="链路状态协议"><a href="#链路状态协议" class="header-anchor">#</a> 链路状态协议</h4> <blockquote><h5 id="应用场景-2"><a href="#应用场景-2" class="header-anchor">#</a> 应用场景:</h5> <ul><li>网络进行了分层设计, 大型网络通常如此;</li> <li>管理员对于网络中采用的链路状态路由协议非常熟悉;</li> <li>网络对于收敛速度的要求极高;</li></ul></blockquote> <blockquote><h5 id="链路状态-link-state"><a href="#链路状态-link-state" class="header-anchor">#</a> 链路状态(Link-State):</h5> <ul><li>链路状态路由协议向全网扩散链路状态信息;</li> <li>链路状态路由协议当网络结构发生变化立即发送更新信息;</li> <li>链路状态路由协议只发送需要更新的信息</li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620190709680.png" alt="image-20220620190709680" style="zoom:40%;"> <h3 id="路由选择协议基础"><a href="#路由选择协议基础" class="header-anchor">#</a> 路由选择协议基础</h3> <h4 id="管理距离-administrative-distance"><a href="#管理距离-administrative-distance" class="header-anchor">#</a> ==管理距离(Administrative Distance)==</h4> <blockquote><ul><li><p>作用: 用于衡量路由协议的可靠性, 各种路由协议都有默认的AD, 有助于确定路由路径;</p></li> <li><p>每一种路由协议按可靠性从高到低，依次分配一个信任等级，这个信任等级就叫管理距离。管理距离是一个从0~255的整数值，0是最可信赖的，而255意味着这个路由不会被使用。</p></li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220618190415618.png" alt="image-20220618190415618"></p> <p>==AD 和 metric的查看==:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Router<span class="token operator">&gt;</span> show <span class="token function">ip</span> route
S        <span class="token number">10.10</span>.10.0/24 <span class="token punctuation">[</span><span class="token number">1</span>/0<span class="token punctuation">]</span> via <span class="token number">10.12</span>.12.1   <span class="token comment"># 1 代表AD; 0 代表 metric</span>
S        <span class="token number">10.10</span>.20.0/24 <span class="token punctuation">[</span><span class="token number">1</span>/0<span class="token punctuation">]</span> via <span class="token number">10.23</span>.23.2
C        <span class="token number">10.12</span>.12.0/30 is directly connected, Ethernet0/1
L        <span class="token number">10.12</span>.12.2/32 is directly connected, Ethernet0/1
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>==查看指定路由条目的信息==:</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router<span class="token operator">&gt;</span> show <span class="token function">ip</span> route <span class="token number">10.10</span>.10.0
Routing entry <span class="token keyword">for</span> <span class="token number">10.10</span>.10.0/24
Known via <span class="token string">&quot;static&quot;</span>, distance <span class="token number">1</span>, metric <span class="token number">0</span>
Routing Descriptor Blocks:
  * <span class="token number">10.12</span>.12.1
      Route metric is <span class="token number">0</span>, traffic share count is <span class="token number">1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div></blockquote> <h4 id="度量值-metrics"><a href="#度量值-metrics" class="header-anchor">#</a> ==度量值 metrics:==</h4> <blockquote><p>使用同一种路由协议时用来表征到达远程网络的路由开销的值,用于确定最佳的路由路径;</p> <p>IP路由协议中使用的度量如下:</p> <ul><li>带宽: EIGRP</li> <li>开销: OSPF, IS-IS</li> <li>延迟: EIGRP</li> <li>跳数: RIP</li> <li>负载: EIGRP</li> <li>可靠性: EIGRP</li></ul></blockquote> <blockquote><p><strong>相同路由协议内部到达同一目的网段有多条路径时，比较最佳路径的参数</strong>; <strong>管理距离AD是不同路由协议之间比较选路的参数</strong>。</p></blockquote> <blockquote><ul><li>如果路由器接收了两个对<code>同一远程网络</code>的更新信息，路由器会首先检查更新信息的AD。如果被通告的路由中有一个的AD 值比另一个的低，那么这个拥有较低AD 值的路由将被放置在路由选择表中。</li> <li>如果被通告的到<code>同一网络的两个路由具有相同的AD</code>，那么路由选择协议的度量值(如跳计数或链路的带宽)将被用作判断到达远程网络最住路径的依据。带有最低度量值的、被通告的路由将被放置在路由选择表中。</li> <li>如果两个被通告的<code>同一网络的路由拥有相同的AD以及相同的度量值</code>，这时该路由选择协议将会在这一远程网络中使用负载均衡(也就是将所发送的分组分配到每个链路上)。</li></ul></blockquote> <h3 id="rip"><a href="#rip" class="header-anchor">#</a> RIP</h3> <blockquote><p>==RIP(Routing Information Protocols, 路由信息协议)==只使用跳计数判定到达某个网络的最佳路径。如果RIP发现对于同一个远程网络存在多个具有相同跳计数的链路，则RIP 将自动执行循环负载均衡。RIP可以对多达6个(默认为4个)等价链路实现负载均衡。</p> <p>==特点==:</p> <ul><li><p>适用于小型同类网络;</p></li> <li><p>基于UDP协议, 端口号 520; 组播方式，其地址为224.0.0.9</p></li> <li><p>AD 为 120;</p></li> <li><p>以hop值作为度量值, 超过 15跳, 则认为不可达;</p></li> <li><p>默认负载均衡数量为4, 可以通过 <code>maximum-paths</code> 修改, 最大值为6;</p> <ul><li><p>然而，当两条通往同一远程网络的链路具有不同的带宽，但是有相同的跳计数时，这种类型的路由度量将会导致问题。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207071401265.png" alt="image-20220707140106135"></p></li></ul></li> <li><p>每隔30s进行周期性路由表更新;</p></li> <li><p>RIP协议存在一个问题，就是它的会聚时间较长。</p></li></ul> <p>==RIP协议依赖三种定时器维护其数据库==:</p> <ul><li><code>路由更新定时器</code> 用于设置路由更新的时间间隔(通常为30 秒)，此间隔是路由器发送自己路由选择表的完整副本给所有相邻路由器的时间间隔。</li> <li><code>路由失效定时器</code>: 用于路由器在最终认定一个路由为失效路由之前需要等待的时长(通常为180 秒)。如果在这个认定等待时间里，路由器没有得到任何关于特定路由的更新消息，路由器将认定这个路由失效。出现这一情况时，路由器会给所有相邻设备发送关于此路由已经无效的更新。</li> <li><code>保持失效定时器</code>: 用于设置路由选择信息被抑制的时长。当路由器接收到某个表示路由不可达的更新分组时，它将进入保持失效状态。这→保持状态将一直持续到路由器接收到具有更好度量的更新分组，或初始路由恢复正常，或者此保持失效定时器期满。默认情况下，该定时器的取值为180秒。</li> <li><code>路由刷新定时器</code>: 用于设置将某个路由认定为无效路由起至将它从路由选择表中删除的时间间隔(通常为240 秒)。在将此路由从路由选择表中删除之前，路由器会将此路由即将消亡的消息通告给相邻设备。路由失效定时器的取值一定要小于路由刷新定时器的值。这就为路由器在更新本地路由选择表时先将这一无效路由通告给相邻设备保留了足够的时间。</li></ul></blockquote> <h4 id="ripv1-ripv2"><a href="#ripv1-ripv2" class="header-anchor">#</a> RIPv1 &amp; RIPv2:</h4> <blockquote><p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207071500296.png" alt="image-20220707150025172"></p> <p>RIPv1(已淘汰):</p> <ul><li>仅支持<code>有类的路由选择</code>(即网络中的所有设备都必须使用相同的子网掩码), 不支持 VLSM;</li> <li>以广播的形式发送更新报文;</li> <li>不支持认证;</li></ul> <p>RIPv2:</p> <ul><li>支持无类路由协议, 支持VLSM;</li> <li>以组播的形式发送更新报文;</li> <li>支持明文和MD5的认证</li></ul> <blockquote><p>我想给出一句忠告:在网络配置中，不管是哪个版本的RIP，我都不推荐使用。由于RIP是一个开放的标准，它可以用于任意品牌的路由器。但是需要注意的是OSPF(将在第9章中讨论)也是一个开放的标准，所以在相同的情况下你同样可以选择OSPF。</p></blockquote></blockquote> <h4 id="rip执行过程"><a href="#rip执行过程" class="header-anchor">#</a> RIP执行过程:</h4> <blockquote><ol><li><p>Cold Start: 在配置好接口的IP地址后, <code>直连路由</code>会首先加入到路由表中;</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220618191729508.png" alt="image-20220618191729508"></p></li> <li><p>Initial Exchange: 相邻的路由器进行首次路由表的信息交换(hop值要加1)</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220618192403739.png" alt="image-20220618192403739"></p></li> <li><p>相邻的路由器再次进行路由表的信息交换, 直到路由表是完备的, 即收敛完成;</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220619105753060.png" alt="image-20220619105753060"></p></li></ol></blockquote> <h4 id="路由环路"><a href="#路由环路" class="header-anchor">#</a> 路由环路:</h4> <blockquote><ul><li><p>距离矢量路由选择协议会在所有激活的接口上定期广播路由更新，以此跟踪互联网络中的任何改变。广播内容包括整个路由选择表。这一方案是可行的，只是需要占用一定的CPU 处理资源和链路带宽。</p></li> <li><p>但是，当某个网络瘫痪时， 真正的问题就有可能会出现，特别是距离矢量路由选择协议的慢会聚，最终会导致不一致的路由选择表和路由环路。</p></li> <li><p>导致路由环路的原因可能是每台路由器不能同时或近乎同时地更新路由选择表。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207071408901.png" alt="image-20220707140855766"></p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207071409109.png" alt="image-20220707140911017"></p></li> <li><p>路由环路的概念: 指数据包在一系列路由器之间构成闭环的路由路径, 而无法到达目的网络的一种现象</p></li> <li><p>==路由环路的恶劣影响==:</p> <ul><li>环路内的路由器占用链路带宽来反复收发流量;</li> <li>路由器的CPU因不断循环数据包而不堪重负;</li> <li>影响到网络收敛;</li> <li>路由更新可能会丢失或无法得到及时的处理;</li></ul></li> <li><p>==消除路由环路的机制==:</p> <ol><li><code>定义最大跳数值</code>, 防止计数至无穷大; 比如RIP的hop值最大为15</li> <li><code>抑制计时器</code>: 一条路由信息无效之后，一段时间内这条路由都处于抑制状态，即在一定时间内不再接收关于同一目的地址的路由更新。大概过程是如果一个路由器从邻居路由器收到一条更新，提示以前可达的网络现在不可达了，或有一个更大跳数的路由，则路由器标识该路由为不可达并启动一个抑制计时器，如果在定时器到时之前收到该路由又可达的更新，或者新度量值比之前的度量值更好，则路由器标识这个路由可达并删除定时器。路由器从一个网段上得知一条路径失效，然后，立即在另一个网段上得知这个路由有效。这个有效的信息往往是不正确的，抑制计时避免了这个问题，而且，当一条链路频繁起停时，抑制计时减少了路由的浮动，增加了网络的稳定性。</li> <li><code>水平分割</code>: 这是一个在距离矢量网络中为了减少错误路由信息和路由选择开销的强制传送规则，其具体做法是禁止向学习到该路由条目的接口回传路由选择信息(即传送方向不能与信息接收方向一致)。</li> <li><code>路由中毒</code>: 避免因路由表更新不一致而导致的问题
<ul><li>某路由条目失效时，会立刻向网络中所有节点发送某条路由的路由更新，这条路由更新中该路由的跳数为16或者不可达。 当相邻的路由器收到该中毒路由, 就可以通过其度量值为无穷大明白该路由是无效的。距离矢量路由协议使用路由中毒来告诉其他路由器，某条路由已经失效无法传送数据到目的地址，不要将该路由加入其他路由器的路由表。<code>中毒反转</code>: 收到路由中毒消息的路由器，不遵守水平分割原则而是将中毒的路由消息转发给所有的相邻路由器，也包括发送中毒信息的源路由器，确认通告相邻路由器这条路由信息己失效了。主要目的是达到快速收敛的目的。</li></ul></li> <li><code>触发更新</code>: 当路由表发生变化时，更新报文立即广播给相邻的所有路由器，而不是等待30秒的更新周期。同样，当一个路由器刚启动RIP时，它广播请求报文。收到此广播的相邻路由器立即应答一个更新报文，而不必等到下一个更新周期。这样，网络拓扑的变化会最快地在网络上传播开，减少了路由循环产生的可能性。</li></ol></li></ul></blockquote> <h4 id="配置rip"><a href="#配置rip" class="header-anchor">#</a> 配置RIP:</h4> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router rip</span>
Corp<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#version 2   # 默认的版本号介于 1和2之间, 发送为1, 接收为1或2;</span>
Corp<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 各接口的网段地址 或者直接 0.0.0.0</span>
Corp<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#no auto-summary</span>

Corp<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#passive-interface e0/0   # 限制RIP更新从指定接口向 LAN 和WAN 中扩散, 这个命令将阻止向外传播RIP 更新，但它并不阻止 对RIP更新的接收。</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><h6 id="其他错误排查命令"><a href="#其他错误排查命令" class="header-anchor">#</a> 其他错误排查命令:</h6> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">sh</span> run <span class="token operator">|</span> s r r  <span class="token comment"># 查看Rip协议的配置</span>
show running-config <span class="token operator">|</span> section router rip

<span class="token function">sh</span> <span class="token function">ip</span> rip database

<span class="token function">clear</span> <span class="token function">ip</span> route *    <span class="token comment"># 清除直连路由以外所有的路由协议</span>

show <span class="token function">ip</span> route    <span class="token comment"># 显示路由表</span>
show <span class="token function">ip</span> protocols  <span class="token comment"># 可以显示在路由器上己配置的路由选择协议</span>
show <span class="token function">ip</span> interface brief

debug <span class="token function">ip</span> rip  <span class="token comment"># 命令debug ip rip 可以将路由器上正在发送和接收的路由更新显示到控制台会话中。如果到路由器的连接是通过远程登录建立的，则我们需要使用 terminal monitor 命令接收 debug命令的输出。</span>
在下
undebug all  <span class="token comment"># 关闭所有的debug进程</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><h4 id="在ripv2的基础上配置默认路由-并通告lan内其他路由器"><a href="#在ripv2的基础上配置默认路由-并通告lan内其他路由器" class="header-anchor">#</a> 在RIPv2的基础上配置默认路由, 并通告LAN内其他路由器</h4> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207071550253.png" alt="image-20220707155007144"></p> <hr> <h3 id="eigrp-协议"><a href="#eigrp-协议" class="header-anchor">#</a> EIGRP 协议</h3> <blockquote><p>https://www.bilibili.com/video/BV1V94y1U7Sr?spm_id_from=333.337.search-card.all.click&amp;vd_source=119094ee4687100c40882d3b8b8ff3e1</p></blockquote> <blockquote><p>Enhanced Interior Gateway Routing Protocol 即 增强型内部网关路由协议。</p> <ul><li><p>EIGRP结合了<code>链路状态</code>和<code>距离矢量</code>==混合型==路由选择协议的Cisco专用协议，</p> <ul><li>EIGRP 不会像OSPF那样发送链路状态数据包，相反，它所发迭的是传统的距离矢量更新，在此更新中包含有网络信息以及从发出通告的路由器达到这些网络的开销。</li> <li>EIGPR 也拥有链路状态的特性，它会在启动时同步相邻路由器上的路由表，并在每次拓扑结构发生改变时发送特定的更新数据;</li></ul> <blockquote><p>这使EIGRP 非常适用于特大型的网络应用。EIGRP的最大跳计数为255(其默认设置为100)。不要为这样的描述而困惑. EIGRP 不会像RIP那样使用跳计数作为度量; 对于EIGRP来说，跳计数只是用来限定EIGRP路由更新数据包在被抛弃之前可以经过的路由器个数。同样，这个数值也是限定AS的大小的，而与如何计算度量无关。</p></blockquote></li> <li><p>采用==弥散修正算法（DUAL）==来实现<a href="https://baike.baidu.com/item/%E5%BF%AB%E9%80%9F%E6%94%B6%E6%95%9B/6202142" target="_blank" rel="noopener noreferrer">快速收敛<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，可以不发送定期的路由更新<a href="https://baike.baidu.com/item/%E4%BF%A1%E6%81%AF/111163" target="_blank" rel="noopener noreferrer">信息<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>以减少<a href="https://baike.baidu.com/item/%E5%B8%A6%E5%AE%BD/266879" target="_blank" rel="noopener noreferrer">带宽<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>的占用.</p></li> <li><p>是一个无类(它的路由更新中包含了子网掩码)、增强的距离矢量协议，协议中也使用了<code>自治系统</code>的概念来描述相邻路由器的集合，处于自治系统中的路由器使用相同的路由选择协议并共享相同的路由选择信息。</p> <blockquote><p>EIGRP 在它的路由更新中包含了子网掩码，因为它被认为是无类的协议。正如我们现在所知道的，对子网掩码信息进行通告，将使我们可以在设计网络时使用VLSM (Variable Length Subnet Mask,可变长子网掩码)及人工汇总!</p></blockquote></li></ul> <h6 id="特点"><a href="#特点" class="header-anchor">#</a> 特点:</h6> <ul><li>高级的距离矢量路由协议: 具有距离矢量性和链路状态协议特征;</li> <li>通过使用PDM (Protocol-DependentModule， 协议相关模块）可以为多种网络层协议提供路由支持，这些网络层协议可以是IP、IPX 、AppleTalk 以及现在使用的IPv6. (很显然我们不会再使用IPX和AppleTalk了，但是EIGRP仍对它们提供了支持。</li> <li>基于弥散更新算法(DUAL) 的快速收敛和最佳路径选择, 100%无环路;</li> <li>Designed to be used within a single autonomous system;</li> <li>无类的路由协议(与RIPv2 和OSPF 一样); 支持VLSM和CIDR, 和不连续子网;</li> <li>路由条目不过期, 拥有备份路由;</li> <li>高效的邻居发现, 触发式更新; 组播方式, 地址为 224.0.0.10</li> <li>较低的路由更新开销: EIGRP 只在启动时同步整个路由选择数据库，之后只在有变化时传送变动的部分，从而维持路由选择数据库的连贯性。</li> <li>配置简单</li> <li>基于<code>可靠传输协议(RTP)</code> 的通信;</li></ul></blockquote> <h4 id="邻居发现"><a href="#邻居发现" class="header-anchor">#</a> 邻居发现</h4> <blockquote><p>在EIGRP路由器彼此进行路由交换之前，它们必须首先成为邻居。要建立邻居关系，必须满足3个条件:</p> <ul><li><p>收发到Hello包; (用于发现以及维持邻居关系)</p></li> <li><p>实现AS号的匹配; 分处于不同自治系统(AS) 中的EIGRP路由器，不会成为邻居, 更不会自动共享路由选择信息;</p> <blockquote><p>在这里，唯一需要关注的就是，在不同AS之间可以进行的手工设定再发布信息。</p></blockquote></li> <li><p>相同的度量(K值)。</p></li></ul></blockquote> <h4 id="支持大型网络"><a href="#支持大型网络" class="header-anchor">#</a> 支持大型网络</h4> <blockquote><p>EIGRP具有许多的强大功能，这使它非常适用于大型的网络:</p> <ul><li><p>在单个路由器上支持多个AS;</p> <ul><li>EIGRP 使用自治系统号来区别可共享路由信息的路由器集合。路由信息只可以在拥有相同自治系统号的路由器间共享。</li></ul> <blockquote><ul><li><p>内部EIGRP路由的管理距离(AD) 是90 ，这些路由产生于同一个自治系统。</p></li> <li><p>外部EIGRP路由的AD是170 ，这并不是一个很高的级别。这些出现在EIGRP路由表内的路由通常是由人工再发布的，它们所描述的网络位于EIGRP自治系统外部。</p></li> <li><p>来自于另一个EIGRP自治系统，或者另一种路由选择协议(如OSPF)，当在EIGRP内部再发布时，这些路由都被称为外部路由。</p></li></ul></blockquote></li> <li><p>支持VLSM和汇总, 支持不连续子网;</p> <blockquote><h6 id="什么是不连续网络"><a href="#什么是不连续网络" class="header-anchor">#</a> 什么是不连续网络?</h6> <p>是将一个有类网络的两个或更多的子网通过另一个有类网络连接在一起的互连网络。</p> <ul><li><p>不连续网络在RIPv1 或思科 IGRP 下是不能正常工作的，认识到这一点很重要。</p></li> <li><p>并且，不连续网络在默认配置的 RIPv2 或 EIGRP 应用中也是不工作的，但在OSPF的默认配置中可以工作，这是因为OSPF不像EIGRP一样能进行自动汇总。</p></li></ul> <p>如下: 子网172.16.10.0 和172.16.20.0 通过 10.3.1.0 网络连接在了一起。默认情况下，出于路由通告的需求，每个路由器都会将这个网络视为是172.16.0.0 的有类网络。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207071713700.png" alt="image-20220707171320564"></p></blockquote></li> <li><p>路由发现和维护。</p></li></ul></blockquote> <h4 id="dual算法的一些术语"><a href="#dual算法的一些术语" class="header-anchor">#</a> DUAL算法的一些术语:</h4> <blockquote><p>Diffusing Update Algorithm, 用于计算最佳无环路径和备用路径</p> <p>==特点==:</p> <ul><li>无环拓扑</li> <li>随时的备用路径</li> <li>快速收敛: DUAL为EIGRP提供的路由会聚时间有可能是所有协议中最快的。</li> <li>支持VLSM;</li> <li>低带宽利用率(通过限定带宽实现)</li></ul> <p>==DUAL算法中的几个术语:==</p> <ul><li><code>可行距离(Feasible Distance)</code>: 本路由器到达目标网络的开销Cost; 这个具有最低FD 的路由被认为是最佳路由，也只有它会出现在路由选择表中。</li> <li><code>通告距离(Advertised Distance)</code>: 当前路由器的下一跳路由器到达目标网络的开销Cost, 这是一个由邻居报告的到达远程网络的度量;</li> <li><code>后继路由器(Successor)</code>: 到达目的网络的最优(FD最小)的下一跳路由器</li> <li><code>可行后继路由器(Feasible Successor)</code>: A backup route if the successor fails. The FS must have a AD that is less than the Successor FD.</li> <li><code>可行性条件(Feasible Condition):</code> <strong>AD &lt; FD~min~</strong> , In order for the route to be a feasible successor, its advertised distance must be less than the feasible distance of the successor route.</li></ul></blockquote> <h4 id="eigrp的三张表"><a href="#eigrp的三张表" class="header-anchor">#</a> EIGRP的三张表:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620123920975.png" alt="image-20220620123920975" style="zoom:37%;"> <blockquote><ul><li><p>邻居关系表通常又称为邻居表，记录已建立好邻居关系的路由器的相关信息。</p></li> <li><p>拓扑表保存着来自每个邻居的有关互联网络中各个路由描述的路由通告。</p></li> <li><p>路由表保存当前正在使用的用于路由判断的路由。对于每个由EIGRP支持的协议所产生的;</p></li></ul> <p>每个表，这里都保存有一个独立的副本，这些协议可以是IPv4 或IPv6 。</p></blockquote> <blockquote><ul><li>由于<code>继任者路由</code>具有到达远程网络的最佳路径，它是要被放在路由选择表中的。然而，拓扑表拥有到达每个网络的链路，因此，继任者路由存放于拓扑表和路由选择表。</li> <li>每个到达远程网络的次级路由都被认为是<code>可行的继任者</code>，这些路由只能在拓扑表中找到，并且在主路由出现问题时它们被用于备份路由。</li></ul></blockquote> <h4 id="eigrp的数据包"><a href="#eigrp的数据包" class="header-anchor">#</a> EIGRP的数据包:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620124143638.png" alt="image-20220620124143638" style="zoom:50%;"> <p>EIGRP 的 hello报文 是通过 RTP 协议发送的, 而不是 TCP或者 UDP;</p> <h4 id="eigrp的metric"><a href="#eigrp的metric" class="header-anchor">#</a> EIGRP的metric:</h4> <blockquote><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207071722269.png" alt="image-20220702193350733" style="zoom:80%;"> <p>与许多其他的只使用单一要素来比较并选择最佳可用路径的胁议不同，EIGRP 使用了一个由4个要素组成的度量，即所谓的合成度量:</p> <ul><li>带宽 Bandwidth</li> <li>延迟 Delay</li> <li>可靠性 Reliability</li> <li>负载 Loading</li> <li>MTU</li></ul> <p>默认情况下， EIGRP 只使用带宽和线路的延迟来判定到达远程网络的最佳路径。有时思科喜欢称它们为<code>路径带宽值</code>和<code>线路延迟累积值</code>。</p> <p>另外，值得注意的是，还有第5个元素，最大传输单元(MTU) 尺寸。这个元素在EIGRP的度量计算中从没有被用到过，但是在一些与EIGRP 相关的命令中，它是一个必需的参数，特别是那些涉及再发布的命令。MTU元素的值表示去往目的网络过程中所遇到的最小MTU值。</p></blockquote> <blockquote><ul><li>以上参数绑定于接口, 可通过 <code>show interfaces e0/0</code> 查看;</li> <li>也可以在接口模式下设置其他值, 只会参与 metrics 的计算, 不会产生实际的效果</li></ul> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>Router<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#bandwidth ?</span>
 <span class="token operator">&lt;</span><span class="token number">1</span>-1000000<span class="token operator"><span class="token file-descriptor important">0</span>&gt;</span>   Bandwidth <span class="token keyword">in</span> kilobits
 inherit        Specify how bandwidth is inherited
 qos-reference  Reference bandwidth <span class="token keyword">for</span> QOS <span class="token builtin class-name">test</span>
 receive        Specify receive-side bandwidth

Router<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#delay ?   </span>
 <span class="token operator">&lt;</span><span class="token number">1</span>-1677721<span class="token operator"><span class="token file-descriptor important">5</span>&gt;</span>  Throughput delay <span class="token punctuation">(</span>tens of microseconds<span class="token punctuation">)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div></blockquote> <h4 id="最大路径数和跳计数"><a href="#最大路径数和跳计数" class="header-anchor">#</a> 最大路径数和跳计数</h4> <blockquote><ul><li><p>默认情况下， EIGRP 默认支持4 条链路的等代价的负载均衡(RIP也可以做到)。然而，通过使用下列命令，可以使EIGRP 实际用于实现负载均衡的链路(平衡或不平衡的)数量达到16:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Rl<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router eigrp 10</span>
Rl<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#maximum-paths ?</span>
<span class="token operator">&lt;</span><span class="token number">1</span>-1<span class="token operator"><span class="token file-descriptor important">6</span>&gt;</span> Number of paths
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li> <li><p>此外， EIGRP 默认的最大跳计数值为100，但它可以被设置到255 。通常不需要修改这个值，但是如果需要，可以这样做:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Rl<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router eigrp 10</span>
Rl<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#metric maximum-hops ?</span>
<span class="token operator">&lt;</span><span class="token number">1</span>-25<span class="token operator"><span class="token file-descriptor important">5</span>&gt;</span> Hop count
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><blockquote><p>注意，尽管在路径度量计算中不使用跳计数，但路由器仍会使用这个最大跳计数来限制AS的范围。</p></blockquote></li></ul></blockquote> <h4 id="配置"><a href="#配置" class="header-anchor">#</a> 配置:</h4> <blockquote><h6 id="requirements-match"><a href="#requirements-match" class="header-anchor">#</a> Requirements match?</h6> <ul><li>Autonomous-System ID</li> <li>K-values</li> <li>in the same Autonomous System</li> <li>Authentication(optional)</li></ul></blockquote> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Router<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router eigrp AS编号   # Autonomous-System, 相邻的路由器必须使用同一个编号的自治系统; 在这里AS 号的具体数值是什么不重要, 这个数值可以取1 到65536 中的任何一个。</span>
Router<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">##network 网段地址  # 记住，与使用RIP相同，这里使用的是有类的网络地址, 即掩码中所有的子网和主机位都为0</span>
Router<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#no auto-summary  # 用于配置不连续子网, 防止其自动聚合</span>

Router<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#passive-interface serial 0/1  # 禁止此接口发送或接收Hello数据包</span>

show running-config <span class="token operator">|</span> section r e

show <span class="token function">ip</span> eigrp neighbors  <span class="token comment"># 查看当前路由器的 neighbors 表</span>
show <span class="token function">ip</span> eigrp topology   <span class="token comment"># 查看当前路由器的 拓扑表</span>
show <span class="token function">ip</span> eigrp traffic    <span class="token comment"># 查看路由的流量</span>
show <span class="token function">ip</span> route eigrp    <span class="token comment"># 查看EIGRP协议的路由表</span>
show <span class="token function">ip</span> protocols    <span class="token comment"># 查看当前路由器上的路由协议</span>

 block behind it, which would allow it to advertise conflicting routes.</p></li> <li><p>Here is the complete configuration of EIGRP on the core router:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Core<span class="token comment">#config t</span>
Core<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router eigrp 10</span>
Core<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.0</span>
Core<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 10.0.0.0</span>
Core<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#no auto-summary</span>
Core<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#interface ethernet 0</span>
Core<span class="token punctuation">(</span>config-if<span class="token punctuation">)</span><span class="token comment">#ip summary-address eigrp 10 192.168.10.64 255.255.255.224</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><blockquote><ul><li>由于EIGRP在有类边界上会自动汇总，因此必须要使用<code>no auto-summary</code>命令。</li> <li>This summary route tells EIGRP to find all networks in the 192.168.10.64 network with a block size of 32 and advertise them as one route out interface E0.</li></ul></blockquote></li></ul></blockquote> <hr> <h3 id="ospf协议"><a href="#ospf协议" class="header-anchor">#</a> OSPF协议</h3> <blockquote><ul><li><p>开放式最短路径优先（Open Shortest Path First，OSPF）, 是用于网际协议（IP）网络的<a href="https://baike.baidu.com/item/%E9%93%BE%E8%B7%AF%E7%8A%B6%E6%80%81%E8%B7%AF%E7%94%B1%E5%8D%8F%E8%AE%AE/1219386" target="_blank" rel="noopener noreferrer">链路状态路由协议<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>。适用于<a href="https://baike.baidu.com/item/IPv4/422599" target="_blank" rel="noopener noreferrer">IPv4<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>的OSPFv2协议定义于RFC 2328，适用于<a href="https://baike.baidu.com/item/IPv6/172297" target="_blank" rel="noopener noreferrer">IPv6<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>的OSPFv3定义于RFC 5340。</p></li> <li><p>是广泛使用的一种动态路由协议，它属于链路状态路由协议，具有路由变化收敛速度快、无路由环路、支持变长子网掩码（VLSM）和汇总、等优点。在网络中使用<a href="https://baike.baidu.com/item/OSPF%E5%8D%8F%E8%AE%AE/421662" target="_blank" rel="noopener noreferrer">OSPF协议<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>后，大部分路由将由OSPF协议自行计算和生成，无须网络管理员人工配置，当网络拓扑发生变化时，协议可以自动计算、更正路由，极大地方便了网络管理。但如果使用时不结合具体网络应用环境，不做好细致的规划，OSPF协议的使用效果会大打折扣，甚至引发故障。</p></li> <li><p>OSPF协议可以让每个路由器负责发现、维护与邻居的关系，并将已知的邻居列表和链路状态更新LSU(Link State Update)报文描述，通过可靠的泛洪与自治系统AS(Autonomous System)内的其他路由器周期性交互，学习到整个自治系统的<a href="https://baike.baidu.com/item/%E7%BD%91%E7%BB%9C%E6%8B%93%E6%89%91%E7%BB%93%E6%9E%84/4136060" target="_blank" rel="noopener noreferrer">网络拓扑结构<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>; 并通过自治系统边界的路由器注入其他AS的路由信息，从而得到整个Internet的路由信息。每隔一个特定时间或当链路状态发生变化时，重新生成LSA，路由器通过泛洪机制将新LSA通告出去，以便实现路由的实时更新。</p></li> <li><p>功能和特点:</p> <ul><li><p>开放的标准, 允许多厂商的设备集成;</p></li> <li><p>该协议使用<code>Dijkstra 算法</code>，在单一自治系统（AS）内部工作。</p> <ul><li>首先OSPF要构建一个最短路径树, 然后使用最佳路径的计算结果来组建路由选择表;</li> <li>OSPF 的会聚也很快，虽然它可能没有EIGRP 快，并且它也支持对相同目标的等价多路径路由。</li></ul></li> <li><p>使用AS自治系统并支持自治系统内进行层次区域划分;</p> <blockquote><p>将OSPF创建为层次结构的原因如下:</p> <ul><li>减少路由选择的开销;</li> <li>加速会聚;</li> <li>将网络的不稳定性限制在单一的网络区域内。</li></ul></blockquote></li> <li><p>最小化的路由选择的更新流量;</p></li> <li><p>支持动态的网络扩展;</p></li> <li><p>支持VLSM和CIDR;</p></li> <li><p>拥有无限的跳计数;</p></li> <li><p>与EIGRP一样, 也支持IPv4和IPv6协议;</p></li></ul></li> <li><p>AD: 110</p></li> <li><p>OSPF 在单一区域内通过 最短路径优先(SPF)算法 计算到达目的地的最短路径, 路由器使用最短路径树来将OSPF路由插入到路由表中</p> <ul><li><p>链路(Link): 路由器的接口</p></li> <li><p>状态(State): 描述接口及其与邻居路由器之间的关系</p></li> <li><p>Cost: 每个路由器都把自己的接口当做根, 去构造一棵树(这棵树中只包含了路由器所在区域内的网络), 并且给与累计成本来计算到达目的地的最短路径</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620191328842.png" alt="image-20220620191328842" style="zoom:39%;"></li></ul></li></ul></blockquote> <blockquote><h5 id="ospf的报文类型"><a href="#ospf的报文类型" class="header-anchor">#</a> OSPF的报文类型:</h5> <ul><li>Hello: 发现, 建立并维护OSPF邻居关系;</li> <li>DBD: 链路状态数据库描述信息(描述LSDB中的LSA头部信息);</li> <li>LSR: 链路状态请求, 向OSPF邻居请求链路状态信息</li> <li>LSU: 链路状态更新;</li> <li>LSAck: 对LSU中的LSA进行确认;</li></ul></blockquote> <h4 id="ospf的术语"><a href="#ospf的术语" class="header-anchor">#</a> OSPF的术语</h4> <blockquote><ul><li><p><code>Link</code> A link is a network or router interface assigned to any given network. When an interface is added to the OSPF process, it’s considered by OSPF to be a link. This link, or interface, will have state information associated with it (up or down) as well as one or more IP addresses.</p></li> <li><p><code>Router ID</code> The Router ID (RID) is an IP address used to identify the router. Cisco chooses the Router ID by using the highest IP address of all configured loopback interfaces. If no loopback interfaces are configured with addresses, OSPF will choose the highest IP address of all active physical interfaces.</p></li> <li><p><code>Neighbor</code> Neighbors are two or more routers that have an interface on a common network, such as two routers connected on a point-to-point serial link.</p></li> <li><p><code>Adjacency</code> An adjacency is a relationship between two OSPF routers that permits the direct exchange of route updates. OSPF is really picky
about sharing routing information—unlike EIGRP, which directly shares routes with all of its neighbors. Instead, OSPF directly shares routes only with neighbors that have also established adjacencies. And not all neighbors will become adjacent—this depends upon both the type of network and the configuration of the routers.</p></li> <li><p><code>Hello protocol</code> The OSPF Hello protocol provides dynamic neighbor discovery and maintains neighbor relationships. Hello packets and Link State Advertisements (LSAs) build and maintain the topological database. Hello packets are addressed to multicast address 224.0.0.5.</p></li> <li><p><code>Neighborship database</code> The neighborship database is a list of all OSPF routers for which Hello packets have been seen. A variety of details, including the Router ID and state, are maintained on each router in the neighborship database.</p></li> <li><p><code>Topological database</code> The topological database contains information from all of the Link State Advertisement packets that have been received for an area. The router uses the information from the topology database as input into the Dijkstra algorithm that computes the shortest path to every network.</p></li> <li><p><code>Link State Advertisement</code> A Link State Advertisement (LSA) is an OSPF data packet containing link-state and routing information that’s shared among OSPF routers. There are different types of LSA packets, and I’ll go into these shortly. An OSPF router will exchange LSA packets only with routers to which it has established adjacencies. ==LSA packets are used to update and maintain the topological database.==</p></li> <li><p><code>Designated router</code> A designated router (DR) is elected whenever OSPF routers are connected to the same multi-access network. Cisco likes to call these “broadcast” networks, but really, they are networks that have multiple recipients(接收者). Try not to confuse multi-access with multipoint, which can be easy to do sometimes.</p></li> <li><p><code>Backup designated router</code> A backup designated router (BDR) is a <em>hot standby</em> for the DR on multi-access links (remember that Cisco sometimes likes to call these “broadcast” networks). The BDR receives all routing updates from OSPF adjacent routers but doesn’t flood LSA updates.</p></li> <li><p><code>OSPF areas</code> A n OSPF area is a grouping of contiguous networks and routers. All routers in the same area share a common Area ID. Because a router can be a member of more than one area at a time, the Area ID is associated with specific interfaces on the router. This would allow some interfaces to belong to area 1 while the remaining interfaces can belong to area 0. All of the routers within the same area have the same topology table. When configuring OSPF, you’ve got to remember that there must be an area 0 and that this is typically considered the backbone area. Areas also play a role in establishing a hierarchical network organization—something that really enhances the scalability of OSPF!</p></li> <li><p><code>Broadcast (multi-access)</code> Broadcast (multi-access) networks such as Ethernet allow multiple devices to connect to (or access) the same network as well as provide a broadcast ability in which a single packet is delivered to all nodes on the network. In OSPF, a DR and a BDR must be elected for each broadcast multi-access network.</p></li> <li><p><code>Non-broadcast</code> multi-access Non-broadcast multi-access (NBMA) networks are types such as Frame Relay, X.25, and Asynchronous Transfer Mode (ATM). These networks <strong>allow for multi-access but have no broadcast ability like Ethernet</strong>. So, NBMA networks require special OSPF configuration to function properly and neighbor relationships must be defined.</p> <blockquote><p>DR and BDR are elected on broadcast and non-broadcast multi-access networks. Elections are covered in detail later in this chapter.</p></blockquote></li> <li><p><code>Point-to-point</code> Point-to-point refers to a type of network topology consisting of a <em>direct connection between two routers that provides a single communication path</em>. The point-to-point connection can be physical, as in a serial cable directly connecting two routers, or it can be logical, as in two routers that are thousands of miles apart yet connected by a circuit in a Frame Relay network. In either case, ==this type of configuration eliminates the need for DRs or BDRs but neighbors are discovered automatically.==</p></li> <li><p><code>Point-to-multipoint</code> Point-to-multipoint refers to a type of network topology consisting of <strong>a series of connections between a single interface on one router and multiple destination routers</strong>. All of the interfaces on all of the routers sharing the point-to-multipoint connection belong to the same network. As with ==point-to-point, DRs or BDRs are not needed.==</p></li></ul></blockquote> <h4 id="ospf的区域概念"><a href="#ospf的区域概念" class="header-anchor">#</a> OSPF的区域概念:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207081101777.png" alt="image-20220708110120640" style="zoom:80%;"> <blockquote><p>这是一个典型的OSPF简易设计。注意，这里一部分路由器是如何连接到主干网上的:</p> <ul><li>这个主干网被称为 区域0或者主干区域(area 0, or the backbone area);</li> <li>OSPF 必须要有一个区域0，而且所有其他区域都需要连接到这个区域。(Areas that do not connect directly to area 0 can be connected by using virtual links, which are beyond the scope of this book.)</li> <li>那些同一自治系统内部的将其他区域连接到主干区域的路由器, 称为 Area Border Router (ABR). 当然, 这些路由器上至少要有一个接口是必须在区域0中的。</li> <li>OSPF 运行在某个自治系统内部，但是通过路由器也可以将多个自治系统连接起来。用于连接AS的路由器被称为Autonomous System Boundary Router (ASBR).。</li></ul></blockquote> <h4 id="ospf的三张表"><a href="#ospf的三张表" class="header-anchor">#</a> OSPF的三张表:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620202258962.png" alt="image-20220620202258962" style="zoom:40%;"> <h4 id="ospf的基本运行步骤"><a href="#ospf的基本运行步骤" class="header-anchor">#</a> OSPF的基本运行步骤:</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620202409172.png" alt="image-20220620202409172" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620211633205.png" alt="image-20220620211633205" style="zoom:43%;"> <blockquote><p>==两台路由器建立 adjacency 关系所要匹配一致的参数==:</p> <ol><li><p><code>Area-ID</code>;</p></li> <li><p><code>Hello and Dead Interval</code>;</p> <blockquote><ul><li>Hello间隔用于设定发送两个Hello 数据包之间的移计数。</li> <li>而dead间隔是指路由器发出的Hello 数据包没有被邻居看到，因而宣称此OSPF 路由器右机所经过的秒数。</li> <li>OSPF 要求，两个邻居间设置的这些时间间隔必须是完全相同的。如果这些间隔中的任何一个不相同，则此网络分段上的路由器将不能成为邻居。可以使用show ip ospf interface 命令来查看这些定时器。</li></ul></blockquote></li> <li><p><code>Authentication password</code>;</p></li> <li><p>Stub Area Flag;</p></li></ol></blockquote> <blockquote><p>==OSPF的八种状态机==:</p> <ol><li>Down: 刚启动 OSPF 进程, 还未收到任何 hello 包;</li> <li>Attempt: 特殊网络环境, 不能发送组播, 需要单独发送单播, 例如帧中继, 会有此状态;</li> <li>Init: 只是一方收到另一方的 hello 包, 但双方没有完成hello交换;</li> <li>Two-way: 已完成 hello 交换, 已经在 hello 中看到自己是对方的邻居;</li> <li>Exstart: 在交换DBD之前, 要在此状态协商主从关系; 从机要先发送 DBD给 主机;</li> <li>Exchange: 完成协商后, 开始交换 DBD</li> <li>Loading: 收到LSR后, 确定对方缺少哪条LSA, 再发送LSU告知对方自己的详细LSA信息;</li> <li>Full: 完成 OSPF 链路数据库的收敛</li></ol></blockquote> <h4 id="ospf-网络类型"><a href="#ospf-网络类型" class="header-anchor">#</a> OSPF 网络类型</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620215601211.png" alt="image-20220620215601211" style="zoom:40%;"> <h4 id="dr-bdr的选举"><a href="#dr-bdr的选举" class="header-anchor">#</a> DR/BDR的选举</h4> <blockquote><ul><li>DR和BDR的选举是通过Hello协议来完成的。在每个网络分段上Hello 数据包是通过IP组播来交换的。</li> <li>只有在广播和非广播的多路访问网络(如以太网和帧中继)的网络分段上才会进行DR和BDR的选举。</li> <li>点到点链路，例如串行WAN连接，不会进行DR/BDR的选举。</li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620215955888.png" alt="image-20220620215955888" style="zoom:40%;"> <blockquote><p>==OSPF中 DR 和 BDR的选举规则==:</p> <ol><li><p>首先会比较接口的Priority数值(0~255): 数值越大越优;</p> <ul><li>优先级查看: <code>how ip ospf interface</code>;</li> <li>优先级修改: <code>R2(config-if)#ip ospf priority ?</code></li></ul></li> <li><p>Priority数值相等时, 进行 Router-ID 的比较: 数值越大越优;</p> <ul><li><p>默认情况下路由器上的最高激活IP地址, 将在路由器启动时成为该路由器的RID。</p> <ul><li><p>可以使用环回(逻辑)接口可以修改RID;</p></li> <li><p>也可以使用命令<code>router-id</code>实现对RID的强制修改:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>R3<span class="token comment">#sh ip ospf</span>
	Routing Process <span class="token string">&quot;ospf 1&quot;</span> with ID <span class="token number">10.1</span>.12.1
R3<span class="token comment">#config t</span>
R3<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router ospf 1</span>
R3<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#router-id 172.31.1.4</span>
R3<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#Reload or use &quot;clear ip ospf process&quot; command, for</span>
	this to take effect
R3<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#do clear ip ospf process</span>
Reset ALL OSPF processes? <span class="token punctuation">[</span>no<span class="token punctuation">]</span>: <span class="token function">yes</span>

    from FULL to DOWN, Neighbor Down: Adjacency forced to reset
    <span class="token number">20</span>:16:35: %OSPF-5-ADJCHG: Process <span class="token number">1</span>, Nbr <span class="token number">10.1</span>.5.1 on FastEthernet0/0
    from FULL to DOWN, Neighbor Down: Interface down or detached
R3<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#do sh ip ospf</span>
    Routing Process <span class="token string">&quot;ospf 1&quot;</span> with ID <span class="token number">172.31</span>.1.4
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div></li></ul></li></ul> <blockquote><p>DR的<code>非抢占性</code>:</p> <ul><li><p>OSPF选举过程结束后加入的路由器, 即使拥有更高的 Priority和 Router-ID, 但只要现有的DR不挂掉, DR就不会被新的路由器所抢占;</p></li> <li><p>如果想要重新执行OSPF选举, 选举 R1 作为 DR:</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220626102501264.png" alt="image-20220626102501264"></p></li></ul></blockquote></li></ol></blockquote> <h5 id="router-id的产生"><a href="#router-id的产生" class="header-anchor">#</a> Router-ID的产生</h5> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620220024361.png" alt="image-20220620220024361" style="zoom:33%;"> <h4 id="lsa的泛洪"><a href="#lsa的泛洪" class="header-anchor">#</a> LSA的泛洪</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620220244595.png" alt="image-20220620220244595" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620220316313.png" alt="image-20220620220316313" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220620220412115.png" alt="image-20220620220412115" style="zoom:40%;"> <h4 id="配置-2"><a href="#配置-2" class="header-anchor">#</a> 配置:</h4> <p>在CCNA阶段, 只需掌握基本的单区域中的OSPF配置即可</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token comment"># 路由器模式下</span>
R1<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router ospf ?/进程ID   # 各路由器的OSPF进程ID 是彼此互不相关的(取值介于1~65535), 但便于维护可以定义同一个进程ID</span>
router-id  ID编号
network 接口的IP地址 通配符掩码 area areaID  <span class="token comment"># &lt;0-4294967295&gt; OSPF area 10 as a decimal value</span>

<span class="token comment"># 接口模式下</span>
<span class="token function">ip</span> ospf cost 数值  <span class="token comment"># 手动设置 指定接口的 COST值  (接口模式下执行)</span>
<span class="token function">ip</span> ospf 进程ID area AreaID   <span class="token comment"># 设置接口的area,可以取代 上面 network ... 设置 area的方式</span>
<span class="token function">sh</span> run int e0/0

show <span class="token function">ip</span> ospf neighbor   <span class="token comment"># 查看OSPF邻居表</span>
<span class="token function">sh</span> <span class="token function">ip</span> os int br
<span class="token function">sh</span> <span class="token function">ip</span> os rou


<span class="token function">clear</span> <span class="token function">ip</span> route *   <span class="token comment"># 清除静态路由表</span>
debuf <span class="token function">ip</span> ospf
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><blockquote><p>通配符掩码:</p> <ul><li><p>配置OSPF可以有许多种不同的方式，但最简单和最容易的做法就是使用通配符掩码0.0.0.0;</p></li> <li><p>取值与子网掩码相反, 通配符掩码 = 255 - 子网掩码;</p></li> <li><p>引例:</p> <ul><li>网络和通配符掩码1.1.1 .1 0.0.0.0 的组合将只指定使用1.1.1.1精确配置的接口，而不包含其他的地址; 如果想在指定接口上简单明确地激活OSPF ，这种方式确实很有用;</li> <li>如果你坚持要匹配网络中的某个范围，如网络和通配符掩码1.1.0.00.0.255.255 的组合将指定一个范围1.1.0.0 - 1.1.255.255。</li></ul></li> <li><p>示例:</p> <blockquote><p>下面的路由器使用了4 个不同的接口与4 个子网相连接:
192.168.10.64/28 ;
192.168.10.80/28 ;
192.168.10.96/28 ;
192.168.10.8/30 。</p> <ul><li>所有的接口都需要配置在区域。中。在我看来，最简单的聚合配置方式是:</li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Test<span class="token comment">#config t</span>
Test<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router ospf 1</span>
Test<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.0 0.0.0.255 area 0</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><ul><li>遗憾的是, 这样简易的配置方式并没有包含在CCNA的目标中!既然这样，我们需要通过使用子网号和通配符，为每个接口创建一个单独的网络声明:</li></ul> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Test<span class="token comment">#config t</span>
Test<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router ospf 1</span>
Test<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.64 0.0.0.15 area 0</span>
Test<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.80 0.0.0.15 area 0</span>
Test<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.96 0.0.0.15 area 0</span>
Test<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.8 0.0.0.3 area 0</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><ul><li>在此使用0.0.0.0 通配符来精确地指定接口的IP地址也是可以的, 但是CCNA 的目标不仅仅是要掌握那些最容易操作的部分</li></ul></blockquote></li></ul></blockquote> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621085920432.png" alt="image-20220621085920432" style="zoom:40%;"> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220621085951700.png" alt="image-20220621085951700" style="zoom:40%;"> <h4 id="ospf的相关命令"><a href="#ospf的相关命令" class="header-anchor">#</a> OSPF的相关命令</h4> <ul><li><p><code>show ip ospf</code> 用于显示运行在该路由器上的-个或全部OSPF进程的OSPF信息。这些信息包含路由器ID 、区域信息、SPF 统计和LSA 定时器信息。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#sh ip ospf</span>

            Number of indication LSA <span class="token number">0</span>
            Number of OoNotAge LSA <span class="token number">0</span>
            Flood list length <span class="token number">0</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br></div></div></li> <li><p><code>show ip ospf database</code> 命令将给出在互联网络中路由器的编号(AS)，及相邻路由器的ID(也就是前面提到过的拓扑数据库); 与<code>show ip eigrp topology</code>命令不同，这个命令只显示OSPF路由器，而不是AS 中的全部链路</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#sh ip ospf database</span>

    <span class="token number">172.16</span>.10.1 <span class="token number">172.16</span>.10.1 	<span class="token number">688</span> 	0x80000004 0x0021a6 <span class="token number">2</span>
    
    		Net Link States <span class="token punctuation">(</span>Area <span class="token number">0</span><span class="token punctuation">)</span>
    Link ID 	ADV Router 	Age 	Seq<span class="token comment"># Checksum</span>
    <span class="token number">10.1</span>.5.1 	<span class="token number">10.1</span>.5.1 	<span class="token number">688</span> 	0x80000001 0x00c977
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div><blockquote><p>这里能看到4个路由器和每个路由器的RID( 即每个路由器上最高的IP地址)。路由器的输出还给出了链路ID 和该链路上位于ADV 路由器(即通告路由器)下的路由器阻D ，注意，接口也是链路。</p></blockquote></li> <li><p><code>show ip ospf interface</code> 给出了所有与接口相关的OSPF信息</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#sh ip ospf int f0/0</span>

    Timer intervals configured, Hello <span class="token number">10</span>, Dead <span class="token number">40</span>, Wait <span class="token number">40</span>, Retransmit <span class="token number">5</span>

    Suppress hello <span class="token keyword">for</span> <span class="token number">0</span> neighbor<span class="token punctuation">(</span>s<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br></div></div><blockquote><p>The following information is displayed by this command:</p> <ul><li>Interface IP address</li> <li>Area assignment</li> <li>Process ID</li> <li>Router ID</li> <li>Network type</li> <li>Cost</li> <li>Priority</li> <li>DR/BDR election information (if applicable)</li> <li>Hello and Dead timer intervals</li> <li>Adjacent neighbor information</li></ul></blockquote></li> <li><p><code>show ip ospf neighbor</code> 命令汇总了OSPF 信息中关于邻居和邻接状态的信息</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Corp<span class="token comment">#sh ip ospf neighbor</span>
Neighbor ID Pri State Dead Time Address Interface

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><blockquote><ul><li>在R3和Corp 路由器间有一个Ethernet Link(广播多路访问)，因此这里会由一个选举过程来决定谁是指定路由器(DR) 以及谁是备份指定路由器(BDR)。</li> <li>点到点链路(使用了串口Serial Port)上不会进行DR/BDR的选举，并且它们显示为 FULL/_</li></ul></blockquote></li> <li><p><code>show ip protocols</code> 不论在路由器上运行OSPF 、EIGRP 、IGRP 、RIP 、BGP ， IS-IS ，或者其他能配置在路由器上的路由选择协议，此命令都非常有用。它提供了一个关于所有当前运行协议的真实操作情况的概述.</p></li></ul> <h6 id="调试命令"><a href="#调试命令" class="header-anchor">#</a> 调试命令</h6> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207081332764.png" alt="image-20220708133242604" style="zoom:80%;"> <h4 id="配置ospf汇总路由"><a href="#配置ospf汇总路由" class="header-anchor">#</a> 配置OSPF汇总路由</h4> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202207081445422.png" alt="image-20220708144521221" style="zoom:70%;"> <blockquote><p>要汇总区域1到主干区域。中，在OSPF进程ID下使用下列命令。下面是核心(主干)路由器的一个完整OSPF配置:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>Core<span class="token punctuation">(</span>config<span class="token punctuation">)</span><span class="token comment">#router ospf 1</span>
Core<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.64 0.0.0.3 area 1</span>
Core<span class="token punctuation">(</span>config-router<span class="token punctuation">)</span><span class="token comment">#network 192.168.10.68 0.0.0.3 area 1</span>
