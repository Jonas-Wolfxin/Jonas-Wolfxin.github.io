Jggg==">Getting Started with Cisco Packet Tracer<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>网址: <a href="https://skillsforall.com/course/getting-started-cisco-packet-tracer?userLang=en-US" target="_blank" rel="noopener noreferrer">https://skillsforall.com/course/getting-started-cisco-packet-tracer?userLang=en-US<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="what-is-cisco-packet-tracer"><a href="#what-is-cisco-packet-tracer" class="header-anchor">#</a> what is Cisco Packet Tracer?</h2> <p>The free Cisco Packet Tracer software helps you to practice your network configuration and troubleshooting skills using your desktop or laptop computer. It allows you to simulate networks without having access to physical equipment. In addition to networking, you can learn, and then practice your Internet of Things (IoT) and Cybersecurity skills. You can choose to build a network from scratch, use a pre-built sample network, or complete lab assignments. While Packet Tracer is not a replacement for practicing on physical routers, switches, firewalls, and servers, it provides many benefits!</p> <h3 id="download-cisco-packet-tracer"><a href="#download-cisco-packet-tracer" class="header-anchor">#</a> Download Cisco Packet Tracer</h3> <p>To obtain and install your copy of Cisco Packet Tracer, please follow the instructions from the link below: <a href="https://skillsforall.com/resources/lab-downloads" target="_blank" rel="noopener noreferrer">https://skillsforall.com/resources/lab-downloads<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="the-packet-tracer-user-interface"><a href="#the-packet-tracer-user-interface" class="header-anchor">#</a> The Packet Tracer User Interface</h2> <p>Packet Tracer is a tool that allows you to simulate real networks. It provides three main menus that you can use for the following:</p> <ul><li>Add devices and connect them via cables or wireless</li> <li>Select, delete, inspect, label, and group components within your network</li> <li>Manage your network</li></ul> <p>The network management menu lets you do the following:</p> <ul><li>Open an existing/sample network</li> <li>Save your current network</li> <li>Modify your user profile or your preferences</li></ul> <h2 id="gui-and-cli-configuration-in-cisco-packet-tracer"><a href="#gui-and-cli-configuration-in-cisco-packet-tracer" class="header-anchor">#</a> GUI and CLI Configuration in Cisco Packet Tracer</h2> <p>Packet Tracer also provides a variety of tabs for device configuration including the following:</p> <ul><li>Physical</li> <li>Config</li> <li>CLI</li> <li>Desktop</li> <li>Services</li></ul> <p>The tabs that are shown depend on the device you are currently configuring.</p> <p><strong>Note</strong>: You may see other tabs on different devices. These additional tabs are beyond the scope of this course.</p> <h3 id="physical-tab"><a href="#physical-tab" class="header-anchor">#</a> Physical Tab</h3> <blockquote><p>The Physical tab provides an interface for interacting with the device including powering it on or off or installing different modules, such as a wireless network interface card (NIC).</p> <p><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303141059412.png" alt="img"></p></blockquote> <h3 id="config-tab"><a href="#config-tab" class="header-anchor">#</a> Config Tab</h3> <blockquote><p>For intermediate devices such as routers and switches, there are two ways to access device configurations. Configurations can be accessed via a Config tab, which is a Graphical User Interface (GUI). Configurations can also be accessed using a command line interface (CLI).</p> <p>The Config tab does not simulate the functionality of a device. This tab is unique to Packet Tracer. If you don’t know how to use the command line interface, this tab provides a way to use a Packet Tracer-only GUI to configure basic settings. As settings are changed in the GUI, the equivalent CLI commands appear in the <strong>Equivalent IOS Commands</strong> window. This helps you to learn the CLI commands and the Cisco Internetwork Operating System (IOS) while you are using the Config tab.</p> <p>For example, in the figure, the user has configured <strong>MyRouter</strong> as the name of the device. The Equivalent IOS Commands window shows the IOS command that achieves the same results in the CLI.</p> <p>In addition, device configuration files can be saved, loaded, erased, and exported here.</p></blockquote> <h3 id="cli-tab"><a href="#cli-tab" class="header-anchor">#</a> CLI Tab</h3> <blockquote><p>The CLI tab provides access to the command line interface of a Cisco device. Using the CLI tab requires knowledge of device configuration with IOS. Here, you can practice configuring Cisco devices at the command line. CLI configuration is a necessary skill for more advanced networking implementations.</p> <p><strong>Note</strong>: Any commands that were entered from the Config tab are also shown in the CLI tab.</p></blockquote> <h3 id="desktop-tab"><a href="#desktop-tab" class="header-anchor">#</a> Desktop Tab</h3> <blockquote><p>For some end devices, such as PCs and laptops, Packet Tracer provides a desktop interface that gives you access to IP configuration, wireless configuration, a command prompt, a web browser, and other applications.</p> <p><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303141109110.png" alt="img"></p></blockquote> <h3 id="services-tab"><a href="#services-tab" class="header-anchor">#</a> Services Tab</h3> <blockquote><p>A server has all of the functions of a host with the addition of one more tab, the Services tab. This tab allows a server to be configured with common server processes such as HTTP, DHCP, DNS, or other services, as shown in the figure.</p> <p><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202303141109536.png" alt="img"></p></blockquote> <h2 id="packet-tracer-tutored-activity-logical-and-physical-mode-exploration"><a href="#packet-tracer-tutored-activity-logical-and-physical-mode-exploration" class="header-anchor">#</a> Packet Tracer Tutored Activity - Logical and Physical Mode Exploration</h2> <p><a href="https://contenthub.netacad.com/sgp/i2ptgs/1.0/en-US/m1//course/en-US/assets/1.1.6-packet-tracer-tutored-activitys-logical-and-physical-mode-exploration.pksz" target="_blank" rel="noopener noreferrer">https://contenthub.netacad.com/sgp/i2ptgs/1.0/en-US/m1//course/en-US/assets/1.1.6-packet-tracer-tutored-activitys-logical-and-physical-mode-exploration.pksz<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="cisco-packet-tracer-file-types"><a href="#cisco-packet-tracer-file-types" class="header-anchor">#</a> Cisco Packet Tracer File Types</h2> <p>Packet Tracer has the ability to create four different types of files. These file types are used for different purposes and include: .pka, .pkt, .pksz, and .pkz.</p> <h3 id="the-pka-file-type"><a href="#the-pka-file-type" class="header-anchor">#</a> The .pka file type</h3> <blockquote><p>The .pka file type is a Packet Tracer Activity file and is the file type you will experience most often. Think of the “a” in .pka as meaning “activity.” A Packet Tracer Activity has an instructions window. The activity is usually scored as well. This file type contains two networks: an initial network and an answer network. The initial network opens when you launch the activity. The answer network runs in the background and can be used to provide scoring and feedback to learners as they complete the activity. Learners do not have access to the answer network in a .pka file.</p> <p>The Packet Tracer Activity instructions window provides the procedures required to complete the activity, assignment, or assessment. The instructions window can also display completion percentage to track how much of the activity has been successfully completed. The Check Results feature can be enabled to provide feedback.</p></blockquote> <h3 id="the-pkt-file-type"><a href="#the-pkt-file-type" class="header-anchor">#</a> The .pkt file type</h3> <blockquote><p>The .pkt file type is created when a simulated network is built in Packet Tracer and saved. The .pkt file can also have graphic background images embedded within it. However, .pkt files have no instructions window or activity scoring.</p></blockquote> <h3 id="the-pksz-file-type"><a href="#the-pksz-file-type" class="header-anchor">#</a> The .pksz file type</h3> <blockquote><p>The .pksz file type is specific to Packet Tracer Tutored Activities (PTTA). These files bundle a .pka file, media assets, and a scripting file for the hinting system. These activities provide support, in the form of contextualized hints, for students who are working on completing the activity.</p></blockquote> <h3 id="the-pkz-file-type"><a href="#the-pkz-file-type" class="header-anchor">#</a> The .pkz file type</h3> <blockquote><p>You will see Save As PKZ... in the File menu. This file type was previously used to embed images and other files in a Packet Tracer file. However, images are now embedded directly within a regular .pkt or .pka file by default. Therefore, consider .pkz as a <strong>deprecated</strong> file type.</p></blockquote> <h2 id="cisco-packet-tracer-assessments"><a href="#cisco-packet-tracer-assessments" class="header-anchor">#</a> Cisco Packet Tracer Assessments</h2> <p>There are two types of assessment items that take advantage of Packet Tracer. These include Packet Tracer Media Objects (PTMO) and Packet Tracer Skills Assessments (PTSA). PTMOs can be either a .pkt or .pka file. A PTMO will show up inline with a question on your quiz, module exam, or some other type of graded assessment. You launch the .pkt or .pka file directly from inside the assessment. Typically, you configure the network or investigate the topology, and then answer a multiple choice assessment question or questions.</p> <p>You can encounter PTSAs at a mid-point in a course or at the end of the course. PTSAs are summative skill assessments in which you demonstrate your skill by implementing the technologies that you have learned. PTSAs are standalone assessments, have their own grading engine, and the results are recorded in a course gradebook, if there is one. After completing a PTSA, you receive item level feedback for each graded component.</p> <p>Click Play in the video to learn more about the PTMO and PTSA Packet Tracer files.</p> <h2 id="packet-tracer-create-a-simple-network"><a href="#packet-tracer-create-a-simple-network" class="header-anchor">#</a> Packet Tracer - Create a Simple Network</h2> <p><a href="https://contenthub.netacad.com/sgp/i2ptgs/1.0/en-US/m2//course/en-US/assets/2.1.1_packet_tracer_create_a_simple_network.pka" target="_blank" rel="noopener noreferrer">https://contenthub.netacad.com/sgp/i2ptgs/1.0/en-US/m2//course/en-US/assets/2.1.1_packet_tracer_create_a_simple_network.pka<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/main/docs/40.网络运维/05.CCNA/30.Cisco Networking Academy/1.Getting Started with Cisco Packet Tracer.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">last Updated:</span> <span class="time">2023/03/15, 11:38:58</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/f2c53e/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">My CCNA Certificate</div></a> <a href="/pag
