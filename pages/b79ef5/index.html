6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">Praxis<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h2 id="升降档"><a href="#升降档" class="header-anchor">#</a> 升降档</h2> <blockquote><p>升降档是通过变速器来实现的。 变速器的作用是将<strong>发动机转速(动力)<strong>通过不同的<em>齿轮传动比</em>耦合到</strong>车速</strong>。</p> <p>变速器的工作原理： <a href="https://www.youtube.com/watch?v=6G0dcR3gfYM" target="_blank" rel="noopener noreferrer">https://www.youtube.com/watch?v=6G0dcR3gfYM<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>档位与车速对应关系: <a href="http://spare-benzin.de/Fahrweise/Geschwindigkeit/Geschwindigkeitsbereiche/Geschwindigkeitsbereich.html" target="_blank" rel="noopener noreferrer">http://spare-benzin.de/Fahrweise/Geschwindigkeit/Geschwindigkeitsbereiche/Geschwindigkeitsbereich.html<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></blockquote> <h3 id="升降档的原理"><a href="#升降档的原理" class="header-anchor">#</a> 升降档的原理</h3> <blockquote><ul><li><p>档位越低, 变速器(输入/输出)传动比越大, 扭矩大(提速能力强), 此时发动机转速相对高, 车速相对低; 但是极限速度相对低; 费油;</p></li> <li><p>档位越高, 变速器(输入/输出)传动比越小, 扭矩小(提速能力弱), 此时发动机转速相对低, 车速相对高; 但是极限速度相对高; 省油;</p></li></ul> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206041829908.png" alt="image-20220602195640154" style="zoom:87%;"></blockquote> <h3 id="档位与速度的匹配"><a href="#档位与速度的匹配" class="header-anchor">#</a> 档位与速度的匹配</h3> <blockquote><ul><li>如果车辆冷启动时点火，发动机怠速转速低于<em>800 r/min</em>或者<em>高于1200 r/min</em>，就要注意了，这是发动机工况不良的表现。</li> <li>正常情况下，发动机转速的最佳状态是在<strong>2200~3500 r/min</strong>之间，此时最经济，也是发动机工况最好的，平时用车应尽量将转速保持在这个范围内。</li> <li>在汽车行驶过程中，尽量少让发动机工作在<em>2000 r/min以下</em>，因为如果转速过低的话，则会感觉发动机动力不足，发动机在低转速时负载过大，对发动机有损害，会容易形成<em>积碳</em>。</li> <li>而如果发动机工作在<em>4000 r/min转以上</em>时，由于燃烧时间变短，油料燃烧不充分，油耗会大幅增加，如果使用五挡正常行驶的话，车速一般已能达到150km/h，已经到了较危险的车速。</li></ul> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206041829630.png" alt="image-20220602195257812" style="zoom:80%;"></blockquote> <h3 id="升降档的操作"><a href="#升降档的操作" class="header-anchor">#</a> 升降档的操作</h3> <h4 id="升档操作"><a href="#升档操作" class="header-anchor">#</a> 升档操作:</h4> <blockquote><ol><li><p>一档起步(<em>左脚迅速抬高至半联动点(多练习找准半联动点)</em>) -&gt; <strong>缓进油门并缓抬离合</strong>; ==一档车速0~15km/h==;</p></li> <li><p>一档给油发动机转速1000-1500转/分，车速 15 km/h，松开油门换到==二档(10~30km/h)==；</p></li> <li><p>二档给油，发动机转速1500-2000转，当车速达到 30 km/h时，松开油门换到==三档(25~45km/h)==；</p></li> <li><p>三档给油, 当发动机转速在1500-2000转，车速达到 45 km/h时，松开油门换到==四档(50~70 km/h)==。</p></li> <li><p>四档给油，当发动机转速在1500-2000转，，车速达到 70 km/h时，松开油门换到==五档(80~120 km/h)==；</p></li> <li><p>五档给油，发动机转速1500-3000转，车速达到 80~120 km/h时，如果还有六档，可以根据规律和经验继续升级。</p></li></ol></blockquote> <h4 id="降档操作"><a href="#降档操作" class="header-anchor">#</a> 降档操作：</h4> <blockquote><p><strong>减速降档(根据车速)</strong>: 踩刹车<strong>降低车速</strong> -&gt; 踩离合降档 -&gt; 慢抬离合；</p> <ul><li>当车速降到 40~50 时 换4挡；</li> <li>当车速降到 30~40 时 换3挡；</li> <li>当车速降到 10~30 时 换2挡；</li> <li>当车速降到  0~10 时 换1挡。</li></ul> <h6 id="高级操作-不减速降档须补油"><a href="#高级操作-不减速降档须补油" class="header-anchor">#</a> 高级操作: 不减速降档须补油</h6> <p>(整个流程要连续流畅, 一气呵成): 踩离合降档 -&gt; 补一脚油门<strong>提高发动机转速</strong>以<em>匹配当前较高的车速状态</em> -&gt; 快抬离合;</p></blockquote> <h3 id="越级升降档"><a href="#越级升降档" class="header-anchor">#</a> 越级升降档</h3> <blockquote><p>升降档位时, 可以越级操作, 但一般只限于 <em>3挡和5挡</em> 或者 <em>4挡和6挡</em> 之间进行, 要把握的重点是要<strong>让发动机转速与车速相匹配</strong>(否则会引起车辆卡顿)</p> <img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/202206041829670.png" alt="image-20220602200812460" style="zoom:80%;"></blockquote> <h2 id="起步防溜坡"><a href="#起步防溜坡" class="header-anchor">#</a> 起步防溜坡</h2> <blockquote><ul><li><strong>脚刹方式</strong>: 坡上踩住刹车和离合 -&gt; 启动 -&gt; 挂1挡 -&gt; 慢抬离合至车头轻微震动 -&gt; 抬刹车并点油门</li> <li><strong>手刹方式</strong>: 坡上踩住离合 -&gt; 启动 -&gt; 挂1挡 -&gt; 慢抬离合至车头轻微震动 -&gt; 放手刹并点油门</li></ul></blockquote> <blockquote><h6 id="离合器的四个段程"><a href="#离合器的四个段程" class="header-anchor">#</a> 离合器的四个段程:</h6> <ul><li>空行程 -&gt; 半联动 -&gt; 全联动 -&gt; 自由行程</li></ul></blockquote></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/master/docs/70.人在德国/10.德国驾照/02.Praxis.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15"
