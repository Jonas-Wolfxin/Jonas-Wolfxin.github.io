序从上到下顺序地执行代码，中间没有任何的判断和跳转,知道程序结束</strong>。</li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br></div></div><h2 id="对象的布尔值"><a href="#对象的布尔值" class="header-anchor">#</a> 对象的布尔值</h2> <ul><li><p>Python一切皆对象，所有对象都有一个布尔值</p> <ul><li>获取对象的布尔值
<ul><li>使用内置函数<font color="#DC4040" size="4" face="黑体">bool()</font></li></ul></li></ul></li> <li><p>以下对象的布尔值为False</p> <ul><li>False</li> <li>数值()</li> <li>None</li> <li>空字符串</li> <li>空列表</li> <li>空元组</li> <li>空字典</li> <li>空集合</li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/10 19:33
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'--------------以上对象的布尔值为False----------------'</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token boolean">False</span><span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#False</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token number">0</span><span class="token punctuation">)</span><span class="token punctuation">)</span>     <span class="token comment">#False</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token number">0.0</span><span class="token punctuation">)</span><span class="token punctuation">)</span>   <span class="token comment">#False</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token boolean">None</span><span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#False</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token string">''</span><span class="token punctuation">)</span><span class="token punctuation">)</span>    <span class="token comment">#False</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token string">&quot;&quot;</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token punctuation">[</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">)</span>    <span class="token comment">#空列表</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token builtin">list</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#空列表</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">)</span>     <span class="token comment">#空元组</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token builtin">tuple</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token punctuation">{</span><span class="token punctuation">}</span><span class="token punctuation">)</span><span class="token punctuation">)</span>    <span class="token comment"># 空字典</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token builtin">dict</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token builtin">set</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#空集合</span>


<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'-------------------其他对象的布尔值均为True--------------------'</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token number">18</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token boolean">True</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">bool</span><span class="token punctuation">(</span><span class="token string">'hello world'</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br></div></div><h2 id="条件表达式"><a href="#条件表达式" class="header-anchor">#</a> 条件表达式</h2> <ul><li><p>条件表达式</p> <ul><li><strong>条件表达式是if...else的简写</strong></li></ul></li> <li><p>语法结构；</p> <p><strong>x</strong> <font color="#DC4040" size="4" face="黑体">if</font> 判断条件 <font color="#DC4040" size="4" face="黑体">else</font> <strong>y</strong></p></li> <li><p>运算规则:</p> <p>如果判断条件的布尔值为<font color="#DC4040" size="4" face="黑体">True</font>,条件表达式的返回值为<font color="#DC4040" size="4" face="黑体">x</font>,<font color="#DC4040" size="4" face="黑体">否则</font>条件表达式的返回值为<font color="#DC4040" size="4" face="黑体">False</font></p></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/12 20:43
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token triple-quoted-string string">'''从键盘录入两个整数,比较两个整数的大小'''</span>
num_a<span class="token operator">=</span><span class="token builtin">int</span><span class="token punctuation">(</span><span class="token builtin">input</span><span class="token punctuation">(</span><span class="token string">'请输入第一个整数:'</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
num_b<span class="token operator">=</span><span class="token builtin">int</span><span class="token punctuation">(</span><span class="token builtin">input</span><span class="token punctuation">(</span><span class="token string">'请输入第二个整数:'</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token comment"># 比较大小</span>
<span class="token triple-quoted-string string">'''if num_a &gt;num_b:
    print(num_a,'大于等于',num_b)
else:
    print(num_a,'小于',num_b)'''</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'需要使用条件表达式:'</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>  <span class="token builtin">str</span><span class="token punctuation">(</span>num_a<span class="token punctuation">)</span><span class="token operator">+</span><span class="token string">'大于等于'</span><span class="token operator">+</span><span class="token builtin">str</span><span class="token punctuation">(</span>num_b<span class="token punctuation">)</span> <span class="token keyword">if</span> num_a<span class="token operator">&gt;=</span>num_b <span class="token keyword">else</span> <span class="token builtin">str</span><span class="token punctuation">(</span>num_a<span class="token punctuation">)</span><span class="token operator">+</span><span class="token string">'小于'</span><span class="token operator">+</span><span class="token builtin">str</span><span class="token punctuation">(</span>num_b<span class="token punctuation">)</span> <span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><h2 id="pass-语句"><a href="#pass-语句" class="header-anchor">#</a> pass 语句</h2> <ul><li><p>pass 语句</p> <ul><li><p>语句什么都不做,只是一个占位符，用在语法上需要语句的地方</p></li> <li><p><strong>什么时候使用</strong></p> <p>先搭建语法结构,还没想好代码怎么写的时候</p></li> <li><p><strong>哪些语句一起使用</strong></p> <ul><li>if语句的条件执行体</li> <li>for-in语句的循环体</li> <li>定义函数时的函数体</li></ul></li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/10/13 19:03
@Version    :1.0
&quot;&quot;&quot;</span>

<span class="token comment"># pass语句，什么都不做，</span>
answer<span class="token operator">=</span><span class="token builtin">input</span><span class="token punctuation">(</span><span class="token string">'请输入您是会员吗?'</span><span class="token punctuation">)</span>


<span class="token comment"># 判断是否为会员</span>
<span class="token keyword">if</span> answer<span class="token operator">==</span><span class="token string">'y'</span><span class="token punctuation">:</span>
    <span class="token keyword">pass</span>
<span class="token keyword">else</span><span class="token punctuation">:</span>
    <span class="token keyword">pass</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/main/docs/30.Python/10.Python Basics/04.Python 基础篇(四).md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=Python" title="标签">#Python</a></div> <div class="last-updated"><span class="prefix">last Updated:</span> <span class="time">2023/03/23, 15:21:41</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/fe07fb/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Python 基础篇(三)</div></a> <a href="/pages/bdc751/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Python 基础篇(五)</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
