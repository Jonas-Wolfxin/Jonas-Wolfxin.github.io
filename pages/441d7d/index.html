>无线网络的覆盖范围各不相同, WLAN, WMAN, WWAN等</li></ul></blockquote> <h2 id="基本的无线设备"><a href="#基本的无线设备" class="header-anchor">#</a> 基本的无线设备</h2> <h3 id="access-point"><a href="#access-point" class="header-anchor">#</a> Access Point</h3> <blockquote><p>通常分为两类: 独立AP 和 无线路由器; 功能如下:</p> <ul><li>终端设备的连接点, 工作在半双工模式;</li> <li>保存着无线数据帧里面的终端设备的MAC地址信息;</li> <li>可提供 NAT 和 DHCP 功能</li></ul></blockquote> <p>在简单的WLAN 中，至少需要给AP 配置SSID ，但也应设置频道和身份验证方法。</p> <p>安装AP 时，务必修改默认的SSID 和管理员密码。</p> <h3 id="wnic"><a href="#wnic" class="header-anchor">#</a> WNIC</h3> <blockquote><p>Wireless Network Interface Card (WNIC), 无线网卡, 所做的工作跟有线网卡NIC差不多</p></blockquote> <h3 id="wireless-antennas无线天线"><a href="#wireless-antennas无线天线" class="header-anchor">#</a> Wireless Antennas无线天线:</h3> <blockquote><ul><li>全向天线: 点到多点</li> <li>定向天线: 点到点,</li></ul> <p>在增益相同的情况下，定向天线的覆盖范围通常比全向天线大。因为定向天线将全部功率都用于一个方向。全向天线必须在所有方向上平均分配功率。定向天线的一个缺点是，必须更准确地对准通信点。这也是大多数AP 都使用全向天线的原因所在。</p></blockquote> <blockquote><h4 id="tips"><a href="#tips" class="header-anchor">#</a> Tips:</h4> <p>在办公室安装AP 时，务必让夭线远离带金属的设备，以免信号被阻断或反射。</p></blockquote> <h2 id="无线管制"><a href="#无线管制" class="header-anchor">#</a> 无线管制</h2> <p>大多数无线网络都使用ISM (Industrial 、Scientific and Medical)频段。</p> <p>IEEE 通信委员会定义了多个网络通信领域，而这些领域被进一步划分成工作组。这就是当今的
大多数网络协议都以802 打头的原因一-80 表示1980 年， 2 表示二月份。所有厂商在生产无线设备时都遵守IEEE 802.11 系列协议规范，因此，每台元线设备的第1 层和第2 层的功能都是由IEEE 802.11系列协议定义的。</p> <h3 id="ieee-802-11-传输"><a href="#ieee-802-11-传输" class="header-anchor">#</a> IEEE 802.11 传输</h3> <ul><li>双向通信、</li> <li>使用相同的频率</li> <li>工作模式为半双工, 即收发数据不能同时传输和接收</li></ul> <h3 id="无需许可的频段"><a href="#无需许可的频段" class="header-anchor">#</a> 无需许可的频段</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220629210833397.png" alt="image-20220629210833397"></p> <p>联邦通信委员会(FCC)(职责是管制美国的无线设备使用)批准了3个无需许可的( unlicensed) 频段供公众使用一-900MHz、2.4GHz和5GHz，但据说不久后将批准其他一些频段。频段900MHz和2.4 GHz被称为IBM 频段，而5GHz频段被称为无需许可的国家信息基础设施( Unlicensed National Information Infrastructure , UNII) 频段。</p> <h3 id="_802-11-标准"><a href="#_802-11-标准" class="header-anchor">#</a> 802.11 标准</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220630000722567.png" alt="image-20220630000722567"></p> <blockquote><ul><li><p>802.11
　　IEEE最初制定的一个无线局域网标准，主要用于解决办公室局域网和校园网中用户与用户终端的无线接入，业务主要限于数据存取，速率最高只能达到2Mbps。由于它在速率和传输距离上都不能满足人们的需要，因此，IEEE小组又相继推出了802.11b和802.11a两个新标准，前者已经成为目前的主流标准，而后者也被很
多厂商看好。</p></li> <li><p>==802.11a== <code>5GHz</code> <code>54Mbps</code></p> <p>802.11a（Wi-Fi5）标准是得到广泛应用的802.11b标准的后续标准。它工作在<code>5GHz</code> U-NII频带，物理层速率可达<code>54Mbps</code>，传输层可达25Mbps。可提供25Mbps的无线ATM接口和10Mbps的以太网无线帧结构接口，以及TDD/TDMA的空中接口；支持语音、数据、图像业务；一个扇区可接入多个用户，每个用户可带多个用户终端。</p> <blockquote><p>优点:</p> <ul><li>使用5 GHz 频段，不受使用2.4 GHz 频段的设备(如微波炉、无线电话和蓝牙设备)的干扰。</li></ul></blockquote></li> <li><p>==802.11b== <code>2.4GHz</code> <code>11Mbit/s</code> <code>3个互不重叠的频道</code>  --&gt; 进阶版是 <code>IEEE 802.11g</code></p> <ul><li><p>IEEE 802.11b是无线局域网的一个标准。其载波的频率为<code>2.4GHz</code>，最大数据传输速率为<code>11Mbit/s</code>。IEEE 802.11b是所有无线局域网标准中最著名，也是普及最广的标准。它有时也被错误地标为Wi-Fi。实际上Wi-Fi是无线局域网联盟（WLANA）的一个商标，该商标仅保障使用该商标的商品互相之间可以合作，与标准本身实际上没有关系。在2.4-GHz-ISM频段共有14个频宽为22MHz的频道可供使用。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220629213015459.png" alt="image-20220629213015459"></p></li> <li><p>802.11b 的问题在于处理数据链路层的方式。为解决盯频谱存在的问题，创建了以太网冲突检测机制的另一种形式，名为载波侦昕多路访问/冲突避免(CSMA/CA)。鉴于CSMNCA 要求的主机与接入点的通信方式，它也被称为请求发送/清除发送RTS/CTS)。发送的每个分组都必须收到一个RTS/CTS 和一个确认，这完全无法满足当今的联网需求。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220629212844219.png" alt="image-20220629212844219"></p></li> <li><p>IEEE 802.11b的后继标准是<code>IEEE 802.11g</code>，其传送速度为<code>54Mbit/s</code>。</p></li></ul></li> <li><p>802.11e
　　802.11e是IEEE为满足服务质量(Qos)方面的要求而制订的WLAN标准。在一些语音、视频等的传输中，Qos是非常重要的指标。在802.11MAC层，802.11e加入了Qos功能，它的分布式控制模式可提供稳定合理的服务质量，而集中控制模式可灵活支持多种服务质量策略，让影音传输能及时、定量、保证多媒体的顺畅应用，WIFI联盟将此称为WMM(wi-fi multimedia) 。</p></li> <li><p>802.11f
　　802.11f追加了IAPP（inter-access point protocol）协定，确保用户端在不同接入点间的漫游，让用户端能平顺、无形地切换存取区域。 802.11f标准确定了在同一网络内接入点的登陆，以及用户从一个接入点切换到另一个接入点时的信息交换。</p></li> <li><p>==802.11g==   <code>2.4GHz</code> <code>54Mbit/s</code></p> <p>IEEE 802.11g 2003年7月，通过了第三种调变标准。其载波的频率为<code>2.4GHz</code>(跟802.11b相同)，原始传送速度为<code>54Mbit/s</code>，净传输速度约为24.7Mbit/s(跟802.11a相同)。802.11g的设备与802.11b兼容。802.11g是为了提高更高的传输速率而制定的标准，它采用2.4GHz频段，使用CCK技术与802.11b(Wi-Fi)后向兼容，同时它又通过采用<code>OFDM</code>技术支持高达54Mbit/s的数据流，所提供的带宽是802.11a的1.5倍。从802.11b到802.11g，可发现WLAN标准不断发展的轨迹：802.11b是所有WLAN标准演进的基石，未来许多的系统大都需要与802.11b向后向兼容，802.11a是一个非全球性的标准，与802.11b后向不兼容，但采用OFDM技术，支持的数据流高达54Mbit/s，提供几倍于802.11b/g的高速信道，如802.11b/g提供3个非重叠信道可达8-12个;可以看出，在802.11g和802.11a之间存在与Wi-Fi兼容性上的差距，为此出现了一种桥接此差距的双频技术——双模(dual band)<code>802.11a+g</code>(=b),它较好地融合了802.11a/g技术，工作在2.4GHz和5GHz两个频段，服从802.11b/g/a等标准，与802.11b后向兼容，使用户简单连接到现有或未来的802.11网络成为可能。</p> <blockquote><ul><li>犹如以太网和快速以太网，在同一个网络中也可混合使用802.11g 产品和802.11b 产品。但与以太网不同的是，如果有4位用户使用的是802.11g ，而有1位用户使用的是802.11b ，则连接到同一个接入点的所有用户都将被迫使用CSMNCA 方法，这太糟糕了，吞吐量将因此而降低。为优化性能，推荐在所有接人点上都禁用802.11b模式。</li> <li>802.11b 使用的调制方法为<code>直接序列扩频</code>( Direct Sequence Spread ~
Spectrum, DSSS)，这种调制方法没有802.11g 和802.11a 使用的调制方法一一<code>正交频分多路复用</code>( Orthogonal Frequency Division Multiplexi吨， OFDM) 那么健壮。在传输距离相同的情况下，使用一一OFDM 的802.11g 客户端的性能要比802.11b 客户端好得多，</li></ul></blockquote></li> <li><p>802.11h
　　是为了与欧洲的HiperLAN2相协调的修订标准，美国和欧洲在5GHz频段上的规划、应用上存在差异，这一标准的制订目的，是为了减少对同处于5GHz频段的雷达的干扰。类似的还有802.16（WIMAX），其中802.16B即是为了与Wireless HUMAN协调所制订。 802.11h涉及两种技术，一种是动态频率选择(DFS)，即接入点不停地扫描信道上的雷达，接入点和相关的基站随时改变频率，最大限度地减少干扰，均匀分配WLAN流
量；另一种技术是传输功率控制(TPC)，总的传输功率或干扰将减少3dB。</p></li> <li><p>802.11i
　　IEEE 802.11i是IEEE为了弥补802.11脆弱的安全加密功能（WEP, Wired Equivalent Privacy）而制定的修正案，于2004年7月完成。其中定义了基于AES的全新加密协议CCMP（CTR with CBC-MAC Protocol），以及向前兼容RC4的加密协议TKIP（Temporal Key Integrity Protocol）。 　　无线网络中的安全问题从暴露到最终解决经历了相当的时间，而各大厂通信芯片商显然无法接受在这期间什么都不出售，所以迫不及待的Wi-Fi厂商采用802.11i的草案3为蓝图设计了一系列通信设备，随后称之为支持WPA（Wi-Fi Protected Access）的；之后称将支持802.11i 最终版协议的通信设备称为支持WPA2（Wi-Fi Protected Access 2）的。</p></li> <li><p>802.11j
　　它是为适应日本在5GHz以上应用不同而定制的标准，日本从4.9GHz开始运用，同时，他们的功率也各不
相同，例如同为5.15-5.25GHz的频段，欧洲允许200MW功率，日本仅允许160MW。</p></li> <li><p>802.11k
　　802.11k为无线局域网应该如何进行信道选择、漫游服务和传输功率控制提供了标准。他提供无线资源管理，让频段（BAND）、通道（CHANNEL）、载波（CARRIER）等更灵活动态地调整、调度，使有限的频段在整体运用效益上获得提升。在一个无线局域网内，每个设备通常连接到提供最强信号的接入点。这种管理有时可能导致对一个接入点过度需求并且会使其他接入点利用率降低，从而导致整个网络的性能降低，这主要是由接入用户的数目及地理位置决定的。在一个遵守802.11k规范的网络中，如果具有最强信号的接入点以其最大容量加载，而一个无线设备连接到一个利用率较低的接入点，在这种情况下，即使其信号可能比较弱，但是总体吞吐量还是比较大的，这是因为这时网络资源得到了更加有效的利用。</p></li> <li><p>==802.11n== <code>(2.4 GHz/ 5GHz)</code> <code>540Mbit/s</code>
　　IEEE 802.11n，2004年1月IEEE宣布组成一个新的单位来发展新的802.11标准。传输速率估计将达<code>540Mbit/s</code>(需要在物理层产生更高速度的传输率)，此项新标准应该要比802.11b快上50倍，而比802.11g快上10倍左右。802.11n也将会比目前的无线网络传送到更远的距离。</p> <p>目前在802.11n有两个提议在互相竞争中:</p> <ul><li>WWiSE (World-Wide Spectrum Efficiency) 以Broadcom为首的一些厂商支持。</li> <li>TGn Sync 由Intel与Philips所支持。</li></ul> <blockquote><p>三大优点:</p> <ul><li><code>40 MHz 频道</code> 802.11g 和802.11a 使用20 MHz频道，并在频道两端利用未用的音调(tone)来保护主载波。这意味着有11 Mbit/s 的带宽未用，这基本上被浪费掉了。802.11n 合并两个载波，让传输速度翻倍，从54 Mbi的提高到108 Mbit/s; 再加上原本被浪费的11 Mbi恼，总传输速度达119 Mbps!</li> <li>MAC效率 802.11协议要求对每个帧进行确认，而802.11n 可在传输很多分组后才确认一次，从而节省了大量开销。这被称为<code>块确认(block acknowledgment)</code>。</li> <li>支持<code>MIMO (multiple-input multiple-output)</code>. 多根天线通过多条路径发送多个帧，并在接收端出另一组天线进行重组，从而提高了吞吐量。这被称为空间多路复用(spatial multiplexing)。</li></ul></blockquote></li> <li><p>802.11o
　　针对VOWLAN（Voice over WLAN）而制订，更快速的无限跨区切换，以及读取语音（voice）比数据（Data）有更高的传输优先权。</p></li> <li><p>802.11p
　　802.11p是车载环境无线接入的标准。最初的设订是在300M距离内能有6MBPS的传输速度。它工作于5.9GHz的频段，并拥有1000英尺的传输距离和6Mbps的数据速率。802.11p将能用于收费站交费、汽车安全业务、通过汽车的电子商务等很多方面。从技术上来看，802.11p对802.11进行了多项针对汽车这样的特殊环境的改进，如热点间切换更先进、更支持移动环境、增强了安全性、加强了身份认证等等。</p></li> <li><p>802.11q</p> <p>制订支援VLAN （virtual LAN,虚拟区域网路）的机制 。</p></li> <li><p>802.11r 快速漫游
　　802．11r标准，着眼于减少漫游时认证所需的时间，这将有助于支持语音等实时应用。使用无线电话技术的移动用户必须能够从一个接入点迅速断开连接，并重新连接到另一个接入点。这个切换过程中的延迟时间不应该超过50毫秒，因为这是人耳能够感觉到的时间间隔。但是目前802.11网络在漫游时的平均延迟是几百毫秒，这直接导致传输过程中的断续，造成连接丢失和语音质量下降。所以对广泛使用的基于802.11的无线语音通讯来说，更快的切换是非常关键的。802.11r改善了移动的客户端设备在接入点之间运动时的切换过程。协议允许一个无线客户机在实现切换之前，就建立起与新接入点之间安全且具备
QoS的状态，这会将连接损失和通话中断减到最小。</p></li> <li><p>802.11s
　　制订与实现目前最先进的MESH网路，提供自主性组态（self-configuring）,自主性修复（self-healing）等能力。无线网状网可以把多个无线局域网连在一起从而能覆盖一个大学校园或整个城市。当一个新接入点加入进来时，它可以自动完成安全和服务质量方面的设置。整个网状网的数据包会自动避开繁忙的接入点，找到最好的路由线。目前关于该标准共有15个提案。IEEE可能在2008年正式认可该标准。</p></li> <li><p>802.11t
　　提供提高无线电广播链路特征评估和衡量标准的一致性方法标准，衡量无线网络性能</p></li></ul></blockquote> <h2 id="无线拓扑"><a href="#无线拓扑" class="header-anchor">#</a> 无线拓扑</h2> <h3 id="独立基本服务集-ibss"><a href="#独立基本服务集-ibss" class="header-anchor">#</a> 独立基本服务集(IBSS)</h3> <p>Independent Basic Service Set (Ad Hoc): 两台带无线NIC的笔记本电脑，如果两个网卡都设置为以ad hoc模式运行，它们的一些IP协议的基本配置参数相同, 它们就能相互连接并传输文件。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220630004158099.png" alt="image-20220630004158099"></p> <p>参考配置实验: <a href="https://blog.csdn.net/xionghuimin/article/details/103365917" target="_blank" rel="noopener noreferrer">组建Ad Hoc模式无线局域网<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h3 id="基本服务集-bss"><a href="#基本服务集-bss" class="header-anchor">#</a> 基本服务集(BSS)</h3> <p>Basic Service Set (BSS)基本服务集 是由AP提供的无线信号决定的区域(蜂窝)，也被称为基本服务区(BSA)。</p> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220630004225334.png" alt="image-20220630004225334"></p> <p>图14-8 是一个采用基础设施模式的典型无线网络，请特别注意接入点，它也连接到了有线网络。这种从接人点到有线网络的连接被称为DS (Dìstrubtìon System ，分发系统)， AP 通过它彼此交换有关其BSA 中主机的信息。AP 不通过无线网络彼此通信，而只通过DS彼此通信。</p> <h3 id="基础设施服务集"><a href="#基础设施服务集" class="header-anchor">#</a> 基础设施服务集</h3> <blockquote><ul><li><p>Infrastructure Basic Service Set, 在基础设施( infrastructure) 模式下，无线NIC只能与接入点通信，而不像在ad hoc模式下那样可直接彼此通信。</p></li> <li><p>无线主机要彼此通信以及与网络的有线部分通信，都必须经由接入点。接入点也连接到了有线网络, 这种从接人点到有线网络的连接被称为DS(Dìstrubtìon System，分发系统)， AP通过它彼此交换有关其BSA中主机的信息。AP不通过无线网络彼此通信，而只通过DS彼此通信。</p></li></ul></blockquote> <h3 id="ssid"><a href="#ssid" class="header-anchor">#</a> SSID</h3> <blockquote><ul><li>服务集标识符(SSID)是一个独一无二的32Bytes标识符（一般是32个ASCII字符），表示特定的无线网络，并定义了AP覆盖的BSA。</li> <li>SSID 是在AP上配置的，可广播出去，也可隐藏起来。如果SSID被隐藏，要让客户端能够连接到网络，必须配置无线配置文件，其中包括SSID。这比其他任何常规身份验证措施和安全措施都重要。</li></ul></blockquote> <h3 id="扩展服务集-ess"><a href="#扩展服务集-ess" class="header-anchor">#</a> 扩展服务集（ESS）</h3> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220630004908232.png" alt="image-20220630004908232"></p> <blockquote><ul><li><p>如果在所有接入点上设置了相同的SSID ，移动无线客户端将能够在网络中漫游。这是当今公司环境最常用的无线网络设计。</p></li> <li><p>这样做将创建扩展服务集(ESS)，其覆盖范围比单个接入点更大，并让用户能够在AP之间漫游，<code>相邻AP的蜂窝必须至少重叠10%-20%</code>，这样才不会中断网络连接。。为此，也必须让每个AP使用不同的频道(频率)。</p></li></ul></blockquote> <h3 id="在wlan中支持ip语音-voip"><a href="#在wlan中支持ip语音-voip" class="header-anchor">#</a> 在WLAN中支持IP语音（VoIP)</h3> <blockquote><p>LAN 和WLAN也可能包含VoIP设备。设计WLAN时，网络管理员必须考虑VoIP的独特要求，如带宽、优先级、延迟、为VoIP配置独立的VLAN并实现QoS以及供电方面的要求：</p> <ol><li>VoIP 数据流有特殊要求，如带宽、优先级和延迟;</li> <li>为避免冲突，应为IP 电话数据流和数据分别配置VLAN ，语音VLAN 在第11 章讨论过;</li> <li>思科VoIP电话通常采用<code>PoE</code> ，因此必须在网络中使用支持PoE的交换机;</li> <li>设计WLAN 时，必须考虑VoIP 设备及其<code>带宽需求</code>:</li> <li>要支持VoIP ，必须在WLANVLAN 中实现<code>QoS</code> 。</li></ol></blockquote> <h2 id="无线安全"><a href="#无线安全" class="header-anchor">#</a> 无线安全</h2> <h3 id="不限制接入"><a href="#不限制接入" class="header-anchor">#</a> 不限制接入</h3> <p>所有Wi-Fi认证的无线LAN 产品都支持&quot;不限制接入&quot;模式, 比如热点公共场所(如咖啡馆、大学校园和机场); 在企业, 家庭等场所应避免此模式.</p> <h3 id="ssid、wep-和-mac地址验证"><a href="#ssid、wep-和-mac地址验证" class="header-anchor">#</a> SSID、WEP 和 MAC地址验证</h3> <h4 id="ssid-2"><a href="#ssid-2" class="header-anchor">#</a> SSID</h4> <p>默认情况下，AP通过信标(beacon)每秒广播其SSID很多次。如果SSID被隐藏，要让客户端能够连接到网络，必须配置无线配置文件，其中包括SSID。这比其他任何常规身份验证措施和安全措施都重要。</p> <h4 id="wep"><a href="#wep" class="header-anchor">#</a> WEP</h4> <blockquote><ul><li><p>Wired Equivalent Privacy，有线等效保密协议 是对在两台<a href="https://baike.baidu.com/item/%E8%AE%BE%E5%A4%87%E9%97%B4" target="_blank" rel="noopener noreferrer">设备间<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a><a href="https://baike.baidu.com/item/%E6%97%A0%E7%BA%BF%E4%BC%A0%E8%BE%93/5127153" target="_blank" rel="noopener noreferrer">无线传输<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>的数据进行加密的方式，用以防止非法用户<a href="https://baike.baidu.com/item/%E7%AA%83%E5%90%AC/1624599" target="_blank" rel="noopener noreferrer">窃听<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>或侵入<a href="https://baike.baidu.com/item/%E6%97%A0%E7%BA%BF%E7%BD%91%E7%BB%9C/169080" target="_blank" rel="noopener noreferrer">无线网络<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>。</p></li> <li><p>使用RC4加密算法, 密钥长40位或128位，通常是由网络管理员在接入点以及与接人点通信的所有客户端上静态配置的。使用静态WEP密钥时，网络管理员必须在WLAN的每台设备中输入相同的密钥，这将耗费大量的时间。显然，在当今的大型公司无线网络中，这几乎是不可能完成的任务，必须有相应的解决方案。</p></li> <li><p>在2003年被 <a href="https://baike.baidu.com/item/Wi-Fi" target="_blank" rel="noopener noreferrer">Wi-Fi<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> Protected Access (WPA) 淘汰，又在2004年由完整的 IEEE <a href="https://baike.baidu.com/item/802.11i" target="_blank" rel="noopener noreferrer">802.11i<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 标准（又称为 WPA2）所取代。</p></li></ul></blockquote> <h4 id="mac地址验证"><a href="#mac地址验证" class="header-anchor">#</a> MAC地址验证</h4> <p>可在每个接入点静态地输入客户端的MAC地址，禁止MAC地址不包含在该过滤表中的客户端访问网络。这昕起来不错，但所有MAC 层信息都必须以明文方式发送，只要有免费的元钱嗅探器，就可读取客户端发送给接入点的分组，并伪造MAC 地址。</p> <h3 id="加密算法"><a href="#加密算法" class="header-anchor">#</a> 加密算法</h3> <h4 id="临时密钥完整性协议-tkip"><a href="#临时密钥完整性协议-tkip" class="header-anchor">#</a> 临时密钥完整性协议(TKIP)</h4> <blockquote><ol><li>基于<em>RC4 加密算法</em>的<code>TKIP</code>。Wi-Fi联盟于2002年年底发布了它，并称之为Wi-Fi安全访问( Wi-Fi Protected Access , ==WPA==);</li> <li>2004年夏天， IEEE 批准了最终的TKIP版本，它添加了更多的安全措施，如<code>802.1X</code>和<code>AES-CCMP</code>( AES-Counter Mode CBC-MAC Protocol , AES计数器模式及密码区块链信息、认证码协议). IEEE 802. 11i-2004 发布后， Wi-Fi联盟作出了积极响应，全面支持这个完整的规范，并出于市场营销目的称之为==WPA2==。</li></ol></blockquote> <h4 id="aes"><a href="#aes" class="header-anchor">#</a> AES</h4> <blockquote><ul><li>WPA2和标准802.11i 都要求使用128位高级加密标准(AES)对数据进行加密。AES被公认为当今最好的加密算法</li> <li>AES 唯一的缺点是，鉴于其计算需求，需要有加密处理器才能运行它。但相比于RC4，其效率要高得多，且安全性要好得多。</li></ul></blockquote> <h3 id="wi-fi-安全访问-wpa"><a href="#wi-fi-安全访问-wpa" class="header-anchor">#</a> Wi-Fi 安全访问(WPA)</h3> <blockquote><ul><li><p>个人模式使用<code>预共享密钥</code>进行身份验证，而企业模式使用身份验证方法802.1x 和EAP。</p></li> <li><p>WPA是一种WLAN身份验证和加密标准，旨在解决2003年及之前发现的安全问题，这包括广为人知的AirSnort 和中间人攻击。</p></li> <li><p>WPA 是迈向IEEE 802.11i 标准的重要一步，它使用的众多组件都与IEEE 802.11i 标准相同，只有加密例外:</p> <ul><li><strong>802.11i 使用AES 加密</strong>;</li> <li><strong>WPA 使用临时密钥完整性协议(TKIP) ，这包括密钥轮换(不断改变的动态密钥)和帧排序</strong>。</li></ul></li></ul></blockquote> <h4 id="wpa-和wpa2预共享密钥模式-psk"><a href="#wpa-和wpa2预共享密钥模式-psk" class="header-anchor">#</a> WPA 和WPA2预共享密钥模式(PSK):</h4> <blockquote><ul><li>PSK在客户端设备和接人点通过密码或验证码(也叫通行码)来验证用户。仅当客户端的密码与接入点的密码匹配时，客户端才能访问网络。</li> <li>PSK 还提供了密钥生成材料(keying material)，供TKIP(WPA) 或CCMP (AES) 用来为传输的每个分组生成加密密钥。</li></ul></blockquote> <h4 id="wpa和wpa2企业模式-eap"><a href="#wpa和wpa2企业模式-eap" class="header-anchor">#</a> WPA和WPA2企业模式(EAP):</h4> <blockquote><h6 id="wpa-和wpa2支持一种企业身份验证方法一一可扩展的身份验证协议-eap-。在当今的网络中-可使用如下eap"><a href="#wpa-和wpa2支持一种企业身份验证方法一一可扩展的身份验证协议-eap-。在当今的网络中-可使用如下eap" class="header-anchor">#</a> WPA 和WPA2支持一种<code>企业身份验证</code>方法一一可扩展的身份验证协议(EAP)。在当今的网络中，可使用如下EAP:</h6> <ul><li><code>Local EAP</code> 通常将<code>RADIUS服务器</code>用作身份验证服务器，但可对AP进行配置，使其同时充当身份验证者和身份验证服务器，这被称为本地EAP。用于对用户进行身份验证的数据库可存储在AP处，也可存储在诸如活动目录等LDAP服务器处。</li> <li><code>LEAP</code> (轻量级EAP) 是思科于2000年开发的一种方法，经思科许可，该方法被众多非思科设备采用，它只使用用户名和密码。</li> <li><code>PEAP</code> PEAP (受保护的EAP) 只要求服务器有证书; EAP-TLS要求服务器和工作站都有证书，EAP-FAST 不要求任何一方有证书。</li> <li><code>EAP-TLS</code> EAP-TLS (EAP 传输层安全)是最安全的方法，但也是最难配置和维护的。要使用EAP-TLS，必须在身份验证服务器和客户端都安装证书。</li> <li><code>EAP-FAST</code> EAP-FAST 指的是通过安全隧道进行灵活身份验证的EAP (EAP-F1exible
Authentication via Secure Tunneling) ，它提供的安全等级与EAP-TLS相同，但无需管理证书。</li></ul></blockquote> <blockquote><h6 id="大多数eap都包含3个组件"><a href="#大多数eap都包含3个组件" class="header-anchor">#</a> 大多数EAP都包含3个组件:</h6> <ul><li>身份验证者;</li> <li>申请者;</li> <li>身份验证服务器;</li></ul></blockquote> <blockquote><h6 id="鉴于身份验证服务器通常为radius服务器-下面简要地介绍一下radius。远程验证拨号用户服务-radius-是一种联网协议-提供了一些很好的安全功能"><a href="#鉴于身份验证服务器通常为radius服务器-下面简要地介绍一下radius。远程验证拨号用户服务-radius-是一种联网协议-提供了一些很好的安全功能" class="header-anchor">#</a> 鉴于身份验证服务器通常为RADIUS服务器，下面简要地介绍一下RADIUS。远程验证拨号用户服务(RADIUS) 是一种联网协议，提供了一些很好的安全功能:</h6> <ul><li>授权;</li> <li>集中访问控制;</li> <li>对连接并访问网络服务的用户和计算机进行记账监督。对于通过RADIUS 身份验证的用户或工作站，可指定其拥有的权限;</li> <li>控制设备或用户可在网络中做什么;</li> <li>将所有访问企图和操作都记录下来。</li></ul></blockquote> <p>身份验证(Authentication)、授权(Authorization)和记账(Accounting), 被称为AAA</p> <h3 id="_802-11i"><a href="#_802-11i" class="header-anchor">#</a> 802.11i;</h3> <p>802.11i 标准新增了一些功能:</p> <ul><li>指定了可使用的EAP 方法;</li> <li>使用加密方法AES-CCMP 而不是RC4;</li> <li>改善了密钥管理。主密钥可以被缓存，让工作站重新连接到网络的速度更快。</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Wolfxin/MyPicGo/img/image-20220630100658651.png" alt="image-20220630100658651"></p> <h2 id="问题"><a href="#问题" class="header-anchor">#</a> 问题</h2> <blockquote><ol><li>IEEE 802 .11b 支持的最大传输速度是多少?      11Mbps</li> <li>IEEE 802.11a 和 802.11g 支持的最大传输速度是多少?       54Mbps</li> <li>判断对错: TKIP加密是基于RC4 算法的。          对</li> <li>IEEE 802. l1 b 使用哪个频段?      2.4GHz</li> <li>IEEE 802. l1 g 使用哪个频段?      2.4GHz</li> <li>IEEE 802. l1 a 使用哪个频段?      5GHz</li> <li>802.11n 的哪项功能提高了MAC的传输效率?   块确认</li> <li>WPA2使用哪种加密方法?            AES-CCMP</li> <li>Wi-Fi 联盟认可了哪种IEEE标准，并称之为WPA2?   802.11i</li> <li>采用企业EAP 解决方案时，无线网络中必须有哪种设备?    RADIUS服务器</li></ol></blockquote></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/master/docs/40.网络运维/05.CCNA/10.CCNA知识笔记/12.WLAN 无线技术.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" ari
