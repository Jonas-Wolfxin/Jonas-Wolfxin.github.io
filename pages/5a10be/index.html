</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul> <h2 id="文件操作"><a href="#文件操作" class="header-anchor">#</a> 文件操作</h2> <h3 id="文件的读写原理"><a href="#文件的读写原理" class="header-anchor">#</a> 文件的读写原理</h3> <ul><li>文件的读写俗称&quot;IO操作&quot;</li> <li>文件读写操作流程</li> <li>操作原理</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/14/02.png" alt="02"></p> <h3 id="文件的读写操作"><a href="#文件的读写操作" class="header-anchor">#</a> 文件的读写操作</h3> <ul><li>内置函数open()创建文件对象</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/14/03.png" alt="03"></p> <ul><li>语法规则</li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/14/04.png" alt="04"></p> <ol><li><p>创建一个file文件</p> <div class="language-dockerfile line-numbers-mode"><pre class="language-dockerfile"><code>中国
美丽
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li> <li><p>读取</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/2 19:41

&quot;&quot;&quot;</span>
<span class="token builtin">file</span><span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'a.txt'</span><span class="token punctuation">,</span><span class="token string">'r'</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">file</span><span class="token punctuation">.</span>readlines<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#结果是 一个列表  #['中国\n', '美丽']</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br></div></div></li></ol> <h3 id="常用的文件打开模式"><a href="#常用的文件打开模式" class="header-anchor">#</a> 常用的文件打开模式</h3> <ul><li>文件的类型
<ul><li>按文件中数据的组织形式,文件分为以下两大类
<ul><li><font color="#DC4040" size="4" face="黑体">文本文件</font>:<strong>存储的是普通&quot;字符&quot;文本,默认为unicode字符集,可以使用记事本程序打开</strong></li> <li><font color="#DC4040" size="4" face="黑体">二进制文件</font>:<strong>把数据内容用&quot;字节&quot;进行存储,无法用记事本打开，必须使用专用的软件打开，举例:mp3音频文件，jpg图片.doc文档等</strong></li></ul></li></ul></li></ul> <table><thead><tr><th style="text-align:center;">打开模式</th> <th>描述</th></tr></thead> <tbody><tr><td style="text-align:center;">r</td> <td>以只读模式打开文件,文件的指针将会放在文件的开头</td></tr> <tr><td style="text-align:center;">w</td> <td>以只写模式打开文件，如果文件不存在则创建，如果文件存在，则覆盖原有内容，文件指针在文件开头</td></tr> <tr><td style="text-align:center;">a</td> <td>以追加模式打开文件，如果文件不存在则创建，文件指针在文件开头，如果文件存在，则在文件末尾追加内容，文件指针在原文件末尾</td></tr> <tr><td style="text-align:center;">b</td> <td>以二进制方式打开文件，不能单独使用，需要与共它模式一起使用,rb或者wb</td></tr> <tr><td style="text-align:center;">+</td> <td>以读写方式打开文件，不能单独使用，需要与其他模式一起使用，a+</td></tr></tbody></table> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/2 19:41
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token comment">#打开模式w</span>
<span class="token builtin">file</span><span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'b.txt'</span><span class="token punctuation">,</span><span class="token string">'w'</span><span class="token punctuation">)</span>
<span class="token comment"># file.write('Hello World')</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>write<span class="token punctuation">(</span><span class="token string">'Python'</span><span class="token punctuation">)</span>   <span class="token comment">#可以发现b.txt的Hello World 变成了 Python</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/2 19:41
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token comment">#打开模式a</span>
<span class="token builtin">file</span><span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'b.txt'</span><span class="token punctuation">,</span><span class="token string">'a'</span><span class="token punctuation">)</span>
<span class="token comment"># file.write('Hello World')</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>write<span class="token punctuation">(</span><span class="token string">'Python'</span><span class="token punctuation">)</span>      <span class="token comment">#运行两次 你将会看到三个Python(追加了两次)</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/2 19:41
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token comment">#打开模式rb</span>
src_file<span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'logo.png'</span><span class="token punctuation">,</span><span class="token string">'rb'</span><span class="token punctuation">)</span>
target_file<span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'copylogo.png'</span><span class="token punctuation">,</span><span class="token string">'wb'</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>target_file<span class="token punctuation">.</span>write<span class="token punctuation">(</span>src_file<span class="token punctuation">.</span>read<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
target_file<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><h2 id="文件对象的常用方法"><a href="#文件对象的常用方法" class="header-anchor">#</a> 文件对象的常用方法</h2> <ul><li>文件对象的常用方法</li></ul> <table><thead><tr><th>方法名</th> <th>说明</th></tr></thead> <tbody><tr><td>read([size])</td> <td>从文件中读取size个字节或字符的内容返回,若省略[size]，则读取到文件末尾，即一次读取文件所有内容</td></tr> <tr><td>readline()</td> <td>从文本文件中读取一行内容</td></tr> <tr><td>readlines()</td> <td>把文本文件中每一行都作为独立的字符串对象，并将这些对象放入列表返回</td></tr> <tr><td>write(str)</td> <td>将字符串str内容写入文件</td></tr> <tr><td>writelines(s_list)</td> <td>将字符串列表s_list写入文本文件,不添加换行符</td></tr> <tr><td>seek(offset[,whence])</td> <td>把文件指针移动到新的位置，offset表示相对于whence的位置:                                  offset:为正往结束方向移动,为负往开始方向移动                                                          whence不同的值代表不同含义:                                                                                        0:从文件开头计算(默认值)                                                                                                    1:从当前位置开始计算                                                                                                        2:从文件尾开始计算</td></tr> <tr><td>tell()</td> <td>返回文件指针的当前位置</td></tr> <tr><td>flush()</td> <td>把缓冲区的内容写入文件，但不关闭文件</td></tr> <tr><td>close()</td> <td>把缓冲区的内容写入文件，同时关闭文件，释放文件对象相关的资源</td></tr></tbody></table> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment">#读</span>
<span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/2 19:41
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token builtin">file</span><span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'a.txt'</span><span class="token punctuation">,</span><span class="token string">'r'</span><span class="token punctuation">)</span>
<span class="token comment"># print(file.read())  #读全部</span>
<span class="token comment"># print(file.readline())  #读一行</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">file</span><span class="token punctuation">.</span>readlines<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token comment">#读的内容返回列表返回</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment">#写</span>
<span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/2 19:41
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token builtin">file</span><span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'c.txt'</span><span class="token punctuation">,</span><span class="token string">'a'</span><span class="token punctuation">)</span> <span class="token comment">#追加</span>
<span class="token comment"># file.write('hello')</span>
lst<span class="token operator">=</span><span class="token punctuation">[</span><span class="token string">'java'</span><span class="token punctuation">,</span><span class="token string">'go'</span><span class="token punctuation">,</span><span class="token string">'python'</span><span class="token punctuation">]</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>writelines<span class="token punctuation">(</span>lst<span class="token punctuation">)</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/2 19:41
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token builtin">file</span><span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'c.txt'</span><span class="token punctuation">,</span><span class="token string">'r'</span><span class="token punctuation">)</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>seek<span class="token punctuation">(</span><span class="token number">2</span><span class="token punctuation">)</span>        <span class="token comment">#文件指针移动到位置2</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">file</span><span class="token punctuation">.</span>read<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#llojavagopython</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">file</span><span class="token punctuation">.</span>tell<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">)</span>  <span class="token comment">#17</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment">#flush和close</span>
<span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/3 22:52
@Version    :1.0
&quot;&quot;&quot;</span>
<span class="token builtin">file</span><span class="token operator">=</span><span class="token builtin">open</span><span class="token punctuation">(</span><span class="token string">'d.txt'</span><span class="token punctuation">,</span><span class="token string">'a'</span><span class="token punctuation">)</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>write<span class="token punctuation">(</span><span class="token string">'hello'</span><span class="token punctuation">)</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>flush<span class="token punctuation">(</span><span class="token punctuation">)</span>  <span class="token comment">#flush 之后可以继续 写入</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>write<span class="token punctuation">(</span><span class="token string">'World'</span><span class="token punctuation">)</span>
<span class="token builtin">file</span><span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment">#close之后就不能 继续写代码了</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><h2 id="with语句-上下文管理器"><a href="#with语句-上下文管理器" class="header-anchor">#</a> with语句(上下文管理器)</h2> <ul><li><strong>with语句可以自动管理上下文资源,不论什么原因跳出with块,都能确保文件正确的关闭,以此来达到释放资源的目的</strong></li></ul> <p><img src="https://cdn.staticaly.com/gh/xustudyxu/image-hosting@master/studynotes/Python/images/14/05.png" alt="05"></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">&quot;&quot;&quot;
@Author : Jonas Wolfxin
@Time   :2021/11/3 23:25
@Version    :1.0
&quot;&quot;&quot;</span>

        <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'exit方法被调用执行了...'</span><span class="token punctuation">)</span>   <span class="token comment">#3</span>
