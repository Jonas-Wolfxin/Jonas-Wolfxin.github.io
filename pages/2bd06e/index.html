Two possible paths exist:</div><div data-v-5c5bdb04="" data-v-7bd7ca31="" class="table markdown-table"><header data-v-5c5bdb04="" class="table-actions" style="position:sticky;left:0px;top:0px;"><span data-v-5c5bdb04="" class="table-title">Table</span> <div data-v-3827a86b="" data-v-5c5bdb04="" class="icon-button table-actions-icon" style="width:28px;height:28px;"><svg data-v-3827a86b="" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" width="20" height="20" viewBox="0 0 1024 1024" name="Copy" class="iconify"><path d="M725.333333 302.933333a166.4 166.4 0 0 1 166.4 166.4v256a166.4 166.4 0 0 1-166.4 166.4h-256A166.4 166.4 0 0 1 302.933333 725.333333v-256A166.4 166.4 0 0 1 469.333333 302.933333h256z m-256 76.8A89.6 89.6 0 0 0 379.733333 469.333333v256c0 49.493333 40.106667 89.6 89.6 89.6h256a89.6 89.6 0 0 0 89.6-89.6v-256A89.6 89.6 0 0 0 725.333333 379.733333h-256z" fill="currentColor"></path><path d="M554.666667 132.266667a166.4 166.4 0 0 1 144.128 83.2 38.4 38.4 0 0 1-66.517334 38.4A89.514667 89.514667 0 0 0 554.666667 209.066667H298.666667A89.6 89.6 0 0 0 209.066667 298.666667v256c0 33.109333 17.92 62.08 44.8 77.653333a38.4 38.4 0 0 1-38.4 66.474667A166.4 166.4 0 0 1 132.266667 554.666667V298.666667A166.4 166.4 0 0 1 298.666667 132.266667h256z" fill="currentColor"></path></svg></div> <div data-v-3827a86b="" data-v-5c5bdb04="" class="icon-button table-actions-icon" style="width:28px;height:28px;"><svg data-v-3827a86b="" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" width="20" height="20" viewBox="0 0 1024 1024" name="Download" class="iconify"><path d="M512 126.976a36.864 36.864 0 0 1 36.864 36.864v347.91424l119.11168-119.11168a36.864 36.864 0 1 1 52.14208 52.14208l-182.0672 182.02624a36.864 36.864 0 0 1-52.10112 0l-182.0672-182.02624a36.864 36.864 0 0 1 52.14208-52.14208l119.11168 119.11168V163.84a36.864 36.864 0 0 1 36.864-36.864zM184.32 564.71552a36.864 36.864 0 0 1 36.864 36.864v145.65376a35.96288 35.96288 0 0 0 35.96288 35.96288h509.70624a35.96288 35.96288 0 0 0 35.96288-35.96288v-145.65376a36.864 36.864 0 0 1 73.728 0v145.65376a109.69088 109.69088 0 0 1-109.69088 109.69088H257.14688A109.69088 109.69088 0 0 1 147.456 747.23328v-145.65376a36.864 36.864 0 0 1 36.864-36.864z" fill="currentColor"></path></svg></div></header> <div data-v-5c5bdb04="" class="table-container"><table data-v-5c5bdb04=""><thead data-v-5c5bdb04=""><tr data-v-5c5bdb04=""><th data-v-5c5bdb04="" align="left">Path</th><th data-v-5c5bdb04="" align="left">Route</th><th data-v-5c5bdb04="" align="left">Cost Calculation</th><th data-v-5c5bdb04="" align="left">Total</th></tr></thead> <tbody data-v-5c5bdb04=""><tr data-v-5c5bdb04=""><td data-v-5c5bdb04="" align="left"><strong data-v-5c5bdb04="">Direct</strong></td><td data-v-5c5bdb04="" align="left">Gi0/3 → DSW2</td><td data-v-5c5bdb04="" align="left">1 Gbps = <strong data-v-5c5bdb04="">4</strong></td><td data-v-5c5bdb04="" align="left"><strong data-v-5c5bdb04="">4</strong></td></tr><tr data-v-5c5bdb04=""><td data-v-5c5bdb04="" align="left"><strong data-v-5c5bdb04="">Via DSW1</strong></td><td data-v-5c5bdb04="" align="left">Gi0/2 → DSW1 → DSW2</td><td data-v-5c5bdb04="" align="left">10 Gbps + 10 Gbps = <strong data-v-5c5bdb04="">2 + 2</strong></td><td data-v-5c5bdb04="" align="left"><strong data-v-5c5bdb04="">4</strong></td></tr></tbody></table></div></div><div class="paragraph"><strong>3. Tiebreaker Rule</strong>
When path costs are equal, STP compares the <strong>sender's Bridge ID</strong>:</div><ul start="1"><li><div class="paragraph">Direct path sender: <strong>DSW2</strong> (BID: 24576)</div></li><li><div class="paragraph">Indirect path sender: DSW1 (BID: 28672)</div></li></ul><div class="paragraph">DSW2 wins (lower BID), so ALSW1 selects <strong>Gi0/2 as Root Port</strong> and <strong>blocks Gi0/1</strong> (facing DSW1) to prevent loops.</div><div class="paragraph"><strong>4. Traffic Path</strong>
Since the direct link to DSW1 is blocked, PC1's traffic must flow:
<strong>ALSW1 → DSW2 → DSW1</strong> (via the 10 Gbps DSW1-DSW2 trunk)</div><div class="paragraph"><strong>Answer: (B) PC1 goes from ALSW1 to DSW2 to DSW1.</strong></div></div></div></div></details> <hr> <h2 id="question-47"><a href="#question-47" class="header-anchor">#</a> Question 47</h2> <p>Refer to the exhibit. After an engineer configures an <strong>EtherChannel</strong> between switch SW1 and switch SW2, this error message is logged on switch SW2.</p> <p><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202603090239831.png" alt="image-20260309015135009"></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>SW2<span class="token comment">#</span>
09:45:32: %PM-4-ERR_DISABLE: channel-misconfig error detected on Gi0/0, putting Gi0/0 <span class="token keyword">in</span> err-disable state
09:45:32: %PM-4-ERR_DISABLE: channel-misconfig error detected on Gi0/1, putting Gi0/1 <span class="token keyword">in</span> err-disable state
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>Based on the output from switch SW1 and the log message received on switch SW2, what action should the engineer take to resolve this issue?</p> <ul><li><strong>(A)</strong> Configure the same protocol on the EtherChannel on switch SW1 and SW2.</li> <li><strong>(B)</strong> Connect the configuration error on interface Gi0/1 on switch SW1.</li> <li><strong>(C)</strong> Define the correct port members on the EtherChannel on switch SW1.</li> <li><strong>(D)</strong> Correct the configuration error on interface Gi0/0 switch SW1.</li></ul> <details><summary><b>Click to Reveal Answer &amp; Analysis</b></summary> <p class="ds-markdown-paragraph"><strong><span>Answer: (C)</span></strong></p> <div style="padding:15px;background:#f8f9fa;border-radius:8px;margin-top:10px;"><div class="ds-markdown" style="--ds-md-zoom:1.143;"><p class="ds-markdown-paragraph"><span>The correct action is to define the correct port members on the EtherChannel on switch SW1, as the output shows no ports are assigned to the port-channel, causing a mismatch with SW2's configuration.</span></p><p class="ds-markdown-paragraph"><strong><span>Explanation:</span></strong></p><ul><li><p class="ds-markdown-paragraph"><span>The </span><code>show etherchannel summary</code><span> on SW1 indicates that Port-channel 1 is in a suspended state (SD) with no member ports listed.</span></p></li><li><p class="ds-markdown-paragraph"><span>The error logs on SW2 show that both G0/0 and G0/1 were placed in err-disable state due to a channel-misconfig error, meaning the ports on SW2 are configured for EtherChannel but the neighbor (SW1) is not properly set up.</span></p></li><li><p class="ds-markdown-paragraph"><span>To resolve, SW1 must have its physical interfaces (G0/0 and G0/1) added to the EtherChannel, aligning with the configuration on SW2.</span></p></li></ul></div></div></details> <hr> <h2 id="question-48"><a href="#question-48" class="header-anchor">#</a> Question 48</h2> <p>Refer to the exhibit. Which type of antenna does the radiation pattern represent?</p> <p><img src="https://cdn.jsdelivr.net/gh/Jonas-Wolfxin/MyPicgo/img/202603090239059.png" alt="image-20260309021716433"></p> <ul><li><strong>(A)</strong> Yagi</li> <li><strong>(B)</strong> multidirectional</li> <li><strong>(C)</strong> directional patch</li> <li><strong>(D)</strong> omnidirectional</li></ul> <details><summary><b>Click to Reveal Answer &amp; Analysis</b></summary> <div style="padding:15px;background:#f8f9fa;border-radius:8px;margin-top:10px;"><p><b>Answer:</b> A
</p> <div data-v-b7eff404="" class="segment-content-box"><div data-v-7bd7ca31="" data-v-0460602e="" class="markdown-container"><div data-v-7bd7ca31="" class="markdown"><div class="paragraph">Based on the exhibit, the radiation pattern shows a strong, focused main lobe with smaller side lobes and back lobes. This indicates the antenna radiates RF power primarily in one specific direction, which is characteristic of a <strong>directional</strong> antenna.</div><div class="paragraph">While both &quot;directional patch&quot; and &quot;Yagi&quot; are types of directional antennas, the pattern shown—with its distinct, elongated main lobe and prominent side lobes—is most representative of a <strong>Yagi-Uda antenna</strong> (often simply called a Yagi). Yagi antennas are high-gain directional antennas commonly used for point-to-point communications, and their 3D radiation patterns are classically depicted with this &quot;carrot-like&quot; shape.</div><div class="paragraph"><strong>Correct Answer: D. Yagi</strong></div><div class="paragraph"><strong>Explanation of other options:</strong></div><ul start="1"><li><div class="paragraph"><strong>A. Multidirectional:</strong> This is not a standard antenna classification. The pattern shows a single focused beam, not radiation in multiple distinct directions.</div></li><li><div class="paragraph"><strong>B. Directional patch:</strong> While patch antennas are also directional, they typically have a different beam shape (often broader or specifically &quot;broadside&quot;), and the depicted pattern with distinct side lobes is more archetypal of a Yagi antenna.</div></li><li><div class="paragraph"><strong>C. Omnidirectional:</strong> An omnidirectional antenna (like a dipole) radiates equally in all horizontal directions, producing a doughnut-shaped (toroidal) pattern, which is clearly different from the focused beam shown.</div></li></ul></div></div></div></div></details> <hr> <h2 id="question-49"><a href="#question-49" class="header-anchor">#</a> Question 49</h2> <p>How do EIGRP metrics compare to OSPF metrics?</p> <ul><li><strong>(A)</strong> EIGRP metrics are based on a combination of bandwidth and packet loss, and OSPF metrics are based on interface bandwidth.</li> <li><strong>(B)</strong> EIGRP uses the Dijkstra algorithm, and OSPF uses The DUAL algorithm</li> <li><strong>(C)</strong> The EIGRP administrative distance for external routes is 170. and the OSPF administrative distance for external routes is undefined</li> <li><strong>(D)</strong> The EIGRP administrative distance for external routes is 170. and the OSPF administrative distance for external routes is 110</li></ul> <details><summary><b>Click to Reveal Answer &amp; Analysis</b></summary> <div data-v-b7eff404="" class="segment-content-box"><div data-v-7bd7ca31="" data-v-0460602e="" class="markdown-container"><div data-v-7bd7ca31="" class="markdown"><div class="paragraph">The correct answer is <strong>(D)</strong>.</div><div class="paragraph"><strong>Explanation:</strong></div><ul start="1"><li><div class="paragraph"><strong>Option (A)</strong> is incorrect because EIGRP metrics are calculated based on <strong>bandwidth and delay</strong> (by default), not packet loss. While EIGRP can consider reliability and load, packet loss is not a standard metric component.</div></li><li><div class="paragraph"><strong>Option (B)</strong> is incorrect because it reverses the algorithms: <strong>OSPF</strong> uses the <strong>Dijkstra</strong> (Shortest Path First) algorithm, while <strong>EIGRP</strong> uses the <strong>DUAL</strong> (Diffusing Update Algorithm).</div></li><li><div class="paragraph"><strong>Option (C)</strong> is incorrect because while it correctly states that EIGRP external routes have an administrative distance (AD) of <strong>170</strong>, OSPF external routes do have a defined AD of <strong>110</strong> (the same as OSPF internal routes).</div></li><li><div class="paragraph"><strong>Option (D)</strong> is correct. The EIGRP administrative distance for external routes (redistributed from other protocols) is indeed <strong>170</strong>, while the OSPF administrative distance for all routes (including external Type 5 and Type 7 LSAs) is <strong>110</strong>.</div></li></ul></div></div></div></details> <hr> <h2 id="question-50"><a href="#question-50" class="header-anchor">#</a> Question 50</h2> <p>What is a characteristic of YANG?</p> <ul><li><strong>(A)</strong> It is a Cisco proprietary language that models NETCONF data</li> <li><strong>(B)</strong> It allows model developers to create custom data types</li> <li><strong>(C)</strong> It structures data in an object-oriented fashion to promote model reuse</li> <li><strong>(D)</strong> It provides loops and conditionals to control now within models</li></ul> <details><summary><b>Click to Reveal Answer &amp; Analysis</b></summary> <div _ngcontent-ng-c2256536958="" inline-copy-host="" id="model-response-message-contentr_459e4232d80484a7" aria-live="polite" aria-busy="false" dir="ltr" class="markdown markdown-main-panel stronger enable-updated-hr-color" style="--animation-duration:400ms;--fade-animation-function:linear;"><p data-path-to-node="0">The correct answer is <b data-path-to-node="0" data-index-in-node="22">(B)</b>.</p><h3 data-path-to-node="1">Understanding YANG</h3><p data-path-to-node="2" id="p-rc_4a7837f1e4370fbd-40"><span class="citation-56"></span><b data-path-to-node="2" data-index-in-node="0"><span class="citation-56">YANG (Yet Another Next Generation)</span></b><span class="citation-56 citation-end-56"> is a data modeling language used to model configuration data, state data, Remote Procedure Calls (RPCs), and notifications for network management protocols like NETCONF and RESTCONF.<source-footnote ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c754948563=""><sup _ngcontent-ng-c754948563="" data-turn-source-index="1" class="superscript"></sup></source-footnote></span><sources-carousel-inline ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c694930324=""><source-inline-chip _ngcontent-ng-c694930324="" _nghost-ng-c3813189076="" class="ng-star-inserted"><div _ngcontent-ng-c3813189076="" class="source-inline-chip-container ng-star-inserted"><button _ngcontent-ng-c3813189076="" cdkoverlayorigin="" aria-label="查看来自“Juniper Networks”的引用内容的来源详情。打开侧边栏。" jslog="262206;track:generic_click,impression,attention;BardVeMetadataKey:[[&quot;r_459e4232d80484a7&quot;,&quot;c_7d66ca0bad373e11&quot;,null,&quot;rc_4a7837f1e4370fbd&quot;,null,null,&quot;en&quot;,null,1,null,null,1,0],null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,[0]]" data-hveid="0" decode-data-ved="1" data-ved="0CAAQvoAQahgKEwi-saahxJGTAxUAAAAAHQAAAAAQhQI" class="button ng-star-inserted"><mat-icon _ngcontent-ng-c3813189076="" role="img" fonticon="link" aria-hidden="true" data-mat-icon-type="font" data-mat-icon-name="link" class="mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted"></mat-icon></button></div></source-inline-chip></sources-carousel-inline></p><ul data-path-to-node="3"><li><p data-path-to-node="3,0,0" id="p-rc_4a7837f1e4370fbd-41"><b data-path-to-node="3,0,0" data-index-in-node="0">Why (B) is correct:</b> One of the core strengths of YANG is its extensibility. <span class="citation-55">Developers can define </span><b data-path-to-node="3,0,0" data-index-in-node="98"><span class="citation-55">typedefs</span></b><span class="citation-55 citation-end-55"> (derived types) to create custom data types based on built-in types (like integers or strings), but with specific constraints (like range, pattern, or length), allowing for strict validation of network data.<source-footnote ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c754948563=""><sup _ngcontent-ng-c754948563="" data-turn-source-index="2" class="superscript"></sup></source-footnote></span><sources-carousel-inline ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c694930324=""><source-inline-chip _ngcontent-ng-c694930324="" _nghost-ng-c3813189076="" class="ng-star-inserted"><div _ngcontent-ng-c3813189076="" class="source-inline-chip-container ng-star-inserted"><button _ngcontent-ng-c3813189076="" cdkoverlayorigin="" aria-label="查看来自“IETF | Internet Engineering Task Force”的引用内容的来源详情。打开侧边栏。" jslog="262206;track:generic_click,impression,attention;BardVeMetadataKey:[[&quot;r_459e4232d80484a7&quot;,&quot;c_7d66ca0bad373e11&quot;,null,&quot;rc_4a7837f1e4370fbd&quot;,null,null,&quot;en&quot;,null,1,null,null,1,0],null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,[0]]" data-hveid="0" decode-data-ved="1" data-ved="0CAAQvoAQahgKEwi-saahxJGTAxUAAAAAHQAAAAAQhgI" class="button ng-star-inserted"><mat-icon _ngcontent-ng-c3813189076="" role="img" fonticon="link" aria-hidden="true" data-mat-icon-type="font" data-mat-icon-name="link" class="mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted"></mat-icon></button></div></source-inline-chip></sources-carousel-inline></p></li></ul><hr data-path-to-node="4"><h3 data-path-to-node="5">Why the other options are incorrect:</h3><ul data-path-to-node="6"><li><p data-path-to-node="6,0,0" id="p-rc_4a7837f1e4370fbd-42"><b data-path-to-node="6,0,0" data-index-in-node="0">(A):</b> YANG is <b data-path-to-node="6,0,0" data-index-in-node="13">not proprietary</b>. <span class="citation-54 citation-end-54">It is an industry-standard language developed by the IETF (as defined in RFC 6020 and RFC 7950) to provide a vendor-neutral way to model data across different platforms.<source-footnote ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c754948563=""><sup _ngcontent-ng-c754948563="" data-turn-source-index="3" class="superscript"></sup></source-footnote></span><sources-carousel-inline ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c694930324=""><source-inline-chip _ngcontent-ng-c694930324="" _nghost-ng-c3813189076="" class="ng-star-inserted"><div _ngcontent-ng-c3813189076="" class="source-inline-chip-container ng-star-inserted"><button _ngcontent-ng-c3813189076="" cdkoverlayorigin="" aria-label="查看来自“Huawei”的引用内容的来源详情。打开侧边栏。" jslog="262206;track:generic_click,impression,attention;BardVeMetadataKey:[[&quot;r_459e4232d80484a7&quot;,&quot;c_7d66ca0bad373e11&quot;,null,&quot;rc_4a7837f1e4370fbd&quot;,null,null,&quot;en&quot;,null,1,null,null,1,0],null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,[0]]" data-hveid="0" decode-data-ved="1" data-ved="0CAAQvoAQahgKEwi-saahxJGTAxUAAAAAHQAAAAAQhwI" class="button ng-star-inserted"><mat-icon _ngcontent-ng-c3813189076="" role="img" fonticon="link" aria-hidden="true" data-mat-icon-type="font" data-mat-icon-name="link" class="mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted"></mat-icon></button></div></source-inline-chip></sources-carousel-inline></p></li><li><p data-path-to-node="6,1,0" id="p-rc_4a7837f1e4370fbd-43"><b data-path-to-node="6,1,0" data-index-in-node="0">(C):</b><span class="citation-53"> YANG uses a </span><b data-path-to-node="6,1,0" data-index-in-node="17"><span class="citation-53">hierarchical, tree-based structure</span></b><span class="citation-53 citation-end-53"> (specifically designed for nodes, lists, and containers) rather than an object-oriented paradigm.<source-footnote ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c754948563=""><sup _ngcontent-ng-c754948563="" data-turn-source-index="4" class="superscript"></sup></source-footnote></span> While it does support &quot;grouping&quot; and &quot;uses&quot; statements to promote module reuse, &quot;object-oriented&quot; is not the correct classification for its structural methodology.<sources-carousel-inline ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c694930324=""><source-inline-chip _ngcontent-ng-c694930324="" _nghost-ng-c3813189076="" class="ng-star-inserted"><div _ngcontent-ng-c3813189076="" class="source-inline-chip-container ng-star-inserted"><button _ngcontent-ng-c3813189076="" cdkoverlayorigin="" aria-label="查看来自“Juniper Networks”的引用内容的来源详情。打开侧边栏。" jslog="262206;track:generic_click,impression,attention;BardVeMetadataKey:[[&quot;r_459e4232d80484a7&quot;,&quot;c_7d66ca0bad373e11&quot;,null,&quot;rc_4a7837f1e4370fbd&quot;,null,null,&quot;en&quot;,null,1,null,null,1,0],null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,[0]]" data-hveid="0" decode-data-ved="1" data-ved="0CAAQvoAQahgKEwi-saahxJGTAxUAAAAAHQAAAAAQiAI" class="button ng-star-inserted"><mat-icon _ngcontent-ng-c3813189076="" role="img" fonticon="link" aria-hidden="true" data-mat-icon-type="font" data-mat-icon-name="link" class="mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted"></mat-icon></button></div></source-inline-chip></sources-carousel-inline></p></li><li><p data-path-to-node="6,2,0" id="p-rc_4a7837f1e4370fbd-44"><b data-path-to-node="6,2,0" data-index-in-node="0">(D):</b><span class="citation-52"> YANG is a </span><b data-path-to-node="6,2,0" data-index-in-node="15"><span class="citation-52">data modeling language, not a procedural programming language</span></b><span class="citation-52 citation-end-52">.<source-footnote ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c754948563=""><sup _ngcontent-ng-c754948563="" data-turn-source-index="5" class="superscript"></sup></source-footnote></span> It does not include loops or conditional logic (like <code data-path-to-node="6,2,0" data-index-in-node="131">if-then-else</code> or <code data-path-to-node="6,2,0" data-index-in-node="147">for</code> loops) for controlling execution flow within a model. <span class="citation-51">It is declarative, meaning it describes </span><i data-path-to-node="6,2,0" data-index-in-node="245"><span class="citation-51">what</span></i><span class="citation-51"> the data structure should look like, not </span><i data-path-to-node="6,2,0" data-index-in-node="291"><span class="citation-51">how</span></i><span class="citation-51 citation-end-51"> to process the logic of a program.<source-footnote ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c754948563=""><sup _ngcontent-ng-c754948563="" data-turn-source-index="6" class="superscript"></sup></source-footnote></span><sources-carousel-inline ng-version="0.0.0-PLACEHOLDER" _nghost-ng-c694930324=""><source-inline-chip _ngcontent-ng-c694930324="" _nghost-ng-c3813189076="" class="ng-star-inserted"><div _ngcontent-ng-c3813189076="" class="source-inline-chip-container ng-star-inserted"><button _ngcontent-ng-c3813189076="" cdkoverlayorigin="" aria-label="查看来自“IETF Datatracker和DEV Community”的引用内容的来源详情。打开侧边栏。" jslog="262206;track:generic_click;BardVeMetadataKey:[[&quot;r_459e4232d80484a7&quot;,&quot;c_7d66ca0bad373e11&quot;,null,&quot;rc_4a7837f1e4370fbd&quot;,null,null,&quot;en&quot;,null,1,null,null,1,0],null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,[0]]" class="button multiple-button ng-star-inserted"><span _ngcontent-ng-c3813189076="" hide-from-message-actions="" class="button-label gds-label-m hide-from-message-actions ng-star-inserted"><mat-icon _ngcontent-ng-c3813189076="" role="img" fonticon="link" aria-hidden="true" data-mat-icon-type="font" data-mat-icon-name="link" class="mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color"></mat-icon>+1</span></button></div></source-inline-chip></sources-carousel-inline></p></li></ul><hr data-path-to-node="7"><p data-path-to-node="8">Would you like me to explain how YANG modules are typically structured using containers and lists, or perhaps show you a brief example of a <code data-path-to-node="8" data-index-in-node="140">typedef</code>?</p></div></details> <hr></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Jonas-Wolfxin/Jonas-Wolfxin.github.io/edit/main/docs/40.网络运维/06.CCNP/20.CCNP题库/10.CCNP_350-401_ENCOR.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">last Updated:</span> <span class="time">2026/03/09, 03:14:14</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/f61749/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Getting Started with Cisco Packet Tracer</div></a> <a href="/pages/21317e/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">自动化运维</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
